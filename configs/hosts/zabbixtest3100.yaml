# Host configuration for zabbixtest3100
#
# This file links templates and sets macros on an existing Zabbix host.
# The host must already exist in Zabbix (created via auto-discovery or manually).
#
# Deploy with:
#   zbx apply configs/hosts/zabbixtest3100.yaml
#
# Or deploy everything at once (templates + host config):
#   zbx apply configs/

host: Zabbix server

templates:
  - monitoring-s3-users

macros:
  - macro: "{$S3_USER_PASSWORD}"
    value: "Y5XFtvNVffPyZA=="
    description: "S3 user password passed to getS3Storage.py"

  - macro: "{$S3_USER_GROUP}"
    value: "000311-cdn"
    description: "S3 user group passed to getS3Storage.py"
