template: VMware Hypervisor
description: "You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/.\r\
  \n\r\nThis template can be used in discovery as well as manually linked to a host.\
  \ To use this template as manually linked to a host, attach it to the host and set\
  \ manually the value of '{$VMWARE.HV.UUID}' macro.\r\n\r\nNote: To create custom\
  \ performance counter see documentation: https://www.zabbix.com/documentation/7.4/manual/vm_monitoring/vmware_keys#footnotes.\r\
  \n\r\nNote: To get all supported counters and generate path for custom performance\
  \ counter see documentation: https://www.zabbix.com/documentation/7.4/manual/appendix/items/perf_counters.\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Hypervisor ping
  key: icmpping[]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "Checks if the hypervisor is running and accepting ICMP pings. One\
    \ of the following:\r\n- Down;\r\n- Up."
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Cluster name
  key: vmware.hv.cluster.name[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Cluster name of the guest VM.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: cluster
- name: Connection state
  key: vmware.hv.connectionstate[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "VMware hypervisor connection state. One of the following:\r\n- Connected;\r\
    \n- Disconnected;\r\n- Not responding."
  history: 31d
  tags:
  - tag: component
    value: availability
- name: CPU usage in percent
  key: vmware.hv.cpu.usage.perf[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: CPU usage as a percentage during the interval.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU usage
  key: vmware.hv.cpu.usage[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: Hz
  description: Aggregated CPU usage across all cores on the host in Hz. This is only
    available if the host is connected.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU utilization
  key: vmware.hv.cpu.utilization[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: CPU utilization as a percentage during the interval depends on power
    management or hyper-threading.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Datacenter name
  key: vmware.hv.datacenter.name[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Datacenter name of the hypervisor.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: datacenter
- name: Full name
  key: vmware.hv.fullname[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: The complete product name, including the version information.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: CPU frequency
  key: vmware.hv.hw.cpu.freq[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  units: Hz
  description: The speed of the CPU cores. This is an average value if there are multiple
    speeds. The product of CPU frequency and the number of cores is approximately
    equal to the sum of the MHz for all the individual cores on the host.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU model
  key: vmware.hv.hw.cpu.model[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: The CPU model.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: cpu
- name: CPU cores
  key: vmware.hv.hw.cpu.num[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  description: Number of physical CPU cores on the host. Physical CPU cores are the
    processors contained by a CPU package.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU threads
  key: vmware.hv.hw.cpu.threads[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  description: Number of physical CPU threads on the host.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Total memory
  key: vmware.hv.hw.memory[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  units: B
  description: The physical memory size.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Model
  key: vmware.hv.hw.model[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: The system model identification.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Bios UUID
  key: vmware.hv.hw.uuid[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: The hardware BIOS identification.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Vendor
  key: vmware.hv.hw.vendor[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: The hardware vendor identification.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Ballooned memory
  key: vmware.hv.memory.size.ballooned[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of guest physical memory that is currently reclaimed through
    the balloon driver. Sum of all guest VMs.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Used memory
  key: vmware.hv.memory.used[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Physical memory usage on the host.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Number of bytes received
  key: vmware.hv.network.in[{$VMWARE.URL},{$VMWARE.HV.UUID},bps]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: Bps
  description: VMware hypervisor network input statistics (bytes per second).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of broadcasts received
  key: vmware.hv.network.in[{$VMWARE.URL},{$VMWARE.HV.UUID},broadcast]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network input statistics (broadcasts).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of dropped received packets
  key: vmware.hv.network.in[{$VMWARE.URL},{$VMWARE.HV.UUID},dropped]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network input statistics (packets dropped).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of errors received
  key: vmware.hv.network.in[{$VMWARE.URL},{$VMWARE.HV.UUID},errors]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network input statistics (errors).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of bytes transmitted
  key: vmware.hv.network.out[{$VMWARE.URL},{$VMWARE.HV.UUID},bps]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: Bps
  description: VMware hypervisor network output statistics (bytes per second).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of broadcasts transmitted
  key: vmware.hv.network.out[{$VMWARE.URL},{$VMWARE.HV.UUID},broadcast]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network output statistics (broadcasts).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of dropped transmitted packets
  key: vmware.hv.network.out[{$VMWARE.URL},{$VMWARE.HV.UUID},dropped]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network output statistics (packets dropped).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Number of errors transmitted
  key: vmware.hv.network.out[{$VMWARE.URL},{$VMWARE.HV.UUID},errors]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: VMware hypervisor network output statistics (errors).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Power usage maximum allowed
  key: vmware.hv.power[{$VMWARE.URL},{$VMWARE.HV.UUID},max]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: '!W'
  description: Maximum allowed power usage.
  history: 31d
  tags:
  - tag: component
    value: power
- name: Power usage
  key: vmware.hv.power[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: '!W'
  description: Current power usage.
  history: 31d
  tags:
  - tag: component
    value: power
- name: Get sensors
  key: vmware.hv.sensors.get[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: text
  description: Master item for sensor data.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Overall status
  key: vmware.hv.status[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The overall alarm status of the host. One of the following:\r\n- Gray:\
    \ Unknown;\r\n- Green: OK;\r\n- Yellow: It might have a problem;\r\n- Red: It\
    \ has a problem."
  history: 31d
  tags:
  - tag: component
    value: health
- name: Uptime
  key: vmware.hv.uptime[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: uptime
  description: System uptime.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Version
  key: vmware.hv.version[{$VMWARE.URL},{$VMWARE.HV.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Dot-separated version string.
  history: 31d
  trends: '0'
  tags:
  - tag: component
