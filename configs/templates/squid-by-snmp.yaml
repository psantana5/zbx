triggers:
- name: 'Squid: Port {$SQUID.HTTP.PORT} is down'
  expression: last(/Squid by SNMP/net.tcp.service[tcp,,3128])=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Squid: Swap usage is more than high watermark'
  expression: last(/Squid by SNMP/squid[cacheCurrentSwapSize])>last(/Squid by SNMP/squid[cacheSwapHighWM])*last(/Squid
    by SNMP/squid[cacheSwapMaxSize])/100
  severity: high
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Squid: Swap usage is more than low watermark'
  expression: last(/Squid by SNMP/squid[cacheCurrentSwapSize])>last(/Squid by SNMP/squid[cacheSwapLowWM])*last(/Squid
    by SNMP/squid[cacheSwapMaxSize])/100
  severity: warning
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Squid: Squid is running out of file descriptors'
  expression: last(/Squid by SNMP/squid[cacheCurrentUnusedFDescrCnt])<100
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Squid: High sys page faults rate'
  expression: avg(/Squid by SNMP/squid[cacheSysPageFaults],5m)>avg(/Squid by SNMP/squid[cacheProtoClientHttpRequests],5m)/100*90
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Squid: Squid has been restarted'
  expression: last(/Squid by SNMP/squid[cacheUptime])<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Squid: Squid version has been changed'
  expression: last(/Squid by SNMP/squid[cacheVersionId],#1)<>last(/Squid by SNMP/squid[cacheVersionId],#2)
    and length(last(/Squid by SNMP/squid[cacheVersionId]))>0
  severity: information
  description: Squid version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
