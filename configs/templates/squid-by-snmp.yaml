template: Squid by SNMP
description: "Template for monitoring Squid caching proxy via SNMP\r\n\r\nYou can\
  \ discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/409339-discussion-thread-for-official-zabbix-template-squid\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
