template: VMware Guest
description: "Note: To enable trigger for free space for guest VM, set macro '{$VMWARE.VM.FS.TRIGGER.USED}'\
  \ to the value '1' on the discovered host level.\r\n\r\nGenerated by official Zabbix\
  \ template tool \"Templator\""
groups:
- Templates
items:
- name: Cluster name
  key: vmware.vm.cluster.name[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Cluster name of the guest VM.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: cluster
- name: Snapshot consolidation needed
  key: vmware.vm.consolidationneeded[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "Displays whether snapshot consolidation is needed or not. One of the\
    \ following:\r\n- True;\r\n- False."
  history: 31d
  tags:
  - tag: component
    value: storage
- name: CPU latency in percent
  key: vmware.vm.cpu.latency[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: Percentage of time the VM is unable to run because it is contending
    for access to the physical CPU(s).
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Number of virtual CPUs
  key: vmware.vm.cpu.num[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  description: Number of virtual CPUs assigned to the guest.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU readiness latency in percent
  key: vmware.vm.cpu.readiness[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: Percentage of time that the virtual machine was ready, but was unable
    to get scheduled to run on the physical CPU.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU ready
  key: vmware.vm.cpu.ready[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: ms
  description: Time that the VM was ready, but unable to get scheduled to run on the
    physical CPU during the last measurement interval (VMware vCenter/ESXi Server
    performance counter sampling interval - 20 seconds).
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU swap-in latency in percent
  key: vmware.vm.cpu.swapwait[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: '%'
  description: Percentage of CPU time spent waiting for a swap-in.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU usage in percent
  key: vmware.vm.cpu.usage.perf[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: CPU usage as a percentage during the interval.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU usage
  key: vmware.vm.cpu.usage[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: Hz
  description: Current upper-bound on CPU usage. The upper-bound is based on the host
    the VM is current running on, as well as limits configured on the VM itself or
    any parent resource pool. Valid while the VM is running.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Datacenter name
  key: vmware.vm.datacenter.name[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Datacenter name of the guest VM.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: datacenter
- name: Guest memory swapped
  key: vmware.vm.guest.memory.size.swapped[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Amount of guest physical memory that is swapped out to the swap space.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Uptime of guest OS
  key: vmware.vm.guest.osuptime[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: uptime
  description: Total time elapsed since the last operating system boot-up (in seconds).
    Data is collected if Guest OS Add-ons (VMware Tools) are installed.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Hypervisor maintenance mode
  key: vmware.vm.hv.maintenance[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "Hypervisor maintenance mode. One of the following:\r\n- Normal mode;\r\
    \n- Maintenance mode."
  history: 31d
  tags:
  - tag: component
    value: system
- name: Hypervisor name
  key: vmware.vm.hv.name[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: char
  description: Hypervisor name of the guest VM.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: hypervisor
- name: Ballooned memory
  key: vmware.vm.memory.size.ballooned[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of guest physical memory that is currently reclaimed through
    the balloon driver.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Compressed memory
  key: vmware.vm.memory.size.compressed[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of memory currently in the compression cache for this VM.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Host memory consumed
  key: vmware.vm.memory.size.consumed[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Amount of host physical memory consumed for backing up guest physical
    memory pages.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Private memory
  key: vmware.vm.memory.size.private[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Amount of memory backed by host memory and not being shared.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Shared memory
  key: vmware.vm.memory.size.shared[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of guest physical memory shared through transparent page
    sharing.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Swapped memory
  key: vmware.vm.memory.size.swapped[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of guest physical memory swapped out to the VM's swap device
    by ESX.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Guest memory usage
  key: vmware.vm.memory.size.usage.guest[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of guest physical memory that is being used by the VM.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Host memory usage
  key: vmware.vm.memory.size.usage.host[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: The amount of host physical memory allocated to the VM, accounting
    for the amount saved from memory sharing with other VMs.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory size
  key: vmware.vm.memory.size[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: unsigned
  units: B
  description: Total size of configured memory.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Host memory usage in percent
  key: vmware.vm.memory.usage[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  units: '%'
  description: Percentage of host physical memory that has been consumed.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Power state
  key: vmware.vm.powerstate[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The current power state of the VM. One of the following:\r\n- Powered\
    \ off;\r\n- Powered on;\r\n- Suspended."
  history: 31d
  tags:
  - tag: component
    value: power
- name: Boot time
  key: vmware.vm.property[{$VMWARE.URL},{$VMWARE.VM.UUID},runtime.bootTime]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: unixtime
  description: System boot time.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Snapshot count
  key: vmware.vm.snapshot.count
  interval: '0'
  type: dependent
  master_item_key: vmware.vm.snapshot.get[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  value_type: unsigned
  description: Snapshot count of the guest VM.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Get snapshots
  key: vmware.vm.snapshot.get[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  value_type: text
  description: Snapshots of the guest VM.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Snapshot latest date
  key: vmware.vm.snapshot.latestdate
  interval: '0'
  type: dependent
  master_item_key: vmware.vm.snapshot.get[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  value_type: char
  description: Latest snapshot date of the guest VM.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: storage
- name: VM state
  key: vmware.vm.state[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "VMware virtual machine state. One of the following:\r\n- Not running;\r\
    \n- Resetting;\r\n- Running;\r\n- Shutting down;\r\n- Standby;\r\n- Unknown."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: system
- name: Committed storage space
  key: vmware.vm.storage.committed[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Total storage space, in bytes, committed to this VM across all datastores.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Uncommitted storage space
  key: vmware.vm.storage.uncommitted[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Additional storage space, in bytes, potentially used by this VM on
    all datastores.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Unshared storage space
  key: vmware.vm.storage.unshared[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: B
  description: Total storage space, in bytes, occupied by the VM across all datastores
    that is not shared with any other VM.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: VMware Tools status
  key: vmware.vm.tools[{$VMWARE.URL},{$VMWARE.VM.UUID},status]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "Monitoring of VMware Tools. One of the following:\r\n- Guest tools\
    \ executing scripts: VMware Tools is starting.\r\n- Guest tools not running: VMware\
    \ Tools is not running.\r\n- Guest tools running: VMware Tools is running."
  history: 31d
  tags:
  - tag: component
    value: system
- name: VMware Tools version
  key: vmware.vm.tools[{$VMWARE.URL},{$VMWARE.VM.UUID},version]
  interval: 1h
  type: simple_check
  value_type: char
  description: Monitoring of the VMware Tools version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime
  key: vmware.vm.uptime[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  units: uptime
  description: System uptime.
  history: 31d
  tags:
  - tag: component
    value: system
triggers:
- name: 'VMware Guest: Snapshot consolidation needed'
  expression: last(/VMware Guest/vmware.vm.consolidationneeded[,{$VMWARE.VM.UUID}])=0
  severity: average
  description: Snapshot consolidation needed.
  tags:
  - tag: scope
    value: availability
- name: 'VMware Guest: Hypervisor is in the maintenance mode'
  expression: last(/VMware Guest/vmware.vm.hv.maintenance[,{$VMWARE.VM.UUID}])=1 and
    1=1
  severity: information
  description: Hypervisor is in the maintenance mode. All other problem on the host
    will be suppressed.
  tags:
  - tag: scope
    value: notice
- name: 'VMware Guest: VM has been restarted'
  expression: (now() - last(/VMware Guest/vmware.vm.property[,{$VMWARE.VM.UUID},runtime.bootTime])
    < 10m) and last(/VMware Guest/vmware.vm.powerstate[,{$VMWARE.VM.UUID}]) = 1
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'VMware Guest: VM is not running'
  expression: last(/VMware Guest/vmware.vm.state[,{$VMWARE.VM.UUID}]) <> 2
  severity: average
  description: VMware virtual machine is not running.
  tags:
  - tag: scope
    value: notice
- name: 'VMware Guest: VMware Tools is not running'
  expression: last(/VMware Guest/vmware.vm.tools[,{$VMWARE.VM.UUID},status]) = 1
  severity: warning
  description: VMware Tools is not running on the VM.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Network device discovery
  key: vmware.vm.net.if.discovery[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  item_prototypes:
  - name: Number of bytes received on interface [{#IFBACKINGDEVICE}]/[{#IFDESC}]
    key: vmware.vm.net.if.in[{$VMWARE.URL},{$VMWARE.VM.UUID},{#IFNAME},bps]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: Bps
  - name: Number of packets received on interface [{#IFBACKINGDEVICE}]/[{#IFDESC}]
    key: vmware.vm.net.if.in[{$VMWARE.URL},{$VMWARE.VM.UUID},{#IFNAME},pps]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Number of bytes transmitted on interface [{#IFBACKINGDEVICE}]/[{#IFDESC}]
    key: vmware.vm.net.if.out[{$VMWARE.URL},{$VMWARE.VM.UUID},{#IFNAME},bps]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: Bps
  - name: Number of packets transmitted on interface [{#IFBACKINGDEVICE}]/[{#IFDESC}]
    key: vmware.vm.net.if.out[{$VMWARE.URL},{$VMWARE.VM.UUID},{#IFNAME},pps]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Network utilization on interface [{#IFBACKINGDEVICE}]/[{#IFDESC}]
    key: vmware.vm.net.if.usage[{$VMWARE.URL},{$VMWARE.VM.UUID},{#IFNAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: Bps
- name: Disk device discovery
  key: vmware.vm.vfs.dev.discovery[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  item_prototypes:
  - name: Average number of outstanding read requests to the disk [{#DISKDESC}]
    key: vmware.vm.storage.readoio[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Average read latency from the disk [{#DISKDESC}]
    key: vmware.vm.storage.totalreadlatency[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: '!ms'
  - name: Average write latency to the disk [{#DISKDESC}]
    key: vmware.vm.storage.totalwritelatency[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: '!ms'
  - name: Average number of outstanding write requests to the disk [{#DISKDESC}]
    key: vmware.vm.storage.writeoio[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Average number of bytes read from the disk [{#DISKDESC}]
    key: vmware.vm.vfs.dev.read[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME},bps]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: Bps
  - name: Average number of reads from the disk [{#DISKDESC}]
    key: vmware.vm.vfs.dev.read[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME},ops]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Average number of bytes written to the disk [{#DISKDESC}]
    key: vmware.vm.vfs.dev.write[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME},bps]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: Bps
  - name: Average number of writes to the disk [{#DISKDESC}]
    key: vmware.vm.vfs.dev.write[{$VMWARE.URL},{$VMWARE.VM.UUID},{#DISKNAME},ops]
    interval: 1m
    type: simple_check
    value_type: unsigned
- name: Mounted filesystem discovery
  key: vmware.vm.vfs.fs.discovery[{$VMWARE.URL},{$VMWARE.VM.UUID}]
  interval: 1h
  type: simple_check
  item_prototypes:
  - name: Free disk space on [{#FSNAME}]
    key: vmware.vm.vfs.fs.size[{$VMWARE.URL},{$VMWARE.VM.UUID},{#FSNAME},free]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: B
  - name: Free disk space on [{#FSNAME}] (percentage)
    key: vmware.vm.vfs.fs.size[{$VMWARE.URL},{$VMWARE.VM.UUID},{#FSNAME},pfree]
    interval: 1m
    type: simple_check
    units: '%'
  - name: Total disk space on [{#FSNAME}]
    key: vmware.vm.vfs.fs.size[{$VMWARE.URL},{$VMWARE.VM.UUID},{#FSNAME},total]
    interval: 1h
    type: simple_check
    value_type: unsigned
    units: B
  - name: Used disk space on [{#FSNAME}]
    key: vmware.vm.vfs.fs.size[{$VMWARE.URL},{$VMWARE.VM.UUID},{#FSNAME},used]
    interval: 1m
    type: simple_check
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'VMware Guest: [{#FSNAME}]: Disk space is critically low'
    expression: max(/VMware Guest/vmware.vm.vfs.fs.size[,{$VMWARE.VM.UUID},{#FSNAME},pfree],5m)<10
      and 0=1
    severity: average
    allow_manual_close: true
  - name: 'VMware Guest: [{#FSNAME}]: Disk space is low'
    expression: max(/VMware Guest/vmware.vm.vfs.fs.size[,{$VMWARE.VM.UUID},{#FSNAME},pfree],5m)<20
      and 0=1
    severity: warning
    allow_manual_close: true
