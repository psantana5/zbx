template: Zabbix proxy health
description: "This template is designed to monitor internal Zabbix metrics on the\
  \ local Zabbix proxy.\r\n\r\nLink this template to the local Zabbix proxy host.\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Discovery queue
  key: zabbix[discovery_queue]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: The count of values enqueued in the discovery queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Zabbix preprocessing
  key: zabbix[preprocessing]
  interval: 1m
  type: zabbix_internal
  value_type: text
  description: The master item of Zabbix server's preprocessing statistics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Preprocessing queue
  key: zabbix[preprocessing_queue]
  interval: '0'
  type: dependent
  master_item_key: zabbix[preprocessing]
  value_type: unsigned
  description: The number of values enqueued in the preprocessing queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing direct throughput
  key: zabbix[preprocessing_throughput_direct]
  interval: '0'
  type: dependent
  master_item_key: zabbix[preprocessing]
  units: Bps
  description: Reflects the direct throughput of the preprocessing.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing queued throughput
  key: zabbix[preprocessing_throughput_queued]
  interval: '0'
  type: dependent
  master_item_key: zabbix[preprocessing]
  units: Bps
  description: Reflects the queued throughput of the preprocessing.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing direct VPS
