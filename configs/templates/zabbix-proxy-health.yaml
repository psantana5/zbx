triggers:
- name: 'Zabbix proxy: Utilization of agent poller processes is high'
  expression: avg(/Zabbix proxy health/zabbix[process,agent poller,avg,busy],10m)>75
  severity: average
  recovery_expression: avg(/Zabbix proxy health/zabbix[process,agent poller,avg,busy],10m)<65
  description: Indicates potential performance issues with the agent poller, which
    may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
