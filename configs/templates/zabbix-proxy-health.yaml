  interval: '0'
  type: dependent
  master_item_key: zabbix[preprocessing]
  units: '!vps'
  description: Reflects the count of direct preprocessing values per second.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing queued VPS
  key: zabbix[preprocessing_vps_queued]
  interval: '0'
  type: dependent
  master_item_key: zabbix[preprocessing]
