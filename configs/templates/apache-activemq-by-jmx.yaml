template: Apache ActiveMQ by JMX
description: "The template to monitor Apache ActiveMQ by Zabbix that work without\
  \ any external scripts.\r\nThe metrics are collected by JMX.\r\nYou can set macro\
  \ values and add macros with context for specific brokers or destinations following\
  \ macro description.\r\n\r\nYou can discuss this template or leave feedback on our\
  \ forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/411049-discussion-thread-for-official-zabbix-template-amq\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
discovery_rules:
- name: Brokers discovery
  key: jmx.discovery[beans,"org.apache.activemq:type=Broker,brokerName=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXBROKERNAME}'
    value: '{$ACTIVEMQ.LLD.FILTER.BROKER.MATCHES}'
  - macro: '{#JMXBROKERNAME}'
    value: '{$ACTIVEMQ.LLD.FILTER.BROKER.NOT_MATCHES}'
  item_prototypes:
  - name: 'Broker {#JMXBROKERNAME}: Version'
    key: jmx[{#JMXOBJ},BrokerVersion]
    interval: 1m
    type: jmx_agent
    value_type: text
  - name: 'Broker {#JMXBROKERNAME}: Memory limit'
    key: jmx[{#JMXOBJ},MemoryLimit]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: 'Broker {#JMXBROKERNAME}: Memory usage in percents'
    key: jmx[{#JMXOBJ}, MemoryPercentUsage]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: '%'
  - name: 'Broker {#JMXBROKERNAME}: Storage limit'
    key: jmx[{#JMXOBJ},StoreLimit]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: 'Broker {#JMXBROKERNAME}: Storage usage in percents'
    key: jmx[{#JMXOBJ},StorePercentUsage]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: '%'
  - name: 'Broker {#JMXBROKERNAME}: Temp limit'
    key: jmx[{#JMXOBJ},TempLimit]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: 'Broker {#JMXBROKERNAME}: Temp usage in percents'
    key: jmx[{#JMXOBJ},TempPercentUsage]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: '%'
  - name: 'Broker {#JMXBROKERNAME}: Consumers count total'
    key: jmx[{#JMXOBJ},TotalConsumerCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: 'Broker {#JMXBROKERNAME}: Messages dequeue rate'
    key: jmx[{#JMXOBJ},TotalDequeueCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: messages/sec
  - name: 'Broker {#JMXBROKERNAME}: Messages enqueue rate'
    key: jmx[{#JMXOBJ},TotalEnqueueCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: messages/sec
  - name: 'Broker {#JMXBROKERNAME}: Producers count total'
    key: jmx[{#JMXOBJ},TotalProducerCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: 'Broker {#JMXBROKERNAME}: Uptime'
    key: jmx[{#JMXOBJ},UptimeMillis]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: s
  trigger_prototypes:
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Version has been changed'
    expression: last(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},BrokerVersion],#1)<>last(/Apache
      ActiveMQ by JMX/jmx[{#JMXOBJ},BrokerVersion],#2) and length(last(/Apache ActiveMQ
      by JMX/jmx[{#JMXOBJ},BrokerVersion]))>0
    severity: information
    allow_manual_close: true
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Memory usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ}, MemoryPercentUsage],5m)>90
    severity: high
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Memory usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ}, MemoryPercentUsage],5m)>75
    severity: average
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Storage usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},StorePercentUsage],5m)>90
    severity: high
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Storage usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},StorePercentUsage],5m)>75
    severity: average
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Temp usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},TempPercentUsage],5m)>90
    severity: high
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Temp usage is too high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},TempPercentUsage],5m)>75
    severity: average
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Consumers count is too low'
    expression: max(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},TotalConsumerCount],5m)<1
    severity: high
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Message enqueue rate is higher
      than dequeue rate'
    expression: avg(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},TotalEnqueueCount],15m)>avg(/Apache
      ActiveMQ by JMX/jmx[{#JMXOBJ},TotalEnqueueCount],15m)
    severity: average
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Producers count is too low'
    expression: max(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},TotalProducerCount],5m)<1
    severity: high
  - name: 'Apache ActiveMQ: Broker {#JMXBROKERNAME}: Broker has been restarted'
    expression: last(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},UptimeMillis])<10m
    severity: information
    allow_manual_close: true
- name: Destinations discovery
  key: jmx.discovery[beans,"org.apache.activemq:type=Broker,brokerName=*,destinationType=*,destinationName=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXDESTINATIONNAME}'
    value: '{$ACTIVEMQ.LLD.FILTER.DESTINATION.MATCHES}'
  - macro: '{#JMXDESTINATIONNAME}'
    value: '{$ACTIVEMQ.LLD.FILTER.DESTINATION.NOT_MATCHES}'
  item_prototypes:
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Consumers
      count total on {#JMXBROKERNAME}'
    key: 'jmx["org.apache.activemq:type=Broker,brokerName={#JMXBROKERNAME}",{$ACTIVEMQ.TOTAL.CONSUMERS.COUNT:
      "{#JMXDESTINATIONNAME}"}]'
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Producers
      count total on {#JMXBROKERNAME}'
    key: 'jmx["org.apache.activemq:type=Broker,brokerName={#JMXBROKERNAME}",{$ACTIVEMQ.TOTAL.PRODUCERS.COUNT:
      "{#JMXDESTINATIONNAME}"}]'
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Consumers
      count'
    key: jmx[{#JMXOBJ},ConsumerCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Messages
      dequeue rate'
    key: jmx[{#JMXOBJ},DequeueCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: messages/sec
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Messages
      enqueue rate'
    key: jmx[{#JMXOBJ},EnqueueCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: messages/sec
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Expired
      messages count'
    key: jmx[{#JMXOBJ},ExpiredCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Memory usage
      in percents'
    key: jmx[{#JMXOBJ},MemoryPercentUsage]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: '%'
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Producers
      count'
    key: jmx[{#JMXOBJ},ProducerCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}: Queue size'
    key: jmx[{#JMXOBJ},QueueSize]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Consumers count is too low'
    expression: max(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},ConsumerCount],10m)<1 and
      last(/Apache ActiveMQ by JMX/jmx["org.apache.activemq:type=Broker,brokerName={#JMXBROKERNAME}",TotalConsumerCount])>1
    severity: average
    recovery_expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},ConsumerCount],10m)>=1
    allow_manual_close: true
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Producers count is too low'
    expression: max(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},ProducerCount],10m)<1 and
      last(/Apache ActiveMQ by JMX/jmx["org.apache.activemq:type=Broker,brokerName={#JMXBROKERNAME}",TotalProducerCount])>1
    severity: average
    recovery_expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},ProducerCount],10m)>=1
    allow_manual_close: true
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Message enqueue rate is higher than dequeue rate'
    expression: avg(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},EnqueueCount],15m)>avg(/Apache
      ActiveMQ by JMX/jmx[{#JMXOBJ},DequeueCount],15m)
    severity: average
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Expired messages count is high'
    expression: last(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},ExpiredCount])>0
    severity: average
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Memory usage is too high'
    expression: last(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},MemoryPercentUsage])>90
    severity: high
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Memory usage is too high'
    expression: last(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},MemoryPercentUsage])>75
    severity: average
  - name: 'Apache ActiveMQ: {#JMXBROKERNAME}: {#JMXDESTINATIONTYPE} {#JMXDESTINATIONNAME}:
      Queue size is high'
    expression: min(/Apache ActiveMQ by JMX/jmx[{#JMXOBJ},QueueSize],10m)>100 and
      1=1
    severity: average
