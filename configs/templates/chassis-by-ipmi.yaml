template: Chassis by IPMI
description: "Template for monitoring servers with BMC over IPMI that work without\
  \ any external scripts.\r\nAll metrics are collected at once, thanks to Zabbix's\
  \ bulk data collection. The template is available starting from Zabbix version 5.0.\r\
  \nIt collects metrics by polling BMC remotely using an IPMI agent.\r\n\r\n\r\nKnown\
  \ Issues:\r\n\r\n  Description: If the BMC has a sensor with an empty threshold\
  \ value, we get the LLD error \"Cannot create trigger...\".\r\n\r\nYou can discuss\
  \ this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/398023-discussion-thread-for-official-zabbix-template-ipmi\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Get IPMI sensors
  key: ipmi.get
  interval: 1m
  type: ipmi_agent
  value_type: text
  description: The master item that receives all sensors with values for LLD and dependent
    elements from BMC.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
discovery_rules:
- name: Discrete sensors discovery
  key: ipmi.discrete.discovery
  interval: '0'
  type: dependent
  master_item_key: ipmi.get
  filter:
  - macro: '{#SENSOR_READING_TYPE}'
    value: threshold
  - macro: '{#SENSOR_TYPE}'
    value: '{$IPMI.SENSOR_TYPE.MATCHES}'
  - macro: '{#SENSOR_TYPE}'
    value: '{$IPMI.SENSOR_TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#SENSOR_ID}'
    key: ipmi.state_text[{#SENSOR_ID}]
    interval: '0'
    type: dependent
    value_type: char
  trigger_prototypes:
  - name: 'Chassis: {#SENSOR_ID} value has changed'
    expression: last(/Chassis by IPMI/ipmi.state_text[{#SENSOR_ID}],#1)<>last(/Chassis
      by IPMI/ipmi.state_text[{#SENSOR_ID}],#2)
    severity: information
    allow_manual_close: true
- name: Threshold sensors discovery
  key: ipmi.sensors.discovery
  interval: '0'
  type: dependent
  master_item_key: ipmi.get
  filter:
  - macro: '{#SENSOR_READING_TYPE}'
    value: threshold
  - macro: '{#SENSOR_TYPE}'
    value: '{$IPMI.SENSOR_TYPE.MATCHES}'
  - macro: '{#SENSOR_TYPE}'
    value: '{$IPMI.SENSOR_TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#SENSOR_ID}, {#SENSOR_UNIT}'
    key: ipmi.value[{#SENSOR_ID}]
    interval: '0'
    type: dependent
  trigger_prototypes:
  - name: 'Chassis: {#SENSOR_ID} value is above critical high'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)>{#SENSOR_HI_CRIT}
    severity: high
  - name: 'Chassis: {#SENSOR_ID} value is above non-critical high'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)>{#SENSOR_HI_WARN}
    severity: warning
  - name: 'Chassis: {#SENSOR_ID} value is above non-recoverable high'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)>{#SENSOR_HI_DISAST}
    severity: disaster
  - name: 'Chassis: {#SENSOR_ID} value is below critical low'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)<{#SENSOR_LO_CRIT}
    severity: high
  - name: 'Chassis: {#SENSOR_ID} value is below non-critical low'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)<{#SENSOR_LO_WARN}
    severity: warning
  - name: 'Chassis: {#SENSOR_ID} value is below non-recoverable low'
    expression: min(/Chassis by IPMI/ipmi.value[{#SENSOR_ID}],5m)<{#SENSOR_LO_DISAST}
    severity: disaster
