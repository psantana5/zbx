template: Apache Cassandra by JMX
description: "The template to monitor Apache Cassandra by Zabbix that work without\
  \ any external scripts.\r\nIt works with both standalone and cluster instances.\r\
  \nThe metrics are collected by JMX.\r\nYou can set {$CASSANDRA.USER} and {$CASSANDRA.PASSWORD}\
  \ macros in the template for using on the host level.\r\n\r\nYou can discuss this\
  \ template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/410057-discussion-thread-for-official-zabbix-template-apache-cassandra\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Cluster - Name
  key: jmx["org.apache.cassandra.db:type=StorageService","ClusterName"]
  interval: 1m
  type: jmx_agent
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: cluster
- name: Version
  key: jmx["org.apache.cassandra.db:type=StorageService","ReleaseVersion"]
  interval: 1m
  type: jmx_agent
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Compaction - Number of completed tasks
  key: jmx["org.apache.cassandra.metrics:name=CompletedTasks,type=Compaction","Value"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Number of completed compactions since server [re]start.
  history: 31d
