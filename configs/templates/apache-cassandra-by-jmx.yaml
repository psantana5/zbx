  value_type: unsigned
  description: "Number of tasks that are currently blocked due to queue saturation\
    \ but on retry will become unblocked.\r\nViewMutationStage: Responsible for materialized\
    \ view writes."
  history: 31d
  tags:
  - tag: component
    value: thread-pools
- name: Thread pool ViewMutationStage - Pending tasks
  key: jmx["org.apache.cassandra.metrics:type=ThreadPools,path=request,scope=ViewMutationStage,name=PendingTasks","Value"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: "Number of queued tasks queued up on this pool.\r\nViewMutationStage:\
    \ Responsible for materialized view writes."
  history: 31d
  tags:
  - tag: component
    value: thread-pools
- name: Thread pool ViewMutationStage - Total blocked tasks
  key: jmx["org.apache.cassandra.metrics:type=ThreadPools,path=request,scope=ViewMutationStage,name=TotalBlockedTasks","Count"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: "Number of tasks that were blocked due to queue saturation.\r\nViewMutationStage:\
    \ Responsible for materialized view writes."
  history: 31d
  tags:
  - tag: component
    value: thread-pools
- name: Cluster - Nodes down
  key: jmx["org.apache.cassandra.net:type=FailureDetector","DownEndpointCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: cluster
- name: Cluster - Nodes up
  key: jmx["org.apache.cassandra.net:type=FailureDetector","UpEndpointCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: cluster
triggers:
- name: 'Apache Cassandra: Version has changed'
  expression: last(/Apache Cassandra by JMX/jmx["org.apache.cassandra.db:type=StorageService","ReleaseVersion"],#1)<>last(/Apache
    Cassandra by JMX/jmx["org.apache.cassandra.db:type=StorageService","ReleaseVersion"],#2)
    and length(last(/Apache Cassandra by JMX/jmx["org.apache.cassandra.db:type=StorageService","ReleaseVersion"]))>0
  severity: information
  description: Cassandra version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Cassandra: Many pending tasks'
  expression: min(/Apache Cassandra by JMX/jmx["org.apache.cassandra.metrics:type=Compaction,name=PendingTasks","Value"],15m)>350
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Apache Cassandra: Too many pending tasks'
  expression: min(/Apache Cassandra by JMX/jmx["org.apache.cassandra.metrics:type=Compaction,name=PendingTasks","Value"],15m)>500
  severity: average
  tags:
  - tag: scope
    value: performance
- name: 'Apache Cassandra: Too many storage exceptions'
  expression: min(/Apache Cassandra by JMX/jmx["org.apache.cassandra.metrics:type=Storage,name=Exceptions","Count"],5m)>0
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Apache Cassandra: Failed to fetch info data'
  expression: nodata(/Apache Cassandra by JMX/jmx["org.apache.cassandra.metrics:type=Storage,name=Load","Count"],15m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 15 minutes
  tags:
  - tag: scope
    value: availability
- name: 'Apache Cassandra: There are down nodes in cluster'
  expression: last(/Apache Cassandra by JMX/jmx["org.apache.cassandra.net:type=FailureDetector","DownEndpointCount"])>0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Tables
  key: jmx.discovery[beans,"org.apache.cassandra.metrics:type=Table,keyspace=*,scope=*,name=ReadLatency"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXKEYSPACE}'
    value: '{$CASSANDRA.KEY_SPACE.MATCHES}'
  - macro: '{#JMXKEYSPACE}'
    value: '{$CASSANDRA.KEY_SPACE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#JMXKEYSPACE}.{#JMXSCOPE}: Bloom filter false ratio'
    key: jmx["org.apache.cassandra.metrics:type=Table,keyspace={#JMXKEYSPACE},scope={#JMXSCOPE},name=BloomFilterFalseRatio","Value"]
    interval: 1m
    type: jmx_agent
  - name: '{#JMXKEYSPACE}.{#JMXSCOPE}: Bytes flushed'
    key: jmx["org.apache.cassandra.metrics:type=Table,keyspace={#JMXKEYSPACE},scope={#JMXSCOPE},name=BytesFlushed","Count"]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: '{#JMXKEYSPACE}.{#JMXSCOPE}: Col update time delta75 percentile'
    key: jmx["org.apache.cassandra.metrics:type=Table,keyspace={#JMXKEYSPACE},scope={#JMXSCOPE},name=ColUpdateTimeDeltaHistogram","75thPercentile"]
    interval: 1m
    type: jmx_agent
    units: ms
  - name: '{#JMXKEYSPACE}.{#JMXSCOPE}: Col update time delta 95 percentile'
    key: jmx["org.apache.cassandra.metrics:type=Table,keyspace={#JMXKEYSPACE},scope={#JMXSCOPE},name=ColUpdateTimeDeltaHistogram","95thPercentile"]
    interval: 1m
    type: jmx_agent
    units: ms
  - name: '{#JMXKEYSPACE}.{#JMXSCOPE}: Compaction bytes written'
    key: jmx["org.apache.cassandra.metrics:type=Table,keyspace={#JMXKEYSPACE},scope={#JMXSCOPE},name=CompactionBytesWritten","Count"]
