template: NetApp FAS3220 by SNMP
description: "The template to monitor SAN NetApp FAS3220 cluster by Zabbix SNMP agent.\r\
  \n\r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nNETAPP-MIB\r\nIF-MIB\r\n\
  \r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/416694-discussion-thread-for-official-zabbix-template-netapp-fas3220\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Failed disks count
  key: fas3220.disk[diskFailedCount]
  interval: 1m
  value_type: unsigned
  description: The number of disks that are currently broken.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Failed disks message
  key: fas3220.disk[diskFailedMessage]
  interval: 1m
  value_type: text
  description: If diskFailedCount is non-zero, this is a string describing the failed
    disk or disks. Each failed disk is described.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: storage
- name: Product firmware version
  key: fas3220.inventory[productFirmwareVersion]
  interval: 1m
  value_type: char
  description: Version string for the firmware running on this platform.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Product version
  key: fas3220.inventory[productVersion]
  interval: 1m
  value_type: char
  description: "MIB: NETAPP-MIB\r\nVersion string for the software running on this\
    \ platform."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'NetApp FAS3220: Number of failed disks has changed'
  expression: last(/NetApp FAS3220 by SNMP/fas3220.disk[diskFailedCount])>0 and last(/NetApp
    FAS3220 by SNMP/fas3220.disk[diskFailedMessage],#1)<>last(/NetApp FAS3220 by SNMP/fas3220.disk[diskFailedMessage],#2)
  severity: warning
  recovery_expression: last(/NetApp FAS3220 by SNMP/fas3220.disk[diskFailedCount])=0
  description: '{{ITEM.LASTVALUE2}.regsub("(.*)", \1)}'
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'NetApp FAS3220: Unavailable by ICMP ping'
  expression: max(/NetApp FAS3220 by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'NetApp FAS3220: High ICMP ping loss'
  expression: min(/NetApp FAS3220 by SNMP/icmppingloss,5m)>20 and min(/NetApp FAS3220
    by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'NetApp FAS3220: High ICMP ping response time'
  expression: avg(/NetApp FAS3220 by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'NetApp FAS3220: Host has been restarted'
  expression: (last(/NetApp FAS3220 by SNMP/system.hw.uptime[hrSystemUptime.0])>0
    and last(/NetApp FAS3220 by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/NetApp
    FAS3220 by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/NetApp FAS3220
    by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'NetApp FAS3220: System name has changed'
  expression: last(/NetApp FAS3220 by SNMP/system.name,#1)<>last(/NetApp FAS3220 by
    SNMP/system.name,#2) and length(last(/NetApp FAS3220 by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'NetApp FAS3220: No SNMP data collection'
  expression: max(/NetApp FAS3220 by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Cluster metrics discovery
  key: fas3220.cluster.discovery
  interval: 1h
  item_prototypes:
  - name: 'Node {#NODE.NAME}: Failed FAN count'
    key: fas3220.cluster[nodeEnvFailedFanCount, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: Failed FAN message'
    key: fas3220.cluster[nodeEnvFailedFanMessage, "{#NODE.NAME}"]
    interval: 1m
    value_type: text
  - name: 'Node {#NODE.NAME}: Degraded power supplies count'
    key: fas3220.cluster[nodeEnvFailedPowerSupplyCount, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: Degraded power supplies message'
    key: fas3220.cluster[nodeEnvFailedPowerSupplyMessage, "{#NODE.NAME}"]
    interval: 1m
    value_type: text
  - name: 'Node {#NODE.NAME}: Over-temperature'
    key: fas3220.cluster[nodeEnvOverTemperature, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: Health'
    key: fas3220.cluster[nodeHealth, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: Location'
    key: fas3220.cluster[nodeLocation, "{#NODE.NAME}"]
    interval: 1m
    value_type: char
  - name: 'Node {#NODE.NAME}: Model'
    key: fas3220.cluster[nodeModel, "{#NODE.NAME}"]
    interval: 1m
    value_type: char
  - name: 'Node {#NODE.NAME}: NVRAM battery status'
    key: fas3220.cluster[nodeNvramBatteryStatus, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: Serial number'
    key: fas3220.cluster[nodeSerialNumber, "{#NODE.NAME}"]
    interval: 1m
    value_type: char
  - name: 'Node {#NODE.NAME}: Uptime'
    key: fas3220.cluster[nodeUptime, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
    units: s
  trigger_prototypes:
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Failed FAN count is over than zero'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedFanCount,
      "{#NODE.NAME}"])>0 and last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedFanMessage,
      "{#NODE.NAME}"])=last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedFanMessage,
      "{#NODE.NAME}"])
    severity: high
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Degraded power supplies count is more
      than zero'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedPowerSupplyCount,
      "{#NODE.NAME}"])>0 and last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedPowerSupplyMessage,
      "{#NODE.NAME}"])=last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvFailedPowerSupplyMessage,
      "{#NODE.NAME}"])
    severity: average
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Temperature is over than recommended'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeEnvOverTemperature,
      "{#NODE.NAME}"])=2
    severity: high
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Node can not communicate with the cluster'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeHealth, "{#NODE.NAME}"])=0
    severity: high
    allow_manual_close: true
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: NVRAM battery status is not OK'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeNvramBatteryStatus,
      "{#NODE.NAME}"])<>1
    severity: average
    allow_manual_close: true
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Host has been restarted'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.cluster[nodeUptime, "{#NODE.NAME}"])<10m
    severity: information
    allow_manual_close: true
- name: CPU discovery
  key: fas3220.cpu.discovery
  interval: 1h
  item_prototypes:
  - name: 'Node {#NODE.NAME}: CPU utilization'
    key: fas3220.cpu[cDOTCpuBusyTimePerCent, "{#NODE.NAME}"]
    interval: 1m
    units: '%'
  trigger_prototypes:
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: High CPU utilization'
    expression: min(/NetApp FAS3220 by SNMP/fas3220.cpu[cDOTCpuBusyTimePerCent, "{#NODE.NAME}"],5m)>90
    severity: warning
- name: Filesystems discovery
  key: fas3220.fs.discovery
  interval: 1h
  filter:
  - macro: '{#FSNAME}'
    value: '{$FAS3220.FS.NAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$FAS3220.FS.NAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$FAS3220.FS.TYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$FAS3220.FS.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#VSERVER}{#FSNAME}: Total space available'
    key: fas3220.fs[df64AvailKBytes, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#VSERVER}{#FSNAME}: Total space'
    key: fas3220.fs[df64TotalKBytes, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#VSERVER}{#FSNAME}: Total space used'
    key: fas3220.fs[df64UsedKBytes, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#VSERVER}{#FSNAME}: Saved by compression percents'
    key: fas3220.fs[dfCompressSavedPercent, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    units: '%'
  - name: '{#VSERVER}{#FSNAME}: Saved by deduplication percents'
    key: fas3220.fs[dfDedupeSavedPercent, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    units: '%'
  - name: '{#VSERVER}{#FSNAME}: Used space percents'
    key: fas3220.fs[dfPerCentKBytesCapacity, "{#VSERVER}{#FSNAME}"]
    interval: 1m
    value_type: unsigned
    units: '%'
  trigger_prototypes:
  - name: 'NetApp FAS3220: {#VSERVER}{#FSNAME}: Disk space is too low'
    expression: min(/NetApp FAS3220 by SNMP/fas3220.fs[df64AvailKBytes, "{#VSERVER}{#FSNAME}"],10m)<10G
      and 1=0
    severity: high
  - name: 'NetApp FAS3220: {#VSERVER}{#FSNAME}: Disk space is too low'
    expression: max(/NetApp FAS3220 by SNMP/fas3220.fs[dfPerCentKBytesCapacity, "{#VSERVER}{#FSNAME}"],10m)>90
      and 1=1
    severity: high
- name: HA discovery
  key: fas3220.ha.discovery
  interval: 1h
  item_prototypes:
  - name: 'Node {#NODE.NAME}: Cannot takeover cause'
    key: fas3220.ha[haCannotTakeoverCause, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE.NAME}: HA settings'
    key: fas3220.ha[haSettings, "{#NODE.NAME}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Node cannot takeover it''s HA partner
      {#PARTNER.NAME}. Reason: {ITEM.VALUE}'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.ha[haCannotTakeoverCause, "{#NODE.NAME}"])<>1
    severity: high
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: HA is not licensed'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.ha[haSettings, "{#NODE.NAME}"])=1
    severity: average
  - name: 'NetApp FAS3220: Node {#NODE.NAME}: Node has been taken over'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.ha[haSettings, "{#NODE.NAME}"])=5
    severity: high
- name: Network ports discovery
  key: fas3220.net.discovery
  interval: 1h
  filter:
  - macro: '{#IFNAME}'
    value: '{$FAS3220.NET.PORT.NAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$FAS3220.NET.PORT.NAME.NOT_MATCHES}'
  - macro: '{#ROLE}'
    value: '{$FAS3220.NET.PORT.ROLE.MATCHES}'
  - macro: '{#TYPE}'
    value: '{$FAS3220.NET.PORT.TYPE.MATCHES}'
  - macro: '{#TYPE}'
    value: '{$FAS3220.NET.PORT.ROLE.NOT_MATCHES}'
  - macro: '{#TYPE}'
    value: '{$FAS3220.NET.PORT.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Inbound packets discarded'
    key: fas3220.net.if[if64InDiscards, "{#NODE}", "{#IFNAME}"]
    interval: 3m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Inbound packets with errors'
    key: fas3220.net.if[if64InErrors, "{#NODE}", "{#IFNAME}"]
    interval: 3m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Bits received'
    key: fas3220.net.if[if64InOctets, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
    units: bps
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Outbound packets discarded'
    key: fas3220.net.if[if64OutDiscards, "{#NODE}", "{#IFNAME}"]
    interval: 3m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Outbound packets with errors'
    key: fas3220.net.if[if64OutErrors, "{#NODE}", "{#IFNAME}"]
    interval: 3m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Bits sent'
    key: fas3220.net.if[if64OutOctets, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
    units: bps
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Health degraded reason'
    key: fas3220.net.port[netportDegradedReason, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: text
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Health'
    key: fas3220.net.port[netportHealthStatus, "{#NODE}", "{#IFNAME}"]
    interval: 1m
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): State'
    key: fas3220.net.port[netportLinkState, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Role'
    key: fas3220.net.port[netportRole, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Speed'
    key: fas3220.net.port[netportSpeedOper, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Node {#NODE}: port {#IFNAME} ({#TYPE}): Up by an administrator'
    key: fas3220.net.port[netportUpAdmin, "{#NODE}", "{#IFNAME}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'NetApp FAS3220: Node {#NODE}: port {#IFNAME} ({#TYPE}): High error rate'
    expression: "min(/NetApp FAS3220 by SNMP/fas3220.net.if[if64InErrors, \"{#NODE}\"\
      , \"{#IFNAME}\"],5m)>\"\"\r\nor min(/NetApp FAS3220 by SNMP/fas3220.net.if[if64OutErrors,\
      \ \"{#NODE}\", \"{#IFNAME}\"],5m)>\"\""
    severity: warning
    recovery_expression: "max(/NetApp FAS3220 by SNMP/fas3220.net.if[if64InErrors,\
      \ \"{#NODE}\", \"{#IFNAME}\"],5m)<\"\"*0.8\r\nand max(/NetApp FAS3220 by SNMP/fas3220.net.if[if64OutErrors,\
      \ \"{#NODE}\", \"{#IFNAME}\"],5m)<\"\"*0.8"
    allow_manual_close: true
  - name: 'NetApp FAS3220: Node {#NODE}: port {#IFNAME} ({#TYPE}): Port is not healthy'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.net.port[netportHealthStatus,
      "{#NODE}", "{#IFNAME}"])<>0 and length(last(/NetApp FAS3220 by SNMP/fas3220.net.port[netportDegradedReason,
      "{#NODE}", "{#IFNAME}"]))>0
    severity: information
  - name: 'NetApp FAS3220: Node {#NODE}: port {#IFNAME} ({#TYPE}): Link down'
    expression: last(/NetApp FAS3220 by SNMP/fas3220.net.port[netportLinkState, "{#NODE}",
      "{#IFNAME}"])<>2 and last(/NetApp FAS3220 by SNMP/fas3220.net.port[netportUpAdmin,
      "{#NODE}", "{#IFNAME}"])=1
    severity: average
    allow_manual_close: true
