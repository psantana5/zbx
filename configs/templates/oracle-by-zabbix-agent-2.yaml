triggers:
- name: 'Oracle: Too many database files'
  expression: min(/Oracle by Zabbix agent 2/oracle.datafiles.stats["","","******","ORA"],5m)
    * 100 / last(/Oracle by Zabbix agent 2/oracle.db_files_limit) > 80
  severity: warning
  description: The number of datafiles is higher than `{$ORACLE.DB.FILE.MAX.WARN}`%
    of the available datafile limit.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Instance hostname has changed'
  expression: last(/Oracle by Zabbix agent 2/oracle.instance_hostname,#1)<>last(/Oracle
    by Zabbix agent 2/oracle.instance_hostname,#2) and length(last(/Oracle by Zabbix
    agent 2/oracle.instance_hostname))>0
  severity: information
  description: An Oracle Database instance hostname has changed. Acknowledge to close
    the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Instance name has changed'
  expression: last(/Oracle by Zabbix agent 2/oracle.instance_name,#1)<>last(/Oracle
    by Zabbix agent 2/oracle.instance_name,#2) and length(last(/Oracle by Zabbix agent
    2/oracle.instance_name))>0
  severity: information
  description: An Oracle Database instance name has changed. Acknowledge to close
    the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Total PGA inuse is too high'
  expression: min(/Oracle by Zabbix agent 2/oracle.total_pga_used,5m) * 100 / last(/Oracle
    by Zabbix agent 2/oracle.pga_target) > 90
  severity: warning
  description: The total PGA in use is more than `{$ORACLE.PGA.USE.MAX.WARN}`% of
    `PGA_AGGREGATE_TARGET`.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Connection to database is unavailable'
  expression: last(/Oracle by Zabbix agent 2/oracle.ping["","","******","ORA"])=0
  severity: disaster
  description: Connection to Oracle Database is currently unavailable.
  tags:
  - tag: scope
    value: availability
- name: 'Oracle: Too many active processes'
  expression: min(/Oracle by Zabbix agent 2/oracle.proc.stats["","","******","ORA"],5m)
    * 100 / last(/Oracle by Zabbix agent 2/oracle.processes_limit) > 80
  severity: warning
  description: Active processes are using more than `{$ORACLE.PROCESSES.MAX.WARN}`%
    of the available number of processes.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Number of REDO logs available for switching is too low'
  expression: max(/Oracle by Zabbix agent 2/oracle.redolog.info["","","******","ORA"],5m)
    < 3
  severity: warning
  description: The number of inactive/unused redos available for log switching is
    low (risk of database downtime).
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Too high database concurrency'
  expression: min(/Oracle by Zabbix agent 2/oracle.session_concurrency_rate,5m) >
    80
  severity: warning
  description: The concurrency rate exceeds `{$ORACLE.CONCURRENCY.MAX.WARN}`%. A high
    contention value does not indicate the root cause of the problem, but is a signal
    to review resource consumption (determine the "heaviest" queries in the database,
    trace sessions, etc.) This will help find the root cause and possible optimization
    points both in database configuration and the logic of building queries.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Too many active sessions'
  expression: min(/Oracle by Zabbix agent 2/oracle.session_count,5m) * 100 / last(/Oracle
    by Zabbix agent 2/oracle.session_limit) > 80
  severity: warning
  description: Active sessions are using more than `{$ORACLE.SESSIONS.MAX.WARN}`%
    of the available sessions.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Too many locked sessions'
  expression: min(/Oracle by Zabbix agent 2/oracle.session_lock_rate,5m) > 20
  severity: warning
  description: The number of locked sessions exceeds `{$ORACLE.SESSIONS.LOCK.MAX.WARN}`%
    of the running sessions.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Too many sessions locked'
  expression: min(/Oracle by Zabbix agent 2/oracle.session_long_time_locked,5m) >
    3
  severity: warning
  description: The number of locked sessions exceeding `{$ORACLE.SESSION.LOCK.MAX.TIME}`
    seconds is too high. Long-term locks can negatively affect the database performance.
    Therefore, if they are detected, you should first find the most difficult queries
    from the database point of view and then analyze possible resource leaks.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Shared pool free is too low'
  expression: max(/Oracle by Zabbix agent 2/oracle.shared_pool_free,5m)<5
  severity: warning
  description: The free memory percent of the shared pool has been less than `{$ORACLE.SHARED.FREE.MIN.WARN}`%
    for the last 5 minutes.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Host has been restarted'
  expression: last(/Oracle by Zabbix agent 2/oracle.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Failed to fetch info data'
  expression: nodata(/Oracle by Zabbix agent 2/oracle.uptime,30m)=1
  severity: information
  description: Zabbix has not received any data for the items for the last 5 minutes.
    The database might be unavailable for connecting.
  tags:
  - tag: scope
    value: availability
- name: 'Oracle: Zabbix account will expire soon'
  expression: last(/Oracle by Zabbix agent 2/oracle.user.info["","","******","ORA"])  <
    7
  severity: warning
  description: The password for the Zabbix user in the database expires soon.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Version has changed'
  expression: last(/Oracle by Zabbix agent 2/oracle.version["","","******","ORA"],#1)<>last(/Oracle
    by Zabbix agent 2/oracle.version["","","******","ORA"],#2) and length(last(/Oracle
    by Zabbix agent 2/oracle.version["","","******","ORA"]))>0
  severity: information
  description: The Oracle Database version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Archive log discovery
  key: oracle.archive.discovery["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]
  interval: 1h
  item_prototypes:
  - name: 'Archivelog ''{#DEST_NAME}'': Get archive log info'
    key: oracle.archive.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DEST_NAME}"]
    interval: 5m
    value_type: text
  - name: 'Archivelog ''{#DEST_NAME}'': Error'
    key: oracle.archivelog_error["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.archive.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DEST_NAME}"]
    value_type: text
  - name: 'Archivelog ''{#DEST_NAME}'': Last sequence'
    key: oracle.archivelog_log_sequence["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.archive.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DEST_NAME}"]
    value_type: unsigned
  - name: 'Archivelog ''{#DEST_NAME}'': Status'
    key: oracle.archivelog_log_status["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.archive.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DEST_NAME}"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Oracle: Archivelog ''{#DEST_NAME}'': Log Archive is not valid'
    expression: last(/Oracle by Zabbix agent 2/oracle.archivelog_log_status["{#DEST_NAME}"])<2
    severity: high
- name: Database discovery
  key: oracle.db.discovery["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]
  interval: 1h
  filter:
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Database ''{#DBNAME}'': Get CDB and No-CDB info'
    key: oracle.cdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DBNAME}"]
    interval: 1m
    value_type: text
  - name: 'Database ''{#DBNAME}'': Force logging'
    key: oracle.db_force_logging["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.cdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DBNAME}"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Log mode'
    key: oracle.db_log_mode["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.cdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DBNAME}"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Open status'
    key: oracle.db_open_mode["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.cdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DBNAME}"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Role'
    key: oracle.db_role["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.cdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DBNAME}"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Oracle: Database ''{#DBNAME}'': Force logging is deactivated for DB with
      active Archivelog'
    expression: last(/Oracle by Zabbix agent 2/oracle.db_force_logging["{#DBNAME}"])
      = 0 and last(/Oracle by Zabbix agent 2/oracle.db_log_mode["{#DBNAME}"]) = 1
    severity: warning
  - name: 'Oracle: Database ''{#DBNAME}'': Open status in mount mode'
    expression: last(/Oracle by Zabbix agent 2/oracle.db_open_mode["{#DBNAME}"])=1
    severity: warning
  - name: 'Oracle: Database ''{#DBNAME}'': Open status has changed'
    expression: last(/Oracle by Zabbix agent 2/oracle.db_open_mode["{#DBNAME}"],#1)<>last(/Oracle
      by Zabbix agent 2/oracle.db_open_mode["{#DBNAME}"],#2)
    severity: information
    allow_manual_close: true
  - name: 'Oracle: Database ''{#DBNAME}'': Role has changed'
    expression: last(/Oracle by Zabbix agent 2/oracle.db_role["{#DBNAME}"],#1)<>last(/Oracle
      by Zabbix agent 2/oracle.db_role["{#DBNAME}"],#2)
    severity: information
    allow_manual_close: true
- name: ASM disk groups discovery
  key: oracle.diskgroups.discovery["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]
  interval: 1h
  item_prototypes:
  - name: 'ASM ''{#DGNAME}'': Get ASM stats'
    key: oracle.diskgroups.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DGNAME}"]
    interval: 1m
    value_type: text
  - name: 'ASM ''{#DGNAME}'': Free size'
    key: oracle.asm_free_size["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.diskgroups.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DGNAME}"]
    value_type: unsigned
    units: B
  - name: 'ASM ''{#DGNAME}'': Total size'
    key: oracle.asm_total_size["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.diskgroups.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DGNAME}"]
    value_type: unsigned
    units: B
  - name: 'ASM ''{#DGNAME}'': Used size, percent'
    key: oracle.asm_used_pct["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.diskgroups.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#DGNAME}"]
    units: '%'
  trigger_prototypes:
  - name: 'Oracle: ASM ''{#DGNAME}'': Disk group usage is too high'
    expression: min(/Oracle by Zabbix agent 2/oracle.asm_used_pct["{#DGNAME}"],5m)>95
    severity: high
  - name: 'Oracle: ASM ''{#DGNAME}'': Disk group usage is too high'
    expression: min(/Oracle by Zabbix agent 2/oracle.asm_used_pct["{#DGNAME}"],5m)>90
    severity: warning
- name: PDB discovery
  key: oracle.pdb.discovery["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]
  interval: 1h
  filter:
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Database ''{#DBNAME}'': Get PDB info'
    key: oracle.pdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#CON_ID}"]
    interval: 1m
    value_type: text
  - name: 'Database ''{#DBNAME}'': Open status'
    key: oracle.pdb_open_mode["{#CON_ID}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.pdb.info["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#CON_ID}"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Oracle: Database ''{#DBNAME}'': Open status in mount mode'
    expression: last(/Oracle by Zabbix agent 2/oracle.pdb_open_mode["{#CON_ID}"])=1
    severity: warning
  - name: 'Oracle: Database ''{#DBNAME}'': Open status has changed'
    expression: last(/Oracle by Zabbix agent 2/oracle.pdb_open_mode["{#CON_ID}"],#1)<>last(/Oracle
      by Zabbix agent 2/oracle.pdb_open_mode["{#CON_ID}"],#2)
    severity: information
    allow_manual_close: true
- name: Tablespace discovery
  key: oracle.ts.discovery["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}"]
  interval: 1h
  filter:
  - macro: '{#CON_NAME}'
    value: '{$ORACLE.TABLESPACE.CONTAINER.MATCHES}'
  - macro: '{#CON_NAME}'
    value: '{$ORACLE.TABLESPACE.CONTAINER.NOT_MATCHES}'
  - macro: '{#TABLESPACE}'
    value: '{$ORACLE.TABLESPACE.NAME.MATCHES}'
  - macro: '{#TABLESPACE}'
    value: '{$ORACLE.TABLESPACE.NAME.NOT_MATCHES}'
  item_prototypes:
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Get tablespaces stats'
    key: oracle.ts.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#TABLESPACE}","{#CONTENTS}","{#CON_ID}"]
    interval: 1m
    value_type: text
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace allocated, bytes'
    key: oracle.tbs_alloc_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.ts.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#TABLESPACE}","{#CONTENTS}","{#CON_ID}"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace free, bytes'
    key: oracle.tbs_free_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.ts.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#TABLESPACE}","{#CONTENTS}","{#CON_ID}"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace MAX size, bytes'
    key: oracle.tbs_max_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.ts.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#TABLESPACE}","{#CONTENTS}","{#CON_ID}"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Open status'
    key: oracle.tbs_status["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: oracle.ts.stats["{$ORACLE.CONNSTRING}","{$ORACLE.USER}","{$ORACLE.PASSWORD}","{$ORACLE.SERVICE}","{#TABLESPACE}","{#CONTENTS}","{#CON_ID}"]
    value_type: unsigned
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace used, bytes'
    key: oracle.tbs_used_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
