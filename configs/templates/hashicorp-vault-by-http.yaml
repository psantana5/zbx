- name: Get tokens
  key: vault.get_tokens
  interval: 15m
  type: script
  params: "var params = JSON.parse(value);\r\n\r\nparams['url'] = params.scheme +\
    \ '://'\r\n\t+ params.host + ':'\r\n\t+ params.port + '/v1/auth/token/lookup-accessor';\r\
    \n\r\nvar request = new HttpRequest(),\r\n\toutput = [];\r\n\r\nrequest.addHeader('X-Vault-Token:\
    \ ' + params.token);\r\n\r\nparams.accessors.trim().split(/\\x20+/).forEach(function\
    \ (accessor) {\r\n\tif (!accessor) {\r\n\t\treturn;\r\n\t}\r\n\r\n\tvar response,\r\
    \n\t\tdata = {},\r\n\t\terror_msg = '';\r\n\r\n\ttry {\r\n\t\tresponse = request.post(params.url,\
    \ JSON.stringify({ accessor: accessor }));\r\n\t\tZabbix.log(4, '[ Vault API ]\
    \ Received response with status code ' + request.getStatus() + ': ' + response);\r\
    \n\r\n\t\tif (response !== null) {\r\n\t\t\ttry {\r\n\t\t\t\tresponse = JSON.parse(response);\r\
    \n\t\t\t}\r\n\t\t\tcatch (error) {\r\n\t\t\t\tthrow 'Failed to parse response\
    \ received from Vault API. Check debug log for more information.';\r\n\t\t\t}\r\
    \n\t\t}\r\n\r\n\t\tif (request.getStatus() !== 200) {\r\n\t\t\tthrow response.errors\
    \ && response.errors[0] || JSON.stringify(response);\r\n\t\t}\r\n\r\n\t\tif (typeof\
    \ response !== 'object' || typeof response.data === 'undefined') {\r\n\t\t\tthrow\
    \ 'Cannot lookup token from Vault API. Check debug log for more information.';\r\
    \n\t\t}\r\n\r\n\t\tdata = response.data;\r\n\t}\r\n\tcatch (error) {\r\n\t\terror_msg\
    \ = error;\r\n\t}\r\n\r\n\toutput.push({\r\n\t\t'accessor': accessor,\r\n\t\t\
    'token_name': data.display_name || 'null',\r\n\t\t'ttl': data.ttl || 0,\r\n\t\t\
    'has_ttl': !!data.expire_time,\r\n\t\t'error': error_msg.toString()\r\n\t});\r\
    \n});\r\n\r\nreturn JSON.stringify(output);"
  value_type: text
  description: Get information about tokens via their accessors. Accessors are defined
    in the macro "{$VAULT.TOKEN.ACCESSORS}".
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
  - tag: component
    value: tokens
