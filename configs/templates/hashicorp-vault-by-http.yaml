  \n\r\nSome metrics may not be collected depending on your Vault instance version\
  \ and configuration.\r\n\r\nYou can discuss this template or leave feedback on our\
  \ forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback\r\n\r\nGenerated\
  \ by official Zabbix template tool \"Templator\""
groups:
- Templates
