template: HAProxy by Zabbix agent
description: "The template to monitor HAProxy by Zabbix that works without any external\
  \ scripts.\r\nMost of the metrics are collected in one go, thanks to Zabbix bulk\
  \ data collection.\r\n\r\nThe template collects metrics by polling the HAProxy stats\
  \ page with Zabbix agent.\r\n\r\nNote, that this template doesn't support authentication\
  \ and redirects (limitations of 'web.page.get').\r\n\r\nSetup:\r\n\r\n1. Set up\
  \ the HAProxy stats page:\r\nhttps://www.haproxy.com/blog/exploring-the-haproxy-stats-page/\r\
  \n\r\nThe example configuration of HAProxy:\r\n\r\nfrontend stats\r\n    bind *:8404\r\
  \n    stats enable\r\n    stats uri /stats\r\n    stats refresh 10s\r\n\r\n2. Set\
  \ the hostname or IP address of the HAProxy stats host or container in the '{$HAPROXY.STATS.HOST}'\
  \ macro. You can also change the status page port in the '{$HAPROXY.STATS.PORT}'\
  \ macro, the status page scheme in the '{$HAPROXY.STATS.SCHEME}' macro and the status\
  \ page path in the '{$HAPROXY.STATS.PATH}' macro if necessary.\r\n\r\nYou can discuss\
  \ this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/393527-discussion-thread-for-official-zabbix-template-haproxy\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Get nodes
  key: haproxy.get.nodes
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$HAPROXY.STATS.SCHEME}://{$HAPROXY.STATS.HOST}:{$HAPROXY.STATS.PORT}/{$HAPROXY.STATS.PATH};csv"]
  value_type: text
  description: Array for LLD rules.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime
  key: haproxy.uptime
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$HAPROXY.STATS.SCHEME}://{$HAPROXY.STATS.HOST}:{$HAPROXY.STATS.PORT}/{$HAPROXY.STATS.PATH}"]
  units: s
  history: 31d
  tags:
  - tag: component
    value: application
- name: Version
  key: haproxy.version
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$HAPROXY.STATS.SCHEME}://{$HAPROXY.STATS.HOST}:{$HAPROXY.STATS.PORT}/{$HAPROXY.STATS.PATH}"]
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Service response time
  key: net.tcp.service.perf["{$HAPROXY.STATS.SCHEME}","{$HAPROXY.STATS.HOST}","{$HAPROXY.STATS.PORT}"]
  interval: 1m
  units: s
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: Service status
  key: net.tcp.service["{$HAPROXY.STATS.SCHEME}","{$HAPROXY.STATS.HOST}","{$HAPROXY.STATS.PORT}"]
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: Get stats page
  key: web.page.get["{$HAPROXY.STATS.SCHEME}://{$HAPROXY.STATS.HOST}:{$HAPROXY.STATS.PORT}/{$HAPROXY.STATS.PATH}"]
  interval: 1m
  value_type: text
  description: HAProxy Statistics Report HTML
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get stats
  key: web.page.get["{$HAPROXY.STATS.SCHEME}://{$HAPROXY.STATS.HOST}:{$HAPROXY.STATS.PORT}/{$HAPROXY.STATS.PATH};csv"]
  interval: 1m
  value_type: text
  description: HAProxy Statistics Report in CSV format
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
triggers:
- name: 'HAProxy: Service has been restarted'
  expression: last(/HAProxy by Zabbix agent/haproxy.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'HAProxy: Version has changed'
  expression: last(/HAProxy by Zabbix agent/haproxy.version,#1)<>last(/HAProxy by
    Zabbix agent/haproxy.version,#2) and length(last(/HAProxy by Zabbix agent/haproxy.version))>0
  severity: information
  description: HAProxy version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'HAProxy: Service response time is too high'
  expression: min(/HAProxy by Zabbix agent/net.tcp.service.perf["http","localhost","8404"],5m)>10s
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'HAProxy: Service is down'
  expression: last(/HAProxy by Zabbix agent/net.tcp.service["http","localhost","8404"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Backend discovery
  key: haproxy.backend.discovery
  interval: '0'
  type: dependent
  master_item_key: haproxy.get.nodes
  filter:
  - macro: '{#MODE}'
    value: http|tcp
  - macro: '{#SVNAME}'
    value: BACKEND
  item_prototypes:
  - name: 'Backend {#PXNAME}: Raw data'
    key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Backend {#PXNAME}: Number of active servers'
    key: haproxy.backend.act[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Backend {#PXNAME}: Number of backup servers'
    key: haproxy.backend.bck[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Backend {#PXNAME}: Incoming traffic'
    key: haproxy.backend.bin.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    units: bps
  - name: 'Backend {#PXNAME}: Outgoing traffic'
    key: haproxy.backend.bout.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    units: bps
  - name: 'Backend {#PXNAME}: Responses denied per second'
    key: haproxy.backend.dresp.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Errors connection per second'
    key: haproxy.backend.econ.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Response errors per second'
    key: haproxy.backend.eresp.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Number of responses with codes 1xx per second'
    key: haproxy.backend.hrsp_1xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Number of responses with codes 2xx per second'
    key: haproxy.backend.hrsp_2xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Number of responses with codes 3xx per second'
    key: haproxy.backend.hrsp_3xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Number of responses with codes 4xx per second'
    key: haproxy.backend.hrsp_4xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Number of responses with codes 5xx per second'
    key: haproxy.backend.hrsp_5xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Unassigned requests'
    key: haproxy.backend.qcur[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Backend {#PXNAME}: Time in queue'
    key: haproxy.backend.qtime[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    units: s
  - name: 'Backend {#PXNAME}: Responses time'
    key: haproxy.backend.rtime[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    units: s
  - name: 'Backend {#PXNAME}: Status'
    key: haproxy.backend.status[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    value_type: char
  - name: 'Backend {#PXNAME}: Sessions per second'
    key: haproxy.backend.stot.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Weight'
    key: haproxy.backend.weight[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Backend {#PXNAME}: Redispatched requests per second'
    key: haproxy.backend.wredis.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Backend {#PXNAME}: Retried connections per second'
    key: haproxy.backend.wretr.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.backend.raw[{#PXNAME},{#SVNAME}]
  trigger_prototypes:
  - name: 'HAProxy: backend {#PXNAME}: Number of responses with error is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.backend.eresp.rate[{#PXNAME},{#SVNAME}],5m)>10
    severity: warning
  - name: 'HAProxy: backend {#PXNAME}: Current number of requests unassigned in queue
      is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.backend.qcur[{#PXNAME},{#SVNAME}],5m)>10
    severity: warning
  - name: 'HAProxy: backend {#PXNAME}: Average time spent in queue is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.backend.qtime[{#PXNAME},{#SVNAME}],5m)>10s
    severity: warning
  - name: 'HAProxy: backend {#PXNAME}: Average response time is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.backend.rtime[{#PXNAME},{#SVNAME}],5m)>10s
    severity: warning
  - name: 'HAProxy: backend {#PXNAME}: Server is DOWN'
    expression: count(/HAProxy by Zabbix agent/haproxy.backend.status[{#PXNAME},{#SVNAME}],#5,"eq","DOWN")=5
    severity: average
- name: Frontend discovery
  key: haproxy.frontend.discovery
  interval: '0'
  type: dependent
  master_item_key: haproxy.get.nodes
  filter:
  - macro: '{#MODE}'
    value: http|tcp
  - macro: '{#SVNAME}'
    value: FRONTEND
  item_prototypes:
  - name: 'Frontend {#PXNAME}: Session utilization'
    key: haproxy.frontend.sutil[{#PXNAME},{#SVNAME}]
    interval: 1m
    type: calculated
    params: last(//haproxy.frontend.scur[{#PXNAME},{#SVNAME}]) / last(//haproxy.frontend.slim[{#PXNAME},{#SVNAME}])
      * 100
    units: '%'
  - name: 'Frontend {#PXNAME}: Raw data'
    key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Frontend {#PXNAME}: Incoming traffic'
    key: haproxy.frontend.bin.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    units: bps
  - name: 'Frontend {#PXNAME}: Outgoing traffic'
    key: haproxy.frontend.bout.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    units: bps
  - name: 'Frontend {#PXNAME}: Denied requests per second'
    key: haproxy.frontend.dreq.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Request errors per second'
    key: haproxy.frontend.ereq.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Number of responses with codes 1xx per second'
    key: haproxy.frontend.hrsp_1xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Number of responses with codes 2xx per second'
    key: haproxy.frontend.hrsp_2xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Number of responses with codes 3xx per second'
    key: haproxy.frontend.hrsp_3xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Number of responses with codes 4xx per second'
    key: haproxy.frontend.hrsp_4xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Number of responses with codes 5xx per second'
    key: haproxy.frontend.hrsp_5xx.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
  - name: 'Frontend {#PXNAME}: Sessions rate'
    key: haproxy.frontend.rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Frontend {#PXNAME}: Requests rate'
    key: haproxy.frontend.req_rate[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Frontend {#PXNAME}: Established sessions'
    key: haproxy.frontend.scur[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Frontend {#PXNAME}: Session limits'
    key: haproxy.frontend.slim[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    value_type: unsigned
  - name: 'Frontend {#PXNAME}: Status'
    key: haproxy.frontend.status[{#PXNAME},{#SVNAME}]
    interval: '0'
    type: dependent
    master_item_key: haproxy.frontend.raw[{#PXNAME},{#SVNAME}]
    value_type: char
  trigger_prototypes:
  - name: 'HAProxy: frontend {#PXNAME}: Session utilization is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.frontend.sutil[{#PXNAME},{#SVNAME}],5m)>80
    severity: warning
  - name: 'HAProxy: frontend {#PXNAME}: Number of requests denied is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.frontend.dreq.rate[{#PXNAME},{#SVNAME}],5m)>10
    severity: warning
  - name: 'HAProxy: frontend {#PXNAME}: Number of request errors is high'
    expression: min(/HAProxy by Zabbix agent/haproxy.frontend.ereq.rate[{#PXNAME},{#SVNAME}],5m)>10
    severity: warning
- name: Server discovery
