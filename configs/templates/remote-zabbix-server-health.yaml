triggers:
- name: 'Zabbix server: Utilization of agent poller processes is high'
  expression: avg(/Remote Zabbix server health/process.agent_poller.avg.busy,10m)>75
  severity: average
  recovery_expression: avg(/Remote Zabbix server health/process.agent_poller.avg.busy,10m)<65
  description: Indicates potential performance issues with the agent poller, which
    may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
