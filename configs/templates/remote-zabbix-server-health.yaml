template: Remote Zabbix server health
description: "This template is designed to monitor internal Zabbix metrics on the\
  \ remote Zabbix server.\r\n\r\nSpecify the address of the remote Zabbix server by\
  \ changing the {$ZABBIX.SERVER.ADDRESS} and {$ZABBIX.SERVER.PORT} macros. Don't\
  \ forget to adjust the \"StatsAllowedIP\" parameter in the remote server's configuration\
  \ file to allow the collection of statistics.\r\n\r\nGenerated by official Zabbix\
  \ template tool \"Templator\""
groups:
- Templates
items:
- name: Connector queue
  key: connector_queue
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  value_type: unsigned
  description: The count of values enqueued in the connector queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Discovery queue
  key: discovery_queue
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  value_type: unsigned
  description: The count of values enqueued in the discovery queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: LLD queue
  key: lld_queue
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  value_type: unsigned
  description: The number of values enqueued in the low-level discovery processing
    queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing queue
  key: preprocessing_queue
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  value_type: unsigned
  description: The number of values enqueued in the preprocessing queue.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing direct throughput
  key: preprocessing_throughput_direct
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  units: Bps
  description: Reflects the direct throughput of the preprocessing.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing queued throughput
  key: preprocessing_throughput_queued
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  units: Bps
  description: Reflects the queued throughput of the preprocessing.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing direct VPS
  key: preprocessing_vps_direct
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  units: '!vps'
  description: Reflects the count of direct preprocessing values per second.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Preprocessing queued VPS
  key: preprocessing_vps_queued
  interval: '0'
