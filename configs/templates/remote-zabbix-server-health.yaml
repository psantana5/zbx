  recovery_expression: avg(/Remote Zabbix server health/process.trapper.avg.busy,10m)<65
  description: Indicates potential performance issues with the trapper, which may
    affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
- name: 'Zabbix server: Utilization of trigger housekeeper processes is high'
  expression: avg(/Remote Zabbix server health/process.trigger_housekeeper.avg.busy,10m)>75
  severity: average
  recovery_expression: avg(/Remote Zabbix server health/process.trigger_housekeeper.avg.busy,10m)<65
  description: Indicates potential performance issues with the trigger housekeeper,
    which may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
- name: 'Zabbix server: Utilization of unreachable poller processes is high'
  expression: avg(/Remote Zabbix server health/process.unreachable_poller.avg.busy,10m)>75
  severity: average
  recovery_expression: avg(/Remote Zabbix server health/process.unreachable_poller.avg.busy,10m)<65
  description: Indicates potential performance issues with the unreachable poller,
    which may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
- name: 'Zabbix server: Utilization of vmware collector processes is high'
  expression: avg(/Remote Zabbix server health/process.vmware_collector.avg.busy,10m)>75
  severity: average
  recovery_expression: avg(/Remote Zabbix server health/process.vmware_collector.avg.busy,10m)<65
  description: Indicates potential performance issues with the vmware collector, which
    may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive configuration cache usage'
  expression: max(/Remote Zabbix server health/rcache.buffer.pused,10m)>75
  severity: average
  description: Consider increasing `CacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Failed to fetch stats data'
  expression: nodata(/Remote Zabbix server health/rcache.buffer.pused,5m)=1
  severity: warning
  description: Zabbix has not received statistics data for `{$ZABBIX.SERVER.NODATA_TIMEOUT}`.
  tags:
  - tag: scope
    value: availability
- name: 'Zabbix server: Wrong template assigned'
  expression: last(/Remote Zabbix server health/server_check)=0
  severity: disaster
  description: Check that the template has been selected correctly.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix server: Excessive value cache usage'
  expression: max(/Remote Zabbix server health/vcache.buffer.pused,10m)>95
  severity: average
  description: Consider increasing `ValueCacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Zabbix value cache working in low-memory mode'
  expression: last(/Remote Zabbix server health/vcache.cache.mode)=1
  severity: high
  description: Once low-memory mode has been switched on, the value cache will remain
    in this state for 24 hours, even if the problem that triggered this mode is resolved
    sooner.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Version has changed'
  expression: last(/Remote Zabbix server health/version,#1)<>last(/Remote Zabbix server
    health/version,#2) and length(last(/Remote Zabbix server health/version))>0
  severity: information
  description: Zabbix server version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix server: Excessive vmware cache usage'
  expression: max(/Remote Zabbix server health/vmware.buffer.pused,10m)>75
  severity: average
  description: Consider increasing `VMwareCacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive history cache usage'
  expression: max(/Remote Zabbix server health/wcache.history.pused,10m)>75
  severity: average
  description: Consider increasing `HistoryCacheSize` in the `zabbix_server.conf`
    configuration file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive history index cache usage'
  expression: max(/Remote Zabbix server health/wcache.index.pused,10m)>75
  severity: average
  description: Consider increasing `HistoryIndexCacheSize` in the `zabbix_server.conf`
    configuration file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive trends cache usage'
  expression: max(/Remote Zabbix server health/wcache.trend.pused,10m)>75
  severity: average
  description: Consider increasing `TrendCacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: More than 100 items have been missing data for over 10 minutes'
  expression: min(/Remote Zabbix server health/zabbix[stats,,,queue,10m],10m)>100
  severity: warning
  description: Indicates potential issues with network connectivity, agent failures,
    or unresponsive monitored resources that require attention.
  tags:
  - tag: scope
    value: performance
discovery_rules:
- name: High availability cluster node discovery
  key: zabbix.nodes.discovery
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  item_prototypes:
  - name: 'Cluster node [{#NODE.NAME}]: Stats'
    key: zabbix.node.stats[{#NODE.ID}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Cluster node [{#NODE.NAME}]: Address'
    key: zabbix.node.address[{#NODE.ID}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.node.stats[{#NODE.ID}]
    value_type: char
  - name: 'Cluster node [{#NODE.NAME}]: Last access age'
    key: zabbix.node.lastaccess.age[{#NODE.ID}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.node.stats[{#NODE.ID}]
    value_type: unsigned
    units: uptime
  - name: 'Cluster node [{#NODE.NAME}]: Last access time'
    key: zabbix.node.lastaccess.time[{#NODE.ID}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.node.stats[{#NODE.ID}]
    value_type: unsigned
    units: unixtime
  - name: 'Cluster node [{#NODE.NAME}]: Status'
    key: zabbix.nodes.status[{#NODE.ID}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.node.stats[{#NODE.ID}]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Zabbix server: Cluster node [{#NODE.NAME}]: Status changed'
    expression: last(/Remote Zabbix server health/zabbix.nodes.status[{#NODE.ID}],#1)<>last(/Remote
      Zabbix server health/zabbix.nodes.status[{#NODE.ID}],#2)
    severity: information
    allow_manual_close: true
- name: Zabbix proxy discovery
  key: zabbix.proxy.discovery
  interval: '0'
  type: dependent
  master_item_key: zabbix.proxies.stats
  item_prototypes:
  - name: 'Proxy [{#PROXY.NAME}]: Stats'
    key: zabbix.proxy.stats[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Proxy [{#PROXY.NAME}]: Certificate'
    key: zabbix.proxy.cert[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Compatibility'
    key: zabbix.proxy.compatibility[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Compression'
    key: zabbix.proxy.compression[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Host count'
    key: zabbix.proxy.hosts[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Item count'
    key: zabbix.proxy.items[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Last seen, in seconds'
    key: zabbix.proxy.last_seen[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
  - name: 'Proxy [{#PROXY.NAME}]: Mode'
    key: zabbix.proxy.mode[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: PSK'
    key: zabbix.proxy.psk[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Required VPS'
    key: zabbix.proxy.requiredperformance[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    units: '!vps'
  - name: 'Proxy [{#PROXY.NAME}]: Unencrypted'
    key: zabbix.proxy.unencrypted[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: unsigned
  - name: 'Proxy [{#PROXY.NAME}]: Version'
    key: zabbix.proxy.version[{#PROXY.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.stats[{#PROXY.NAME}]
    value_type: char
  trigger_prototypes:
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy is not supported'
    expression: last(/Remote Zabbix server health/zabbix.proxy.compatibility[{#PROXY.NAME}],#1)=3
    severity: high
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy is outdated'
    expression: last(/Remote Zabbix server health/zabbix.proxy.compatibility[{#PROXY.NAME}],#1)=2
    severity: warning
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy last seen'
    expression: last(/Remote Zabbix server health/zabbix.proxy.last_seen[{#PROXY.NAME}],#1)>600
    severity: warning
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy never seen'
    expression: last(/Remote Zabbix server health/zabbix.proxy.last_seen[{#PROXY.NAME}],#1)=-1
    severity: warning
