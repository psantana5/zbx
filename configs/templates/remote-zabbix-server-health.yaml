- name: Zabbix server check
  key: server_check
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  value_type: unsigned
  description: Flag indicating whether it is a server or not.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Trend function cache, % of unique requests
  key: tcache.pitems
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  units: '%'
  description: "The effectiveness statistics of the Zabbix trend function cache. The\
    \ percentage of cached items calculated from the sum of the cached items plus\
    \ requests.\r\nA low percentage most likely means that the cache size can be reduced."
  history: 31d
  tags:
  - tag: component
    value: system
- name: Trend function cache, % of misses
  key: tcache.pmisses
  interval: '0'
  type: dependent
  master_item_key: zabbix[stats,{$ZABBIX.SERVER.ADDRESS},{$ZABBIX.SERVER.PORT}]
  units: '%'
  description: The effectiveness statistics of the Zabbix trend function cache. The
    percentage of cache misses.
  history: 31d
  tags:
  - tag: component
    value: system
