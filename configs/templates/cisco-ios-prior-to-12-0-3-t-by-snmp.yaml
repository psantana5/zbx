template: Cisco IOS prior to 12.0_3_T by SNMP
description: "Cisco IOS Software releases prior to 12.0(3)T\r\n\r\nMIBs used:\r\n\
  HOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nOLD-CISCO-CPU-MIB\r\nCISCO-ENVMON-MIB\r\nCISCO-MEMORY-POOL-MIB\r\
  \nENTITY-MIB\r\n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: 'Cisco IOS: SNMP walk fans'
  key: sensor.fans.walk
  interval: 1m
  value_type: text
  description: Discovering system fans.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'Cisco IOS: SNMP walk PSUs'
  key: sensor.psu.walk
  interval: 1m
  value_type: text
  description: The table of power supply status maintained by the environmental monitor
    card.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'Cisco IOS: SNMP walk temperature sensors'
  key: sensor.temp.walk
  interval: 1m
  value_type: text
  description: Discovery of ciscoEnvMonTemperatureTable (ciscoEnvMonTemperatureDescr),
    a table of ambient temperature status maintained by the environmental monitor.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: CPU utilization
  key: system.cpu.util[avgBusy5]
  interval: 5m
  units: '%'
  description: "MIB: OLD-CISCO-CPU-MIB\r\n5 minute exponentially-decayed moving average\
    \ of the CPU busy percentage.\r\nReference: http://www.cisco.com/c/en/us/support/docs/ip/simple-network-management-protocol-snmp/15215-collect-cpu-util-snmp.html"
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1h
  value_type: char
  description: 'MIB: ENTITY-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1h
  value_type: char
  description: 'MIB: ENTITY-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: 'Cisco IOS: SNMP walk entity serial numbers'
  key: system.hw.serialnumber.walk
  interval: 1m
  value_type: text
  description: "MIB: ENTITY-MIB\r\nEntity Serial Numbers Discovery."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Operating system
  key: system.sw.os[sysDescr.0]
  interval: 1h
  value_type: char
  description: 'MIB: SNMPv2-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: 'Cisco IOS: SNMP walk memory'
  key: vm.memory.walk
  interval: 1m
  value_type: text
  description: "MIB: CISCO-MEMORY-POOL-MIB\r\nDiscovery of ciscoMemoryPoolTable, a\
    \ table of memory pool monitoring entries.\r\nhttp://www.cisco.com/c/en/us/support/docs/ip/simple-network-management-protocol-snmp/15216-contiguous-memory.html."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Cisco IOS: Unavailable by ICMP ping'
  expression: max(/Cisco IOS prior to 12.0_3_T by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Cisco IOS: High ICMP ping loss'
  expression: min(/Cisco IOS prior to 12.0_3_T by SNMP/icmppingloss,5m)>20 and min(/Cisco
    IOS prior to 12.0_3_T by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco IOS: High ICMP ping response time'
  expression: avg(/Cisco IOS prior to 12.0_3_T by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco IOS: High CPU utilization'
  expression: min(/Cisco IOS prior to 12.0_3_T by SNMP/system.cpu.util[avgBusy5],5m)>90
  severity: warning
  description: The CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Cisco IOS: Device has been replaced'
  expression: last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber,#1)<>last(/Cisco
    IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber,#2) and length(last(/Cisco
    IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco IOS: Host has been restarted'
  expression: (last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.uptime[hrSystemUptime.0])>0
    and last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.uptime[hrSystemUptime.0])<10m)
    or (last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Cisco IOS prior to 12.0_3_T by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco IOS: System name has changed'
  expression: last(/Cisco IOS prior to 12.0_3_T by SNMP/system.name,#1)<>last(/Cisco
    IOS prior to 12.0_3_T by SNMP/system.name,#2) and length(last(/Cisco IOS prior
    to 12.0_3_T by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Cisco IOS: Operating system description has changed'
  expression: last(/Cisco IOS prior to 12.0_3_T by SNMP/system.sw.os[sysDescr.0],#1)<>last(/Cisco
    IOS prior to 12.0_3_T by SNMP/system.sw.os[sysDescr.0],#2) and length(last(/Cisco
    IOS prior to 12.0_3_T by SNMP/system.sw.os[sysDescr.0]))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco IOS: No SNMP data collection'
  expression: max(/Cisco IOS prior to 12.0_3_T by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Entity Serial Numbers Discovery
  key: entity_sn.discovery
  interval: '0'
  type: dependent
  master_item_key: system.hw.serialnumber.walk
  filter:
  - macro: '{#ENT_CLASS}'
    value: ^3$
  - macro: '{#ENT_SN}'
    value: .+
  item_prototypes:
  - name: '{#ENT_NAME}: Hardware serial number'
    key: system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  trigger_prototypes:
  - name: 'Cisco IOS: {#ENT_NAME}: Device has been replaced'
    expression: last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#1)<>last(/Cisco
      IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#2)
      and length(last(/Cisco IOS prior to 12.0_3_T by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
- name: FAN Discovery
  key: fan.discovery
  interval: '0'
  type: dependent
  master_item_key: sensor.fans.walk
  item_prototypes:
  - name: '{#SENSOR_INFO}: Fan status'
    key: sensor.fan.status[ciscoEnvMonFanState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco IOS: {#SENSOR_INFO}: Fan is in critical state'
    expression: count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.fan.status[ciscoEnvMonFanState.{#SNMPINDEX}],#1,"eq","3")=1
      or count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.fan.status[ciscoEnvMonFanState.{#SNMPINDEX}],#1,"eq","4")=1
    severity: average
  - name: 'Cisco IOS: {#SENSOR_INFO}: Fan is in warning state'
    expression: count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.fan.status[ciscoEnvMonFanState.{#SNMPINDEX}],#1,"eq","2")=1
      or count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.fan.status[ciscoEnvMonFanState.{#SNMPINDEX}],#1,"eq","6")=1
    severity: warning
- name: Memory Discovery
  key: memory.discovery
  interval: '0'
  type: dependent
  master_item_key: vm.memory.walk
  item_prototypes:
  - name: '{#SNMPVALUE}: Memory utilization'
    key: vm.memory.util[vm.memory.util.{#SNMPINDEX}]
    interval: 1m
    type: calculated
    params: last(//vm.memory.used[ciscoMemoryPoolUsed.{#SNMPINDEX}])/(last(//vm.memory.free[ciscoMemoryPoolFree.{#SNMPINDEX}])+last(//vm.memory.used[ciscoMemoryPoolUsed.{#SNMPINDEX}]))*100
    units: '%'
  - name: '{#SNMPVALUE}: Free memory'
    key: vm.memory.free[ciscoMemoryPoolFree.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: '{#SNMPVALUE}: Used memory'
    key: vm.memory.used[ciscoMemoryPoolUsed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Cisco IOS: {#SNMPVALUE}: High memory utilization'
    expression: min(/Cisco IOS prior to 12.0_3_T by SNMP/vm.memory.util[vm.memory.util.{#SNMPINDEX}],5m)>90
    severity: average
- name: PSU Discovery
  key: psu.discovery
  interval: '0'
  type: dependent
  master_item_key: sensor.psu.walk
  item_prototypes:
  - name: '{#SENSOR_INFO}: Power supply status'
    key: sensor.psu.status[ciscoEnvMonSupplyState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco IOS: {#SENSOR_INFO}: Power supply is in critical state'
    expression: count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.psu.status[ciscoEnvMonSupplyState.{#SNMPINDEX}],#1,"eq","3")=1
      or count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.psu.status[ciscoEnvMonSupplyState.{#SNMPINDEX}],#1,"eq","4")=1
    severity: average
  - name: 'Cisco IOS: {#SENSOR_INFO}: Power supply is in warning state'
    expression: count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.psu.status[ciscoEnvMonSupplyState.{#SNMPINDEX}],#1,"eq","2")=1
      or count(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.psu.status[ciscoEnvMonSupplyState.{#SNMPINDEX}],#1,"eq","6")=1
    severity: warning
- name: Temperature Discovery
  key: temperature.discovery
  interval: '0'
  type: dependent
  master_item_key: sensor.temp.walk
  item_prototypes:
  - name: '{#SNMPVALUE}: Temperature status'
    key: sensor.temp.status[ciscoEnvMonTemperatureState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: '{#SNMPVALUE}: Temperature'
    key: sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: °C
  trigger_prototypes:
  - name: 'Cisco IOS: {#SNMPVALUE}: Temperature is above critical threshold'
    expression: "avg(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)>60\r\
      \nor\r\nlast(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.status[ciscoEnvMonTemperatureState.{#SNMPINDEX}])=3\r\
      \nor\r\nlast(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.status[ciscoEnvMonTemperatureState.{#SNMPINDEX}])=4"
    severity: high
    recovery_expression: max(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)<60-3
  - name: 'Cisco IOS: {#SNMPVALUE}: Temperature is above warning threshold'
    expression: "avg(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)>50\r\
      \nor\r\nlast(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.status[ciscoEnvMonTemperatureState.{#SNMPINDEX}])=2"
    severity: warning
    recovery_expression: max(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)<50-3
  - name: 'Cisco IOS: {#SNMPVALUE}: Temperature is too low'
    expression: avg(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco IOS prior to 12.0_3_T by SNMP/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)>5+3
