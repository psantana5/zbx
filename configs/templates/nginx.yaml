# Nginx web server monitoring template
#
# Requires the Nginx status module to be enabled:
#   location /nginx_status { stub_status; }
#
# Deploy with:
#   zbx apply configs/templates/nginx.yaml

template: nginx
name: "Nginx"
description: "Nginx web server performance and availability monitoring"
groups:
  - Templates
  - Templates/Applications

items:
  - name: Nginx status
    key: "web.page.get[localhost,/nginx_status,80]"
    type: zabbix_agent
    interval: 30s
    value_type: text
    history: 1h
    trends: "0"
    description: "Raw nginx_status page output"

  - name: Nginx active connections
    key: "nginx.active_connections"
    type: zabbix_agent_active
    interval: 30s
    value_type: unsigned
    description: "Current number of active connections"
    tags:
      - tag: component
        value: nginx

  - name: Nginx requests per second
    key: "nginx.requests.rate"
    type: calculated
    params: "rate(/nginx/web.page.get[localhost,/nginx_status,80],1m)"
    interval: 60s
    value_type: float
    description: "HTTP requests per second derived from nginx_status (1-minute rate)"
    tags:
      - tag: component
        value: nginx

  - name: Nginx process status
    key: "proc.num[nginx]"
    interval: 60s
    value_type: unsigned
    description: "Number of nginx worker processes"

triggers:
  - name: Nginx is not running
    expression: last(/nginx/proc.num[nginx]) = 0
    severity: disaster
    description: "No nginx processes found — service may be down"
    tags:
      - tag: scope
        value: availability

  - name: Nginx high request rate (>1000 req/s)
    expression: avg(/nginx/nginx.requests.rate,5m) > 1000
    severity: warning
    description: "Nginx is handling a very high request rate"
