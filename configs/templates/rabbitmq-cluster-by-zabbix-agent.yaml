- name: Health Check 3.8.10+ discovery
  key: rabbitmq.healthcheck.v3810.discovery
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$RABBITMQ.API.SCHEME}://{$RABBITMQ.API.USER}:{$RABBITMQ.API.PASSWORD}@{$RABBITMQ.API.CLUSTER_HOST}:{$RABBITMQ.API.PORT}/api/overview"]
  item_prototypes:
  - name: 'Healthcheck: alarms in effect in the cluster{#SINGLETON}'
    key: web.page.get["{$RABBITMQ.API.SCHEME}://{$RABBITMQ.API.USER}:{$RABBITMQ.API.PASSWORD}@{$RABBITMQ.API.CLUSTER_HOST}:{$RABBITMQ.API.PORT}/api/health/checks/alarms{#SINGLETON}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'RabbitMQ cluster: There are active alarms in the cluster'
    expression: last(/RabbitMQ cluster by Zabbix agent/web.page.get["http://zbx_monitor:zabbix@127.0.0.1:15672/api/health/checks/alarms{#SINGLETON}"])=0
    severity: average
