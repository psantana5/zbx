template: RabbitMQ cluster by Zabbix agent
description: "Get cluster metrics from RabbitMQ management plugin provided an HTTP-based\
  \ API using Zabbix agent.\r\n\r\nYou can discuss this template or leave feedback\
  \ on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387226-discussion-thread-for-official-zabbix-template-rabbitmq\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Messages acknowledged
  key: rabbitmq.overview.messages.ack
  interval: '0'
  type: dependent
