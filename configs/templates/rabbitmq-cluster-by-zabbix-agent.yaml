    interval: '0'
    type: dependent
    master_item_key: rabbitmq.get_exchanges["{#VHOST}/{#EXCHANGE}/{#TYPE}"]
    value_type: unsigned
  - name: 'Exchange [{#VHOST}][{#EXCHANGE}][{#TYPE}]: Messages delivered per second'
