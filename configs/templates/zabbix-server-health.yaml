- name: 'Zabbix server: More than 100 items have been missing data for over 10 minutes'
  expression: min(/Zabbix server health/zabbix[queue,10m],10m)>100
  severity: warning
  description: Indicates potential issues with network connectivity, agent failures,
    or unresponsive monitored resources that require attention.
  tags:
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive configuration cache usage'
  expression: max(/Zabbix server health/zabbix[rcache,buffer,pused],10m)>75
  severity: average
  description: Consider increasing `CacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Wrong template assigned'
  expression: last(/Zabbix server health/zabbix[triggers])=0
  severity: disaster
  description: Check that the template has been selected correctly.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix server: Excessive value cache usage'
  expression: max(/Zabbix server health/zabbix[vcache,buffer,pused],10m)>95
  severity: average
  description: Consider increasing `ValueCacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Zabbix value cache working in low-memory mode'
  expression: last(/Zabbix server health/zabbix[vcache,cache,mode])=1
  severity: high
  description: Once low-memory mode has been switched on, the value cache will remain
    in this state for 24 hours, even if the problem that triggered this mode is resolved
    sooner.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Version has changed'
  expression: last(/Zabbix server health/zabbix[version],#1)<>last(/Zabbix server
    health/zabbix[version],#2) and length(last(/Zabbix server health/zabbix[version]))>0
  severity: information
  description: Zabbix server version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix server: Excessive vmware cache usage'
  expression: max(/Zabbix server health/zabbix[vmware,buffer,pused],10m)>75
  severity: average
  description: Consider increasing `VMwareCacheSize` in the `zabbix_server.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix server: Excessive history cache usage'
