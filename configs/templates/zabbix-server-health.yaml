  trigger_prototypes:
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy is not supported'
    expression: last(/Zabbix server health/zabbix.proxy.compatibility[{#PROXY.NAME}],#1)=3
    severity: high
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy is outdated'
    expression: last(/Zabbix server health/zabbix.proxy.compatibility[{#PROXY.NAME}],#1)=2
    severity: warning
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy last seen'
    expression: last(/Zabbix server health/zabbix.proxy.last_seen[{#PROXY.NAME}],#1)>600
    severity: warning
  - name: 'Zabbix server: Proxy [{#PROXY.NAME}]: Zabbix proxy never seen'
    expression: last(/Zabbix server health/zabbix.proxy.last_seen[{#PROXY.NAME}],#1)=-1
    severity: warning
- name: Zabbix proxy groups discovery
  key: zabbix.proxy.groups.discovery
  interval: '0'
  type: dependent
  master_item_key: zabbix[proxy group,discovery]
  filter:
  - macro: '{#PROXY.GROUP.NAME}'
    value: '{$PROXY.GROUP.DISCOVERY.NAME.MATCHES}'
  - macro: '{#PROXY.GROUP.NAME}'
    value: '{$PROXY.GROUP.DISCOVERY.NAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Settings'
    key: zabbix.proxy.group.settings[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Stats'
    key: zabbix.proxy.group.stats[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Available proxies, in %'
    key: zabbix.proxy.group.avail.proxies.percent[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.group.stats[{#PROXY.GROUP.NAME}]
    value_type: unsigned
    units: '%'
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Available proxies'
    key: zabbix.proxy.group.avail.proxies[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.group.stats[{#PROXY.GROUP.NAME}]
    value_type: unsigned
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Failover period'
    key: zabbix.proxy.group.failover[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.group.settings[{#PROXY.GROUP.NAME}]
    units: s
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: Minimum number of proxies'
    key: zabbix.proxy.group.online.min[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.group.settings[{#PROXY.GROUP.NAME}]
  - name: 'Proxy group [{#PROXY.GROUP.NAME}]: State'
    key: zabbix.proxy.group.state[{#PROXY.GROUP.NAME}]
    interval: '0'
    type: dependent
    master_item_key: zabbix.proxy.group.stats[{#PROXY.GROUP.NAME}]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Availability too low'
    expression: max(/Zabbix server health/zabbix.proxy.group.avail.proxies.percent[{#PROXY.GROUP.NAME}],3m)<75
    severity: warning
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Failover invalid value'
    expression: last(/Zabbix server health/zabbix.proxy.group.failover[{#PROXY.GROUP.NAME}],#1)=-1
    severity: warning
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Minimum number of proxies
      invalid value'
    expression: last(/Zabbix server health/zabbix.proxy.group.online.min[{#PROXY.GROUP.NAME}],#1)=-1
    severity: warning
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Status changed'
    expression: last(/Zabbix server health/zabbix.proxy.group.state[{#PROXY.GROUP.NAME}],#1)<>last(/Zabbix
      server health/zabbix.proxy.group.state[{#PROXY.GROUP.NAME}],#2) and length(last(/Zabbix
      server health/zabbix.proxy.group.state[{#PROXY.GROUP.NAME}]))>0
    severity: information
    allow_manual_close: true
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Status "degrading"'
    expression: last(/Zabbix server health/zabbix.proxy.group.state[{#PROXY.GROUP.NAME}],#1)=4
    severity: average
  - name: 'Zabbix server: Proxy group [{#PROXY.GROUP.NAME}]: Status "offline"'
    expression: last(/Zabbix server health/zabbix.proxy.group.state[{#PROXY.GROUP.NAME}],#1)=1
    severity: high
