# Linux observability template
# Covers the most common performance metrics for Linux hosts.
#
# Deploy with:
#   zbx apply configs/templates/linux-observability.yaml

template: linux-observability
name: "Linux Observability"
description: "Core performance metrics for Linux servers"
groups:
  - Templates
  - Templates/Linux

items:
  - name: CPU utilization
    key: system.cpu.util
    interval: 30s
    value_type: float
    units: "%"
    description: "Overall CPU usage across all cores"
    tags:
      - tag: component
        value: cpu

  - name: Available memory
    key: vm.memory.size[available]
    interval: 60s
    value_type: unsigned
    units: B
    description: "Available (free + cache + buffers) memory in bytes"
    tags:
      - tag: component
        value: memory

  - name: Memory utilization
    key: vm.memory.utilization
    interval: 60s
    value_type: float
    units: "%"
    tags:
      - tag: component
        value: memory

  - name: System load (1 min avg)
    key: system.cpu.load[all,avg1]
    interval: 60s
    value_type: float
    description: "1-minute load average"
    tags:
      - tag: component
        value: cpu

  - name: Number of processes
    key: proc.num
    interval: 60s
    value_type: unsigned

  - name: Uptime
    key: system.uptime
    interval: 600s
    value_type: unsigned
    units: uptime

triggers:
  - name: High CPU utilization (>90% for 5 min)
    expression: avg(/linux-observability/system.cpu.util,5m) > 90
    severity: high
    description: "CPU usage has been above 90% for the last 5 minutes"
    tags:
      - tag: scope
        value: performance

  - name: CPU utilization warning (>75% for 5 min)
    expression: avg(/linux-observability/system.cpu.util,5m) > 75
    severity: warning
    description: "CPU usage has been above 75% for the last 5 minutes"

  - name: Low available memory (<10%)
    expression: last(/linux-observability/vm.memory.utilization) > 90
    severity: average
    description: "Less than 10% memory is available"
    tags:
      - tag: scope
        value: memory

  - name: Critical memory pressure (>97%)
    expression: last(/linux-observability/vm.memory.utilization) > 97
    severity: high
    description: "Memory utilization is critically high"

discovery_rules:
  - name: Mounted filesystem discovery
    key: vfs.fs.discovery
    interval: 1h
    description: "Auto-discover mounted filesystems"
    item_prototypes:
      - name: "Filesystem {#FSNAME}: free space"
        key: "vfs.fs.size[{#FSNAME},free]"
        interval: 5m
        value_type: unsigned
        units: B

      - name: "Filesystem {#FSNAME}: used space (%)"
        key: "vfs.fs.size[{#FSNAME},pused]"
        interval: 5m
        value_type: float
        units: "%"

  - name: Network interface discovery
    key: net.if.discovery
    interval: 1h
    description: "Auto-discover network interfaces"
    item_prototypes:
      - name: "{#IFNAME}: inbound traffic"
        key: "net.if.in[{#IFNAME}]"
        interval: 60s
        value_type: unsigned
        units: bps

      - name: "{#IFNAME}: outbound traffic"
        key: "net.if.out[{#IFNAME}]"
        interval: 60s
        value_type: unsigned
        units: bps
