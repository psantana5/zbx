template: Memcached by Zabbix agent 2
description: "Get Memcached metrics from plugin for the New Zabbix Agent (zabbix-agent2).\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/398623-discussion-thread-for-official-zabbix-template-memcached\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: 'Commands: FLUSH per second'
  key: memcached.commands.flush.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: The flush_all command invalidates all items in the database. This operation
    incurs a performance penalty and shouldn't take place in production, so check
    your debug scripts.
  history: 31d
  tags:
  - tag: component
    value: commands
- name: 'Commands: GET per second'
  key: memcached.commands.get.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: Number of GET requests received by server per second.
  history: 31d
  tags:
  - tag: component
    value: commands
- name: 'Commands: SET per second'
  key: memcached.commands.set.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: Number of SET requests received by server per second.
  history: 31d
  tags:
  - tag: component
    value: commands
- name: Maximum number of bytes
  key: memcached.config.limit_maxbytes
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  units: B
  description: Maximum number of bytes allowed in cache. You can adjust this setting
    via a config file or the command line while starting your Memcached server.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: Open connections
  key: memcached.connections.current
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: The number of clients presently connected
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Max connections
  key: memcached.connections.max
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Max number of concurrent connections
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Queued connections per second
  key: memcached.connections.queued.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: Number of times that memcached has hit its connections limit and disabled
    its listener
  history: 31d
  tags:
  - tag: component
    value: connections
- name: New connections per second
  key: memcached.connections.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: Number of connections opened per second
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connection structures
  key: memcached.connections.structures
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Number of  connection structures allocated by the server
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Throttled connections
  key: memcached.connections.throttled.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  description: Number of times a client connection was throttled. When sending GETs
    in batch mode and the connection contains too many requests (limited by -R parameter)
    the connection might be throttled to prevent starvation.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: CPU sys
  key: memcached.cpu.sys
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  units: s
  description: System CPU consumed by the Memcached server
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU user
  key: memcached.cpu.user
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  units: s
  description: User CPU consumed by the Memcached server
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Ping
  key: memcached.ping["{$MEMCACHED.CONN.URI}"]
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
- name: Process id
  key: memcached.process_id
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: PID of the server process
  history: 31d
  tags:
  - tag: component
    value: application
- name: Bytes used
  key: memcached.stats.bytes
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  units: B
  description: Current number of bytes used to store items.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Read bytes per second
  key: memcached.stats.bytes_read.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  units: Bps
  description: The network's read rate per second in B/sec
  history: 31d
  tags:
  - tag: component
    value: network
- name: Written bytes per second
  key: memcached.stats.bytes_written.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  units: Bps
  description: The network's read rate per second in B/sec
  history: 31d
  tags:
  - tag: component
    value: network
- name: Current number of items stored
  key: memcached.stats.curr_items
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Current number of items stored by this instance.
  history: 31d
  tags:
  - tag: component
    value: keyspace
- name: Evictions per second
  key: memcached.stats.evictions.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: "\"An eviction is when an item that still has time to live is removed\
    \ from the cache because a brand new item needs to be allocated.\r\nThe item is\
    \ selected with a pseudo-LRU mechanism.\r\nA high number of evictions coupled\
    \ with a low hit rate means your application is setting a large number of keys\
    \ that are never used again.\""
  history: 31d
  tags:
  - tag: component
    value: keyspace
- name: Hits per second
  key: memcached.stats.hits.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Number of successful GET requests (items requested and found) per second.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Misses per second
  key: memcached.stats.misses.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Number of missed GET requests (items requested but not found) per second.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Threads
  key: memcached.stats.threads
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Number of worker threads requested
  history: 31d
  tags:
  - tag: component
    value: threads
- name: New items per second
  key: memcached.stats.total_items.rate
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  description: Number of new items stored per second.
  history: 31d
  tags:
  - tag: component
    value: keyspace
- name: Get status
  key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  interval: 1m
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime
  key: memcached.uptime
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: unsigned
  units: s
  description: Number of seconds since Memcached server start
  history: 31d
  tags:
  - tag: component
    value: application
- name: Memcached version
  key: memcached.version
  interval: '0'
  type: dependent
  master_item_key: memcached.stats["{$MEMCACHED.CONN.URI}"]
  value_type: char
  description: Version of the Memcached server
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
triggers:
- name: 'Memcached: Memory usage is too high'
  expression: min(/Memcached by Zabbix agent 2/memcached.stats.bytes,5m)/last(/Memcached
    by Zabbix agent 2/memcached.config.limit_maxbytes)*100>90
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'Memcached: Total number of connected clients is too high'
  expression: min(/Memcached by Zabbix agent 2/memcached.connections.current,5m)/last(/Memcached
    by Zabbix agent 2/memcached.connections.max)*100>80
  severity: warning
  description: When the number of connections reaches the value of the "max_connections"
    parameter, new connections will be rejected.
  tags:
  - tag: scope
    value: capacity
- name: 'Memcached: Too many queued connections'
  expression: min(/Memcached by Zabbix agent 2/memcached.connections.queued.rate,5m)>1
  severity: warning
  description: The max number of connections is reached and a new connection had to
    wait in the queue as a result.
  tags:
  - tag: scope
    value: capacity
- name: 'Memcached: Too many throttled connections'
  expression: min(/Memcached by Zabbix agent 2/memcached.connections.throttled.rate,5m)>1
  severity: warning
  description: "Number of times a client connection was throttled is too high.\r\n\
    When sending GETs in batch mode and the connection contains too many requests\
    \ (limited by -R parameter) the connection might be throttled to prevent starvation."
  tags:
  - tag: scope
    value: performance
- name: 'Memcached: Failed to fetch info data'
  expression: nodata(/Memcached by Zabbix agent 2/memcached.cpu.sys,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Memcached: Service is down'
  expression: last(/Memcached by Zabbix agent 2/memcached.ping["tcp://localhost:11211"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Memcached: Service has been restarted'
  expression: last(/Memcached by Zabbix agent 2/memcached.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Memcached: Version has changed'
  expression: last(/Memcached by Zabbix agent 2/memcached.version,#1)<>last(/Memcached
    by Zabbix agent 2/memcached.version,#2) and length(last(/Memcached by Zabbix agent
    2/memcached.version))>0
  severity: information
  description: The Memcached version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
