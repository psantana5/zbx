template: Windows by SNMP
description: "This is an official Windows template. It requires an SNMP client.\r\n\
  \r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nIF-MIB\r\n\r\nKnown Issues:\r\
  \n\r\n  Description:\r\n    64-bit I/O is not supported even though `IfxTable` is\
  \ present.\r\n    Currently, Windows gets its interface status from MIB-2. Since\
  \ these 64-bit SNMP counters (`ifHCInOctets`, `ifHCOutOctets`, etc.) are defined\
  \ as an extension to IF-MIB, Microsoft has not implemented it.\r\n  Version: Win2008,\
  \ Win2012R2.\r\n\r\n  Description: MIB is not supported\r\n  Version: WindowsXP\r\
  \n\r\n  Description: EtherLike MIB is not supported\r\n  Version: any\r\n\r\n  Description:\r\
  \n    HOST-RESOURCES-MIB::hrStorageSize is limited to number 2147483647.\r\n   \
  \ Storage size is calculated using: `hrStorageSize` and `hrStorageAllocationUnits`.\r\
  \n    Allocation size of 512 bytes, sets the limit of monitored device to 1TB.\r\
  \n  Version: any\r\n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: 'Windows: SNMP walk network interfaces'
  key: net.if.walk
  interval: 1m
  value_type: text
  description: Discovering interfaces from IF-MIB.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: CPU utilization
  key: system.cpu.util
  interval: 1m
  units: '%'
  description: "MIB: HOST-RESOURCES-MIB\r\nThe average, over the last minute, of the\
    \ percentage of time that processors was not idle.\r\nImplementations may approximate\
    \ this one minute smoothing period if necessary."
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: 'Windows: SNMP walk mounted filesystems'
  key: vfs.fs.walk
  interval: 1m
  value_type: text
  description: HOST-RESOURCES-MIB::hrStorage discovery.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Windows: Unavailable by ICMP ping'
  expression: max(/Windows by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Windows: High ICMP ping loss'
  expression: min(/Windows by SNMP/icmppingloss,5m)>20 and min(/Windows by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Windows: High ICMP ping response time'
  expression: avg(/Windows by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Windows: High CPU utilization'
  expression: min(/Windows by SNMP/system.cpu.util,5m)>90
  severity: warning
  description: CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Windows: Host has been restarted'
  expression: (last(/Windows by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Windows
    by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Windows by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Windows by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Windows: System name has changed'
  expression: last(/Windows by SNMP/system.name,#1)<>last(/Windows by SNMP/system.name,#2)
    and length(last(/Windows by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Windows: No SNMP data collection'
  expression: max(/Windows by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Network interfaces discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.walk
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifInOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifOutOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Windows by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>2\r\
      \nor min(/Windows by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>2"
    severity: warning
    recovery_expression: "max(/Windows by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<2*0.8\r\
      \nand max(/Windows by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<2*0.8"
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Windows by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Windows\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or\r\navg(/Windows by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Windows\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and\r\nlast(/Windows by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/Windows by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Windows\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and\r\navg(/Windows by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Windows\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower
      speed than it was before'
    expression: "change(/Windows by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0\
      \ and last(/Windows by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\r\nand\
      \ (\r\nlast(/Windows by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or\r\nlast(/Windows\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or\r\nlast(/Windows by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11\
      \ or\r\nlast(/Windows by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/Windows\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or\r\nlast(/Windows by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\
      \n)\r\nand\r\n(last(/Windows by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/Windows by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\
      \ and last(/Windows by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or\r\
      \n(last(/Windows by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Windows by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/Windows by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Windows
      by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/Windows by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
- name: Mounted filesystem discovery
  key: vfs.fs.discovery[snmp]
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.walk
  filter:
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSNAME}]: Get data'
    key: vfs.fs.walk.data[hrStorage.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'FS [{#FSNAME}]: Space: Used, in %'
    key: vfs.fs.pused[{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[hrStorage.{#SNMPINDEX}]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Total'
    key: vfs.fs.total[hrStorageSize.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[hrStorage.{#SNMPINDEX}]
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used'
    key: vfs.fs.used[hrStorageUsed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[hrStorage.{#SNMPINDEX}]
    units: B
  trigger_prototypes:
  - name: 'Windows: FS [{#FSNAME}]: Space is critically low'
    expression: min(/Windows by SNMP/vfs.fs.pused[{#SNMPINDEX}],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'Windows: FS [{#FSNAME}]: Space is low'
    expression: min(/Windows by SNMP/vfs.fs.pused[{#SNMPINDEX}],5m)>80
    severity: warning
    allow_manual_close: true
- name: Memory discovery
  key: vm.memory.discovery
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.walk
  filter:
  - macro: '{#MEMNAME}'
    value: '{$MEMORY.NAME.MATCHES}'
  - macro: '{#MEMNAME}'
    value: '{$MEMORY.NAME.NOT_MATCHES}'
  - macro: '{#MEMTYPE}'
    value: '{$MEMORY.TYPE.MATCHES}'
  - macro: '{#MEMTYPE}'
    value: '{$MEMORY.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#MEMNAME}: Get data'
    key: vm.memory.data[{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: text
  - name: '{#MEMNAME}: Used'
    key: vm.memory.used[hrStorageUsed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vm.memory.data[{#SNMPINDEX}]
    value_type: unsigned
    units: B
  - name: '{#MEMNAME}: Utilization'
    key: vm.memory.util[{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vm.memory.data[{#SNMPINDEX}]
    units: '%'
  - name: '{#MEMNAME}: Total'
    key: vm.memory.walk.data.total[hrStorageSize.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vm.memory.data[{#SNMPINDEX}]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Windows: {#MEMNAME}: High memory utilization'
    expression: min(/Windows by SNMP/vm.memory.util[{#SNMPINDEX}],5m)>90
    severity: average
