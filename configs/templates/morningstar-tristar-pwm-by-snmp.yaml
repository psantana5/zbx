  severity: warning
  tags:
  - tag: scope
    value: notice
- name: 'Morningstar TriStar PWM: Status: Device has "batterySenseDisconnected" alarm
    flag'
  expression: count(/Morningstar TriStar PWM by SNMP/status.alarms[alarms.0],#3,"like","batterySenseDisconnected")=2
