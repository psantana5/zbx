template: Morningstar TriStar PWM by SNMP
description: "MIBs used:\r\nTRISTAR\r\n\r\nGenerated by official Zabbix template tool\
  \ \"Templator\""
groups:
- Templates
items:
- name: 'Battery: Battery Voltage discovery'
  key: battery.voltage.discovery[batteryVoltage.0]
  interval: 15m
  units: V
  description: "MIB: TRISTAR\r\nDescription:Battery voltage\r\nScaling Factor:0.002950042724609375\r\
    \nUnits:V\r\nRange:[0.0, 80.0]\r\nModbus address:0x0008"
  history: '0'
  tags:
  - tag: component
    value: battery
  - tag: component
    value: discovery
  - tag: component
    value: raw
- name: 'Status: Control Mode'
  key: control.mode[controlMode.0]
  interval: 1m
  description: "MIB: TRISTAR\r\nDescription:Control Mode\r\nModbus address:0x001A\r\
    \n\r\n0: charge\r\n1: loadControl\r\n2: diversion\r\n3: lighting"
  history: 31d
  tags:
  - tag: component
    value: status
- name: 'Counter: Amp-hours'
  key: counter.charge_amp_hours[ahResettable.0]
  interval: 1m
  units: Ah
  description: "MIB: TRISTAR\r\nDescription:Ah (Resettable)\r\nScaling Factor:0.1\r\
    \nUnits:Ah\r\nRange:[0.0, 50000.0]\r\nModbus addresses:H=0x0011 L=0x0012"
  history: 31d
  tags:
  - tag: component
    value: counter
- name: 'Counter: KW-hours'
  key: counter.charge_kw_hours[kilowattHours.0]
  interval: 1m
  units: '!kWh'
  description: "MIB: TRISTAR\r\nDescription:Kilowatt Hours\r\nScaling Factor:1.0\r\
    \nUnits:kWh\r\nRange:[0.0, 5000.0]\r\nModbus address:0x001E"
  history: 31d
  tags:
  - tag: component
    value: counter
- name: 'Status: Alarms'
  key: status.alarms[alarms.0]
  interval: 1m
  value_type: text
  description: "MIB: TRISTAR\r\nDescription:Alarms\r\nModbus addresses:H=0x001D L=0x0017"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: status
- name: 'Status: Faults'
  key: status.faults[faults.0]
  interval: 1m
  value_type: text
  description: "MIB: TRISTAR\r\nDescription:Battery voltage\r\nScaling Factor:0.002950042724609375\r\
    \nUnits:V\r\nRange:[0.0, 80.0]\r\nModbus address:0x0008"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: status
- name: 'Status: Uptime (hardware)'
  key: status.hw.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: The amount of time since this host was last initialized. Note that
    this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime
    is the uptime of the network management portion of the system.
  history: 31d
  tags:
  - tag: component
    value: status
- name: 'Status: Uptime (network)'
  key: status.net.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: The time (in hundredths of a second) since the network management portion
    of the system was last re-initialized.
  history: 31d
  tags:
  - tag: component
    value: status
- name: 'Temperature: Battery'
  key: temp.battery[batteryTemperature.0]
  interval: 1m
  units: C
  description: "MIB: TRISTAR\r\nDescription:Battery Temperature\r\nScaling Factor:1.0\r\
    \nUnits:deg C\r\nRange:[-40, 120]\r\nModbus address:0x000F"
  history: 31d
  tags:
  - tag: component
    value: temperature
- name: 'Temperature: Heatsink'
  key: temp.heatsink[heatsinkTemperature.0]
  interval: 1m
  units: C
  description: "MIB: TRISTAR\r\nDescription:Heatsink Temperature\r\nScaling Factor:1.0\r\
    \nUnits:deg C\r\nRange:[-40, 120]\r\nModbus address:0x000E"
  history: 31d
  tags:
  - tag: component
    value: temperature
triggers:
- name: 'Morningstar TriStar PWM: Status: Device has "batterySense" alarm flag'
