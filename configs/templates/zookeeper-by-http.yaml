- name: Revalidate per sec
  key: zookeeper.revalidate_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Rate of revalidations.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Server mode
  key: zookeeper.server_state
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: char
  description: Mode of the server. In an ensemble, this may either be leader or follower.
    Otherwise, it is standalone
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Snap syncs per sec
  key: zookeeper.snap_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Number of snap syncs performed per second
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Uptime
  key: zookeeper.uptime
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  units: s
