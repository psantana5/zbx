  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Number of watches currently set on the local ZooKeeper process.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Znode count
  key: zookeeper.znode_count
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: The number of znodes in the ZooKeeper namespace (the data)
  history: 31d
  tags:
  - tag: component
    value: application
triggers:
- name: 'Zookeeper: Too many file descriptors used'
  expression: min(/Zookeeper by HTTP/zookeeper.open_file_descriptor_count,5m) * 100
    / last(/Zookeeper by HTTP/zookeeper.max_file_descriptor_count) > 85
  severity: warning
  description: Number of file descriptors used more than {$ZOOKEEPER.FILE_DESCRIPTORS.MAX.WARN}%
    of the available number of file descriptors.
  tags:
  - tag: scope
    value: capacity
- name: 'Zookeeper: Too many queued requests'
  expression: min(/Zookeeper by HTTP/zookeeper.outstanding_requests,5m)>10
  severity: average
  description: Number of queued requests in the server. This goes up when the server
    receives more requests than it can process.
  tags:
  - tag: scope
    value: performance
- name: 'Zookeeper: Server mode has changed'
  expression: last(/Zookeeper by HTTP/zookeeper.server_state,#1)<>last(/Zookeeper
    by HTTP/zookeeper.server_state,#2) and length(last(/Zookeeper by HTTP/zookeeper.server_state))>0
  severity: information
  description: Zookeeper node state has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Zookeeper: Failed to fetch info data'
  expression: nodata(/Zookeeper by HTTP/zookeeper.uptime,10m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 10 minutes
  tags:
  - tag: scope
    value: availability
- name: 'Zookeeper: Version has changed'
  expression: last(/Zookeeper by HTTP/zookeeper.version,#1)<>last(/Zookeeper by HTTP/zookeeper.version,#2)
    and length(last(/Zookeeper by HTTP/zookeeper.version))>0
  severity: information
  description: Zookeeper version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Clients discovery
  key: zookeeper.clients
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Get client info'
    key: zookeeper.client_info[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Latency, avg'
    key: zookeeper.avg_latency[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
    units: ms
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Latency, max'
    key: zookeeper.max_latency[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
    units: ms
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Latency, min'
    key: zookeeper.min_latency[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
    units: ms
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Outstanding requests'
    key: zookeeper.outstanding_requests[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
    value_type: unsigned
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Packets received per sec'
    key: zookeeper.packets_received[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
  - name: 'Zookeeper client {#TYPE} [{#CLIENT}]: Packets sent per sec'
    key: zookeeper.packets_sent[{#TYPE},{#CLIENT}]
    interval: '0'
    type: dependent
    master_item_key: zookeeper.client_info[{#TYPE},{#CLIENT}]
- name: Leader metrics discovery
  key: zookeeper.metrics.leader
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  item_prototypes:
  - name: Learners{#SINGLETON}
    key: zookeeper.learners[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Pending syncs{#SINGLETON}
    key: zookeeper.pending_syncs[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Quorum size{#SINGLETON}
    key: zookeeper.quorum_size[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Synced followers{#SINGLETON}
    key: zookeeper.synced_followers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Synced non-voting follower{#SINGLETON}
    key: zookeeper.synced_non_voting_followers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Synced observers{#SINGLETON}
    key: zookeeper.synced_observers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Zookeeper: Too many pending syncs'
    expression: min(/Zookeeper by HTTP/zookeeper.pending_syncs[{#SINGLETON}],5m)>10
    severity: average
    allow_manual_close: true
  - name: 'Zookeeper: Too few active followers'
    expression: last(/Zookeeper by HTTP/zookeeper.synced_followers[{#SINGLETON}])
      < last(/Zookeeper by HTTP/zookeeper.quorum_size[{#SINGLETON}])-1
    severity: average
