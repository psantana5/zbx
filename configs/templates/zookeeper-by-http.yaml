  - tag: component
    value: disk
- name: Snapshot writes
  key: zookeeper.cnt_snapshottime
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Count of performed snapshot writes.
  history: 31d
  tags:
  - tag: component
    value: disk
- name: Commit per sec
  key: zookeeper.commit_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: The number of commits performed per second
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Drop connections per sec
  key: zookeeper.connection_drop_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Rate of connection drops.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Rejected connections per sec
  key: zookeeper.connection_rejected.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Rate of connection rejected.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Revalidate connections per sec
  key: zookeeper.connection_revalidate_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Rate of connection revalidations.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Diff syncs per sec
  key: zookeeper.diff_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Number of diff syncs performed per second
  history: 31d
