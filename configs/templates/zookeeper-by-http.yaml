    value: operations
- name: Ephemeral nodes count
  key: zookeeper.ephemerals_count
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Number of ephemeral nodes that a zookeeper server has in its data tree.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Get connections stats
  key: zookeeper.get_connections_stats
  interval: 1m
  type: http_agent
  value_type: text
  description: Get information on client connections to server. Note, depending on
    the number of client connections this operation may be expensive (i.e. impact
    server performance).
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: connections
  - tag: component
    value: raw
- name: Get server metrics
  key: zookeeper.get_metrics
  interval: 1m
  type: http_agent
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Global sessions
