template: Zookeeper by HTTP
description: "This template is designed for the effortless deployment of Apache Zookeeper\
  \ monitoring by Zabbix via HTTP and doesn't require any external scripts.\r\n\r\n\
  This template works with standalone and cluster instances. Metrics are collected\
  \ from each Zookeeper node by requests to AdminServer\r\n\r\nSetup:\r\n\r\n1. Enable\
  \ the AdminServer and configure the parameters according to the official documentation:\r\
  \nhttps://zookeeper.apache.org/doc/current/zookeeperAdmin.html#sc_adminserver_config\r\
  \n\r\n2. Set the hostname or IP address of the Apache Zookeeper host in the '{$ZOOKEEPER.HOST}'\
  \ macro. You can also change the '{$ZOOKEEPER.COMMAND_URL}', '{$ZOOKEEPER.PORT}'\
  \ and '{$ZOOKEEPER.SCHEME}' macros if necessary.\r\n\r\nYou can discuss this template\
  \ or leave feedback on our forum:\r\nhttps://www.zabbix.com/forum/zabbix-suggestions-and-feedback\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Approximate data size
  key: zookeeper.approximate_data_size
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  units: B
  description: Data tree size in bytes.The size includes the znode path and its value.
  history: 31d
  tags:
  - tag: component
    value: disk
- name: Election time, avg
  key: zookeeper.avg_election_time
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: Time between entering and leaving election.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Fsync time, avg
  key: zookeeper.avg_fsynctime
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: Time to fsync transaction log.
  history: 31d
  tags:
  - tag: component
    value: disk
- name: Latency, avg
  key: zookeeper.avg_latency
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: The average amount of time it takes for the server to respond to a
    client request.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Snapshot write time, avg
  key: zookeeper.avg_snapshottime
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: Average time to write a snapshot.
  history: 31d
  tags:
  - tag: component
    value: disk
- name: Bytes received per sec
  key: zookeeper.bytes_received_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: Bps
  description: Number of bytes received per second.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Elections
  key: zookeeper.cnt_election_time
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Number of elections happened.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Fsync
  key: zookeeper.cnt_fsynctime
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Count of performed fsyncs.
  history: 31d
