- name: Outstanding requests
  key: zookeeper.outstanding_requests
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: The number of queued requests when the server is under load and is
    receiving more sustained requests than it can process.
  history: 31d
