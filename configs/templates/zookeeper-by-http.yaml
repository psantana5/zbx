  - tag: component
    value: sessions
- name: Looking per sec
  key: zookeeper.looking_count.rate
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  description: Rate of transitions into looking state.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: File descriptors, max
  key: zookeeper.max_file_descriptor_count
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: unsigned
  description: Maximum number of file descriptors that a zookeeper server can open.
  history: 31d
  tags:
  - tag: component
    value: fds
- name: Latency, max
  key: zookeeper.max_latency
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: The maximum amount of time it takes for the server to respond to a
    client request.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Latency, min
  key: zookeeper.min_latency
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  units: ms
  description: The minimum amount of time it takes for the server to respond to a
