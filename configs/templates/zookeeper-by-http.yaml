    state.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Version
  key: zookeeper.version
  interval: '0'
  type: dependent
  master_item_key: zookeeper.get_metrics
  value_type: char
  description: Version of Zookeeper server.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Watch count
