- name: Threads running
  key: mysql.threads_running
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of threads that are not sleeping.
  history: 31d
  tags:
  - tag: component
    value: threads
- name: Uptime
  key: mysql.uptime
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  units: uptime
  description: Number of seconds that the server has been up.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Version
  key: mysql.version["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  interval: 15m
  value_type: char
  description: MySQL server version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
triggers:
- name: 'MySQL: Server has aborted connections'
  expression: min(/MySQL by Zabbix agent/mysql.aborted_connects.rate,5m)>3
  severity: average
  description: The number of failed attempts to connect to the MySQL server is more
    than `{$MYSQL.ABORTED_CONN.MAX.WARN}` in the last 5 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Buffer pool utilization is too low'
  expression: max(/MySQL by Zabbix agent/mysql.buffer_pool_utilization,5m)<50
  severity: warning
  description: The buffer pool utilization is less than `{$MYSQL.BUFF_UTIL.MIN.WARN}`%
    in the last 5 minutes. This means that there is a lot of unused RAM allocated
    for the buffer pool, which you can easily reallocate at the moment.
  tags:
  - tag: scope
    value: notice
- name: 'MySQL: Refused connections'
  expression: last(/MySQL by Zabbix agent/mysql.connection_errors_max_connections.rate)>0
  severity: average
  description: Number of refused connections due to the `max_connections` limit being
    reached.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Number of on-disk temporary tables created per second is high'
  expression: min(/MySQL by Zabbix agent/mysql.created_tmp_disk_tables.rate,5m)>10
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Number of temporary files created per second is high'
  expression: min(/MySQL by Zabbix agent/mysql.created_tmp_files.rate,5m)>10
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Number of internal temporary tables created per second is high'
  expression: min(/MySQL by Zabbix agent/mysql.created_tmp_tables.rate,5m)>30
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Service is down'
  expression: last(/MySQL by Zabbix agent/mysql.ping["127.0.0.1","3306"])=0
  severity: high
  description: MySQL is down.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Server has slow queries'
  expression: min(/MySQL by Zabbix agent/mysql.slow_queries.rate,5m)>3
  severity: warning
  description: The number of slow queries is more than `{$MYSQL.SLOW_QUERIES.MAX.WARN}`
    in the last 5 minutes.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Service has been restarted'
  expression: last(/MySQL by Zabbix agent/mysql.uptime)<10m
  severity: information
  description: MySQL uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MySQL: Failed to fetch info data'
  expression: nodata(/MySQL by Zabbix agent/mysql.uptime,30m)=1
  severity: information
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Version has changed'
  expression: last(/MySQL by Zabbix agent/mysql.version["127.0.0.1","3306"],#1)<>last(/MySQL
    by Zabbix agent/mysql.version["127.0.0.1","3306"],#2) and length(last(/MySQL by
    Zabbix agent/mysql.version["127.0.0.1","3306"]))>0
  severity: information
  description: The MySQL version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Database discovery
  key: mysql.db.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  interval: 1h
  filter:
  - macro: '{#DBNAME}'
    value: '{$MYSQL.DBNAME.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MYSQL.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: Size of database {#DBNAME}
    key: mysql.dbsize["{$MYSQL.HOST}","{$MYSQL.PORT}","{#DBNAME}"]
    interval: 5m
    value_type: unsigned
    units: B
- name: MariaDB discovery
  key: mysql.extra_metric.discovery
  interval: '0'
  type: dependent
  master_item_key: mysql.version["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  item_prototypes:
  - name: Binlog commits
    key: mysql.binlog_commits[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Binlog group commits
    key: mysql.binlog_group_commits[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait count
    key: mysql.master_gtid_wait_count[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait timeouts
    key: mysql.master_gtid_wait_timeouts[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait time
    key: mysql.master_gtid_wait_time[{#SINGLETON}]
    interval: '0'
    type: dependent
- name: Replication discovery
  key: mysql.replication.discovery["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  interval: 1h
  item_prototypes:
  - name: Replication Slave status {#MASTER_HOST}
    key: mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]
    interval: 1m
    value_type: text
  - name: Replication Seconds Behind Master {#MASTER_HOST}
    key: mysql.seconds_behind_master["{#MASTER_HOST}"]
    interval: '0'
    type: dependent
    master_item_key: mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]
    value_type: unsigned
    units: s
  - name: Replication Slave IO Running {#MASTER_HOST}
    key: mysql.slave_io_running["{#MASTER_HOST}"]
    interval: '0'
    type: dependent
    master_item_key: mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]
    value_type: char
  - name: Replication Slave SQL Running {#MASTER_HOST}
    key: mysql.slave_sql_running["{#MASTER_HOST}"]
    interval: '0'
    type: dependent
    master_item_key: mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]
    value_type: char
  - name: Replication Slave SQL Running State {#MASTER_HOST}
    key: mysql.slave_sql_running_state["{#MASTER_HOST}"]
    interval: '0'
    type: dependent
    master_item_key: mysql.slave_status["{$MYSQL.HOST}","{$MYSQL.PORT}","{#SQL_STATEMENT}"]
    value_type: text
  trigger_prototypes:
  - name: 'MySQL: Replication lag is too high'
    expression: min(/MySQL by Zabbix agent/mysql.seconds_behind_master["{#MASTER_HOST}"],5m)>30m
    severity: warning
  - name: 'MySQL: The slave I/O thread is not running'
    expression: count(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"],#1,"eq","No")=1
    severity: average
  - name: 'MySQL: The slave I/O thread is not connected to a replication master'
    expression: count(/MySQL by Zabbix agent/mysql.slave_io_running["{#MASTER_HOST}"],#1,"ne","Yes")=1
    severity: warning
  - name: 'MySQL: The SQL thread is not running'
    expression: count(/MySQL by Zabbix agent/mysql.slave_sql_running["{#MASTER_HOST}"],#1,"eq","No")=1
    severity: warning
