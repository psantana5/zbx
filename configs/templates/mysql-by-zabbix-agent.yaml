- name: Open tables
  key: mysql.open_tables
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of tables that are open.
  history: 31d
  tags:
  - tag: component
    value: tables
- name: Status
  key: mysql.ping["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  interval: 1m
  value_type: unsigned
  description: MySQL server status.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Queries per second
  key: mysql.queries.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of statements executed by the server. This variable includes
    statements executed within stored programs, unlike the `Questions` variable.
  history: 31d
