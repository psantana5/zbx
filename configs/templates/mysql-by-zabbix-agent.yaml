- name: Slow queries per second
  key: mysql.slow_queries.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of queries that have taken more than `long_query_time` seconds.
  history: 31d
  tags:
  - tag: component
    value: queries
- name: Threads cached
  key: mysql.threads_cached
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of threads in the thread cache.
  history: 31d
  tags:
  - tag: component
    value: threads
- name: Threads connected
  key: mysql.threads_connected
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of currently open connections.
  history: 31d
  tags:
  - tag: component
    value: threads
- name: Threads created per second
  key: mysql.threads_created.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of threads created to handle connections. If the value of `Threads_created`
    is large, you may want to increase the `thread_cache_size` value. The cache miss
    rate can be calculated as `Threads_created`/`Connections`.
  history: 31d
