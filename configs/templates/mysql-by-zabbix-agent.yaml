template: MySQL by Zabbix agent
description: "Requirements for template operation:\r\n\r\n1. Install Zabbix agent\
  \ and MySQL client. If necessary, add the path to the 'mysql' and 'mysqladmin' utilities\
  \ to the global environment variable PATH.\r\n\r\n2. Copy the 'template_db_mysql.conf'\
  \ file with user parameters into folder with Zabbix agent configuration (/etc/zabbix/zabbix_agentd.d/\
  \ by default). Don't forget to restart Zabbix agent.\r\n\r\n3. Create the MySQL\
  \ user that will be used for monitoring ('<password>' at your discretion). For example:\r\
  \n\r\nCREATE USER 'zbx_monitor'@'%' IDENTIFIED BY '<password>';\r\nGRANT REPLICATION\
  \ CLIENT,PROCESS,SHOW DATABASES,SHOW VIEW ON *.* TO 'zbx_monitor'@'%';\r\n\r\nFor\
  \ more information, please see MySQL documentation (https://dev.mysql.com/doc/refman/8.0/en/grant.html).\r\
  \n\r\nNOTE: In order to collect replication metrics, MariaDB Enterprise Server 10.5.8-5\
  \ and above and MariaDB Community Server 10.5.9 and above require the SLAVE MONITOR\
  \ privilege to be set for the monitoring user:\r\n\r\nGRANT REPLICATION CLIENT,PROCESS,SHOW\
  \ DATABASES,SHOW VIEW,SLAVE MONITOR ON *.* TO 'zbx_monitor'@'%';\r\n\r\nFor more\
  \ information, please read the MariaDB documentation (https://mariadb.com/docs/server/ref/mdb/privileges/SLAVE_MONITOR/).\r\
  \n\r\n4. Create '.my.cnf' configuration file in the home directory of Zabbix agent\
  \ for Linux distributions (/var/lib/zabbix by default) or 'my.cnf' in c:\\ for Windows.\
  \ For example:\r\n\r\n[client]\r\nprotocol=tcp\r\nuser='zbx_monitor'\r\npassword='<password>'\r\
  \n\r\nFor more information, please see MySQL documentation (https://dev.mysql.com/doc/refman/8.0/en/option-files.html).\r\
  \n\r\nNOTE: Linux distributions that use SELinux may require additional steps for\
  \ access configuration.\r\n\r\nYou can discuss this template or leave feedback on\
  \ our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384189-discussion-thread-for-official-zabbix-template-db-mysql\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Aborted clients per second
  key: mysql.aborted_clients.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of connections that were aborted because the client died without
    closing the connection properly.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Aborted connections per second
  key: mysql.aborted_connects.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of failed attempts to connect to the MySQL server.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Binlog cache disk use
  key: mysql.binlog_cache_disk_use
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of transactions that used a temporary disk cache because they
    could not fit in the regular binary log cache, being larger than `binlog_cache_size`.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: Buffer pool efficiency
  key: mysql.buffer_pool_efficiency
  interval: 1m
  type: calculated
  params: "100 - (last(//mysql.innodb_buffer_pool_reads) / \r\n( last(//mysql.innodb_buffer_pool_read_requests)\
    \ + \r\n( last(//mysql.innodb_buffer_pool_read_requests) = 0 ) ) * 100 * \r\n\
    ( last(//mysql.innodb_buffer_pool_read_requests) > 0 ))"
  units: '%'
  description: The item shows how effectively the buffer pool is serving reads.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Buffer pool utilization
  key: mysql.buffer_pool_utilization
  interval: 1m
  type: calculated
  params: "( last(//mysql.innodb_buffer_pool_pages_total) - \r\nlast(//mysql.innodb_buffer_pool_pages_free)\
    \ ) / \r\n( last(//mysql.innodb_buffer_pool_pages_total) + \r\n( last(//mysql.innodb_buffer_pool_pages_total)\
    \ = 0 ) ) * 100 * \r\n( last(//mysql.innodb_buffer_pool_pages_total) > 0 )"
  units: '%'
  description: Ratio of used to total pages in the buffer pool.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Bytes received
  key: mysql.bytes_received.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  units: Bps
  description: Number of bytes received from all clients.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Bytes sent
