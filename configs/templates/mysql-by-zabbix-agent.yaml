- name: Get status variables
  key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  interval: 1m
  value_type: text
  description: Gets server global status information.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: InnoDB buffer pool pages free
  key: mysql.innodb_buffer_pool_pages_free
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: The total size of the InnoDB buffer pool, in pages.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: InnoDB buffer pool pages total
  key: mysql.innodb_buffer_pool_pages_total
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: The total size of the InnoDB buffer pool, in pages.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: InnoDB buffer pool read requests
  key: mysql.innodb_buffer_pool_read_requests
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of logical read requests.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: InnoDB buffer pool read requests per second
  key: mysql.innodb_buffer_pool_read_requests.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of logical read requests per second.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: InnoDB buffer pool reads
  key: mysql.innodb_buffer_pool_reads
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of logical reads that InnoDB could not satisfy from the buffer
    pool and had to read directly from the disk.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: InnoDB buffer pool reads per second
  key: mysql.innodb_buffer_pool_reads.rate
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of logical reads per second that InnoDB could not satisfy from
    the buffer pool and had to read directly from the disk.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: Innodb buffer pool wait free
  key: mysql.innodb_buffer_pool_wait_free
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of times InnoDB waited for a free page before reading or creating
    a page. Normally, writes to the InnoDB buffer pool happen in the background. When
    no clean pages are available, dirty pages are flushed first in order to free some
    up. This counts the numbers of wait for this operation to finish. If this value
    is not small, look at the increasing `innodb_buffer_pool_size`.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: memory
- name: Calculated value of innodb_log_file_size
  key: mysql.innodb_log_file_size
  interval: 1m
  type: calculated
  params: (last(//mysql.innodb_os_log_written) - last(//mysql.innodb_os_log_written,#1:now-1h))
    / {$MYSQL.INNODB_LOG_FILES}
  description: '`Innodb_log_file_size` is calculated as: (`innodb_os_log_written`-`innodb_os_log_written`(time
    shift -1h))/`{$MYSQL.INNODB_LOG_FILES}`. `Innodb_log_file_size` is the size in
    bytes of the each InnoDB redo log file in the log group. The combined size can
    be no more than 512 GB. Larger values mean less disk I/O due to less flushing
    checkpoint activity, but also slower recovery from a crash.'
  history: 31d
  tags:
  - tag: component
    value: system
- name: Innodb number open files
  key: mysql.innodb_num_open_files
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  description: Number of open files held by InnoDB. InnoDB only.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: system
- name: Innodb log written
  key: mysql.innodb_os_log_written
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  units: B
  description: Number of bytes written to the InnoDB log.
  history: 31d
  tags:
  - tag: component
    value: system
- name: InnoDB row lock time
  key: mysql.innodb_row_lock_time
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  units: s
  description: The total time spent in acquiring row locks for InnoDB tables, in milliseconds.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: tables
- name: InnoDB row lock time max
  key: mysql.innodb_row_lock_time_max
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  units: s
  description: The maximum time to acquire a row lock for InnoDB tables, in milliseconds.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: tables
- name: InnoDB row lock waits
  key: mysql.innodb_row_lock_waits
  interval: '0'
  type: dependent
  master_item_key: mysql.get_status_variables["{$MYSQL.HOST}","{$MYSQL.PORT}"]
  value_type: unsigned
  description: Number of times operations on InnoDB tables had to wait for a row lock.
  history: 31d
  tags:
  - tag: component
    value: innodb
  - tag: component
    value: tables
- name: Max used connections
