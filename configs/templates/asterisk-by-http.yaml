triggers:
- name: 'Asterisk: Total number of active channels of IAX trunks is too high'
  expression: min(/Asterisk by HTTP/asterisk.iax.active_channels,10m)>=28
  severity: warning
  description: The IAX trunks may not be able to process new calls.
  tags:
  - tag: scope
    value: performance
- name: 'Asterisk: Total number of active channels of PJSIP trunks is too high'
  expression: min(/Asterisk by HTTP/asterisk.pjsip.active_channels,10m)>=28
  severity: warning
  description: The PJSIP trunks may not be able to process new calls.
  tags:
  - tag: scope
    value: performance
- name: 'Asterisk: Total number of active channels of SIP trunks is too high'
  expression: min(/Asterisk by HTTP/asterisk.sip.active_channels,10m)>=28
  severity: warning
  description: The SIP trunks may not be able to process new calls.
  tags:
  - tag: scope
    value: performance
- name: 'Asterisk: Service has been restarted'
  expression: last(/Asterisk by HTTP/asterisk.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Asterisk: Failed to fetch AMI page'
  expression: nodata(/Asterisk by HTTP/asterisk.uptime,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'Asterisk: Configuration has been reloaded'
  expression: last(/Asterisk by HTTP/asterisk.uptime_reload)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Asterisk: Version has changed'
  expression: last(/Asterisk by HTTP/asterisk.version,#1)<>last(/Asterisk by HTTP/asterisk.version,#2)
    and length(last(/Asterisk by HTTP/asterisk.version))>0
  severity: information
  description: The Asterisk version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Asterisk: Service response time is too high'
  expression: min(/Asterisk by HTTP/net.tcp.service.perf["tcp","<SET AMI HOST>","5038"],5m)>10s
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Asterisk: Service is down'
  expression: last(/Asterisk by HTTP/net.tcp.service["tcp","<SET AMI HOST>","5038"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: IAX peers discovery
  key: asterisk.iax_peers.discovery
  interval: '0'
  type: dependent
  master_item_key: asterisk.get_stats
  item_prototypes:
  - name: 'IAX trunk "{#OBJECTNAME}": Get IAX trunk'
    key: asterisk.iax.trunk.get[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'IAX trunk "{#OBJECTNAME}": Active channels'
    key: asterisk.iax.trunk.active_channels[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.iax.trunk.get[{#OBJECTNAME}]
    value_type: unsigned
  - name: 'IAX trunk "{#OBJECTNAME}": Status'
    key: asterisk.iax.trunk.status[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.iax.trunk.get[{#OBJECTNAME}]
    value_type: char
  trigger_prototypes:
  - name: 'Asterisk: IAX trunk "{#OBJECTNAME}": Number of the IAX trunk "{#OBJECTNAME}"
      active channels is too high'
    expression: min(/Asterisk by HTTP/asterisk.iax.trunk.active_channels[{#OBJECTNAME}],10m)>=28
    severity: warning
  - name: 'Asterisk: IAX trunk "{#OBJECTNAME}": IAX trunk {#OBJECTNAME} has a state
      {ITEM.VALUE}'
    expression: last(/Asterisk by HTTP/asterisk.iax.trunk.status[{#OBJECTNAME}])="UNKNOWN"
      or last(/Asterisk by HTTP/asterisk.iax.trunk.status[{#OBJECTNAME}])="UNREACHABLE"
    severity: average
- name: PJSIP endpoints discovery
  key: asterisk.pjsip_endpoints.discovery
  interval: '0'
  type: dependent
  master_item_key: asterisk.get_stats
  item_prototypes:
  - name: 'PJSIP trunk "{#OBJECTNAME}": Get PJSIP trunk'
    key: asterisk.pjsip.trunk.get[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'PJSIP trunk "{#OBJECTNAME}": Active channels'
    key: asterisk.pjsip.trunk.active_channels[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.pjsip.trunk.get[{#OBJECTNAME}]
    value_type: unsigned
  - name: 'PJSIP trunk "{#OBJECTNAME}": Device state'
    key: asterisk.pjsip.trunk.devicestate[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.pjsip.trunk.get[{#OBJECTNAME}]
    value_type: char
  trigger_prototypes:
  - name: 'Asterisk: PJSIP trunk "{#OBJECTNAME}": Number of the PJSIP trunk "{#OBJECTNAME}"
      active channels is too high'
    expression: min(/Asterisk by HTTP/asterisk.pjsip.trunk.active_channels[{#OBJECTNAME}],10m)>=28
    severity: warning
  - name: 'Asterisk: PJSIP trunk "{#OBJECTNAME}": PJSIP trunk {#OBJECTNAME} has a
      state Unavailable'
    expression: last(/Asterisk by HTTP/asterisk.pjsip.trunk.devicestate[{#OBJECTNAME}])="Unavailable"
    severity: average
- name: Queues discovery
  key: asterisk.queues.discovery
  interval: '0'
  type: dependent
  master_item_key: asterisk.get_stats
  item_prototypes:
  - name: '"{#QUEUE}": Get queue'
    key: asterisk.queue.get[{#QUEUE}]
    interval: '0'
    type: dependent
    value_type: text
  - name: '"{#QUEUE}": Available'
    key: asterisk.queue.available[{#QUEUE}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.queue.get[{#QUEUE}]
    value_type: unsigned
  - name: '"{#QUEUE}": Callers'
    key: asterisk.queue.callers[{#QUEUE}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.queue.get[{#QUEUE}]
    value_type: unsigned
  - name: '"{#QUEUE}": Logged in'
    key: asterisk.queue.loggedin[{#QUEUE}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.queue.get[{#QUEUE}]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Asterisk: "{#QUEUE}": Number of callers in the queue "{#QUEUE}" is too
      high'
    expression: min(/Asterisk by HTTP/asterisk.queue.callers[{#QUEUE}],10m)>10
    severity: warning
- name: SIP peers discovery
  key: asterisk.sip_peers.discovery
  interval: '0'
  type: dependent
  master_item_key: asterisk.get_stats
  item_prototypes:
  - name: 'SIP trunk "{#OBJECTNAME}": Get SIP trunk'
    key: asterisk.sip.trunk.get[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'SIP trunk "{#OBJECTNAME}": Active channels'
    key: asterisk.sip.trunk.active_channels[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.sip.trunk.get[{#OBJECTNAME}]
    value_type: unsigned
  - name: 'SIP trunk "{#OBJECTNAME}": Status'
    key: asterisk.sip.trunk.status[{#OBJECTNAME}]
    interval: '0'
    type: dependent
    master_item_key: asterisk.sip.trunk.get[{#OBJECTNAME}]
    value_type: char
  trigger_prototypes:
  - name: 'Asterisk: SIP trunk "{#OBJECTNAME}": Number of the SIP trunk "{#OBJECTNAME}"
      active channels is too high'
    expression: min(/Asterisk by HTTP/asterisk.sip.trunk.active_channels[{#OBJECTNAME}],10m)>=28
    severity: warning
  - name: 'Asterisk: SIP trunk "{#OBJECTNAME}": SIP trunk {#OBJECTNAME} has a state
      {ITEM.VALUE}'
    expression: last(/Asterisk by HTTP/asterisk.sip.trunk.status[{#OBJECTNAME}])="UNKNOWN"
      or last(/Asterisk by HTTP/asterisk.sip.trunk.status[{#OBJECTNAME}])="UNREACHABLE"
    severity: average
