template: Asterisk by HTTP
description: "The template gets Asterisk metrics from AMI by HTTP agent.\r\nYou should\
  \ enable the mini-HTTP Server, add the option webenabled=yes in the general section\
  \ of the manager.conf file and create Asterisk Manager user with system and command\
  \ write permissions within your Asterisk instance.\r\nDisable the PJSIP driver if\
  \ you do not use PJSIP or do not have PJSIP endpoints.\r\nPlease, define AMI address\
  \ in the {$AMI.URL} macro. Also, set the hostname or IP address of the AMI host\
  \ in the {$AMI.HOST} macro for Zabbix to check Asterisk service status.\r\nThen\
  \ you can define {$AMI.USERNAME} and {$AMI.SECRET} macros in the template for using\
  \ on the host level.\r\nIf there are errors, increase the logging to debug level\
  \ and see the Zabbix server log.\r\n\r\nYou can discuss this template or leave feedback\
  \ on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/410060-discussion-thread-for-official-zabbix-template-asterisk\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Active calls
  key: asterisk.active_calls
  interval: '0'
  type: dependent
  master_item_key: asterisk.get_stats
  value_type: unsigned
  description: The number of active calls at the moment.
  history: 31d
