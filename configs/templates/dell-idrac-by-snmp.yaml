template: Dell iDRAC by SNMP
description: "Template for Dell servers with iDRAC version 7 and later.\r\n\r\nMIBs\
  \ used:\r\nHOST-RESOURCES-MIB\r\nIDRAC-MIB-SMIv2\r\nSNMPv2-MIB\r\n\r\nYou can discuss\
  \ this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/426752-discussion-thread-for-official-zabbix-dell-templates\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: SNMP walk RAID controllers table
  key: dell.server.array.controller.walk
  interval: 1m
  value_type: text
  description: Scanning of RAID Controllers Table `IDRAC-MIB-SMIv2::controllerTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk Battery table
  key: dell.server.battery.walk
  interval: 1m
  value_type: text
  description: Scanning of RAID Controllers Table `IDRAC-MIB-SMIv2::batteryTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: BIOS version
  key: dell.server.bios.version
  interval: 1m
  value_type: char
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the version name of\
    \ the system BIOS."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System contact details
  key: dell.server.contact[sysContact]
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nName and contact information of the contact person\
    \ for the node. If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk Processor device tables
  key: dell.server.cpu.walk
  interval: 1m
  value_type: text
  description: Scanning of Processor Device Status Table `IDRAC-MIB-SMIv2::processorDeviceTable`
    and `IDRAC-MIB-SMIv2::processorDeviceStatusTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: System description
  key: dell.server.descr[sysDescr]
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should include the full name and version identification of the system's hardware\
    \ type, software operating system, and networking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk Physical disk table
  key: dell.server.disk.physical.walk
  interval: 1m
  value_type: text
  description: Scanning of Physical Disk Table `IDRAC-MIB-SMIv2::physicalDiskTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk Virtual disk table
  key: dell.server.disk.virtual.walk
  interval: 1m
  value_type: text
  description: Scanning of Virtual Disk Table `IDRAC-MIB-SMIv2::virtualDiskTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk Cooling device table
  key: dell.server.fan.walk
  interval: 1m
  value_type: text
  description: Scanning of Cooling Device Table `IDRAC-MIB-SMIv2::coolingDeviceTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Firmware version
  key: dell.server.hw.firmware[racFirmwareVersion]
  interval: 1h
  value_type: char
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the firmware version\
    \ of a remote access card."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: dell.server.hw.model[systemModelName]
  interval: 1m
  value_type: char
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the model name of the\
    \ system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: dell.server.hw.serialnumber[systemServiceTag]
  interval: 1m
  value_type: char
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the service tag of\
    \ the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: dell.server.hw.uptime[systemPowerUpTime]
  interval: 1m
  value_type: unsigned
  units: uptime
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the power-up time of\
    \ the system in seconds."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: dell.server.location[sysLocation]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe physical location of this node (e.g., 'telephone\
    \ closet, 3rd floor'). If the location is unknown, the value is a zero-length\
    \ string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Memory, total size
  key: dell.server.memory.size.total
  interval: 1m
  type: calculated
  params: sum(last_foreach(//dell.server.memory.size[*]))
  value_type: unsigned
  units: B
  description: Total memory amount on the device.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: SNMP walk Memory device table
  key: dell.server.memory.walk
  interval: 1m
  value_type: text
  description: Scanning of Memory Device Table `IDRAC-MIB-SMIv2::memoryDeviceTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: System name
  key: dell.server.name[sysName]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node. By convention, this is the node's fully-qualified domain name. If the\
    \ name is unknown, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk Network device table
  key: dell.server.net.if.walk
  interval: 1m
  value_type: text
  description: Scanning of Network Device Table `IDRAC-MIB-SMIv2::networkDeviceTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime (network)
  key: dell.server.net.uptime[snmpEngineTime]
  interval: 1m
  value_type: unsigned
  units: uptime
  description: "MIB: SNMP-FRAMEWORK-MIB\r\nThe number of seconds since the value of\
    \ the snmpEngineBoots object last changed."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: dell.server.objectid[sysObjectID]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ entity as part of the vendor's SMI enterprises subtree with the prefix 1.3.6.1.4.1\
    \ (e.g., a vendor with the identifier 1.3.6.1.4.1.4242 might assign a system object\
    \ with the OID 1.3.6.1.4.1.4242.1.1)."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk Power supply table
  key: dell.server.psu.walk
  interval: 1m
  value_type: text
  description: Scanning of Power Supply Table `IDRAC-MIB-SMIv2::powerSupplyTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk Temperature sensor table
  key: dell.server.sensor.temp.walk
  interval: 1m
  value_type: text
  description: Scanning of Temperature Probe Table `IDRAC-MIB-SMIv2::temperatureProbeTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Overall system health status
  key: dell.server.status[globalSystemStatus]
  interval: 1m
  value_type: unsigned
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the overall rollup\
    \ status of all the components in the system monitored by the remote access card.\
    \ Includes system, storage, IO devices, iDRAC, CPU, memory, etc."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: health
  - tag: component
    value: system
- name: Operating system
  key: dell.server.sw.os[systemOSName]
  interval: 1h
  value_type: char
  description: "MIB: IDRAC-MIB-SMIv2\r\nThis attribute defines the name of the operating\
    \ system that the host is running."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk System battery table
  key: dell.server.system.battery.walk
  interval: 1m
  value_type: text
  description: Scanning of System Battery Table `IDRAC-MIB-SMIv2::systemBatteryTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk Voltage probe table
  key: dell.server.voltage.walk
  interval: 1m
  value_type: text
  description: Scanning of Voltage Probe Table `IDRAC-MIB-SMIv2::voltageProbeTable`.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other `snmptrap`
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: system
triggers:
- name: 'Dell iDRAC: Firmware has changed'
  expression: last(/Dell iDRAC by SNMP/dell.server.hw.firmware[racFirmwareVersion],#1)<>last(/Dell
    iDRAC by SNMP/dell.server.hw.firmware[racFirmwareVersion],#2) and length(last(/Dell
    iDRAC by SNMP/dell.server.hw.firmware[racFirmwareVersion]))>0
  severity: information
  description: Firmware version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Dell iDRAC: Device has been replaced'
  expression: last(/Dell iDRAC by SNMP/dell.server.hw.serialnumber[systemServiceTag],#1)<>last(/Dell
    iDRAC by SNMP/dell.server.hw.serialnumber[systemServiceTag],#2) and length(last(/Dell
    iDRAC by SNMP/dell.server.hw.serialnumber[systemServiceTag]))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Dell iDRAC: Host has been restarted'
  expression: (last(/Dell iDRAC by SNMP/dell.server.hw.uptime[systemPowerUpTime])>0
    and last(/Dell iDRAC by SNMP/dell.server.hw.uptime[systemPowerUpTime])<10m) or
    (last(/Dell iDRAC by SNMP/dell.server.hw.uptime[systemPowerUpTime])=0 and last(/Dell
    iDRAC by SNMP/dell.server.net.uptime[snmpEngineTime])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Dell iDRAC: Memory amount has changed'
  expression: change(/Dell iDRAC by SNMP/dell.server.memory.size.total)>0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Dell iDRAC: System name has changed'
  expression: last(/Dell iDRAC by SNMP/dell.server.name[sysName],#1)<>last(/Dell iDRAC
    by SNMP/dell.server.name[sysName],#2) and length(last(/Dell iDRAC by SNMP/dell.server.name[sysName]))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Dell iDRAC: System is in unrecoverable state'
  expression: last(/Dell iDRAC by SNMP/dell.server.status[globalSystemStatus])=6
  severity: high
  description: Please check the device for faults.
  tags:
  - tag: scope
    value: availability
- name: 'Dell iDRAC: System status is in critical state'
  expression: last(/Dell iDRAC by SNMP/dell.server.status[globalSystemStatus])=5
  severity: average
  description: Please check the device for errors.
  tags:
  - tag: scope
    value: availability
- name: 'Dell iDRAC: System status is in warning state'
  expression: last(/Dell iDRAC by SNMP/dell.server.status[globalSystemStatus])=4
  severity: warning
  description: Please check the device for warnings.
  tags:
  - tag: scope
    value: availability
- name: 'Dell iDRAC: Operating system description has changed'
  expression: last(/Dell iDRAC by SNMP/dell.server.sw.os[systemOSName],#1)<>last(/Dell
    iDRAC by SNMP/dell.server.sw.os[systemOSName],#2) and length(last(/Dell iDRAC
    by SNMP/dell.server.sw.os[systemOSName]))>0
  severity: information
  description: Operating system description has changed. Possibly, the system has
    been updated or replaced. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Dell iDRAC: No SNMP data collection'
  expression: max(/Dell iDRAC by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Array controller discovery
  key: array.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.array.controller.walk
  item_prototypes:
  - name: 'Controller [{#CNTLR_NAME}]: Model'
    key: dell.server.hw.diskarray.model[controllerName.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Controller [{#CNTLR_NAME}]: Status'
    key: dell.server.hw.diskarray.status[controllerComponentStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Controller [{#CNTLR_NAME}]: Critical state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.diskarray.status[controllerComponentStatus.{#SNMPINDEX}])=5
    severity: average
  - name: 'Dell iDRAC: Controller [{#CNTLR_NAME}]: Unrecoverable state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.diskarray.status[controllerComponentStatus.{#SNMPINDEX}])=6
    severity: high
  - name: 'Dell iDRAC: Controller [{#CNTLR_NAME}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.diskarray.status[controllerComponentStatus.{#SNMPINDEX}])=4
    severity: warning
- name: Battery discovery
  key: battery.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.battery.walk
  item_prototypes:
  - name: 'Battery [{#BATTERY_NAME}]: Status'
    key: dell.server.hw.battery.status[batteryState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Battery [{#BATTERY_NAME}]: Critical state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.battery.status[batteryState.{#SNMPINDEX}])=3
    severity: average
  - name: 'Dell iDRAC: Battery [{#BATTERY_NAME}]: Not in optimal state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.battery.status[batteryState.{#SNMPINDEX}])<>2
    severity: information
  - name: 'Dell iDRAC: Battery [{#BATTERY_NAME}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.battery.status[batteryState.{#SNMPINDEX}])=4
    severity: warning
- name: CPU status discovery
  key: cpu.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.cpu.walk
  item_prototypes:
  - name: 'CPU [{#CPU_FQDD}]: State'
    key: dell.server.cpu.state[cpu.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'CPU [{#CPU_FQDD}]: Status'
    key: dell.server.cpu.status[cpu.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: CPU [{#CPU_FQDD}]: Reading error'
    expression: bitand(last(/Dell iDRAC by SNMP/dell.server.cpu.state[cpu.{#SNMPINDEX}],#1),128)=0
    severity: average
  - name: 'Dell iDRAC: CPU [{#CPU_FQDD}]: Status is not OK'
    expression: last(/Dell iDRAC by SNMP/dell.server.cpu.status[cpu.{#SNMPINDEX}],#1)<>3
    severity: average
- name: Fan discovery
  key: fan.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.fan.walk
  filter:
  - macro: '{#TYPE}'
    value: '3'
  item_prototypes:
  - name: 'Fan [{#FAN_DESCR}]: Speed'
    key: dell.server.sensor.fan.speed[{#FAN_DESCR}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: rpm
  - name: 'Fan [{#FAN_DESCR}]: Status'
    key: dell.server.sensor.fan.status[{#FAN_DESCR}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Fan [{#FAN_DESCR}]: Critical state'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=5
      or last(/Dell iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=6 or
      last(/Dell iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=8 or last(/Dell
      iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=9 or last(/Dell iDRAC
      by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=10
    severity: average
  - name: 'Dell iDRAC: Fan [{#FAN_DESCR}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=4
      or last(/Dell iDRAC by SNMP/dell.server.sensor.fan.status[{#FAN_DESCR}])=7
    severity: warning
- name: Memory discovery
  key: memory.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.memory.walk
  item_prototypes:
  - name: 'Memory [{#SNMPVALUE}]: Size'
    key: dell.server.memory.size[{#SNMPVALUE}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'Memory [{#SNMPVALUE}]: Status'
    key: dell.server.memory.status[{#SNMPVALUE}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Memory [{#SNMPVALUE}]: Status is not OK'
    expression: last(/Dell iDRAC by SNMP/dell.server.memory.status[{#SNMPVALUE}],#1)<>3
    severity: average
- name: Network interface discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.net.if.walk
  item_prototypes:
  - name: 'NIC [{#NIC_FQDD}/{#NIC_MAC}]: Link status'
    key: dell.server.net.if.link[{#NIC_FQDD}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'NIC [{#NIC_FQDD}/{#NIC_MAC}]: Status'
    key: dell.server.net.if.status[{#NIC_FQDD}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: NIC [{#NIC_FQDD}/{#NIC_MAC}]: Link down'
    expression: 1=1 and last(/Dell iDRAC by SNMP/dell.server.net.if.link[{#NIC_FQDD}],#1)<>1
      and last(/Dell iDRAC by SNMP/dell.server.net.if.link[{#NIC_FQDD}],#1)<>last(/Dell
      iDRAC by SNMP/dell.server.net.if.link[{#NIC_FQDD}],#2)
    severity: average
    recovery_expression: last(/Dell iDRAC by SNMP/dell.server.net.if.link[{#NIC_FQDD}],#1)=1
      or 1=0
    allow_manual_close: true
  - name: 'Dell iDRAC: NIC [{#NIC_FQDD}/{#NIC_MAC}]: Status is not OK'
    expression: last(/Dell iDRAC by SNMP/dell.server.net.if.status[{#NIC_FQDD}],#1)<>3
    severity: average
- name: Physical disk discovery
  key: physicaldisk.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.disk.physical.walk
  item_prototypes:
  - name: 'Physical disk [{#DISK_NAME}]: Media type'
    key: dell.server.hw.physicaldisk.media_type[physicalDiskMediaType.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Physical disk [{#DISK_NAME}]: Model name'
    key: dell.server.hw.physicaldisk.model[physicalDiskProductID.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Physical disk [{#DISK_NAME}]: Serial number'
    key: dell.server.hw.physicaldisk.serialnumber[physicalDiskSerialNo.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Physical disk [{#DISK_NAME}]: Size'
    key: dell.server.hw.physicaldisk.size[physicalDiskCapacityInMB.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'Physical disk [{#DISK_NAME}]: S.M.A.R.T. Status'
    key: dell.server.hw.physicaldisk.smart_status[physicalDiskSmartAlertIndication.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Physical disk [{#DISK_NAME}]: Status'
    key: dell.server.hw.physicaldisk.status[physicalDiskComponentStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Physical disk [{#DISK_NAME}] has been replaced'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.serialnumber[physicalDiskSerialNo.{#SNMPINDEX}],#1)<>last(/Dell
      iDRAC by SNMP/dell.server.hw.physicaldisk.serialnumber[physicalDiskSerialNo.{#SNMPINDEX}],#2)
      and length(last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.serialnumber[physicalDiskSerialNo.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
  - name: 'Dell iDRAC: Physical disk [{#DISK_NAME}]: S.M.A.R.T. failed'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.smart_status[physicalDiskSmartAlertIndication.{#SNMPINDEX}])=1
      or last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.smart_status[physicalDiskSmartAlertIndication.{#SNMPINDEX}])=1
    severity: high
  - name: 'Dell iDRAC: Physical disk [{#DISK_NAME}]: Failed state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.status[physicalDiskComponentStatus.{#SNMPINDEX}])=5
      or last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.status[physicalDiskComponentStatus.{#SNMPINDEX}])=6
    severity: high
  - name: 'Dell iDRAC: Physical disk [{#DISK_NAME}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.physicaldisk.status[physicalDiskComponentStatus.{#SNMPINDEX}])=4
    severity: warning
- name: PSU discovery
  key: psu.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.psu.walk
  item_prototypes:
  - name: 'Power supply [{#PSU_DESCR}]: State'
    key: dell.server.sensor.psu.status[powerSupplyStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Power supply [{#PSU_DESCR}]: Critical state'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.psu.status[powerSupplyStatus.{#SNMPINDEX}])=5
      or last(/Dell iDRAC by SNMP/dell.server.sensor.psu.status[powerSupplyStatus.{#SNMPINDEX}])=6
    severity: average
  - name: 'Dell iDRAC: Power supply [{#PSU_DESCR}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.psu.status[powerSupplyStatus.{#SNMPINDEX}])=4
    severity: warning
- name: System battery discovery
  key: system.battery.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.system.battery.walk
  item_prototypes:
  - name: 'System battery [{#SNMPVALUE}]: Status'
    key: dell.server.system.battery[{#SNMPVALUE}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: System battery [{#SNMPVALUE}]: Status is not OK'
    expression: last(/Dell iDRAC by SNMP/dell.server.system.battery[{#SNMPVALUE}],#1)<>3
    severity: average
- name: Temperature discovery
  key: temp.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.sensor.temp.walk
  item_prototypes:
  - name: 'Probe [{#SENSOR_LOCALE}]: Status'
    key: dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
  - name: 'Probe [{#SENSOR_LOCALE}]: Value'
    key: dell.server.sensor.temp.value[temperatureProbeReading.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: °C
  trigger_prototypes:
  - name: 'Dell iDRAC: Probe [{#SENSOR_LOCALE}]: Critical status'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=5
      or last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=6
      or last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=8
      or last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=9
    severity: average
  - name: 'Dell iDRAC: Probe [{#SENSOR_LOCALE}]: Not in optimal status'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])<>3
    severity: information
    allow_manual_close: true
  - name: 'Dell iDRAC: Probe [{#SENSOR_LOCALE}]: Warning status'
    expression: last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=4
      or last(/Dell iDRAC by SNMP/dell.server.sensor.temp.status[temperatureProbeStatus.{#SNMPINDEX}])=7
    severity: warning
- name: Virtual disk discovery
  key: virtualdisk.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.disk.virtual.walk
  item_prototypes:
  - name: 'Virtual disk [{#DISK_NAME}]: Layout type'
    key: dell.server.hw.virtualdisk.layout[virtualDiskLayout.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Virtual disk [{#DISK_NAME}]: Read policy'
    key: dell.server.hw.virtualdisk.read_policy[virtualDiskReadPolicy.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Virtual disk [{#DISK_NAME}]: Size'
    key: dell.server.hw.virtualdisk.size[virtualDiskSizeInMB.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'Virtual disk [{#DISK_NAME}]: Operational state'
    key: dell.server.hw.virtualdisk.state[virtualDiskOperationalState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Virtual disk [{#DISK_NAME}]: Status'
    key: dell.server.hw.virtualdisk.status[virtualDiskState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Virtual disk [{#DISK_NAME}]: Write policy'
    key: dell.server.hw.virtualdisk.write_policy[virtualDiskWritePolicy.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Dell iDRAC: Virtual disk [{#DISK_NAME}]: Failed state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.virtualdisk.status[virtualDiskState.{#SNMPINDEX}])=3
    severity: high
  - name: 'Dell iDRAC: Virtual disk [{#DISK_NAME}]: Warning state'
    expression: last(/Dell iDRAC by SNMP/dell.server.hw.virtualdisk.status[virtualDiskState.{#SNMPINDEX}])=4
    severity: warning
- name: Voltage probe discovery
  key: voltage.discovery
  interval: '0'
  type: dependent
  master_item_key: dell.server.voltage.walk
  filter:
  - macro: '{#VPROBE_NAME}'
    value: '{$DELL.SNMP.DISCOVERY.VOLTAGE.NAME.MATCHES}'
  - macro: '{#VPROBE_NAME}'
    value: '{$DELL.SNMP.DISCOVERY.VOLTAGE.NAME.NOT_MATCHES}'
  - macro: '{#VPROBE_TYPE}'
    value: '{$DELL.SNMP.DISCOVERY.VOLTAGE.TYPE.MATCHES}'
  - macro: '{#VPROBE_TYPE}'
    value: '{$DELL.SNMP.DISCOVERY.VOLTAGE.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Voltage probe [{#VPROBE_NAME}]: Status'
    key: dell.server.voltage.status[{#VPROBE_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Voltage probe [{#VPROBE_NAME}]: Voltage'
    key: dell.server.voltage.value[{#VPROBE_NAME}]
    interval: '0'
    type: dependent
    units: V
  trigger_prototypes:
  - name: 'Dell iDRAC: Voltage probe [{#VPROBE_NAME}]: Status is not OK'
    expression: last(/Dell iDRAC by SNMP/dell.server.voltage.status[{#VPROBE_NAME}])<>3
    severity: average
