    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.CPU.{#SNMPINDEX}])
      = 3
    severity: warning
- name: Temperature Discovery I/O
  key: tempDescr.discovery.io
  interval: 1h
  filter:
  - macro: '{#SENSOR_LOCALE}'
    value: '5'
  item_prototypes:
  - name: 'I/O-{#SNMPINDEX}: Temperature sensor condition'
    key: sensor.temp.condition[cpqHeTemperatureCondition."I/O.{#SNMPINDEX}"]
    interval: 1m
