  - name: 'HP iLO: I/O-{#SNMPINDEX}: The temperature sensor is outside of normal operating
      range'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition."I/O.{#SNMPINDEX}"])
      = 3
    severity: warning
- name: Temperature Discovery Memory
  key: tempDescr.discovery.memory
  interval: 1h
  filter:
  - macro: '{#SENSOR_LOCALE}'
    value: '7'
  item_prototypes:
  - name: 'Memory-{#SNMPINDEX}: Temperature sensor condition'
    key: sensor.temp.condition[cpqHeTemperatureCondition.Memory.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Memory-{#SNMPINDEX}: Temperature'
    key: sensor.temp.value[cpqHeTemperatureCelsius.Memory.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'HP iLO: Memory-{#SNMPINDEX}: Temperature could not be determined'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Memory.{#SNMPINDEX}])
      = 1
    severity: information
    allow_manual_close: true
  - name: 'HP iLO: Memory-{#SNMPINDEX}: The temperature sensor detects a condition
      that could permanently damage the system.'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Memory.{#SNMPINDEX}])
      = 4
    severity: high
  - name: 'HP iLO: Memory-{#SNMPINDEX}: The temperature sensor is outside of normal
      operating range'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Memory.{#SNMPINDEX}])
      = 3
    severity: warning
- name: Temperature Discovery PSU
  key: tempDescr.discovery.psu
  interval: 1h
  filter:
  - macro: '{#SENSOR_LOCALE}'
    value: '10'
  item_prototypes:
  - name: 'PSU-{#SNMPINDEX}: Temperature sensor condition'
    key: sensor.temp.condition[cpqHeTemperatureCondition.PSU.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'PSU-{#SNMPINDEX}: Temperature'
    key: sensor.temp.value[cpqHeTemperatureCelsius.PSU.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'HP iLO: PSU-{#SNMPINDEX}: Temperature could not be determined'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.PSU.{#SNMPINDEX}])
      = 1
    severity: information
    allow_manual_close: true
  - name: 'HP iLO: PSU-{#SNMPINDEX}: The temperature sensor detects a condition that
      could permanently damage the system.'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.PSU.{#SNMPINDEX}])
      = 4
    severity: high
  - name: 'HP iLO: PSU-{#SNMPINDEX}: The temperature sensor is outside of normal operating
      range'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.PSU.{#SNMPINDEX}])
      = 3
    severity: warning
