template: HP iLO by SNMP
description: "Template Server HP iLO\r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nCPQHLTH-MIB\r\
  \nSNMPv2-MIB\r\nCPQSINFO-MIB\r\nCPQIDA-MIB\r\n\r\nGenerated by official Zabbix template\
  \ tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: System temperature status
  key: sensor.temp.status[cpqHeThermalCondition.0]
  interval: 1m
  value_type: unsigned
  description: "MIB: CPQHLTH-MIB\r\nThis value specifies the overall condition of\
    \ the system's thermal environment.\r\nThis value will be one of the following:\r\
    \nother(1)  Temperature could not be determined.\r\nok(2)  The temperature sensor\
    \ is within normal operating range.\r\ndegraded(3)  The temperature sensor is\
    \ outside of normal operating range.\r\nfailed(4)  The temperature sensor detects\
    \ a condition that could  permanently damage the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: temperature
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1m
  value_type: char
  description: "MIB: CPQSINFO-MIB\r\nThe machine product name.The name of the machine\
    \ used in this system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1m
  value_type: char
  description: "MIB: CPQSINFO-MIB\r\nThe serial number of the physical system unit.\
    \ The string will be empty if the system does not report the serial number function."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Overall system health status
  key: system.status[cpqHeMibCondition.0]
  interval: 1m
  value_type: unsigned
  description: "MIB: CPQHLTH-MIB\r\nThe overall condition. This object represents\
    \ the overall status of the server information represented by this MIB."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'HP iLO: Unavailable by ICMP ping'
  expression: max(/HP iLO by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'HP iLO: High ICMP ping loss'
  expression: min(/HP iLO by SNMP/icmppingloss,5m)>20 and min(/HP iLO by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP iLO: High ICMP ping response time'
  expression: avg(/HP iLO by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP iLO: Device has been replaced'
  expression: last(/HP iLO by SNMP/system.hw.serialnumber,#1)<>last(/HP iLO by SNMP/system.hw.serialnumber,#2)
    and length(last(/HP iLO by SNMP/system.hw.serialnumber))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'HP iLO: Host has been restarted'
  expression: (last(/HP iLO by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/HP
    iLO by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/HP iLO by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/HP iLO by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'HP iLO: System name has changed'
  expression: last(/HP iLO by SNMP/system.name,#1)<>last(/HP iLO by SNMP/system.name,#2)
    and length(last(/HP iLO by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'HP iLO: System status is in critical state'
  expression: count(/HP iLO by SNMP/system.status[cpqHeMibCondition.0],#1,"eq","4")=1
  severity: high
  description: Please check the device for errors
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP iLO: System status is in warning state'
  expression: count(/HP iLO by SNMP/system.status[cpqHeMibCondition.0],#1,"eq","3")=1
  severity: warning
  description: Please check the device for warnings
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP iLO: No SNMP data collection'
  expression: max(/HP iLO by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Array Controller Cache Discovery
  key: array.cache.discovery
  interval: 1h
  item_prototypes:
  - name: '#{#CACHE_CNTRL_INDEX}: Disk array cache controller battery status'
    key: system.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '#{#CACHE_CNTRL_INDEX}: Disk array cache controller status'
    key: system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP iLO: #{#CACHE_CNTRL_INDEX}: Disk array cache controller battery is in
      critical state!'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}],#1,"eq","4")=1
      or count(/HP iLO by SNMP/system.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}],#1,"eq","7")=1
    severity: average
  - name: 'HP iLO: #{#CACHE_CNTRL_INDEX}: Disk array cache controller battery is in
      warning state'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.cache.battery.status[cpqDaAccelBattery.{#SNMPINDEX}],#1,"eq","5")=1
    severity: warning
  - name: 'HP iLO: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in critical
      state!'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}],#1,"eq","8")=1
    severity: average
  - name: 'HP iLO: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is in warning
      state'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}],#1,"eq","7")=1
      or count(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}],#1,"eq","9")=1
      or count(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}],#1,"eq","6")=1
    severity: warning
  - name: 'HP iLO: #{#CACHE_CNTRL_INDEX}: Disk array cache controller is not in optimal
      state'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}],#1,"ne","3")=1
      and last(/HP iLO by SNMP/system.hw.diskarray.cache.status[cpqDaAccelStatus.{#SNMPINDEX}])<>2
    severity: warning
- name: Array Controller Discovery
  key: array.discovery
  interval: 1h
  item_prototypes:
  - name: '{#CNTLR_LOCATION}: Disk array controller model'
    key: system.hw.diskarray.model[cpqDaCntlrModel.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#CNTLR_LOCATION}: Disk array controller status'
    key: system.hw.diskarray.status[cpqDaCntlrCondition.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP iLO: {#CNTLR_LOCATION}: Disk array controller is in critical state'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.status[cpqDaCntlrCondition.{#SNMPINDEX}],#1,"eq","4")=1
    severity: high
  - name: 'HP iLO: {#CNTLR_LOCATION}: Disk array controller is in warning state'
    expression: count(/HP iLO by SNMP/system.hw.diskarray.status[cpqDaCntlrCondition.{#SNMPINDEX}],#1,"eq","3")=1
    severity: average
- name: FAN Discovery
  key: fan.discovery
  interval: 1h
  item_prototypes:
  - name: 'Fan {#SNMPINDEX}: Fan status'
    key: sensor.fan.status[cpqHeFltTolFanCondition.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP iLO: Fan {#SNMPINDEX}: Fan is in critical state'
    expression: count(/HP iLO by SNMP/sensor.fan.status[cpqHeFltTolFanCondition.{#SNMPINDEX}],#1,"eq","4")=1
    severity: average
  - name: 'HP iLO: Fan {#SNMPINDEX}: Fan is in warning state'
    expression: count(/HP iLO by SNMP/sensor.fan.status[cpqHeFltTolFanCondition.{#SNMPINDEX}],#1,"eq","3")=1
    severity: warning
- name: Physical Disk Discovery
  key: physicalDisk.discovery
  interval: 1h
  item_prototypes:
  - name: '{#DISK_LOCATION}: Physical disk media type'
    key: system.hw.physicaldisk.media_type[cpqDaPhyDrvMediaType.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#DISK_LOCATION}: Physical disk model name'
    key: system.hw.physicaldisk.model[cpqDaPhyDrvModel.{#SNMPINDEX}]
    interval: 1m
    value_type: char
  - name: '{#DISK_LOCATION}: Physical disk serial number'
    key: system.hw.physicaldisk.serialnumber[cpqDaPhyDrvSerialNum.{#SNMPINDEX}]
    interval: 1m
    value_type: char
  - name: '{#DISK_LOCATION}: Disk size'
    key: system.hw.physicaldisk.size[cpqDaPhyDrvMediaType.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#DISK_LOCATION}: Physical disk S.M.A.R.T. status'
    key: system.hw.physicaldisk.smart_status[cpqDaPhyDrvSmartStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#DISK_LOCATION}: Physical disk status'
    key: system.hw.physicaldisk.status[cpqDaPhyDrvStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP iLO: {#DISK_LOCATION}: Disk has been replaced'
    expression: last(/HP iLO by SNMP/system.hw.physicaldisk.serialnumber[cpqDaPhyDrvSerialNum.{#SNMPINDEX}],#1)<>last(/HP
      iLO by SNMP/system.hw.physicaldisk.serialnumber[cpqDaPhyDrvSerialNum.{#SNMPINDEX}],#2)
      and length(last(/HP iLO by SNMP/system.hw.physicaldisk.serialnumber[cpqDaPhyDrvSerialNum.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
  - name: 'HP iLO: {#DISK_LOCATION}: Physical disk S.M.A.R.T. failed'
    expression: count(/HP iLO by SNMP/system.hw.physicaldisk.smart_status[cpqDaPhyDrvSmartStatus.{#SNMPINDEX}],#1,"eq","3")=1
      or count(/HP iLO by SNMP/system.hw.physicaldisk.smart_status[cpqDaPhyDrvSmartStatus.{#SNMPINDEX}],#1,"eq","4")=1
    severity: high
  - name: 'HP iLO: {#DISK_LOCATION}: Physical disk failed'
    expression: count(/HP iLO by SNMP/system.hw.physicaldisk.status[cpqDaPhyDrvStatus.{#SNMPINDEX}],#1,"eq","3")=1
    severity: high
  - name: 'HP iLO: {#DISK_LOCATION}: Physical disk is in warning state'
    expression: count(/HP iLO by SNMP/system.hw.physicaldisk.status[cpqDaPhyDrvStatus.{#SNMPINDEX}],#1,"eq","4")=1
    severity: warning
- name: PSU Discovery
  key: psu.discovery
  interval: 1h
  item_prototypes:
  - name: 'Chassis {#CHASSIS_NUM}, bay {#BAY_NUM}: Power supply status'
    key: sensor.psu.status[cpqHeFltTolPowerSupplyCondition.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP iLO: Chassis {#CHASSIS_NUM}, bay {#BAY_NUM}: Power supply is in critical
      state'
    expression: count(/HP iLO by SNMP/sensor.psu.status[cpqHeFltTolPowerSupplyCondition.{#SNMPINDEX}],#1,"eq","4")=1
    severity: average
  - name: 'HP iLO: Chassis {#CHASSIS_NUM}, bay {#BAY_NUM}: Power supply is in warning
      state'
    expression: count(/HP iLO by SNMP/sensor.psu.status[cpqHeFltTolPowerSupplyCondition.{#SNMPINDEX}],#1,"eq","3")=1
    severity: warning
- name: Temperature Discovery
  key: tempDescr.discovery
  interval: 1h
  filter:
  - macro: '{#SENSOR_LOCALE}'
    value: (4|8|9|12|13)
  item_prototypes:
  - name: '{#SNMPINDEX}: Temperature sensor condition'
    key: sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#SNMPINDEX}: Temperature sensor location'
    key: sensor.temp.locale[cpqHeTemperatureLocale.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#SNMPINDEX}: Temperature'
    key: sensor.temp.value[cpqHeTemperatureCelsius.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'HP iLO: {#SNMPINDEX}: Temperature could not be determined'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}])
      = 1
    severity: information
    allow_manual_close: true
  - name: 'HP iLO: {#SNMPINDEX}: The temperature sensor detects a condition that could
      permanently damage the system.'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}])
      = 4
    severity: high
  - name: 'HP iLO: {#SNMPINDEX}: The temperature sensor is outside of normal operating
      range'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.{#SNMPINDEX}])
      = 3
    severity: warning
- name: Temperature Discovery Ambient
  key: tempDescr.discovery.ambient
  interval: 1h
  filter:
  - macro: '{#SENSOR_LOCALE}'
    value: '11'
  - macro: '{#SNMPINDEX}'
    value: 0\.1
  item_prototypes:
  - name: 'Ambient: Temperature sensor condition'
    key: sensor.temp.condition[cpqHeTemperatureCondition.Ambient.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Ambient: Temperature'
    key: sensor.temp.value[cpqHeTemperatureCelsius.Ambient.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'HP iLO: Ambient: Temperature could not be determined'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Ambient.{#SNMPINDEX}])
      = 1
    severity: information
    allow_manual_close: true
  - name: 'HP iLO: Ambient: The temperature sensor detects a condition that could
      permanently damage the system.'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Ambient.{#SNMPINDEX}])
      = 4
    severity: high
  - name: 'HP iLO: Ambient: The temperature sensor is outside of normal operating
      range'
    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.Ambient.{#SNMPINDEX}])
      = 3
    severity: warning
- name: Temperature Discovery CPU
  key: tempDescr.discovery.cpu
  interval: 1h
  filter:
