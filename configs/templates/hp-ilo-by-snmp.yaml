    expression: last(/HP iLO by SNMP/sensor.temp.condition[cpqHeTemperatureCondition.CPU.{#SNMPINDEX}])
      = 4
    severity: high
  - name: 'HP iLO: CPU-{#SNMPINDEX}: The temperature sensor is outside of normal operating
