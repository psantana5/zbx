template: IIS by Zabbix agent active
description: "Get metrics from IIS using Zabbix agent running on Windows.\r\n\r\n\
  You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/401862-discussion-thread-for-official-zabbix-template-internet-information-services\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: '{$IIS.PORT} port ping'
  key: net.tcp.service[{$IIS.SERVICE},,{$IIS.PORT}]
  interval: 1m
  type: simple_check
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: Files cache hits percentage
  key: perf_counter_en["\Web Service Cache\File Cache Hits %"]
  interval: 1m
  type: zabbix_agent_active
  description: 'The ratio of user-mode file cache hits to total cache requests (since
    service startup). Note: This value might be low if the Kernel URI cache hits percentage
    is high.'
  history: 31d
  tags:
  - tag: component
    value: cache
- name: File cache misses
  key: perf_counter_en["\Web Service Cache\File Cache Misses"]
  interval: 1m
  type: zabbix_agent_active
  description: The total number of unsuccessful lookups in the user-mode file cache
    since service startup.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: URIs cache hits percentage
  key: perf_counter_en["\Web Service Cache\URI Cache Hits %"]
  interval: 1m
  type: zabbix_agent_active
  description: The ratio of user-mode URI Cache Hits to total cache requests (since
    service startup)
  history: 31d
  tags:
  - tag: component
    value: cache
- name: URI cache misses
  key: perf_counter_en["\Web Service Cache\URI Cache Misses"]
  interval: 1m
  type: zabbix_agent_active
  description: The total number of unsuccessful lookups in the user-mode URI cache
    since service startup.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: Anonymous users per second
  key: perf_counter_en["\Web Service(_Total)\Anonymous Users/sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The number of requests from users over an anonymous connection per
    second. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: users
- name: Bytes Received per second
  key: perf_counter_en["\Web Service(_Total)\Bytes Received/sec", 60]
  interval: 1m
  type: zabbix_agent_active
  units: Bps
  description: The average rate per minute at which data bytes are received by the
    service at the Application Layer. Does not include protocol headers or control
    bytes.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Bytes Sent per second
  key: perf_counter_en["\Web Service(_Total)\Bytes Sent/sec", 60]
  interval: 1m
  type: zabbix_agent_active
  units: Bps
  description: The average rate per minute at which data bytes are sent by the service.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Bytes Total per second
  key: perf_counter_en["\Web Service(_Total)\Bytes Total/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  units: Bps
  description: The average rate per minute of total bytes/sec transferred by the Web
    service (sum of bytes sent/sec and bytes received/sec).
  history: 31d
  tags:
  - tag: component
    value: network
- name: Method CGI requests per second
  key: perf_counter_en["\Web Service(_Total)\CGI Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of CGI requests that are simultaneously being processed by
    the Web service. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Connection attempts per second
  key: perf_counter_en["\Web Service(_Total)\Connection Attempts/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The average rate per minute that connections using the Web service
    are being attempted. The count is the average for all Web sites combined.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Method COPY requests per second
  key: perf_counter_en["\Web Service(_Total)\Copy Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests made using the COPY method. Copy requests
    are used for copying files and directories. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Current connections
  key: perf_counter_en["\Web Service(_Total)\Current Connections"]
  interval: 1m
  type: zabbix_agent_active
  description: The number of active connections.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Method DELETE requests per second
  key: perf_counter_en["\Web Service(_Total)\Delete Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the DELETE method made. Average per
    minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method GET requests per second
  key: perf_counter_en["\Web Service(_Total)\Get Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests made using the GET method. GET requests are
    generally used for basic file retrievals or image maps, though they can be used
    with forms. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method HEAD requests per second
  key: perf_counter_en["\Web Service(_Total)\Head Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the HEAD method made. HEAD requests
    generally indicate a client is querying the state of a document they already have
    to see if it needs to be refreshed. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method ISAPI requests per second
  key: perf_counter_en["\Web Service(_Total)\ISAPI Extension Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of ISAPI Extension requests that are simultaneously being
    processed by the Web service. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method LOCK requests per second
  key: perf_counter_en["\Web Service(_Total)\Lock Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests made using the LOCK method. Lock requests
    are used to lock a file for one user so that only that user can modify the file.
    Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Locked errors per second
  key: perf_counter_en["\Web Service(_Total)\Locked Errors/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of errors due to requests that couldn't be satisfied by the
    server because the requested document was locked. These are generally reported
    as an HTTP 423 error code to the client. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: errors
- name: Method MKCOL requests per second
  key: perf_counter_en["\Web Service(_Total)\Mkcol Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the MKCOL method made. Mkcol requests
    are used to create directories on the server. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method MOVE requests per second
  key: perf_counter_en["\Web Service(_Total)\Move Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the MOVE method made. Move requests
    are used for moving files and directories. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: NonAnonymous users per second
  key: perf_counter_en["\Web Service(_Total)\NonAnonymous Users/sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The number of requests from users over a non-anonymous connection per
    second. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: users
- name: Not Found errors per second
  key: perf_counter_en["\Web Service(_Total)\Not Found Errors/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of errors due to requests that couldn't be satisfied by the
    server because the requested document could not be found. These are generally
    reported to the client with HTTP error code 404. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: errors
- name: Method OPTIONS requests per second
  key: perf_counter_en["\Web Service(_Total)\Options Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the OPTIONS method made. Average per
    minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method Total Other requests per second
  key: perf_counter_en["\Web Service(_Total)\Other Request Methods/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: Total Other Request Methods is the number of HTTP requests that are
    not OPTIONS, GET, HEAD, POST, PUT, DELETE, TRACE, MOVE, COPY, MKCOL, PROPFIND,
    PROPPATCH, SEARCH, LOCK or UNLOCK methods (since service startup). Average per
    minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method POST requests per second
  key: perf_counter_en["\Web Service(_Total)\Post Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: Rate of HTTP requests using POST method. Generally used for forms or
    gateway requests. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method PROPFIND requests per second
  key: perf_counter_en["\Web Service(_Total)\Propfind Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the PROPFIND method made. Propfind
    requests retrieve property values on files and directories. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method PROPPATCH requests per second
  key: perf_counter_en["\Web Service(_Total)\Proppatch Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the PROPPATCH method made. Proppatch
    requests set property values on files and directories. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method PUT requests per second
  key: perf_counter_en["\Web Service(_Total)\Put Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the PUT method made. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method MS-SEARCH requests per second
  key: perf_counter_en["\Web Service(_Total)\Search Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the MS-SEARCH method made. Search requests
    are used to query the server to find resources that match a set of conditions
    provided by the client. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Uptime
  key: perf_counter_en["\Web Service(_Total)\Service Uptime"]
  interval: 1m
  type: zabbix_agent_active
  units: s
  description: The service uptime expressed in seconds.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Total connection attempts
  key: perf_counter_en["\Web Service(_Total)\Total Connection Attempts (all instances)"]
  interval: 1m
  type: zabbix_agent_active
  description: The total number of connections to the Web or FTP service that have
    been attempted since service startup. The count is the total for all Web sites
    or FTP sites combined.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Method Total requests per second
  key: perf_counter_en["\Web Service(_Total)\Total Method Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of all HTTP requests received. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method TRACE requests per second
  key: perf_counter_en["\Web Service(_Total)\Trace Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the TRACE method made. Average per
    minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Method TRACE requests per second
  key: perf_counter_en["\Web Service(_Total)\Unlock Requests/Sec", 60]
  interval: 1m
  type: zabbix_agent_active
  description: The rate of HTTP requests using the UNLOCK method made. Unlock requests
    are used to remove locks from files. Average per minute.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: World Wide Web Publishing Service (W3SVC) state
  key: service.info[W3SVC]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: The World Wide Web Publishing Service (W3SVC) provides web connectivity
    and administration of websites through the IIS snap-in. If the World Wide Web
    Publishing Service stops, the operating system cannot serve any form of web request.
    This service was dependent on "Windows Process Activation Service".
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Windows Process Activation Service (WAS) state
  key: service.info[WAS]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: Windows Process Activation Service (WAS) is a tool for managing worker
    processes that contain applications that host Windows Communication Foundation
    (WCF) services. Worker processes handle requests that are sent to a Web Server
    for specific application pools. Each application pool sets boundaries for the
    applications it contains.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Active agent availability
  key: zabbix[host,active_agent,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of active checks on the host. The value of this item\
    \ corresponds to availability icons in the host list.\r\nPossible values:\r\n\
    0 - unknown\r\n1 - available\r\n2 - not available"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'IIS: Port {$IIS.PORT} is down'
  expression: last(/IIS by Zabbix agent active/net.tcp.service[http,,80])=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'IIS: Service has been restarted'
  expression: last(/IIS by Zabbix agent active/perf_counter_en["\Web Service(_Total)\Service
    Uptime"])<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'IIS: The World Wide Web Publishing Service (W3SVC) is not running'
  expression: last(/IIS by Zabbix agent active/service.info[W3SVC])<>0
  severity: high
  description: The World Wide Web Publishing Service (W3SVC) is not in the running
    state. IIS cannot start.
  tags:
  - tag: scope
    value: availability
- name: 'IIS: Windows process Activation Service (WAS) is not running'
  expression: last(/IIS by Zabbix agent active/service.info[WAS])<>0
  severity: high
  description: Windows Process Activation Service (WAS) is not in the running state.
    IIS cannot start.
  tags:
  - tag: scope
    value: availability
- name: 'IIS: Active checks are not available'
  expression: min(/IIS by Zabbix agent active/zabbix[host,active_agent,available],5m)=2
  severity: high
  description: Active checks are considered unavailable. Agent is not sending heartbeat
    for prolonged time.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Application pools discovery
  key: wmi.getall[root\webAdministration, select Name from ApplicationPool]
  interval: 1h
  type: zabbix_agent_active
  filter:
  - macro: '{#APPPOOL}'
    value: '{$IIS.APPPOOL.MATCHES}'
  - macro: '{#APPPOOL}'
    value: '{$IIS.APPPOOL.NOT_MATCHES}'
  item_prototypes:
  - name: AppPool {#APPPOOL} state
    key: perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Current Application Pool State"]
    interval: 1m
    type: zabbix_agent_active
    value_type: unsigned
  - name: '{#APPPOOL} Uptime'
    key: perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Current Application Pool Uptime"]
    interval: 1m
    type: zabbix_agent_active
    units: s
  - name: AppPool {#APPPOOL} recycles
    key: perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Total Application Pool Recycles"]
    interval: 1m
    type: zabbix_agent_active
    value_type: unsigned
  - name: AppPool {#APPPOOL} current queue size
    key: perf_counter_en["\HTTP Service Request Queues({#APPPOOL})\CurrentQueueSize"]
    interval: 30s
    type: zabbix_agent_active
    value_type: unsigned
  trigger_prototypes:
  - name: 'IIS: Application pool {#APPPOOL} is not in Running state'
    expression: last(/IIS by Zabbix agent active/perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Current
      Application Pool State"])<>3 and 1=1
    severity: high
  - name: 'IIS: {#APPPOOL} has been restarted'
    expression: last(/IIS by Zabbix agent active/perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Current
      Application Pool Uptime"])<10m
    severity: information
    allow_manual_close: true
  - name: 'IIS: Application pool {#APPPOOL} has been recycled'
    expression: last(/IIS by Zabbix agent active/perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Total
      Application Pool Recycles"],#1)<>last(/IIS by Zabbix agent active/perf_counter_en["\APP_POOL_WAS({#APPPOOL})\Total
      Application Pool Recycles"],#2) and 1=1
    severity: information
  - name: 'IIS: Request queue of {#APPPOOL} is too large'
    expression: min(/IIS by Zabbix agent active/perf_counter_en["\HTTP Service Request
      Queues({#APPPOOL})\CurrentQueueSize"],5m)>""
    severity: warning
