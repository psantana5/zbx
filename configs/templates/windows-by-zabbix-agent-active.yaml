template: Windows by Zabbix agent active
description: "This is an official Windows template. It requires Zabbix agent 7.4 or\
  \ newer.\r\n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387224-discussion-thread-for-official-zabbix-template-for-windows\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Host name of Zabbix agent running
  key: agent.hostname
  interval: 1h
  type: zabbix_agent_active
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Zabbix agent ping
  key: agent.ping
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: The agent always returns "1" for this item. May be used in combination
    with `nodata()` for the availability check.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Version of Zabbix agent running
  key: agent.version
  interval: 1h
  type: zabbix_agent_active
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Cache bytes
  key: perf_counter_en["\Memory\Cache Bytes"]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: B
  description: Cache Bytes is the sum of the Memory\\System Cache Resident Bytes,
    Memory\\System Driver Resident Bytes, Memory\\System Code Resident Bytes, and
    Memory\\Pool Paged Resident Bytes counters. This counter displays the last observed
    value only; it is not an average.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Free system page table entries
  key: perf_counter_en["\Memory\Free System Page Table Entries"]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: This indicates the number of page table entries not currently in use
    by the system. If the number is less than 5,000, there may be a memory leak or
    you running out of memory.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory page faults per second
  key: perf_counter_en["\Memory\Page Faults/sec"]
  interval: 1m
  type: zabbix_agent_active
  description: Page Faults/sec is the average number of pages faulted per second.
    It is measured in number of pages faulted per second because only one page is
    faulted in each fault operation, hence this is also equal to the number of page
    fault operations. This counter includes both hard faults (those that require disk
    access) and soft faults (where the faulted page is found elsewhere in physical
    memory.) Most processors can handle large numbers of soft faults without significant
    consequence. However, hard faults, which require disk access, can cause significant
    delays.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory pages per second
  key: perf_counter_en["\Memory\Pages/sec"]
  interval: 1m
  type: zabbix_agent_active
  description: "This measures the rate at which pages are read from or written to\
    \ disk to resolve hard page faults.\r\nIf the value is greater than 1,000, as\
    \ a result of excessive paging, there may be a memory leak."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory pool non-paged
  key: perf_counter_en["\Memory\Pool Nonpaged Bytes"]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: B
  description: "This measures the size, in bytes, of the non-paged pool. This is an\
    \ area of system memory for objects that cannot be written to disk but instead\
    \ must remain in physical memory as long as they are allocated.\r\nThere is a\
    \ possible memory leak if the value is greater than 175MB (or 100MB with the /3GB\
    \ switch). Consequently, Event ID 2019 is recorded in the system event log."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Used swap space in %
  key: perf_counter_en["\Paging file(_Total)\% Usage"]
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: The used space of swap volume/file in percent.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: CPU DPC time
  key: perf_counter_en["\Processor Information(_total)\% DPC Time"]
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: Processor DPC time is the time that a single processor spent receiving
    and servicing deferred procedure calls (DPCs). DPCs are interrupts that run at
    a lower priority than standard interrupts. `% DPC Time` is a component of `% Privileged
    Time` because DPCs are executed in privileged mode. If a high `% DPC Time` is
    sustained, there may be a processor bottleneck or an application or hardware related
    issue that can significantly diminish overall system performance.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU interrupt time
  key: perf_counter_en["\Processor Information(_total)\% Interrupt Time"]
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: The processor information `% Interrupt Time` counter indicates how
    much time the processor spends handling hardware interrupts during sample intervals.
    It reflects the activity of devices like the system clock, mouse, disk drivers,
    and network cards. A value above 20% suggests possible hardware issues.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU privileged time
  key: perf_counter_en["\Processor Information(_total)\% Privileged Time"]
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: The processor information `% Privileged Time` counter shows the percent
    of time that the processor is spent executing in Kernel (or Privileged) mode.
    Privileged mode includes services interrupts inside Interrupt Service Routines
    (ISRs), executing Deferred Procedure Calls (DPCs), Device Driver calls and other
    kernel-mode functions of the Windows Operating System.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU user time
  key: perf_counter_en["\Processor Information(_total)\% User Time"]
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: The processor information `% User Time` counter shows the percent of
    time that the processor(s) is spent executing in User mode.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Context switches per second
  key: perf_counter_en["\System\Context Switches/sec"]
  interval: 1m
  type: zabbix_agent_active
  description: "Context Switches/sec is the combined rate at which all processors\
    \ on the computer are switched from one thread to another.\r\nContext switches\
    \ occur when a running thread voluntarily relinquishes the processor, is preempted\
    \ by a higher priority ready thread, or switches between user-mode and privileged\
    \ (kernel) mode to use an Executive or subsystem service.\r\nIt is the sum of\
    \ Thread\\\\Context Switches/sec for all threads running on all processors in\
    \ the computer and is measured in numbers of switches.\r\nThere are context switch\
    \ counters on the System and Thread objects. This counter displays the difference\
    \ between the values observed in the last two samples, divided by the duration\
    \ of the sample interval."
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU queue length
  key: perf_counter_en["\System\Processor Queue Length"]
  interval: 1m
  type: zabbix_agent_active
  description: The Processor Queue Length shows the number of threads that are observed
    as delayed in the processor Ready Queue and are waiting to be executed.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Number of threads
  key: perf_counter_en["\System\Threads"]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: The number of threads used by all running processes.
  history: 31d
  tags:
  - tag: component
    value: os
- name: Number of processes
  key: proc.num[]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: The number of processes.
  history: 31d
  tags:
  - tag: component
    value: os
- name: CPU utilization
  key: system.cpu.util
  interval: 1m
  type: zabbix_agent_active
  units: '%'
  description: CPU utilization expressed in %.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System name
  key: system.hostname
  interval: 1h
  type: zabbix_agent_active
  value_type: char
  description: The host name of the system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System local time
  key: system.localtime
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: unixtime
  description: The local system time of the host.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Operating system architecture
  key: system.sw.arch
  interval: 1h
  type: zabbix_agent_active
  value_type: char
  description: The architecture of the operating system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Operating system
  key: system.sw.os
  interval: 1h
  type: zabbix_agent_active
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Free swap space
  key: system.swap.free
  interval: 1m
  type: calculated
  params: last(//system.swap.size[,total]) - last(//system.swap.size[,total]) / 100
    * last(//perf_counter_en["\Paging file(_Total)\% Usage"])
  value_type: unsigned
  units: B
  description: The free space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Free swap space in %
  key: system.swap.pfree
  interval: '0'
  type: dependent
  master_item_key: perf_counter_en["\Paging file(_Total)\% Usage"]
  units: '%'
  description: The free space of the swap volume/file expressed in %.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Total swap space
  key: system.swap.size[,total]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: B
  description: The total space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: System description
  key: system.uname
  interval: 15m
  type: zabbix_agent_active
  value_type: char
  description: System description of the host.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime
  key: system.uptime
  interval: 30s
  type: zabbix_agent_active
  value_type: unsigned
  units: uptime
  description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Get filesystems
  key: vfs.fs.get
  interval: 1m
  type: zabbix_agent_active
  value_type: text
  description: The `vfs.fs.get` key acquires raw information set about the filesystems.
    Later to be extracted by preprocessing in dependent items.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Total memory
  key: vm.memory.size[total]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: B
  description: Total memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Used memory
  key: vm.memory.size[used]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  units: B
  description: Used memory in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory utilization
  key: vm.memory.util
  interval: 1m
  type: calculated
  params: last(//vm.memory.size[used]) / last(//vm.memory.size[total]) * 100
  units: '%'
  description: Memory utilization in %.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Number of cores
  key: wmi.get[root/cimv2,"Select NumberOfLogicalProcessors from Win32_ComputerSystem"]
  interval: 1m
  type: zabbix_agent_active
  value_type: unsigned
  description: The number of logical processors available on the computer.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: 'Windows: Network interfaces WMI get'
  key: wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID
    from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]
  interval: 1m
  type: zabbix_agent_active
  value_type: text
  description: Raw data of `win32_networkadapter.`
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Active agent availability
  key: zabbix[host,active_agent,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of active checks on the host. The value of this item\
    \ corresponds to availability icons in the host list.\r\nPossible values:\r\n\
    0 - unknown\r\n1 - available\r\n2 - not available"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Windows: Zabbix agent is not available'
  expression: nodata(/Windows by Zabbix agent active/agent.ping,30m)=1
  severity: average
  description: For active agents, `nodata()` with `agent.ping` is used with `{$AGENT.NODATA_TIMEOUT}`
    as a time threshold.
  tags:
  - tag: scope
    value: availability
- name: 'Windows: Number of free system page table entries is too low'
  expression: max(/Windows by Zabbix agent active/perf_counter_en["\Memory\Free System
    Page Table Entries"],5m)<5000
  severity: warning
  description: '`Memory\Free System Page Table Entries` has been less than `{$MEM.PAGE_TABLE_CRIT.MIN}`
    for 5 minutes. If the number is less than 5,000, there may be a memory leak.'
  tags:
  - tag: scope
    value: capacity
- name: 'Windows: The Memory Pages/sec is too high'
  expression: min(/Windows by Zabbix agent active/perf_counter_en["\Memory\Pages/sec"],5m)>1000
  severity: warning
  description: The Memory Pages/sec in the last 5 minutes exceeds `{$MEM.PAGE_SEC.CRIT.MAX}`.
    If the value is greater than 1,000, as a result of excessive paging, there may
    be a memory leak.
  tags:
  - tag: scope
    value: capacity
- name: 'Windows: CPU interrupt time is too high'
  expression: min(/Windows by Zabbix agent active/perf_counter_en["\Processor Information(_total)\%
    Interrupt Time"],5m)>50
  severity: warning
  description: The CPU Interrupt Time in the last 5 minutes exceeds `{$CPU.INTERRUPT.CRIT.MAX}`%.
  tags:
  - tag: scope
    value: performance
- name: 'Windows: CPU privileged time is too high'
  expression: min(/Windows by Zabbix agent active/perf_counter_en["\Processor Information(_total)\%
    Privileged Time"],5m)>30
  severity: warning
  description: The CPU privileged time in the last 5 minutes exceeds {$CPU.PRIV.CRIT.MAX}%.
  tags:
  - tag: scope
    value: performance
- name: 'Windows: CPU queue length is too high'
  expression: min(/Windows by Zabbix agent active/perf_counter_en["\System\Processor
    Queue Length"],5m) - last(/Windows by Zabbix agent active/wmi.get[root/cimv2,"Select
    NumberOfLogicalProcessors from Win32_ComputerSystem"]) * 2 > 3
  severity: warning
  description: The CPU Queue Length in the last 5 minutes exceeds `{$CPU.QUEUE.CRIT.MAX}`.
    According to actual observations, PQL should not exceed the number of cores *
    2. To fine-tune the conditions, use the macro `{$CPU.QUEUE.CRIT.MAX }`.
  tags:
  - tag: scope
    value: performance
- name: 'Windows: High CPU utilization'
  expression: min(/Windows by Zabbix agent active/system.cpu.util,5m)>90
  severity: warning
  description: CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Windows: System name has changed'
  expression: change(/Windows by Zabbix agent active/system.hostname) and length(last(/Windows
    by Zabbix agent active/system.hostname))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Windows: Operating system description has changed'
  expression: change(/Windows by Zabbix agent active/system.sw.os) and length(last(/Windows
    by Zabbix agent active/system.sw.os))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Windows: High swap space usage'
  expression: max(/Windows by Zabbix agent active/system.swap.pfree,5m)<20 and last(/Windows
    by Zabbix agent active/system.swap.size[,total])>0
  severity: warning
  description: This trigger is ignored, if there is no swap configured
  tags:
  - tag: scope
    value: performance
- name: 'Windows: Host has been restarted'
  expression: last(/Windows by Zabbix agent active/system.uptime)<10m
  severity: warning
  description: The device uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Windows: High memory utilization'
  expression: min(/Windows by Zabbix agent active/vm.memory.util,5m)>90
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Windows: Active checks are not available'
  expression: min(/Windows by Zabbix agent active/zabbix[host,active_agent,available],5m)=2
  severity: high
  description: Active checks are considered unavailable. Agent has not sent a heartbeat
    for a prolonged time.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Network interfaces discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID
    from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]
  filter:
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in["{#IFGUID}",dropped]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in["{#IFGUID}",errors]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in["{#IFGUID}"]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out["{#IFGUID}",dropped]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out["{#IFGUID}",errors]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out["{#IFGUID}"]
    interval: 3m
    type: zabbix_agent_active
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed["{#IFGUID}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status["{#IFGUID}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type["{#IFGUID}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Windows by Zabbix agent active/net.if.in[\"{#IFGUID}\",errors],5m)>2\r\
      \nor min(/Windows by Zabbix agent active/net.if.out[\"{#IFGUID}\",errors],5m)>2"
    severity: warning
    recovery_expression: "max(/Windows by Zabbix agent active/net.if.in[\"{#IFGUID}\"\
      ,errors],5m)<2*0.8\r\nand max(/Windows by Zabbix agent active/net.if.out[\"\
      {#IFGUID}\",errors],5m)<2*0.8"
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Windows by Zabbix agent active/net.if.in[\"{#IFGUID}\"],15m)>(90/100)*last(/Windows\
      \ by Zabbix agent active/net.if.speed[\"{#IFGUID}\"]) or\r\navg(/Windows by\
      \ Zabbix agent active/net.if.out[\"{#IFGUID}\"],15m)>(90/100)*last(/Windows\
      \ by Zabbix agent active/net.if.speed[\"{#IFGUID}\"])) and\r\nlast(/Windows\
      \ by Zabbix agent active/net.if.speed[\"{#IFGUID}\"])>0"
    severity: warning
    recovery_expression: "avg(/Windows by Zabbix agent active/net.if.in[\"{#IFGUID}\"\
      ],15m)<((90-3)/100)*last(/Windows by Zabbix agent active/net.if.speed[\"{#IFGUID}\"\
      ]) and\r\navg(/Windows by Zabbix agent active/net.if.out[\"{#IFGUID}\"],15m)<((90-3)/100)*last(/Windows\
      \ by Zabbix agent active/net.if.speed[\"{#IFGUID}\"])"
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower
      speed than it was before'
    expression: "change(/Windows by Zabbix agent active/net.if.speed[\"{#IFGUID}\"\
      ])<0 and\r\nlast(/Windows by Zabbix agent active/net.if.speed[\"{#IFGUID}\"\
      ])>0 and\r\nlast(/Windows by Zabbix agent active/net.if.status[\"{#IFGUID}\"\
      ])=2"
    severity: information
    allow_manual_close: true
  - name: 'Windows: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Windows by Zabbix agent active/net.if.status["{#IFGUID}"])<>2
      and (last(/Windows by Zabbix agent active/net.if.status["{#IFGUID}"],#1)<>last(/Windows
      by Zabbix agent active/net.if.status["{#IFGUID}"],#2))
    severity: average
    recovery_expression: last(/Windows by Zabbix agent active/net.if.status["{#IFGUID}"])=2
      or 1=0
    allow_manual_close: true
- name: Physical disks discovery
  key: perf_instance_en.discovery[PhysicalDisk]
  interval: 1h
  type: zabbix_agent_active
  filter:
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.MATCHES}'
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.NOT_MATCHES}'
  item_prototypes:
  - name: '{#DEVNAME}: Disk utilization by idle time'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\% Idle Time",60]
    interval: 1m
    type: zabbix_agent_active
    units: '%'
  - name: '{#DEVNAME}: Average disk read queue length'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg. Disk Read Queue Length",60]
    interval: 1m
    type: zabbix_agent_active
  - name: '{#DEVNAME}: Disk read request avg waiting time'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg. Disk sec/Read",60]
    interval: 1m
    type: zabbix_agent_active
    units: s
  - name: '{#DEVNAME}: Disk write request avg waiting time'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg. Disk sec/Write",60]
    interval: 1m
    type: zabbix_agent_active
    units: s
  - name: '{#DEVNAME}: Average disk write queue length'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg. Disk Write Queue Length",60]
    interval: 1m
    type: zabbix_agent_active
  - name: '{#DEVNAME}: Disk average queue size (avgqu-sz)'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Current Disk Queue Length",60]
    interval: 1m
    type: zabbix_agent_active
  - name: '{#DEVNAME}: Disk read rate'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Disk Reads/sec",60]
    interval: 1m
    type: zabbix_agent_active
    units: '!r/s'
  - name: '{#DEVNAME}: Disk write rate'
    key: perf_counter_en["\PhysicalDisk({#DEVNAME})\Disk Writes/sec",60]
    interval: 1m
    type: zabbix_agent_active
    units: '!w/s'
  trigger_prototypes:
  - name: 'Windows: {#DEVNAME}: Disk is overloaded'
    expression: min(/Windows by Zabbix agent active/perf_counter_en["\PhysicalDisk({#DEVNAME})\%
      Idle Time",60],15m)>95
    severity: warning
    allow_manual_close: true
  - name: 'Windows: {#DEVNAME}: Disk read request responses are too high'
    expression: min(/Windows by Zabbix agent active/perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg.
      Disk sec/Read",60],15m) > 0.02
    severity: warning
    allow_manual_close: true
  - name: 'Windows: {#DEVNAME}: Disk write request responses are too high'
    expression: min(/Windows by Zabbix agent active/perf_counter_en["\PhysicalDisk({#DEVNAME})\Avg.
      Disk sec/Write",60],15m) > 0.02
    severity: warning
    allow_manual_close: true
- name: Windows services discovery
  key: service.discovery
  interval: 1h
  type: zabbix_agent_active
  filter:
  - macro: '{#SERVICE.NAME}'
    value: '{$SERVICE.NAME.MATCHES}'
  - macro: '{#SERVICE.NAME}'
    value: '{$SERVICE.NAME.NOT_MATCHES}'
  - macro: '{#SERVICE.STARTUPNAME}'
    value: '{$SERVICE.STARTUPNAME.MATCHES}'
  - macro: '{#SERVICE.STARTUPNAME}'
    value: '{$SERVICE.STARTUPNAME.NOT_MATCHES}'
  item_prototypes:
  - name: State of service "{#SERVICE.NAME}" ({#SERVICE.DISPLAYNAME})
    key: service.info["{#SERVICE.NAME}",state]
    interval: 1m
    type: zabbix_agent_active
    value_type: unsigned
  trigger_prototypes:
  - name: 'Windows: "{#SERVICE.NAME}" ({#SERVICE.DISPLAYNAME}) is not running'
    expression: min(/Windows by Zabbix agent active/service.info["{#SERVICE.NAME}",state],#3)<>0
    severity: average
- name: Mounted filesystem discovery
  key: vfs.fs.dependent.discovery
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.get
  filter:
  - macro: '{#FSDRIVETYPE}'
    value: '{$VFS.FS.FSDRIVETYPE.MATCHES}'
  - macro: '{#FSDRIVETYPE}'
    value: '{$VFS.FS.FSDRIVETYPE.NOT_MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSLABEL}({#FSNAME})]: Get data'
    key: vfs.fs.dependent[{#FSNAME},data]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'FS [{#FSLABEL}({#FSNAME})]: Space: Available'
    key: vfs.fs.dependent.size[{#FSNAME},free]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  - name: 'FS [{#FSLABEL}({#FSNAME})]: Space: Used, in %'
    key: vfs.fs.dependent.size[{#FSNAME},pused]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    units: '%'
  - name: 'FS [{#FSLABEL}({#FSNAME})]: Space: Total'
    key: vfs.fs.dependent.size[{#FSNAME},total]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  - name: 'FS [{#FSLABEL}({#FSNAME})]: Space: Used'
    key: vfs.fs.dependent.size[{#FSNAME},used]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Windows: FS [{#FSLABEL}({#FSNAME})]: Space is critically low'
    expression: min(/Windows by Zabbix agent active/vfs.fs.dependent.size[{#FSNAME},pused],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'Windows: FS [{#FSLABEL}({#FSNAME})]: Space is low'
    expression: min(/Windows by Zabbix agent active/vfs.fs.dependent.size[{#FSNAME},pused],5m)>80
    severity: warning
    allow_manual_close: true
