triggers:
- name: 'Apache Kafka: Unclean leader election detected'
  expression: last(/Apache Kafka by JMX/jmx["kafka.controller:type=ControllerStats,name=UncleanLeaderElectionsPerSec","Count"])>0
  severity: average
  description: Unclean leader elections occur when there is no qualified partition
    leader among Kafka brokers. If Kafka is configured to allow an unclean leader
    election, a leader is chosen from the out-of-sync replicas, and any messages that
    were not synced prior to the loss of the former leader are lost forever. Essentially,
    unclean leader elections sacrifice consistency for availability.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: One or more partitions have no leader'
  expression: last(/Apache Kafka by JMX/jmx["kafka.controller:type=KafkaController,name=OfflinePartitionsCount","Value"])
    > 0
  severity: warning
  description: Any partition without an active leader will be completely inaccessible,
    and both consumers and producers of that partition will be blocked until a leader
    becomes available.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: There are offline log directories'
  expression: last(/Apache Kafka by JMX/jmx["kafka.log:type=LogManager,name=OfflineLogDirectoryCount","Value"])
    > 0
  severity: warning
  description: The offline log directory count metric indicate the number of log directories
    which are offline (due to a hardware failure for example) so that the broker cannot
    store incoming messages anymore.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: Network processor average idle percent is too low'
  expression: max(/Apache Kafka by JMX/jmx["kafka.network:type=SocketServer,name=NetworkProcessorAvgIdlePercent","Value"],15m)<30
  severity: average
  description: The network processor idle ratio metric indicates the percentage of
    time the network processor are not in use. The lower this number, the more loaded
    the broker is.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: Failed to fetch info data'
  expression: nodata(/Apache Kafka by JMX/jmx["kafka.network:type=SocketServer,name=NetworkProcessorAvgIdlePercent","Value"],15m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 15 minutes
  tags:
  - tag: scope
    value: availability
- name: 'Apache Kafka: Request handler average idle percent is too low'
  expression: max(/Apache Kafka by JMX/jmx["kafka.server:type=KafkaRequestHandlerPool,name=RequestHandlerAvgIdlePercent","OneMinuteRate"],15m)<30
  severity: average
  description: The request handler idle ratio metric indicates the percentage of time
    the request handlers are not in use. The lower this number, the more loaded the
    broker is.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: There are partitions under the min ISR'
  expression: last(/Apache Kafka by JMX/jmx["kafka.server:type=ReplicaManager,name=UnderMinIsrPartitionCount","Value"])>0
  severity: average
  description: The Under min ISR partitions metric displays the number of partitions,
    where the number of In-Sync Replicas (ISR) is less than the minimum number of
    in-sync replicas specified. The two most common causes of under-min ISR partitions
    are that one or more brokers is unresponsive, or the cluster is experiencing performance
    issues and one or more brokers are falling behind.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: There are under replicated partitions'
  expression: last(/Apache Kafka by JMX/jmx["kafka.server:type=ReplicaManager,name=UnderReplicatedPartitions","Value"])>0
  severity: average
  description: The Under replicated partitions metric displays the number of partitions
    that do not have enough replicas to meet the desired replication factor. A partition
    will also be considered under-replicated if the correct number of replicas exist,
    but one or more of the replicas have fallen significantly behind the partition
    leader. The two most common causes of under-replicated partitions are that one
    or more brokers is unresponsive, or the cluster is experiencing performance issues
    and one or more brokers have fallen behind.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: Broker is not connected to ZooKeeper'
  expression: find(/Apache Kafka by JMX/jmx["kafka.server:type=SessionExpireListener,name=SessionState","Value"],,"regexp","CONNECTED")=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Apache Kafka: Kafka service has been restarted'
  expression: last(/Apache Kafka by JMX/jmx["kafka.server:type=app-info","start-time-ms"])<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Apache Kafka: Version has changed'
  expression: last(/Apache Kafka by JMX/jmx["kafka.server:type=app-info","version"],#1)<>last(/Apache
    Kafka by JMX/jmx["kafka.server:type=app-info","version"],#2) and length(last(/Apache
    Kafka by JMX/jmx["kafka.server:type=app-info","version"]))>0
  severity: information
  description: The Kafka version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Topic Metrics (read)
  key: jmx.discovery[beans,"kafka.server:type=BrokerTopicMetrics,name=BytesOutPerSec,topic=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.MATCHES}'
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.NOT_MATCHES}'
  item_prototypes:
  - name: 'Kafka {#JMXTOPIC}: Bytes out per second'
    key: jmx["kafka.server:type=BrokerTopicMetrics,name=BytesOutPerSec,topic={#JMXTOPIC}","Count"]
    interval: 1m
    type: jmx_agent
    units: Bps
- name: Topic Metrics (errors)
  key: jmx.discovery[beans,"kafka.server:type=BrokerTopicMetrics,name=BytesRejectedPerSec,topic=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.MATCHES}'
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.NOT_MATCHES}'
  item_prototypes:
  - name: 'Kafka {#JMXTOPIC}: Bytes rejected per second'
    key: jmx["kafka.server:type=BrokerTopicMetrics,name=BytesRejectedPerSec,topic={#JMXTOPIC}","Count"]
    interval: 1m
    type: jmx_agent
- name: Topic Metrics (write)
  key: jmx.discovery[beans,"kafka.server:type=BrokerTopicMetrics,name=MessagesInPerSec,topic=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.MATCHES}'
  - macro: '{#JMXTOPIC}'
    value: '{$KAFKA.TOPIC.NOT_MATCHES}'
  item_prototypes:
  - name: 'Kafka {#JMXTOPIC}: Bytes in per second'
    key: jmx["kafka.server:type=BrokerTopicMetrics,name=BytesInPerSec,topic={#JMXTOPIC}","Count"]
    interval: 1m
    type: jmx_agent
    units: Bps
  - name: 'Kafka {#JMXTOPIC}: Messages in per second'
    key: jmx["kafka.server:type=BrokerTopicMetrics,name=MessagesInPerSec,topic={#JMXTOPIC}","Count"]
    interval: 1m
    type: jmx_agent
