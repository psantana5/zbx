template: Apache Kafka by JMX
description: "Official JMX Template for Apache Kafka.\r\n  The metrics are collected\
  \ by JMX.\r\n  You can set {$KAFKA.USER} and {$KAFKA.PASSWORD} macros in the template\
  \ for using on the host level.\r\n\r\nYou can discuss this template or leave feedback\
  \ on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback\r\n\r\
  \nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Leader election per second
  key: jmx["kafka.controller:type=ControllerStats,name=LeaderElectionRateAndTimeMs","Count"]
  interval: 1m
  type: jmx_agent
  description: Number of leader elections per second.
  history: 31d
  tags:
  - tag: component
    value: controller
- name: Unclean leader election per second
