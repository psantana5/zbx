template: macOS by Zabbix agent
description: "This is an official macOS template. It requires Zabbix agent 7.4 or\
  \ newer.\r\n\r\nNotes on filesystem (FS) discovery:\r\n  - The ext4/3/2 FS reserves\
  \ space for privileged usage, typically set at 5% by default.\r\n  - BTRFS allocates\
  \ a default of 10% of the volume for its own needs.\r\n  - To mitigate potential\
  \ disasters, FS usage triggers are based on the maximum available space.\r\n   \
  \ - Utilization formula: 'pused = 100 - 100 * (available / total - free + available)'\r\
  \n  - The FS utilization chart, derived from graph prototypes, reflects FS reserved\
  \ space as the difference between used and available space from the total volume.\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Host name of Zabbix agent running
  key: agent.hostname
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Zabbix agent ping
  key: agent.ping
  interval: 1m
  value_type: unsigned
  description: The agent always returns "1" for this item. May be used in combination
    with `nodata()` for the availability check.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Version of Zabbix agent running
  key: agent.version
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Maximum number of opened files
  key: kernel.maxfiles
  interval: 1h
  value_type: unsigned
  description: May be increased by using the `sysctl` utility or modifying the file
    `/etc/sysctl.conf`.
  history: 31d
  tags:
  - tag: component
    value: os
- name: Maximum number of processes
  key: kernel.maxproc
  interval: 1h
  value_type: unsigned
  description: May be increased by using the `sysctl` utility or modifying the file
    `/etc/sysctl.conf`.
  history: 31d
  tags:
  - tag: component
    value: os
- name: Incoming network traffic on en0
  key: net.if.in[en0]
  interval: 1m
  value_type: unsigned
  units: bps
  history: 31d
  tags:
  - tag: component
    value: network
- name: Outgoing network traffic on en0
  key: net.if.out[en0]
  interval: 1m
  value_type: unsigned
  units: bps
  history: 31d
  tags:
  - tag: component
    value: network
- name: Host boot time
  key: system.boottime
  interval: 10m
  value_type: unsigned
  units: unixtime
  history: 31d
  tags:
  - tag: component
    value: os
- name: Processor load (15 min average per core)
  key: system.cpu.load[percpu,avg15]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Processor load (1 min average per core)
  key: system.cpu.load[percpu,avg1]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Processor load (5 min average per core)
  key: system.cpu.load[percpu,avg5]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Host name
  key: system.hostname
  interval: 1h
  value_type: char
  description: The host name of the system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Host local time
  key: system.localtime
  interval: 1m
  value_type: unsigned
  units: unixtime
  description: The local system time of the host.
  history: 31d
  tags:
  - tag: component
    value: os
- name: System information
  key: system.uname
  interval: 1h
  value_type: char
  description: Information as normally returned by `uname -a`.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: System uptime
  key: system.uptime
  interval: 10m
  value_type: unsigned
  units: uptime
  description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
  history: 31d
  tags:
  - tag: component
    value: os
- name: Number of logged in users
  key: system.users.num
  interval: 1m
  value_type: unsigned
  description: The number of users who are currently logged in.
  history: 31d
  tags:
  - tag: component
    value: os
  - tag: component
    value: security
- name: Checksum of /etc/passwd
  key: vfs.file.cksum[/etc/passwd,sha256]
  interval: 15m
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: security
- name: Get filesystems
  key: vfs.fs.get
  interval: 1m
  value_type: text
  description: The `vfs.fs.get` key acquires raw information set about the filesystems.
    Later to be extracted by preprocessing in dependent items.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Available memory
  key: vm.memory.size[available]
  interval: 1m
  value_type: unsigned
  units: B
  description: Defined as free + cached + buffers.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Total memory
  key: vm.memory.size[total]
  interval: 1h
  value_type: unsigned
  units: B
  description: Total memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Zabbix agent availability
  key: zabbix[host,agent,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: Used for monitoring the availability status of the agent.
  history: 31d
  tags:
  - tag: component
    value: system
triggers:
- name: 'macOS: Configured max number of opened files is too low'
  expression: last(/macOS by Zabbix agent/kernel.maxfiles)<1024
  severity: information
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: performance
- name: 'macOS: Configured max number of processes is too low'
  expression: last(/macOS by Zabbix agent/kernel.maxproc)<256
  severity: information
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: performance
- name: 'macOS: Processor load is too high'
  expression: avg(/macOS by Zabbix agent/system.cpu.load[percpu,avg1],5m)>5
  severity: warning
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'macOS: Hostname was changed'
  expression: last(/macOS by Zabbix agent/system.hostname,#1)<>last(/macOS by Zabbix
    agent/system.hostname,#2)
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'macOS: Host information was changed'
  expression: last(/macOS by Zabbix agent/system.uname,#1)<>last(/macOS by Zabbix
    agent/system.uname,#2)
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'macOS: Server has just been restarted'
  expression: change(/macOS by Zabbix agent/system.uptime)<0
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'macOS: /etc/passwd has been changed'
  expression: last(/macOS by Zabbix agent/vfs.file.cksum[/etc/passwd,sha256],#1)<>last(/macOS
    by Zabbix agent/vfs.file.cksum[/etc/passwd,sha256],#2)
  severity: warning
  tags:
  - tag: scope
    value: security
- name: 'macOS: Lack of available memory on server'
  expression: last(/macOS by Zabbix agent/vm.memory.size[available])<20M
  severity: average
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'macOS: Zabbix agent is not available'
  expression: max(/macOS by Zabbix agent/zabbix[host,agent,available],3m)=0
  severity: average
  description: For passive checks only; the availability of the agent(s) and a host
    is used with `{$AGENT.TIMEOUT}` as the time threshold.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Mounted filesystem discovery
  key: vfs.fs.dependent.discovery
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.get
  filter:
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSNAME}]: Get data'
    key: vfs.fs.dependent[{#FSNAME},data]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'FS [{#FSNAME}]: Inodes: Free, in %'
    key: vfs.fs.dependent.inode[{#FSNAME},pfree]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Available'
    key: vfs.fs.dependent.size[{#FSNAME},free]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  - name: 'FS [{#FSNAME}]: Space: Available, in %'
    key: vfs.fs.dependent.size[{#FSNAME},pfree]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Used, in %'
    key: vfs.fs.dependent.size[{#FSNAME},pused]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Total'
    key: vfs.fs.dependent.size[{#FSNAME},total]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used'
    key: vfs.fs.dependent.size[{#FSNAME},used]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.dependent[{#FSNAME},data]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'macOS: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/macOS by Zabbix agent/vfs.fs.dependent.inode[{#FSNAME},pfree],5m)<10
    severity: average
  - name: 'macOS: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/macOS by Zabbix agent/vfs.fs.dependent.inode[{#FSNAME},pfree],5m)<20
    severity: warning
  - name: 'macOS: FS [{#FSNAME}]: Space is critically low'
    expression: min(/macOS by Zabbix agent/vfs.fs.dependent.size[{#FSNAME},pused],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'macOS: FS [{#FSNAME}]: Space is low'
    expression: min(/macOS by Zabbix agent/vfs.fs.dependent.size[{#FSNAME},pused],5m)>80
    severity: warning
    allow_manual_close: true
