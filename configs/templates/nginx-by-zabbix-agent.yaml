template: Nginx by Zabbix agent
description: "Get metrics from stub status module using Zabbix agent running on Linux\r\
  \nhttps://nginx.ru/en/docs/http/ngx_http_stub_status_module.html\r\n\r\nYou can\
  \ discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384765-discussion-thread-for-official-zabbix-template-nginx\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Service response time
  key: net.tcp.service.perf[http,"{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PORT}"]
  interval: 1m
  units: s
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Service status
  key: net.tcp.service[http,"{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PORT}"]
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Connections accepted per second
  key: nginx.connections.accepted.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  description: The total number of accepted client connections.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections active
  key: nginx.connections.active
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: unsigned
  description: The current number of active client connections including waiting connections.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections dropped per second
  key: nginx.connections.dropped.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  description: The total number of dropped client connections.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections handled per second
  key: nginx.connections.handled.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  description: The total number of handled connections. Generally, the parameter value
    is the same as for the accepted connections, unless some resource limits have
    been reached (for example, the `worker_connections limit`).
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections reading
  key: nginx.connections.reading
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: unsigned
  description: The current number of connections where Nginx is reading the request
    header.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections waiting
  key: nginx.connections.waiting
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: unsigned
  description: The current number of idle client connections waiting for a request.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections writing
  key: nginx.connections.writing
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: unsigned
  description: The current number of connections where Nginx is writing a response
    back to the client.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Requests total
  key: nginx.requests.total
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: unsigned
  description: The total number of client requests.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Requests per second
  key: nginx.requests.total.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  description: The total number of client requests.
  history: 31d
  tags:
  - tag: component
    value: requests
- name: Version
  key: nginx.version
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Get processes summary
  key: proc.get[{$NGINX.PROCESS.NAME.PARAMETER},,,summary]
  interval: 1m
  value_type: text
  description: The aggregated data of summary metrics for all processes.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get stub status page
  key: web.page.get["{$NGINX.STUB_STATUS.HOST}","{$NGINX.STUB_STATUS.PATH}","{$NGINX.STUB_STATUS.PORT}"]
  interval: 1m
  value_type: text
  description: "The following status information is provided:\r\n`Active connections`\
    \ - the current number of active client connections including waiting connections.\r\
    \n`Accepted` - the total number of accepted client connections.\r\n`Handled` -\
    \ the total number of handled connections. Generally, the parameter value is the\
    \ same as for the accepted connections, unless some resource limits have been\
    \ reached (for example, the `worker_connections` limit).\r\n`Requests` - the total\
    \ number of client requests.\r\n`Reading` - the current number of connections\
    \ where Nginx is reading the request header.\r\n`Writing` - the current number\
    \ of connections where Nginx is writing a response back to the client.\r\n`Waiting`\
    \ - the current number of idle client connections waiting for a request.\r\n\r\
    \nSee also [Module ngx_http_stub_status_module](https://nginx.org/en/docs/http/ngx_http_stub_status_module.html)."
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
triggers:
- name: 'Nginx: Version has changed'
  expression: last(/Nginx by Zabbix agent/nginx.version,#1)<>last(/Nginx by Zabbix
    agent/nginx.version,#2) and length(last(/Nginx by Zabbix agent/nginx.version))>0
  severity: information
  description: The Nginx version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Nginx process discovery
  key: nginx.proc.discovery
  interval: '0'
  type: dependent
  master_item_key: proc.get[{$NGINX.PROCESS.NAME.PARAMETER},,,summary]
  filter:
  - macro: '{#NGINX.NAME}'
    value: '{$NGINX.PROCESS_NAME}'
  item_prototypes:
  - name: CPU utilization
    key: proc.cpu.util[{#NGINX.NAME}]
    interval: 1m
    units: '%'
  - name: Get process data
    key: nginx.proc.get[{#NGINX.NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: Number of running processes
    key: nginx.proc.num[{#NGINX.NAME}]
    interval: '0'
    type: dependent
    master_item_key: nginx.proc.get[{#NGINX.NAME}]
    value_type: unsigned
  - name: Memory usage, %
    key: nginx.proc.pmem[{#NGINX.NAME}]
    interval: '0'
    type: dependent
    master_item_key: nginx.proc.get[{#NGINX.NAME}]
    units: '%'
  - name: Memory usage (rss)
    key: nginx.proc.rss[{#NGINX.NAME}]
    interval: '0'
    type: dependent
    master_item_key: nginx.proc.get[{#NGINX.NAME}]
    value_type: unsigned
    units: B
  - name: Memory usage (vsize)
    key: nginx.proc.vmem[{#NGINX.NAME}]
    interval: '0'
    type: dependent
    master_item_key: nginx.proc.get[{#NGINX.NAME}]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Nginx: Failed to fetch stub status page'
    expression: "(find(/Nginx by Zabbix agent/web.page.get[\"localhost\",\"basic_status\"\
      ,\"80\"],,\"iregexp\",\"HTTP\\\\/[\\\\d.]+\\\\s+200\")=0 or\r\nnodata(/Nginx\
      \ by Zabbix agent/web.page.get[\"localhost\",\"basic_status\",\"80\"],30m))\
      \ and last(/Nginx by Zabbix agent/nginx.proc.num[{#NGINX.NAME}])>0"
    severity: warning
    allow_manual_close: true
  - name: 'Nginx: High connections drop rate'
    expression: min(/Nginx by Zabbix agent/nginx.connections.dropped.rate,5m) > 1
      and last(/Nginx by Zabbix agent/nginx.proc.num[{#NGINX.NAME}])>0
    severity: warning
  - name: 'Nginx: Service is down'
    expression: last(/Nginx by Zabbix agent/net.tcp.service[http,"localhost","80"])=0
      and last(/Nginx by Zabbix agent/nginx.proc.num[{#NGINX.NAME}])>0
    severity: average
    allow_manual_close: true
  - name: 'Nginx: Service response time is too high'
    expression: min(/Nginx by Zabbix agent/net.tcp.service.perf[http,"localhost","80"],5m)>10
      and last(/Nginx by Zabbix agent/nginx.proc.num[{#NGINX.NAME}])>0
    severity: warning
    allow_manual_close: true
  - name: 'Nginx: Process is not running'
    expression: last(/Nginx by Zabbix agent/nginx.proc.num[{#NGINX.NAME}])=0
    severity: high
