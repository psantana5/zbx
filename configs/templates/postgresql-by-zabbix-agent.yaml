template: PostgreSQL by Zabbix agent
description: "This template is designed for the deployment of PostgreSQL monitoring\
  \ by Zabbix via Zabbix agent and uses user parameters to run SQL queries with the\
  \ `psql` command-line tool.\r\n\r\nNote:\r\n- The template requires `pg_isready`\
  \ and `psql` utilities to be installed on the same host with Zabbix agent.\r\n-\
  \ The template requires files with SQL queries and user parameters that can be found\
  \ in the Zabbix official repository:\r\nhttps://git.zabbix.com/projects/ZBX/repos/zabbix/browse/templates/db/postgresql?at=refs%2Fheads%2Frelease%2F6.0\r\
  \n\r\nSetup:\r\n\r\n1. Deploy Zabbix agent and create the PostgreSQL user for monitoring\
  \ (`<password>` at your discretion) with proper access rights to your PostgreSQL\
  \ instance.\r\n\r\nFor PostgreSQL version 10 and above:\r\nCREATE USER zbx_monitor\
  \ WITH PASSWORD '<PASSWORD>' INHERIT;\r\nGRANT pg_monitor TO zbx_monitor;\r\n\r\n\
  For PostgreSQL version 9.6 and below:\r\nCREATE USER zbx_monitor WITH PASSWORD '<PASSWORD>';\r\
  \nGRANT SELECT ON pg_stat_database TO zbx_monitor;\r\nALTER USER zbx_monitor WITH\
  \ SUPERUSER;\r\n\r\n2. Copy the `postgresql/` directory to the `zabbix` user home\
  \ directory - `/var/lib/zabbix/`. The `postgresql/` directory contains the files\
  \ with SQL queries needed to obtain metrics from PostgreSQL instance.\r\n\r\nIf\
  \ the home directory of the `zabbix` user doesn't exist, create it first:\r\nmkdir\
  \ -m u=rwx,g=rwx,o= -p /var/lib/zabbix\r\nchown zabbix:zabbix /var/lib/zabbix\r\n\
  \r\n3. Copy the `template_db_postgresql.conf` file, containing user parameters,\
  \ to the Zabbix agent configuration directory `/etc/zabbix/zabbix_agentd.d/` and\
  \ restart Zabbix agent service.\r\n\r\nIf you want to use SSL/TLS encryption to\
  \ protect communications with the remote PostgreSQL instance, you can modify the\
  \ connection string in user parameters. For example, to enable required encryption\
  \ in transport mode without identity checks you could append `?sslmode=required`\
  \ to the end of the connection string for all keys that use `psql`:\r\nUserParameter=pgsql.bgwriter[*],\
  \ psql -qtAX postgresql://\"$3\":\"$4\"@\"$1\":\"$2\"/\"$5\"?sslmode=required -f\
  \ \"/var/lib/zabbix/postgresql/pgsql.bgwriter.sql\"\r\n\r\nConsult the PostgreSQL\
  \ documentation about protection modes (https://www.postgresql.org/docs/current/libpq-ssl.html#LIBPQ-SSL-PROTECTION)\
  \ and client connection parameters (https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNECT-SSLMODE).\r\
  \n\r\nAlso, it is assumed that you set up the PostgreSQL instance to work in the\
  \ desired encryption mode. Check the PostgreSQL documentation (https://www.postgresql.org/docs/current/ssl-tcp.html)\
  \ for details.\r\n\r\n4. Edit the `pg_hba.conf` configuration file to allow connections\
  \ for the user `zbx_monitor`. You can check the PostgreSQL documentation for examples\
  \ (https://www.postgresql.org/docs/current/auth-pg-hba-conf.html).\r\n\r\n5. Specify\
  \ the host name or IP address in the `{$PG.HOST}` macro. Adjust the port number\
  \ with `{$PG.PORT}` macro if needed.\r\n\r\n6. Set the password that you specified\
  \ in step 1 in the macro `{$PG.PASSWORD}`.\r\n\r\nYou can discuss this template\
  \ or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384190-%C2%A0discussion-thread-for-official-zabbix-template-db-postgresql\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: 'Bgwriter: Buffers allocated per second'
  key: pgsql.bgwriter.buffers_alloc.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of buffers allocated per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Bgwriter: Buffers written directly by a backend per second'
  key: pgsql.bgwriter.buffers_backend.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of buffers written directly by a backend per second. Available
    in PostgreSQL versions prior to 17.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Bgwriter: Times a backend executed its own fsync per second'
  key: pgsql.bgwriter.buffers_backend_fsync.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of times a backend had to execute its own fsync call per second
    (normally the background writer handles those even when the backend does its own
    write). Available in PostgreSQL versions prior to 17.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Buffers written during checkpoints per second'
  key: pgsql.bgwriter.buffers_checkpoint.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of buffers written during checkpoints per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Buffers written by the background writer per second'
  key: pgsql.bgwriter.buffers_clean.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of buffers written by the background writer per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Checkpoint sync time per second'
  key: pgsql.bgwriter.checkpoint_sync_time.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Total amount of time per second that has been spent in the portion
    of checkpoint processing where files are synchronized to disk.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Checkpoint write time per second'
  key: pgsql.bgwriter.checkpoint_write_time.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Total amount of time per second that has been spent in the portion
    of checkpoint processing where files are written to disk.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Requested per second'
  key: pgsql.bgwriter.checkpoints_req.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of requested checkpoints that have been performed per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Checkpoint: Scheduled per second'
  key: pgsql.bgwriter.checkpoints_timed.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of scheduled checkpoints that have been performed per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: 'Bgwriter: Number of bgwriter cleaning scan stopped per second'
  key: pgsql.bgwriter.maxwritten_clean.rate
  interval: '0'
  type: dependent
  master_item_key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  description: Number of times the background writer stopped a cleaning scan because
    it had written too many buffers per second.
  history: 31d
  tags:
  - tag: component
    value: bgwriter
- name: Get bgwriter
  key: pgsql.bgwriter["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: text
  description: "Collect all metrics from pg_stat_bgwriter:\r\nhttps://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-BGWRITER-VIEW"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Cache hit ratio, %
  key: pgsql.cache.hit["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  units: '%'
  description: Cache hit ratio.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: Config hash
  key: pgsql.config.hash["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 15m
  value_type: text
  description: PostgreSQL configuration hash.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: 'Connections sum: Active'
  key: pgsql.connections.sum.active
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: Total number of connections executing a query.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Idle'
  key: pgsql.connections.sum.idle
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: Total number of connections waiting for a new client command.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Idle in transaction'
  key: pgsql.connections.sum.idle_in_transaction
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: Total number of connections in a transaction state but not executing
    a query.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Prepared'
  key: pgsql.connections.sum.prepared
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: "Total number of prepared transactions:\r\nhttps://www.postgresql.org/docs/current/sql-prepare-transaction.html"
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Total'
  key: pgsql.connections.sum.total
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: Total number of connections.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Total, %'
  key: pgsql.connections.sum.total_pct
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  units: '%'
  description: Total number of connections, in percentage.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connections sum: Waiting'
  key: pgsql.connections.sum.waiting
  interval: '0'
  type: dependent
  master_item_key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: "Total number of waiting connections:\r\nhttps://www.postgresql.org/docs/current/monitoring-stats.html#WAIT-EVENT-TABLE"
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Get connections sum
  key: pgsql.connections.sum["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: text
  description: "Collect all metrics from pg_stat_activity:\r\nhttps://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-ACTIVITY-VIEW"
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get dbstat
  key: pgsql.dbstat["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: text
  description: "Collect all metrics from pg_stat_database per database:\r\nhttps://www.postgresql.org/docs/current/monitoring-stats.html#PG-STAT-DATABASE-VIEW"
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get locks
  key: pgsql.locks["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: text
  description: "Collect all metrics from pg_locks per database:\r\nhttps://www.postgresql.org/docs/current/explicit-locking.html#LOCKING-TABLES"
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Ping time
  key: pgsql.ping.time["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  units: s
  description: Used to get the `SELECT 1` query execution time.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Ping
  key: pgsql.ping["{$PG.HOST}","{$PG.PORT}"]
  interval: 1m
  value_type: unsigned
  description: Used to test a connection to see if it is alive. It is set to 0 if
    the instance doesn't accept the connections.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Get queries
  key: pgsql.queries["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}","{$PG.QUERY_ETIME.MAX.WARN}"]
  interval: 1m
  value_type: text
  description: Collect all metrics by query execution time.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'Replication: Standby count'
  key: pgsql.replication.count["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: unsigned
  description: Number of standby servers.
  history: 31d
  tags:
  - tag: component
    value: replication
- name: 'Replication: Lag in seconds'
  key: pgsql.replication.lag.sec["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: unsigned
  units: s
  description: Replication lag with master, in seconds.
  history: 31d
  tags:
  - tag: component
    value: replication
- name: 'Replication: Recovery role'
  key: pgsql.replication.recovery_role["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: unsigned
  description: 'Replication role: 1 — recovery is still in progress (standby mode),
    0 — master mode.'
  history: 31d
  tags:
  - tag: component
    value: replication
- name: 'Replication: Status'
  key: pgsql.replication.status["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: unsigned
  description: 'Replication status: 0 — streaming is down, 1 — streaming is up, 2
    — master mode.'
  history: 31d
  tags:
  - tag: component
    value: replication
- name: 'Transactions: Max active transaction time'
  key: pgsql.transactions.active
  interval: '0'
  type: dependent
  master_item_key: pgsql.transactions["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Current max active transaction time.
  history: 31d
  tags:
  - tag: component
    value: transactions
- name: 'Transactions: Max idle transaction time'
  key: pgsql.transactions.idle
  interval: '0'
  type: dependent
  master_item_key: pgsql.transactions["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Current max idle transaction time.
  history: 31d
  tags:
  - tag: component
    value: transactions
- name: 'Transactions: Max prepared transaction time'
  key: pgsql.transactions.prepared
  interval: '0'
  type: dependent
  master_item_key: pgsql.transactions["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Current max prepared transaction time.
  history: 31d
  tags:
  - tag: component
    value: transactions
- name: 'Transactions: Max waiting transaction time'
  key: pgsql.transactions.waiting
  interval: '0'
  type: dependent
  master_item_key: pgsql.transactions["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  units: s
  description: Current max waiting transaction time.
  history: 31d
  tags:
  - tag: component
    value: transactions
- name: Get transactions
  key: pgsql.transactions["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: text
  description: Collect metrics by transaction execution time.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime
  key: pgsql.uptime["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1m
  value_type: unsigned
  units: uptime
  description: Time since the server started.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Version
  key: pgsql.version["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 15m
  value_type: char
  description: PostgreSQL version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: 'WAL: Segments count'
  key: pgsql.wal.count
  interval: '0'
  type: dependent
  master_item_key: pgsql.wal.stat["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  description: Number of WAL segments.
  history: 31d
  tags:
  - tag: component
    value: wal
- name: Get WAL
  key: pgsql.wal.stat["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 5m
  value_type: text
  description: Collect write-ahead log (WAL) metrics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'WAL: Bytes written'
  key: pgsql.wal.write
  interval: '0'
  type: dependent
  master_item_key: pgsql.wal.stat["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  value_type: unsigned
  units: B
  description: WAL write, in bytes.
  history: 31d
  tags:
  - tag: component
    value: wal
triggers:
- name: 'PostgreSQL: Required checkpoints occur too frequently'
  expression: last(/PostgreSQL by Zabbix agent/pgsql.bgwriter.checkpoints_req.rate)
    > 5
  severity: average
  description: "Checkpoints are points in the sequence of transactions at which it\
    \ is guaranteed that the heap and index data files have been updated with all\
    \ information written before that checkpoint. At checkpoint time, all dirty data\
    \ pages are flushed to disk and a special checkpoint record is written to the\
    \ log file.\r\nhttps://www.postgresql.org/docs/current/wal-configuration.html"
  tags:
  - tag: scope
    value: performance
- name: 'PostgreSQL: Failed to get items'
  expression: nodata(/PostgreSQL by Zabbix agent/pgsql.bgwriter["localhost","5432","zbx_monitor","******","postgres"],30m)
    = 1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Cache hit ratio too low'
  expression: max(/PostgreSQL by Zabbix agent/pgsql.cache.hit["localhost","5432","zbx_monitor","******","postgres"],5m)
    < 90
  severity: warning
  description: Cache hit ratio is lower than {$PG.CACHE_HITRATIO.MIN.WARN} for 5m.
  tags:
  - tag: scope
    value: performance
- name: 'PostgreSQL: Configuration has changed'
  expression: last(/PostgreSQL by Zabbix agent/pgsql.config.hash["localhost","5432","zbx_monitor","******","postgres"],#1)<>last(/PostgreSQL
    by Zabbix agent/pgsql.config.hash["localhost","5432","zbx_monitor","******","postgres"],#2)
    and length(last(/PostgreSQL by Zabbix agent/pgsql.config.hash["localhost","5432","zbx_monitor","******","postgres"]))>0
  severity: information
  description: PostgreSQL configuration has changed.
  tags:
  - tag: scope
    value: notice
- name: 'PostgreSQL: Total number of connections is too high'
  expression: min(/PostgreSQL by Zabbix agent/pgsql.connections.sum.total_pct,5m)
    > 90
  severity: average
  description: Total number of current connections exceeds the limit of {$PG.CONN_TOTAL_PCT.MAX.WARN}%
    out of the maximum number of concurrent connections to the database server (the
    "max_connections" setting).
  tags:
  - tag: scope
    value: performance
- name: 'PostgreSQL: Response too long'
  expression: min(/PostgreSQL by Zabbix agent/pgsql.ping.time["localhost","5432","zbx_monitor","******","postgres"],5m)
    > 1s
  severity: average
  description: Response is taking too long (over {$PG.PING_TIME.MAX.WARN} for 5m).
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'PostgreSQL: Service is down'
  expression: last(/PostgreSQL by Zabbix agent/pgsql.ping["localhost","5432"]) = 0
  severity: high
  description: Last test of a connection was unsuccessful.
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Streaming lag with master is too high'
  expression: min(/PostgreSQL by Zabbix agent/pgsql.replication.lag.sec["localhost","5432","zbx_monitor","******","postgres"],5m)
    > 10m
  severity: average
  description: Replication lag with master is higher than {$PG.REPL_LAG.MAX.WARN}
    for 5m.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'PostgreSQL: Replication is down'
  expression: max(/PostgreSQL by Zabbix agent/pgsql.replication.status["localhost","5432","zbx_monitor","******","postgres"],5m)=0
  severity: average
  description: Replication is enabled and data streaming was down for 5m.
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Service has been restarted'
  expression: last(/PostgreSQL by Zabbix agent/pgsql.uptime["localhost","5432","zbx_monitor","******","postgres"])
    < 10m
  severity: average
  description: PostgreSQL uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'PostgreSQL: Version has changed'
  expression: last(/PostgreSQL by Zabbix agent/pgsql.version["localhost","5432","zbx_monitor","******","postgres"],#1)<>last(/PostgreSQL
    by Zabbix agent/pgsql.version["localhost","5432","zbx_monitor","******","postgres"],#2)
    and length(last(/PostgreSQL by Zabbix agent/pgsql.version["localhost","5432","zbx_monitor","******","postgres"]))>0
  severity: information
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Database discovery
  key: pgsql.discovery.db["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1h
  filter:
  - macro: '{#DBNAME}'
    value: '{$PG.LLD.FILTER.DBNAME}'
  item_prototypes:
  - name: 'DB [{#DBNAME}]: Database size'
    key: pgsql.db.size["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}","{#DBNAME}"]
    interval: 15m
    value_type: unsigned
    units: B
  - name: 'DB [{#DBNAME}]: Get frozen XID'
    key: pgsql.frozenxid["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    interval: 1m
    value_type: text
  - name: 'DB [{#DBNAME}]: Get scans'
    key: pgsql.scans["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    interval: 1m
    value_type: text
  - name: 'DB [{#DBNAME}]: Get dbstat'
    key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'DB [{#DBNAME}]: Frozen XID before autovacuum, %'
    key: pgsql.frozenxid.prc_before_av["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.frozenxid["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    units: '%'
  - name: 'DB [{#DBNAME}]: Frozen XID before stop, %'
    key: pgsql.frozenxid.prc_before_stop["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.frozenxid["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    units: '%'
  - name: 'DB [{#DBNAME}]: Num of locks total'
    key: pgsql.locks.total["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Get queries'
    key: pgsql.queries.get_metrics["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'DB [{#DBNAME}]: Index scans per second'
    key: pgsql.scans.idx.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.scans["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Sequential scans per second'
    key: pgsql.scans.seq.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.scans["{$PG.HOST}","{$PG.PORT}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Blocks hit per second'
    key: pgsql.dbstat.blks_hit.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Disk blocks read per second'
    key: pgsql.dbstat.blks_read.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Detected conflicts per second'
    key: pgsql.dbstat.conflicts.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Detected deadlocks per second'
    key: pgsql.dbstat.deadlocks.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Temp_bytes written per second'
    key: pgsql.dbstat.temp_bytes.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'DB [{#DBNAME}]: Temp_files created per second'
    key: pgsql.dbstat.temp_files.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Tuples deleted per second'
    key: pgsql.dbstat.tup_deleted.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Tuples fetched per second'
    key: pgsql.dbstat.tup_fetched.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Tuples inserted per second'
    key: pgsql.dbstat.tup_inserted.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Tuples returned per second'
    key: pgsql.dbstat.tup_returned.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Tuples updated per second'
    key: pgsql.dbstat.tup_updated.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Commits per second'
    key: pgsql.dbstat.xact_commit.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Rollbacks per second'
    key: pgsql.dbstat.xact_rollback.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Queries slow maintenance count'
    key: pgsql.queries.mro.slow_count["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Queries max maintenance time'
    key: pgsql.queries.mro.time_max["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'DB [{#DBNAME}]: Queries sum maintenance time'
    key: pgsql.queries.mro.time_sum["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'DB [{#DBNAME}]: Queries slow query count'
    key: pgsql.queries.query.slow_count["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Queries max query time'
    key: pgsql.queries.query.time_max["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'DB [{#DBNAME}]: Queries sum query time'
    key: pgsql.queries.query.time_sum["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'DB [{#DBNAME}]: Queries slow transaction count'
    key: pgsql.queries.tx.slow_count["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Queries max transaction time'
    key: pgsql.queries.tx.time_max["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'DB [{#DBNAME}]: Queries sum transaction time'
    key: pgsql.queries.tx.time_sum["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
    units: s
  trigger_prototypes:
  - name: 'PostgreSQL: DB [{#DBNAME}]: VACUUM FREEZE is required to prevent wraparound'
    expression: last(/PostgreSQL by Zabbix agent/pgsql.frozenxid.prc_before_stop["{#DBNAME}"])<75
    severity: average
  - name: 'PostgreSQL: DB [{#DBNAME}]: Number of locks is too high'
    expression: min(/PostgreSQL by Zabbix agent/pgsql.locks.total["{#DBNAME}"],5m)>100
    severity: warning
  - name: 'PostgreSQL: DB [{#DBNAME}]: Too many recovery conflicts'
    expression: min(/PostgreSQL by Zabbix agent/pgsql.dbstat.conflicts.rate["{#DBNAME}"],5m)
      > 0
    severity: average
  - name: 'PostgreSQL: DB [{#DBNAME}]: Deadlock occurred'
    expression: min(/PostgreSQL by Zabbix agent/pgsql.dbstat.deadlocks.rate["{#DBNAME}"],5m)
      > 0
    severity: high
  - name: 'PostgreSQL: DB [{#DBNAME}]: Too many slow queries'
    expression: min(/PostgreSQL by Zabbix agent/pgsql.queries.query.slow_count["{#DBNAME}"],5m)>5
    severity: warning
