template: TP-LINK by SNMP
description: "Template Net TP-LINK\r\n\r\nMIBs used:\r\nTPLINK-SYSINFO-MIB\r\nHOST-RESOURCES-MIB\r\
  \nSNMPv2-MIB\r\nTPLINK-SYSMONITOR-MIB\r\nIF-MIB\r\n\r\nKnown Issues:\r\n\r\n  Description:\
  \ Default sysLocation, sysName and sysContact is not filled with proper data. Real\
  \ hostname and location can be found only in private branch (TPLINK-SYSINFO-MIB).\
  \ Please check whether this problem exists in the latest firmware: https://www.tp-link.com/en/support/download/t2600g-28ts/#Firmware\r\
  \n  Version: 2.0.0 Build 20170628 Rel.55184 (Beta)\r\n  Device: T2600G-28TS 2.0\r\
  \n\r\n  Description: The Serial number of the product (tpSysInfoSerialNum) is missing\
  \ in HW versions prior to V2_170323\r\n  Version: Prior to version V2_170323\r\n\
  \  Device: T2600G-28TS 2.0\r\n\r\nGenerated by official Zabbix template tool \"\
  Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: 'TP-LINK: SNMP walk network interfaces'
  key: net.if.walk
  interval: 1m
  value_type: text
  description: Discovering interfaces from IF-MIB.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk system CPUs
  key: system.cpu.walk
  interval: 1m
  value_type: text
  description: Discovering TPLINK-SYSMONITOR-MIB::tpSysMonitorCpuTable, displays the
    CPU utilization of all UNITs.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Firmware version
  key: system.hw.firmware
  interval: 1h
  value_type: char
  description: "MIB: TPLINK-SYSINFO-MIB\r\nThe software version of the product."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1h
  value_type: char
  description: "MIB: TPLINK-SYSINFO-MIB\r\nThe hardware version of the product."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1h
  value_type: char
  description: "MIB: TPLINK-SYSINFO-MIB\r\nThe Serial number of the product."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware version(revision)
  key: system.hw.version
  interval: 1h
  value_type: char
  description: "MIB: TPLINK-SYSINFO-MIB\r\nThe hardware version of the product."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk memory
  key: vm.memory.walk
  interval: 1m
  value_type: text
  description: Discovering TPLINK-SYSMONITOR-MIB::tpSysMonitorMemoryTable, displays
    the memory utilization of all UNITs.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'TP-LINK: Unavailable by ICMP ping'
  expression: max(/TP-LINK by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'TP-LINK: High ICMP ping loss'
  expression: min(/TP-LINK by SNMP/icmppingloss,5m)>20 and min(/TP-LINK by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'TP-LINK: High ICMP ping response time'
  expression: avg(/TP-LINK by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'TP-LINK: Firmware has changed'
  expression: last(/TP-LINK by SNMP/system.hw.firmware,#1)<>last(/TP-LINK by SNMP/system.hw.firmware,#2)
    and length(last(/TP-LINK by SNMP/system.hw.firmware))>0
  severity: information
  description: Firmware version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'TP-LINK: Device has been replaced'
  expression: last(/TP-LINK by SNMP/system.hw.serialnumber,#1)<>last(/TP-LINK by SNMP/system.hw.serialnumber,#2)
    and length(last(/TP-LINK by SNMP/system.hw.serialnumber))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'TP-LINK: Host has been restarted'
  expression: (last(/TP-LINK by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/TP-LINK
    by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/TP-LINK by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/TP-LINK by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'TP-LINK: System name has changed'
  expression: last(/TP-LINK by SNMP/system.name,#1)<>last(/TP-LINK by SNMP/system.name,#2)
    and length(last(/TP-LINK by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'TP-LINK: No SNMP data collection'
  expression: max(/TP-LINK by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: CPU Discovery
  key: cpu.discovery
  interval: '0'
  type: dependent
  master_item_key: system.cpu.walk
  item_prototypes:
  - name: '#{#SNMPVALUE}: CPU utilization'
    key: system.cpu.util[tpSysMonitorCpu1Minute.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  trigger_prototypes:
  - name: 'TP-LINK: #{#SNMPVALUE}: High CPU utilization'
    expression: min(/TP-LINK by SNMP/system.cpu.util[tpSysMonitorCpu1Minute.{#SNMPINDEX}],5m)>90
    severity: warning
- name: Memory Discovery
  key: memory.discovery
  interval: '0'
  type: dependent
  master_item_key: vm.memory.walk
  item_prototypes:
  - name: '#{#SNMPVALUE}: Memory utilization'
    key: vm.memory.util[tpSysMonitorMemoryUtilization.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  trigger_prototypes:
  - name: 'TP-LINK: #{#SNMPVALUE}: High memory utilization'
    expression: min(/TP-LINK by SNMP/vm.memory.util[tpSysMonitorMemoryUtilization.{#SNMPINDEX}],5m)>90
    severity: average
- name: Network interfaces discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.walk
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifInOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifOutOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifSpeed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'TP-LINK: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/TP-LINK by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>2\r\
      \nor min(/TP-LINK by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>2"
    severity: warning
    recovery_expression: "max(/TP-LINK by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<2*0.8\r\
      \nand max(/TP-LINK by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<2*0.8"
    allow_manual_close: true
  - name: 'TP-LINK: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/TP-LINK by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)>(95/100)*last(/TP-LINK\
      \ by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}]) or\r\navg(/TP-LINK by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)>(95/100)*last(/TP-LINK\
      \ by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])) and\r\nlast(/TP-LINK by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/TP-LINK by SNMP/net.if.in[ifInOctets.{#SNMPINDEX}],15m)<((95-3)/100)*last(/TP-LINK\
      \ by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}]) and\r\navg(/TP-LINK by SNMP/net.if.out[ifOutOctets.{#SNMPINDEX}],15m)<((95-3)/100)*last(/TP-LINK\
      \ by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'TP-LINK: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower
      speed than it was before'
    expression: "change(/TP-LINK by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])<0 and\
      \ last(/TP-LINK by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0\r\nand (\r\nlast(/TP-LINK\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or\r\nlast(/TP-LINK by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7\
      \ or\r\nlast(/TP-LINK by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11 or\r\nlast(/TP-LINK\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/TP-LINK by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69\
      \ or\r\nlast(/TP-LINK by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\n)\r\n\
      and\r\n(last(/TP-LINK by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/TP-LINK by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}])>0\
      \ and last(/TP-LINK by SNMP/net.if.speed[ifSpeed.{#SNMPINDEX}],#2)>0) or\r\n\
      (last(/TP-LINK by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'TP-LINK: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/TP-LINK by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/TP-LINK by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/TP-LINK
      by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/TP-LINK by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
