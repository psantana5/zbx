triggers:
- name: 'Hadoop: NameNode: Cluster has missing blocks'
  expression: min(/Hadoop by HTTP/hadoop.namenode.missing_blocks,15m)>0
  severity: average
  description: A missing block is far worse than a corrupt block, because a missing
    block cannot be recovered by copying a replica.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: NameNode: Cluster has DataNodes in Dead state'
  expression: min(/Hadoop by HTTP/hadoop.namenode.num_dead_data_nodes,5m)>0
  severity: average
  description: The death of a DataNode causes a flurry of network activity, as the
    NameNode initiates replication of blocks lost on the dead nodes.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: NameNode: Cluster capacity remaining is low'
  expression: max(/Hadoop by HTTP/hadoop.namenode.percent_remaining,15m)<20
  severity: warning
  description: A good practice is to ensure that disk use never exceeds 80 percent
    capacity.
  tags:
  - tag: scope
    value: capacity
- name: 'Hadoop: NameNode: Service has been restarted'
  expression: last(/Hadoop by HTTP/hadoop.namenode.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: NameNode: Failed to fetch NameNode API page'
  expression: nodata(/Hadoop by HTTP/hadoop.namenode.uptime,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'Hadoop: NameNode: Cluster has volume failures'
  expression: min(/Hadoop by HTTP/hadoop.namenode.volume_failures_total,15m)>0
  severity: average
  description: HDFS now allows for disks to fail in place, without affecting DataNode
    operations, until a threshold value is reached. This is set on each DataNode via
    the dfs.datanode.failed.volumes.tolerated property; it defaults to 0, meaning
    that any volume failure will shut down the DataNode; on a production cluster where
    DataNodes typically have 6, 8, or 12 disks, setting this parameter to 1 or 2 is
    typically the best practice.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: ResourceManager: Cluster has no active NodeManagers'
  expression: max(/Hadoop by HTTP/hadoop.resourcemanager.num_active_nm,5m)=0
  severity: high
  description: Cluster is unable to execute any jobs without at least one NodeManager.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: ResourceManager: Cluster has unhealthy NodeManagers'
  expression: min(/Hadoop by HTTP/hadoop.resourcemanager.num_unhealthy_nm,15m)>0
  severity: average
  description: YARN considers any node with disk utilization exceeding the value specified
    under the property yarn.nodemanager.disk-health-checker.max-disk-utilization-per-disk-percentage
    (in yarn-site.xml) to be unhealthy. Ample disk space is critical to ensure uninterrupted
    operation of a Hadoop cluster, and large numbers of unhealthyNodes (the number
    to alert on depends on the size of your cluster) should be quickly investigated
    and resolved.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: ResourceManager: Service has been restarted'
  expression: last(/Hadoop by HTTP/hadoop.resourcemanager.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Hadoop: ResourceManager: Failed to fetch ResourceManager API page'
  expression: nodata(/Hadoop by HTTP/hadoop.resourcemanager.uptime,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'Hadoop: NameNode: Service response time is too high'
  expression: min(/Hadoop by HTTP/net.tcp.service.perf["tcp","NameNode","9870"],5m)>10s
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Hadoop: ResourceManager: Service response time is too high'
  expression: min(/Hadoop by HTTP/net.tcp.service.perf["tcp","ResourceManager","8088"],5m)>10s
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Hadoop: NameNode: Service is unavailable'
  expression: last(/Hadoop by HTTP/net.tcp.service["tcp","NameNode","9870"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Hadoop: ResourceManager: Service is unavailable'
  expression: last(/Hadoop by HTTP/net.tcp.service["tcp","ResourceManager","8088"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Data node discovery
  key: hadoop.datanode.discovery
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'Hadoop DataNode {#HOSTNAME}: Get stats'
    key: hadoop.datanode.get[{#HOSTNAME}]
    interval: 1m
    type: http_agent
    value_type: text
  - name: '{#HOSTNAME}: Used'
    key: hadoop.datanode.dfs_used[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    value_type: unsigned
    units: B
  - name: '{#HOSTNAME}: JVM Garbage collection time'
    key: hadoop.datanode.jvm.gc_time[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    value_type: unsigned
    units: '!ms'
  - name: '{#HOSTNAME}: JVM Heap usage'
    key: hadoop.datanode.jvm.mem_heap_used[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    units: '!MB'
  - name: '{#HOSTNAME}: JVM Threads'
    key: hadoop.datanode.jvm.threads[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    value_type: unsigned
  - name: '{#HOSTNAME}: Number of failed volumes'
    key: hadoop.datanode.numfailedvolumes[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    value_type: unsigned
  - name: 'Hadoop DataNode {#HOSTNAME}: Get raw info'
    key: hadoop.datanode.raw_info[{#HOSTNAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: '{#HOSTNAME}: Remaining'
    key: hadoop.datanode.remaining[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    value_type: unsigned
    units: B
  - name: '{#HOSTNAME}: Uptime'
    key: hadoop.datanode.uptime[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.get[{#HOSTNAME}]
    units: s
  - name: '{#HOSTNAME}: Admin state'
    key: hadoop.datanode.admin_state[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.raw_info[{#HOSTNAME}]
    value_type: char
  - name: '{#HOSTNAME}: Oper state'
    key: hadoop.datanode.oper_state[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.raw_info[{#HOSTNAME}]
    value_type: char
  - name: '{#HOSTNAME}: Version'
    key: hadoop.datanode.version[{#HOSTNAME}]
    interval: '0'
    type: dependent
    master_item_key: hadoop.datanode.raw_info[{#HOSTNAME}]
    value_type: char
  trigger_prototypes:
  - name: 'Hadoop: {#HOSTNAME}: Service has been restarted'
    expression: last(/Hadoop by HTTP/hadoop.datanode.uptime[{#HOSTNAME}])<10m
    severity: information
    allow_manual_close: true
  - name: 'Hadoop: {#HOSTNAME}: Failed to fetch DataNode API page'
    expression: nodata(/Hadoop by HTTP/hadoop.datanode.uptime[{#HOSTNAME}],30m)=1
    severity: warning
    allow_manual_close: true
  - name: 'Hadoop: {#HOSTNAME}: DataNode has state {ITEM.VALUE}.'
    expression: last(/Hadoop by HTTP/hadoop.datanode.oper_state[{#HOSTNAME}])<>"Live"
    severity: average
- name: Node manager discovery
  key: hadoop.nodemanager.discovery
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'Hadoop NodeManager {#HOSTNAME}: Get stats'
    key: hadoop.nodemanager.get[{#HOSTNAME}]
