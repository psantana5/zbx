  - name: 'Hadoop: {#HOSTNAME}: NodeManager has state {ITEM.VALUE}.'
    expression: last(/Hadoop by HTTP/hadoop.nodemanager.state[{#HOSTNAME}])<>"RUNNING"
    severity: average
