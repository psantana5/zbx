template: Etcd by HTTP
description: "This template is designed to monitor 'etcd' by Zabbix that works without\
  \ any external scripts.\r\nMost of the metrics are collected in one go, thanks to\
  \ Zabbix bulk data collection.\r\n\r\nThe template 'Etcd by HTTP' — collects metrics\
  \ by help of the HTTP agent from '/metrics' endpoint.\r\n\r\nRefer to the vendor\
  \ documentation:\r\nhttps://etcd.io/docs/v3.5/op-guide/monitoring/#metrics-endpoint\r\
  \n\r\nFor the users of 'etcd version <= 3.4':\r\n\r\nIn 'etcd v3.5' some metrics\
  \ have been deprecated. See more details on 'Upgrade etcd from 3.4 to 3.5':\r\n\
  https://etcd.io/docs/v3.4/upgrades/upgrade_3_5/\r\nPlease upgrade your 'etcd' instance,\
  \ or use older 'Etcd by HTTP' template version.\r\n\r\nSetup:\r\n\r\n1. Make sure\
  \ that 'etcd' allows the collection of metrics. You can test it by running:\r\n\
  curl -L http://localhost:2379/metrics\r\n\r\n2. Check if 'etcd' is accessible from\
  \ Zabbix proxy or Zabbix server depending on where you are planning to do the monitoring.\
  \ To verify it, run:\r\ncurl -L  http://<etcd_node_address>:2379/metrics\r\n\r\n\
  3. Add the template to the 'etcd' node. Set the hostname or IP address of the 'etcd'\
  \ host in the '{$ETCD.HOST}' macro. By default, the template uses a client's port.\r\
  \nYou can configure metrics endpoint location by adding '--listen-metrics-urls'\
  \ flag.\r\n\r\nFor more details, see the etcd documentation:\r\nhttps://etcd.io/docs/v3.5/op-guide/configuration/#profiling-and-monitoring\r\
  \n\r\nAdditional points to consider:\r\n\r\n- If you have specified a non-standard\
  \ port for 'etcd', don't forget to change macros: '{$ETCD.SCHEME}' and '{$ETCD.PORT}'.\r\
  \n- You can set '{$ETCD.USERNAME}' and '{$ETCD.PASSWORD}' macros in the template\
  \ to use on a host level if necessary.\r\n- To test availability, run : 'zabbix_get\
  \ -s etcd-host -k etcd.health'.\r\n\r\nGenerated by official Zabbix template tool\
  \ \"Templator\""
groups:
- Templates
items:
- name: Cluster version
  key: etcd.cluster.version
  interval: '0'
  type: dependent
  master_item_key: etcd.get_version
  value_type: char
  description: The version of the `etcd cluster`.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: CPU
  key: etcd.cpu.util
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: s
  description: The total user and system CPU time spent in seconds.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: DB size
  key: etcd.db.size
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: B
  description: The total size of the underlying database.
  history: 31d
  tags:
  - tag: component
    value: database
- name: Deletes per second
  key: etcd.delete.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of deletes seen by this member per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Pending events
  key: etcd.events.sent.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: The total number of pending events to be sent.
  history: 31d
  tags:
  - tag: component
    value: events
- name: Get node metrics
  key: etcd.get_metrics
  interval: 1m
  type: http_agent
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get version
  key: etcd.get_version
  interval: 1m
  type: http_agent
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: application
- name: RPCs received per second
  key: etcd.grpc.received.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of RPC stream messages received on the server.
  history: 31d
  tags:
  - tag: component
    value: grpc
- name: RPCs sent per second
  key: etcd.grpc.sent.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of gRPC stream messages sent by the server.
  history: 31d
  tags:
  - tag: component
    value: grpc
- name: RPCs started per second
  key: etcd.grpc.started.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of RPCs started on the server.
  history: 31d
  tags:
  - tag: component
    value: grpc
- name: Server has a leader
  key: etcd.has.leader
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: "It defines - whether or not a leader exists:\r\n1 - it exists;\r\n\
    0 - it does not."
  history: 31d
  tags:
  - tag: component
    value: leader
- name: Node health
  key: etcd.health
  interval: 1m
  type: http_agent
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
- name: HTTP 4XX
  key: etcd.http.requests.4xx.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of handled failures of requests (non-watches), by the method
    (`GET/PUT` etc.), and the code `4XX`.
  history: 31d
  tags:
  - tag: component
    value: http
  - tag: http-code
    value: 4xx
- name: HTTP 5XX
  key: etcd.http.requests.5xx.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of handled failures of requests (non-watches), by the method
    (`GET/PUT` etc.), and the code `5XX`.
  history: 31d
  tags:
  - tag: component
    value: http
  - tag: http-code
    value: 5xx
- name: HTTP requests received
  key: etcd.http.requests.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of requests received into the system (successfully parsed
    and `authd`).
  history: 31d
  tags:
  - tag: component
    value: http
- name: Server is a leader
  key: etcd.is.leader
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: "It defines - whether or not this member is a leader:\r\n1 - it is;\r\
    \n0 - otherwise."
  history: 31d
  tags:
  - tag: component
    value: leader
- name: Keys compacted per second
  key: etcd.keys.compacted.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of DB keys compacted per second.
  history: 31d
  tags:
  - tag: component
    value: keys
- name: Keys expired per second
  key: etcd.keys.expired.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of expired keys per second.
  history: 31d
  tags:
  - tag: component
    value: keys
- name: Keys total
  key: etcd.keys.total
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: The total number of keys.
  history: 31d
  tags:
  - tag: component
    value: keys
- name: Leader changes
  key: etcd.leader.changes
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: The number of leader changes the member has seen since its start.
  history: 31d
  tags:
  - tag: component
    value: leader
- name: Maximum open file descriptors
  key: etcd.max.fds
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The Maximum number of open file descriptors.
  history: 31d
  tags:
  - tag: component
    value: fds
- name: Client gRPC received bytes per second
  key: etcd.network.grpc.received.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: Bps
  description: The number of bytes received from gRPC clients per second.
  history: 31d
  tags:
  - tag: component
    value: grpc
- name: Client gRPC sent bytes per second
  key: etcd.network.grpc.sent.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: Bps
  description: The number of bytes sent from gRPC clients per second.
  history: 31d
  tags:
  - tag: component
    value: grpc
- name: Open file descriptors
  key: etcd.open.fds
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of open file descriptors.
  history: 31d
  tags:
  - tag: component
    value: fds
- name: Proposals applied per second
  key: etcd.proposals.applied.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of consensus proposals applied.
  history: 31d
  tags:
  - tag: component
    value: proposals
- name: Proposals committed per second
  key: etcd.proposals.committed.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of consensus proposals committed.
  history: 31d
  tags:
  - tag: component
    value: proposals
- name: Proposals failed per second
  key: etcd.proposals.failed.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  description: The number of failed proposals seen.
  history: 31d
  tags:
  - tag: component
    value: proposals
- name: Proposals pending
  key: etcd.proposals.pending
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  value_type: unsigned
  description: The current number of pending proposals to commit.
  history: 31d
  tags:
  - tag: component
    value: proposals
- name: PUT per second
  key: etcd.put.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of puts seen by this member per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Range per second
  key: etcd.range.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of ranges seen by this member per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Reads per second
  key: etcd.reads.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of read actions by `get/getRecursive`, local to this member.
  history: 31d
  tags:
  - tag: component
    value: store
- name: Resident memory
  key: etcd.res.bytes
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: B
  description: The size of resident memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Server version
  key: etcd.server.version
  interval: '0'
  type: dependent
  master_item_key: etcd.get_version
  value_type: char
  description: The version of the `etcd server`.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Transaction per second
  key: etcd.txn.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of transactions seen by this member per second.
  history: 31d
  tags:
  - tag: component
    value: transactions
- name: Uptime
  key: etcd.uptime
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: s
  description: '`Etcd` server uptime.'
  history: 31d
  tags:
  - tag: component
    value: application
- name: Virtual memory
  key: etcd.virtual.bytes
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: B
  description: The size of virtual memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Writes per second
  key: etcd.writes.rate
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  units: rps
  description: The number of writes (e.g., `set/compareAndDelete`) seen by this member.
  history: 31d
  tags:
  - tag: component
    value: store
- name: Service's TCP port state
  key: net.tcp.service["{$ETCD.SCHEME}","{$ETCD.HOST}","{$ETCD.PORT}"]
  interval: 1m
  type: simple_check
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Etcd: Cluster version has changed'
  expression: last(/Etcd by HTTP/etcd.cluster.version,#1)<>last(/Etcd by HTTP/etcd.cluster.version,#2)
    and length(last(/Etcd by HTTP/etcd.cluster.version))>0
  severity: information
  description: Etcd version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Etcd: Member has no leader'
  expression: last(/Etcd by HTTP/etcd.has.leader)=0
  severity: average
  description: If a member does not have a leader, it is totally unavailable.
  tags:
  - tag: scope
    value: availability
- name: 'Etcd: Node healthcheck failed'
  expression: last(/Etcd by HTTP/etcd.health)=0
  severity: average
  description: See more details on https://etcd.io/docs/v3.5/op-guide/monitoring/#health-check.
  tags:
  - tag: scope
    value: availability
- name: 'Etcd: Too many HTTP requests failures'
  expression: min(/Etcd by HTTP/etcd.http.requests.5xx.rate,5m)>2
  severity: warning
  description: Too many requests failed on `etcd` instance with the `5xx HTTP code`.
  tags:
  - tag: scope
    value: availability
- name: 'Etcd: Failed to fetch info data'
  expression: nodata(/Etcd by HTTP/etcd.is.leader,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Etcd: Instance has seen too many leader changes'
  expression: (max(/Etcd by HTTP/etcd.leader.changes,15m)-min(/Etcd by HTTP/etcd.leader.changes,15m))>5
  severity: warning
  description: Rapid leadership changes impact the performance of `etcd` significantly.
    It also signals that the leader is unstable, perhaps due to network connectivity
    issues or excessive load hitting the `etcd cluster`.
  tags:
  - tag: scope
    value: availability
- name: 'Etcd: Current number of open files is too high'
  expression: min(/Etcd by HTTP/etcd.open.fds,5m)/last(/Etcd by HTTP/etcd.max.fds)*100>90
  severity: warning
  description: "Heavy usage of a file descriptor (i.e., near the limit of the process's\
    \ file descriptor) indicates a potential file descriptor exhaustion issue.\r\n\
    If the file descriptors are exhausted, `etcd` may panic because it cannot create\
    \ new WAL files."
  tags:
  - tag: scope
    value: capacity
- name: 'Etcd: Too many proposal failures'
  expression: min(/Etcd by HTTP/etcd.proposals.failed.rate,5m)>2
  severity: warning
  description: 'Normally related to two issues: temporary failures related to a leader
    election or longer downtime caused by a loss of quorum in the cluster.'
  tags:
  - tag: scope
    value: performance
- name: 'Etcd: Too many proposals are queued to commit'
  expression: min(/Etcd by HTTP/etcd.proposals.pending,5m)>5
  severity: warning
  description: Rising pending proposals suggests there is a high client load, or the
    member cannot commit proposals.
  tags:
  - tag: scope
    value: performance
- name: 'Etcd: Server version has changed'
  expression: last(/Etcd by HTTP/etcd.server.version,#1)<>last(/Etcd by HTTP/etcd.server.version,#2)
    and length(last(/Etcd by HTTP/etcd.server.version))>0
  severity: information
  description: Etcd version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Etcd: Host has been restarted'
  expression: last(/Etcd by HTTP/etcd.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Etcd: Service is unavailable'
  expression: last(/Etcd by HTTP/net.tcp.service["http","<SET ETCD HOST>","2379"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: gRPC codes discovery
  key: etcd.grpc_code.discovery
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  filter:
  - macro: '{#GRPC.CODE}'
    value: '{$ETCD.GRPC_CODE.MATCHES}'
  - macro: '{#GRPC.CODE}'
    value: '{$ETCD.GRPC_CODE.NOT_MATCHES}'
  item_prototypes:
  - name: RPCs completed with code {#GRPC.CODE}
    key: etcd.grpc.handled.rate[{#GRPC.CODE}]
    interval: '0'
    type: dependent
    units: rps
  trigger_prototypes:
  - name: 'Etcd: Too many failed gRPC requests with code: {#GRPC.CODE}'
    expression: min(/Etcd by HTTP/etcd.grpc.handled.rate[{#GRPC.CODE}],5m)>1
    severity: warning
- name: Peers discovery
  key: etcd.peer.discovery
  interval: '0'
  type: dependent
  master_item_key: etcd.get_metrics
  item_prototypes:
  - name: 'Etcd peer {#ETCD.PEER}: Bytes received'
    key: etcd.bytes.received.rate[{#ETCD.PEER}]
    interval: '0'
    type: dependent
    units: Bps
  - name: 'Etcd peer {#ETCD.PEER}: Bytes sent'
    key: etcd.bytes.sent.rate[{#ETCD.PEER}]
    interval: '0'
    type: dependent
    units: Bps
  - name: 'Etcd peer {#ETCD.PEER}: Receive failures'
    key: etcd.received.fail.rate[{#ETCD.PEER}]
    interval: '0'
    type: dependent
    units: rps
  - name: 'Etcd peer {#ETCD.PEER}: Send failures'
    key: etcd.sent.fail.rate[{#ETCD.PEER}]
    interval: '0'
    type: dependent
    units: rps
