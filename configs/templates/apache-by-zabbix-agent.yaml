template: Apache by Zabbix agent
description: "Get metrics from mod_status module using HTTP agent.\r\nhttps://httpd.apache.org/docs/current/mod/mod_status.html\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384764-discussion-thread-for-official-zabbix-template-apache\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Total bytes
  key: apache.bytes
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  units: B
  description: The total bytes served.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Bytes per second
  key: apache.bytes.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  units: Bps
  description: "It is calculated as a rate of change for total bytes statistics.\r\
    \n`BytesPerSec` is not used, as it counts the average since the last Apache server\
    \ start."
  history: 31d
  tags:
  - tag: component
    value: network
- name: Total requests
  key: apache.requests
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The total number of the Apache server accesses.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Requests per second
  key: apache.requests.rate
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  description: "It is calculated as a rate of change for the \"Total requests\" statistics.\r\
    \n`ReqPerSec` is not used, as it counts the average since the last Apache server\
    \ start."
  history: 31d
  tags:
  - tag: component
    value: network
- name: Uptime
  key: apache.uptime
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  units: uptime
  description: The service uptime expressed in seconds.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Version
  key: apache.version
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: char
  description: The Apache service version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Workers idle cleanup
  key: apache.workers.cleanup
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in cleanup state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers closing connection
  key: apache.workers.closing
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in closing state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers DNS lookup
  key: apache.workers.dnslookup
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in `dnslookup` state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers finishing
  key: apache.workers.finishing
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in finishing state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers keepalive (read)
  key: apache.workers.keepalive
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in `keepalive` state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers logging
  key: apache.workers.logging
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in logging state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers reading request
  key: apache.workers.reading
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in reading state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers sending reply
  key: apache.workers.sending
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in sending state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers slot with no current process
  key: apache.workers.slot
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of slots with no current process.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers starting up
  key: apache.workers.starting
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in starting state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Workers waiting for connection
  key: apache.workers.waiting
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The number of workers in waiting state.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Total workers busy
  key: apache.workers_total.busy
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The total number of busy worker threads/processes.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Total workers idle
  key: apache.workers_total.idle
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  value_type: unsigned
  description: The total number of idle worker threads/processes.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Service response time
  key: net.tcp.service.perf[http,"{$APACHE.STATUS.HOST}","{$APACHE.STATUS.PORT}"]
  interval: 1m
  units: s
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Service ping
  key: net.tcp.service[http,"{$APACHE.STATUS.HOST}","{$APACHE.STATUS.PORT}"]
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Get processes summary
  key: proc.get[{$APACHE.PROCESS.NAME.PARAMETER},,,summary]
  interval: 1m
  value_type: text
  description: The aggregated data of summary metrics for all processes.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get status
  key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  interval: 1m
  value_type: text
  description: "Getting data from a machine-readable version of the Apache status\
    \ page.\r\nFor more information see Apache Module [mod_status](https://httpd.apache.org/docs/current/mod/mod_status.html)."
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: raw
triggers:
- name: 'Apache: Service has been restarted'
  expression: last(/Apache by Zabbix agent/apache.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Apache: Version has changed'
  expression: last(/Apache by Zabbix agent/apache.version,#1)<>last(/Apache by Zabbix
    agent/apache.version,#2) and length(last(/Apache by Zabbix agent/apache.version))>0
  severity: information
  description: Apache version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Event MPM discovery
  key: apache.mpm.event.discovery
  interval: '0'
  type: dependent
  master_item_key: web.page.get["{$APACHE.STATUS.SCHEME}://{$APACHE.STATUS.HOST}:{$APACHE.STATUS.PORT}/{$APACHE.STATUS.PATH}"]
  item_prototypes:
  - name: Bytes per request
    key: apache.bytes[per_request{#SINGLETON}]
    interval: '0'
    type: dependent
    units: B
  - name: Connections async closing
    key: apache.connections[async_closing{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Connections async keepalive
    key: apache.connections[async_keep_alive{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Connections async writing
    key: apache.connections[async_writing{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Connections total
    key: apache.connections[total{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Number of async processes
    key: apache.process[num{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
- name: Apache process discovery
  key: apache.proc.discovery
  interval: '0'
  type: dependent
  master_item_key: proc.get[{$APACHE.PROCESS.NAME.PARAMETER},,,summary]
  filter:
  - macro: '{#APACHE.NAME}'
    value: '{$APACHE.PROCESS_NAME}'
  item_prototypes:
  - name: CPU utilization
    key: proc.cpu.util[{#APACHE.NAME}]
    interval: 1m
    units: '%'
  - name: Get process data
    key: apache.proc.get[{#APACHE.NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: Number of running processes
    key: apache.proc.num[{#APACHE.NAME}]
    interval: '0'
    type: dependent
    master_item_key: apache.proc.get[{#APACHE.NAME}]
    value_type: unsigned
  - name: Memory usage, %
    key: apache.proc.pmem[{#APACHE.NAME}]
    interval: '0'
    type: dependent
    master_item_key: apache.proc.get[{#APACHE.NAME}]
    units: '%'
  - name: Memory usage (rss)
    key: apache.proc.rss[{#APACHE.NAME}]
    interval: '0'
    type: dependent
    master_item_key: apache.proc.get[{#APACHE.NAME}]
    value_type: unsigned
    units: B
  - name: Memory usage (vsize)
    key: apache.proc.vmem[{#APACHE.NAME}]
    interval: '0'
    type: dependent
    master_item_key: apache.proc.get[{#APACHE.NAME}]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Apache: Failed to fetch status page'
    expression: nodata(/Apache by Zabbix agent/web.page.get["http://127.0.0.1:80/server-status?auto"],30m)=1
      and last(/Apache by Zabbix agent/apache.proc.num[{#APACHE.NAME}])>0
    severity: warning
    allow_manual_close: true
  - name: 'Apache: Service is down'
    expression: last(/Apache by Zabbix agent/net.tcp.service[http,"127.0.0.1","80"])=0
      and last(/Apache by Zabbix agent/apache.proc.num[{#APACHE.NAME}])>0
    severity: average
    allow_manual_close: true
  - name: 'Apache: Service response time is too high'
    expression: min(/Apache by Zabbix agent/net.tcp.service.perf[http,"127.0.0.1","80"],5m)>10
      and last(/Apache by Zabbix agent/apache.proc.num[{#APACHE.NAME}])>0
    severity: warning
    allow_manual_close: true
  - name: 'Apache: Process is not running'
    expression: last(/Apache by Zabbix agent/apache.proc.num[{#APACHE.NAME}])=0
    severity: high
