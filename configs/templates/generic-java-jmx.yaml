template: Generic Java JMX
description: Generated by official Zabbix template tool "Templator"
groups:
- Templates
items:
- name: 'ClassLoading: Loaded class count'
  key: jmx["java.lang:type=ClassLoading","LoadedClassCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Displays number of classes that are currently loaded in the Java virtual
    machine.
  history: 31d
  tags:
  - tag: component
    value: class
- name: 'ClassLoading: Total loaded class count'
  key: jmx["java.lang:type=ClassLoading","TotalLoadedClassCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Displays the total number of classes that have been loaded since the
    Java virtual machine has started execution.
  history: 31d
  tags:
  - tag: component
    value: class
- name: 'ClassLoading: Unloaded class count'
  key: jmx["java.lang:type=ClassLoading","UnloadedClassCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Displays the total number of classes that have been loaded since the
    Java virtual machine has started execution.
  history: 31d
  tags:
  - tag: component
    value: class
- name: 'Compilation: Name of the current JIT compiler'
  key: jmx["java.lang:type=Compilation","Name"]
  interval: 1m
  type: jmx_agent
  value_type: char
  description: Displays the total number of classes unloaded since the Java virtual
    machine has started execution.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: compilation
- name: 'Compilation: Accumulated time spent'
  key: jmx["java.lang:type=Compilation","TotalCompilationTime"]
  interval: 1m
  type: jmx_agent
  units: s
  description: Displays the approximate accumulated elapsed time spent in compilation,
    in seconds.
  history: 31d
  tags:
  - tag: component
    value: compilation
- name: 'Memory: Heap memory committed'
  key: jmx["java.lang:type=Memory","HeapMemoryUsage.committed"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  units: B
  description: Current heap memory allocated. This amount of memory is guaranteed
    for the Java virtual machine to use.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Heap memory maximum size'
  key: jmx["java.lang:type=Memory","HeapMemoryUsage.max"]
  interval: 1m
  type: jmx_agent
  units: B
  description: Maximum amount of heap that can be used for memory management. This
    amount of memory is not guaranteed to be available if it is greater than the amount
    of committed memory. The Java virtual machine may fail to allocate memory even
    if the amount of used memory does not exceed this maximum size.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Heap memory used'
  key: jmx["java.lang:type=Memory","HeapMemoryUsage.used"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  units: B
  description: Current memory usage outside the heap.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Non-Heap memory committed'
  key: jmx["java.lang:type=Memory","NonHeapMemoryUsage.committed"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  units: B
  description: Current memory allocated outside the heap. This amount of memory is
    guaranteed for the Java virtual machine to use.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Non-Heap memory maximum size'
  key: jmx["java.lang:type=Memory","NonHeapMemoryUsage.max"]
  interval: 1m
  type: jmx_agent
  units: B
  description: Maximum amount of non-heap memory that can be used for memory management.
    This amount of memory is not guaranteed to be available if it is greater than
    the amount of committed memory. The Java virtual machine may fail to allocate
    memory even if the amount of used memory does not exceed this maximum size.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Non-Heap memory used'
  key: jmx["java.lang:type=Memory","NonHeapMemoryUsage.used"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  units: B
  description: Current memory usage outside the heap
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: Object pending finalization count'
  key: jmx["java.lang:type=Memory","ObjectPendingFinalizationCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: The approximate number of objects for which finalization is pending.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'OperatingSystem: File descriptors maximum count'
  key: jmx["java.lang:type=OperatingSystem","MaxFileDescriptorCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: This is the number of file descriptors we can have opened in the same
    process, as determined by the operating system. You can never have more file descriptors
    than this number.
  history: 31d
  tags:
  - tag: component
    value: os
- name: 'OperatingSystem: File descriptors opened'
  key: jmx["java.lang:type=OperatingSystem","OpenFileDescriptorCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: 'This is the number of opened file descriptors at the moment, if this
    reaches the MaxFileDescriptorCount, the application will throw an IOException:
    Too many open files. This could mean you are opening file descriptors and never
    closing them.'
  history: 31d
  tags:
  - tag: component
    value: os
- name: 'OperatingSystem: Process CPU Load'
  key: jmx["java.lang:type=OperatingSystem","ProcessCpuLoad"]
  interval: 1m
  type: jmx_agent
  units: '%'
  description: ProcessCpuLoad represents the CPU load in this process.
  history: 31d
  tags:
  - tag: component
    value: os
- name: 'Runtime: JVM uptime'
  key: jmx["java.lang:type=Runtime","Uptime"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: runtime
- name: 'Runtime: JVM name'
  key: jmx["java.lang:type=Runtime","VmName"]
  interval: 1h
  type: jmx_agent
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: runtime
- name: 'Runtime: JVM version'
  key: jmx["java.lang:type=Runtime","VmVersion"]
  interval: 1h
  type: jmx_agent
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: runtime
- name: 'Threading: Daemon thread count'
  key: jmx["java.lang:type=Threading","DaemonThreadCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Number of daemon threads running.
  history: 31d
  tags:
  - tag: component
    value: threading
- name: 'Threading: Peak thread count'
  key: jmx["java.lang:type=Threading","PeakThreadCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: Maximum number of threads being executed at the same time since the
    JVM was started or the peak was reset.
  history: 31d
  tags:
  - tag: component
    value: threading
- name: 'Threading: Thread count'
  key: jmx["java.lang:type=Threading","ThreadCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: The number of threads running at the current moment.
  history: 31d
  tags:
  - tag: component
    value: threading
- name: 'Threading: Total started thread count'
  key: jmx["java.lang:type=Threading","TotalStartedThreadCount"]
  interval: 1m
  type: jmx_agent
  value_type: unsigned
  description: The number of threads started since the JVM was launched.
  history: 31d
  tags:
  - tag: component
    value: threading
triggers:
- name: 'Generic Java JMX: Compilation: {HOST.NAME} uses suboptimal JIT compiler'
  expression: find(/Generic Java JMX/jmx["java.lang:type=Compilation","Name"],,"like","Client")=1
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'Generic Java JMX: Memory: Heap memory usage is high'
  expression: min(/Generic Java JMX/jmx["java.lang:type=Memory","HeapMemoryUsage.used"],10m)>(last(/Generic
    Java JMX/jmx["java.lang:type=Memory","HeapMemoryUsage.max"])*85/100) and last(/Generic
    Java JMX/jmx["java.lang:type=Memory","HeapMemoryUsage.max"])>0
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'Generic Java JMX: Memory: Non-Heap memory usage is high'
  expression: min(/Generic Java JMX/jmx["java.lang:type=Memory","NonHeapMemoryUsage.used"],10m)>(last(/Generic
    Java JMX/jmx["java.lang:type=Memory","NonHeapMemoryUsage.max"])*85/100) and last(/Generic
    Java JMX/jmx["java.lang:type=Memory","NonHeapMemoryUsage.max"])>0
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'Generic Java JMX: OperatingSystem: Opened file descriptor count is high'
  expression: min(/Generic Java JMX/jmx["java.lang:type=OperatingSystem","OpenFileDescriptorCount"],3m)>(last(/Generic
    Java JMX/jmx["java.lang:type=OperatingSystem","MaxFileDescriptorCount"])*85/100)
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'Generic Java JMX: OperatingSystem: Process CPU Load is high'
  expression: min(/Generic Java JMX/jmx["java.lang:type=OperatingSystem","ProcessCpuLoad"],5m)>85
  severity: average
  tags:
  - tag: scope
    value: capacity
- name: 'Generic Java JMX: Runtime: JVM is not reachable'
  expression: nodata(/Generic Java JMX/jmx["java.lang:type=Runtime","Uptime"],5m)=1
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Generic Java JMX: Runtime: {HOST.NAME} runs suboptimal VM type'
  expression: find(/Generic Java JMX/jmx["java.lang:type=Runtime","VmName"],,"like","Server")<>1
  severity: information
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Garbage collector discovery
  key: jmx.discovery["beans","java.lang:name=*,type=GarbageCollector"]
  interval: 4h
  type: jmx_agent
  item_prototypes:
  - name: 'GarbageCollector: {#JMXNAME} number of collections per second'
    key: jmx["java.lang:name={#JMXNAME},type=GarbageCollector","CollectionCount"]
    interval: 1m
    type: jmx_agent
  - name: 'GarbageCollector: {#JMXNAME} accumulated time spent in collection'
    key: jmx["java.lang:name={#JMXNAME},type=GarbageCollector","CollectionTime"]
    interval: 1m
    type: jmx_agent
    units: s
- name: Memory pool discovery
  key: jmx.discovery["beans","java.lang:name=*,type=MemoryPool"]
  interval: 4h
  type: jmx_agent
  filter:
  - macro: '{#JMXNAME}'
    value: '{$JMX.MEM.POOL.NAME.MATCHES}'
  item_prototypes:
  - name: 'Memory pool: {#JMXNAME} committed'
    key: jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.committed"]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: 'Memory pool: {#JMXNAME} maximum size'
    key: jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.max"]
    interval: 1m
    type: jmx_agent
    units: B
  - name: 'Memory pool: {#JMXNAME} used'
    key: jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.used"]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Generic Java JMX: Memory pool: {#JMXNAME} memory usage is high'
    expression: min(/Generic Java JMX/jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.used"],10m)>(last(/Generic
      Java JMX/jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.max"])*85/100)
      and last(/Generic Java JMX/jmx["java.lang:name={#JMXNAME},type=MemoryPool","Usage.max"])>0
    severity: warning
