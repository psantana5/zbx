template: Huawei OceanStor 5300 V5 by SNMP
description: "The template to monitor SAN Huawei OceanStor 5300 V5 by Zabbix SNMP\
  \ agent.\r\n\r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\n\r\nYou can discuss\
  \ this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/418855-discussion-thread-for-official-zabbix-template-huawei-oceanstor\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Status
  key: huawei.5300.v5[status]
  interval: 1m
  value_type: unsigned
  description: System running status.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: system
- name: Capacity total
  key: huawei.5300.v5[totalCapacity]
  interval: 1m
  value_type: unsigned
  units: B
  description: Total capacity of a device.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Capacity used
  key: huawei.5300.v5[usedCapacity]
  interval: 1m
  value_type: unsigned
  units: B
  description: Used capacity of a device.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Version
  key: huawei.5300.v5[version]
  interval: 1m
  value_type: char
  description: The device version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Huawei OceanStor 5300 V5: Storage version has been changed'
  expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[version],#1)<>last(/Huawei
    OceanStor 5300 V5 by SNMP/huawei.5300.v5[version],#2) and length(last(/Huawei
    OceanStor 5300 V5 by SNMP/huawei.5300.v5[version]))>0
  severity: information
  description: OceanStor 5300 V5 version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Huawei OceanStor 5300 V5: Unavailable by ICMP ping'
  expression: max(/Huawei OceanStor 5300 V5 by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Huawei OceanStor 5300 V5: High ICMP ping loss'
  expression: min(/Huawei OceanStor 5300 V5 by SNMP/icmppingloss,5m)>20 and min(/Huawei
    OceanStor 5300 V5 by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Huawei OceanStor 5300 V5: High ICMP ping response time'
  expression: avg(/Huawei OceanStor 5300 V5 by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Huawei OceanStor 5300 V5: Host has been restarted'
  expression: (last(/Huawei OceanStor 5300 V5 by SNMP/system.hw.uptime[hrSystemUptime.0])>0
    and last(/Huawei OceanStor 5300 V5 by SNMP/system.hw.uptime[hrSystemUptime.0])<10m)
    or (last(/Huawei OceanStor 5300 V5 by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Huawei OceanStor 5300 V5 by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Huawei OceanStor 5300 V5: System name has changed'
  expression: last(/Huawei OceanStor 5300 V5 by SNMP/system.name,#1)<>last(/Huawei
    OceanStor 5300 V5 by SNMP/system.name,#2) and length(last(/Huawei OceanStor 5300
    V5 by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Huawei OceanStor 5300 V5: No SNMP data collection'
  expression: max(/Huawei OceanStor 5300 V5 by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: BBU discovery
  key: huawei.5300.bbu.discovery
  interval: 1h
  item_prototypes:
  - name: 'BBU {#ID} on {#LOCATION}: Health status'
    key: huawei.5300.v5[hwInfoBBUHealthStatus, "{#ID}:{#LOCATION}"]
    interval: 1m
    value_type: unsigned
  - name: 'BBU {#ID} on {#LOCATION}: Running status'
    key: huawei.5300.v5[hwInfoBBURunningStatus, "{#ID}:{#LOCATION}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: BBU {#ID} on {#LOCATION}: Health status is not
      Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoBBUHealthStatus,
      "{#ID}:{#LOCATION}"])<>1
    severity: high
  - name: 'Huawei OceanStor 5300 V5: BBU {#ID} on {#LOCATION}: Running status is not
      Online'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoBBURunningStatus,
      "{#ID}:{#LOCATION}"])<>2
    severity: average
- name: Controllers discovery
  key: huawei.5300.controllers.discovery
  interval: 1h
  item_prototypes:
  - name: 'Controller {#ID}: CPU utilization'
    key: huawei.5300.v5[hwInfoControllerCPUUsage, "{#ID}"]
    interval: 1m
    units: '%'
  - name: 'Controller {#ID}: Health status'
    key: huawei.5300.v5[hwInfoControllerHealthStatus, "{#ID}"]
    interval: 1m
    value_type: unsigned
  - name: 'Controller {#ID}: Memory utilization'
    key: huawei.5300.v5[hwInfoControllerMemoryUsage, "{#ID}"]
    interval: 1m
    value_type: unsigned
    units: '%'
  - name: 'Controller {#ID}: Role'
    key: huawei.5300.v5[hwInfoControllerRole, "{#ID}"]
    interval: 1m
    value_type: unsigned
  - name: 'Controller {#ID}: Running status'
    key: huawei.5300.v5[hwInfoControllerRunningStatus, "{#ID}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: Controller {#ID}: High CPU utilization'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerCPUUsage,
      "{#ID}"],5m)>90
    severity: warning
  - name: 'Huawei OceanStor 5300 V5: Controller {#ID}: Health status is not Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerHealthStatus,
      "{#ID}"])<>1
    severity: high
  - name: 'Huawei OceanStor 5300 V5: Controller {#ID}: Memory usage is too high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerMemoryUsage,
      "{#ID}"],5m)>90
    severity: average
  - name: 'Huawei OceanStor 5300 V5: Controller {#ID}: Role has been changed'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerRole,
      "{#ID}"],#1)<>last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerRole,
      "{#ID}"],#2)
    severity: warning
    allow_manual_close: true
  - name: 'Huawei OceanStor 5300 V5: Controller {#ID}: Running status is not Online'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoControllerRunningStatus,
      "{#ID}"])<>27
    severity: average
- name: Disks discovery
  key: huawei.5300.disks.discovery
  interval: 1h
  item_prototypes:
  - name: 'Disk {#MODEL} on {#LOCATION}: Health score'
    key: huawei.5300.v5[hwInfoDiskHealthMark, "{#ID}"]
    interval: 1m
    value_type: unsigned
  - name: 'Disk {#MODEL} on {#LOCATION}: Health status'
    key: huawei.5300.v5[hwInfoDiskHealthStatus, "{#ID}"]
    interval: 1m
    value_type: unsigned
  - name: 'Disk {#MODEL} on {#LOCATION}: Running status'
    key: huawei.5300.v5[hwInfoDiskRunningStatus, "{#ID}"]
    interval: 1m
    value_type: unsigned
  - name: 'Disk {#MODEL} on {#LOCATION}: Temperature'
    key: huawei.5300.v5[hwInfoDiskTemperature, "{#ID}"]
    interval: 1m
    value_type: unsigned
    units: °C
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: Disk {#MODEL} on {#LOCATION}: Health status is
      not Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoDiskHealthStatus,
      "{#ID}"])<>1
    severity: high
  - name: 'Huawei OceanStor 5300 V5: Disk {#MODEL} on {#LOCATION}: Running status
      is not Online'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoDiskRunningStatus,
      "{#ID}"])<>27
    severity: average
  - name: 'Huawei OceanStor 5300 V5: Disk {#MODEL} on {#LOCATION}: Temperature is
      too high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoDiskTemperature,
      "{#ID}"],5m)>45
    severity: high
- name: Enclosure discovery
  key: huawei.5300.enclosure.discovery
  interval: 1h
  item_prototypes:
  - name: 'Enclosure {#NAME}: Health status'
    key: huawei.5300.v5[hwInfoEnclosureHealthStatus, "{#NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Enclosure {#NAME}: Running status'
    key: huawei.5300.v5[hwInfoEnclosureRunningStatus, "{#NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Enclosure {#NAME}: Temperature'
    key: huawei.5300.v5[hwInfoEnclosureTemperature, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: °C
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: Enclosure {#NAME}: Health status is not Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoEnclosureHealthStatus,
      "{#NAME}"])<>1
    severity: high
  - name: 'Huawei OceanStor 5300 V5: Enclosure {#NAME}: Running status is not Online'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoEnclosureRunningStatus,
      "{#NAME}"])<>27
    severity: average
  - name: 'Huawei OceanStor 5300 V5: Enclosure {#NAME}: Temperature is too high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoEnclosureTemperature,
      "{#NAME}"],3m)>35
    severity: high
- name: FANs discovery
  key: huawei.5300.fan.discovery
  interval: 1h
  item_prototypes:
  - name: 'FAN {#ID} on {#LOCATION}: Health status'
    key: huawei.5300.v5[hwInfoFanHealthStatus, "{#ID}:{#LOCATION}"]
    interval: 1m
    value_type: unsigned
  - name: 'FAN {#ID} on {#LOCATION}: Running status'
    key: huawei.5300.v5[hwInfoFanRunningStatus, "{#ID}:{#LOCATION}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: FAN {#ID} on {#LOCATION}: Health status is not
      Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoFanHealthStatus,
      "{#ID}:{#LOCATION}"])<>1
    severity: high
  - name: 'Huawei OceanStor 5300 V5: FAN {#ID} on {#LOCATION}: Running status is not
      Running'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoFanRunningStatus,
      "{#ID}:{#LOCATION}"])<>2
    severity: average
- name: LUNs discovery
  key: huawei.5300.lun.discovery
  interval: 1h
  item_prototypes:
  - name: 'LUN {#NAME}: Average total I/O latency'
    key: huawei.5300.v5[hwPerfLunAverageIOResponseTime, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!ms'
  - name: 'LUN {#NAME}: Average read I/O latency'
    key: huawei.5300.v5[hwPerfLunAverageReadIOLatency, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!ms'
  - name: 'LUN {#NAME}: Average write I/O latency'
    key: huawei.5300.v5[hwPerfLunAverageWriteIOLatency, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!ms'
  - name: 'LUN {#NAME}: Read operations per second'
    key: huawei.5300.v5[hwPerfLunReadIOPS, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'LUN {#NAME}: Read traffic per second'
    key: huawei.5300.v5[hwPerfLunReadTraffic, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  - name: 'LUN {#NAME}: Total I/O per second'
    key: huawei.5300.v5[hwPerfLunTotalIOPS, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'LUN {#NAME}: Total traffic per second'
    key: huawei.5300.v5[hwPerfLunTotalTraffic, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  - name: 'LUN {#NAME}: Write operations per second'
    key: huawei.5300.v5[hwPerfLunWriteIOPS, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'LUN {#NAME}: Write traffic per second'
    key: huawei.5300.v5[hwPerfLunWriteTraffic, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  - name: 'LUN {#NAME}: Capacity'
    key: huawei.5300.v5[hwStorageLunCapacity, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: 'LUN {#NAME}: Status'
    key: huawei.5300.v5[hwStorageLunStatus, "{#NAME}"]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: LUN {#NAME}: Average I/O response time is too
      high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwPerfLunAverageIOResponseTime,
      "{#NAME}"],5m)>100
    severity: warning
  - name: 'Huawei OceanStor 5300 V5: LUN {#NAME}: Status is not Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwStorageLunStatus,
      "{#NAME}"])<>1
    severity: average
- name: Nodes performance discovery
  key: huawei.5300.nodes.discovery
  interval: 1h
  item_prototypes:
  - name: 'Node {#NODE}: CPU utilization'
    key: huawei.5300.v5[hwPerfNodeCPUUsage, "{#NODE}"]
    interval: 1m
    units: '%'
  - name: 'Node {#NODE}: Average I/O latency'
    key: huawei.5300.v5[hwPerfNodeDelay, "{#NODE}"]
    interval: 1m
    units: '!ms'
  - name: 'Node {#NODE}: Read operations per second'
    key: huawei.5300.v5[hwPerfNodeReadIOPS, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'Node {#NODE}: Read traffic per second'
    key: huawei.5300.v5[hwPerfNodeReadTraffic, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  - name: 'Node {#NODE}: Total I/O per second'
    key: huawei.5300.v5[hwPerfNodeTotalIOPS, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'Node {#NODE}: Total traffic per second'
    key: huawei.5300.v5[hwPerfNodeTotalTraffic, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  - name: 'Node {#NODE}: Write operations per second'
    key: huawei.5300.v5[hwPerfNodeWriteIOPS, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: '!iops'
  - name: 'Node {#NODE}: Write traffic per second'
    key: huawei.5300.v5[hwPerfNodeWriteTraffic, "{#NODE}"]
    interval: 1m
    value_type: unsigned
    units: Bps
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: Node {#NODE}: High CPU utilization'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwPerfNodeCPUUsage,
      "{#NODE}"],5m)>90
    severity: warning
  - name: 'Huawei OceanStor 5300 V5: Node {#NODE}: Average I/O latency is too high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwPerfNodeDelay,
      "{#NODE}"],5m)>20
    severity: warning
- name: Storage pools discovery
  key: huawei.5300.pool.discovery
  interval: 1h
  item_prototypes:
  - name: 'Pool {#NAME}: Capacity free'
    key: huawei.5300.v5[hwInfoStoragePoolFreeCapacity, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: 'Pool {#NAME}: Capacity used percentage'
    key: huawei.5300.v5[hwInfoStoragePoolFreeCapacityPct, "{#NAME}"]
    interval: 1m
    type: calculated
    params: last(//huawei.5300.v5[hwInfoStoragePoolSubscribedCapacity, "{#NAME}"])/last(//huawei.5300.v5[hwInfoStoragePoolTotalCapacity,
      "{#NAME}"])*100
    value_type: unsigned
    units: '%'
  - name: 'Pool {#NAME}: Health status'
    key: huawei.5300.v5[hwInfoStoragePoolHealthStatus, "{#NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Pool {#NAME}: Running status'
    key: huawei.5300.v5[hwInfoStoragePoolRunningStatus, "{#NAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'Pool {#NAME}: Capacity used'
    key: huawei.5300.v5[hwInfoStoragePoolSubscribedCapacity, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  - name: 'Pool {#NAME}: Capacity total'
    key: huawei.5300.v5[hwInfoStoragePoolTotalCapacity, "{#NAME}"]
    interval: 1m
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Huawei OceanStor 5300 V5: Pool {#NAME}: Used capacity is too high'
    expression: min(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoStoragePoolFreeCapacityPct,
      "{#NAME}"],5m)>{#THRESHOLD}
    severity: average
  - name: 'Huawei OceanStor 5300 V5: Pool {#NAME}: Health status is not Normal'
    expression: last(/Huawei OceanStor 5300 V5 by SNMP/huawei.5300.v5[hwInfoStoragePoolHealthStatus,
      "{#NAME}"])<>1
    severity: high
