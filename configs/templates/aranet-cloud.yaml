items:
- name: Get data
  key: aranet.get_data
  interval: 1m
  type: script
  params: "var Aranet = {\r\n\tparams: {},\r\n\tauth_token: null,\r\n\trefresh_token:\
    \ null,\r\n\tspace_id: null,\r\n\r\n\tsetParams: function (params) {\r\n\t\t['api_endpoint',\
    \ 'username', 'password', 'space_name'].forEach(function (field) {\r\n\t\t\tif\
    \ (typeof params !== 'object' || typeof params[field] === 'undefined'\r\n\t\t\t\
    \t\t|| params[field] === '') {\r\n\t\t\t\tthrow 'Required param is not set: \"\
    ' + field + '\".';\r\n\t\t\t}\r\n\t\t});\r\n\r\n\t\tAranet.params = params;\r\n\
    \t\tif (typeof Aranet.params.api_endpoint === 'string') {\r\n\t\t\tif (!Aranet.params.api_endpoint.endsWith('/'))\
    \ {\r\n\t\t\t\tAranet.params.api_endpoint += '/';\r\n\t\t\t}\r\n\t\t}\r\n\t},\r\
    \n\r\n\trequest: function (method, query, data) {\r\n\t\tvar response,\r\n\t\t\
    \trequest = new HttpRequest(),\r\n\t\t\turl = Aranet.params.api_endpoint + query;\r\
    \n\r\n\t\trequest.addHeader('Content-Type: application/json');\r\n\r\n\t\tif (Aranet.auth_token\
    \ !== null) {\r\n\t\t\trequest.addHeader('Authorization: Bearer ' + Aranet.auth_token);\r\
    \n\t\t}\r\n\r\n\t\tif (typeof data !== 'undefined') {\r\n\t\t\tdata = JSON.stringify(data);\r\
    \n\t\t}\r\n\r\n\t\tswitch (method) {\r\n\t\t\tcase 'get':\r\n\t\t\t\tresponse\
    \ = request.get(url, data);\r\n\t\t\t\tbreak;\r\n\r\n\t\t\tcase 'post':\r\n\t\t\
    \t\tresponse = request.post(url, data);\r\n\t\t\t\tbreak;\r\n\r\n\t\t\tdefault:\r\
    \n\t\t\t\tthrow 'Unsupported HTTP request method: ' + method;\r\n\t\t}\r\n\r\n\
    \t\tZabbix.log(4, '[ Aranet scraper ] Received response with status code ' + request.getStatus()\
    \ + ': ' + response);\r\n\r\n\t\tif (request.getStatus() < 200 || request.getStatus()\
    \ >= 300) {\r\n\t\t\tvar message = 'Request failed with status code ' + request.getStatus();\r\
    \n\r\n\t\t\tmessage += ': ' + response;\r\n\t\t\tthrow message;\r\n\t\t}\r\n\r\
    \n\t\tif (response !== null) {\r\n\t\t\ttry {\r\n\t\t\t\tresponse = JSON.parse(response);\r\
    \n\t\t\t}\r\n\t\t\tcatch (error) {\r\n\t\t\t\tthrow 'Failed to parse response\
    \ received from Aranet Cloud. Check debug log for more information.';\r\n\t\t\t\
    }\r\n\t\t}\r\n\r\n\t\treturn {\r\n\t\t\tstatus: request.getStatus(),\r\n\t\t\t\
    response: response\r\n\t\t};\r\n\t},\r\n\r\n\tlogin: function () {\r\n\t\tvar\
    \ result,\r\n\t\t\tdata = {\r\n\t\t\t\tlogin: Aranet.params.username,\r\n\t\t\t\
    \tpassw: Aranet.params.password\r\n\t\t\t};\r\n\r\n\t\tresult = Aranet.request('post',\
    \ 'user/login', data);\r\n\t\tif (typeof result.response !== 'object'\r\n\t\t\t\
    \t|| typeof result.response.auth === 'undefined'\r\n\t\t\t\t|| result.status !=\
    \ 200) {\r\n\t\t\tthrow 'Cannot login to Aranet Cloud. Check debug log for more\
    \ information.';\r\n\t\t}\r\n\r\n\t\tAranet.auth_token = result.response.auth;\r\
    \n\t\tAranet.refresh_token = result.response.refresh;\r\n\r\n\t\tvar spaces =\
    \ result.response.spaces;\r\n\t\tfor (var key in spaces) {\r\n\t\t\tif (spaces[key]\
    \ == Aranet.params.space_name) {\r\n\t\t\t\tAranet.space_id = key;\r\n\t\t\t\t\
    break;\r\n\t\t\t}\r\n\t\t}\r\n\r\n\t\treturn result.response;\r\n\t},\r\n\r\n\t\
    logout: function () {\r\n\t\tvar result,\r\n\t\t\tdata = {\r\n\t\t\t\trefresh:\
    \ Aranet.refresh_token\r\n\t\t\t};\r\n\r\n\t\ttry {\r\n\t\t\tresult = Aranet.request('post',\
    \ 'user/logout', data);\r\n\t\t\tif (result.status != 204) {\r\n\t\t\t\tthrow\
    \ 'Cannot logout from Aranet Cloud ' + request.getStatus() + ': ' + result.response;\r\
    \n\t\t\t}\r\n\t\t}\r\n\t\tcatch (error) {\r\n\t\t\tZabbix.log(4, '[ Aranet scraper\
    \ ] ' + error)\r\n\t\t}\r\n\t},\r\n\r\n\tgetMetrics: function () {\r\n\t\tvar\
    \ result = Aranet.request('get', 'metrics/' + Aranet.space_id);\r\n\r\n\t\tif\
    \ (typeof result.response !== 'object'\r\n\t\t\t\t|| typeof result.response.data\
    \ === 'undefined'\r\n\t\t\t\t|| result.status != 200) {\r\n\t\t\tthrow 'Cannot\
    \ get metrics data from Aranet Cloud. Check debug log for more information.';\r\
    \n\t\t};\r\n\r\n\t\treturn result.response;\r\n\t},\r\n\r\n\tgetSensors: function\
    \ () {\r\n\t\tvar result = Aranet.request('get', 'sensors/' + Aranet.space_id\
    \ + '?fields=devices,metrics,telemetry,name');\r\n\r\n\t\tif (typeof result.response\
    \ !== 'object'\r\n\t\t\t\t|| typeof result.response.data === 'undefined'\r\n\t\
    \t\t\t|| result.status != 200) {\r\n\t\t\tthrow 'Cannot get sensors data from\
    \ Aranet Cloud. Check debug log for more information.';\r\n\t\t};\r\n\r\n\t\t\
    return result.response;\r\n\t},\r\n\r\n\tgetGateways: function () {\r\n\t\tvar\
    \ result = Aranet.request('get', 'gateways/' + Aranet.space_id);\r\n\r\n\t\tif\
    \ (typeof result.response !== 'object'\r\n\t\t\t|| typeof result.response.devices\
    \ === 'undefined'\r\n\t\t\t|| result.status != 200) {\r\n\t\t\tthrow 'Cannot get\
    \ gateways data from Aranet Cloud. Check debug log for more information.';\r\n\
    \t\t};\r\n\r\n\t\treturn result.response;\r\n\t}\r\n}\r\n\r\nvar processed_metrics\
    \ = {},\r\n\tprocessed_sensors = [];\r\n\r\ntry {\r\n\tAranet.setParams(JSON.parse(value));\r\
    \n\r\n\tAranet.login();\r\n\r\n\tvar raw_metrics = Aranet.getMetrics(),\r\n\t\t\
    raw_sensors = Aranet.getSensors(),\r\n\t\traw_gateways = Aranet.getGateways();\r\
    \n\r\n\tAranet.logout();\r\n\r\n\tvar items = raw_metrics.data.items;\r\n\tfor\
    \ (item_idx in items) {\r\n\t\tvar unit_name,\r\n\t\t\tunits = items[item_idx].units;\r\
    \n\r\n\t\tunits.some(function (unit) {\r\n\t\t\tunit_name = unit.name;\r\n\t\t\
    \tif (unit.selected) {\r\n\t\t\t\treturn true;\r\n\t\t\t}\r\n\t\t});\r\n\r\n\t\
    \tprocessed_metrics[items[item_idx].id] = {\r\n\t\t\tname: items[item_idx].name,\r\
    \n\t\t\tunit: unit_name\r\n\t\t}\r\n\r\n\t\tdelete items[item_idx];\r\n\t}\r\n\
    \r\n\tvar items = raw_sensors.data.items;\r\n\tfor (item_idx in items) {\r\n\t\
    \tvar upd_ts = 0,\r\n\t\t\tgateway = {},\r\n\t\t\tsensor_metrics = [],\r\n\t\t\
    \tmetrics = items[item_idx].metrics,\r\n\t\t\ttelemetry = items[item_idx].telemetry;\r\
    \n\r\n\t\tfor (m_idx in metrics) {\r\n\t\t\tvar unit = processed_metrics[metrics[m_idx].id];\r\
    \n\r\n\t\t\tif (upd_ts < metrics[m_idx].t) {\r\n\t\t\t\tupd_ts = metrics[m_idx].t;\r\
    \n\t\t\t}\r\n\r\n\t\t\tsensor_metrics.push({\r\n\t\t\t\tname: unit.name,\r\n\t\
    \t\t\tunit: unit.unit,\r\n\t\t\t\tvalue: metrics[m_idx].v\r\n\t\t\t});\r\n\t\t\
    }\r\n\r\n\t\tfor (var t_idx in telemetry) {\r\n\t\t\tvar unit = processed_metrics[telemetry[t_idx].id];\r\
    \n\r\n\t\t\tif (upd_ts < telemetry[t_idx].t) {\r\n\t\t\t\tupd_ts = telemetry[t_idx].t;\r\
    \n\t\t\t}\r\n\r\n\t\t\tsensor_metrics.push({\r\n\t\t\t\tname: unit.name,\r\n\t\
    \t\t\tunit: unit.unit,\r\n\t\t\t\tvalue: telemetry[t_idx].v\r\n\t\t\t});\r\n\t\
    \t}\r\n\r\n\t\traw_gateways.devices.some(function (dev) {\r\n\t\t\tif (items[item_idx].devices[0].id\
    \ === dev.id) {\r\n\t\t\t\tgateway = {\r\n\t\t\t\t\tid: dev.id,\r\n\t\t\t\t\t\
    name: dev.device\r\n\t\t\t\t}\r\n\t\t\t\treturn true;\r\n\t\t\t}\r\n\t\t})\r\n\
    \r\n\t\tif (upd_ts) {\r\n\t\t\tsensor_metrics.push({\r\n\t\t\t\tname: 'Last update',\r\
    \n\t\t\t\tunit: 's',\r\n\t\t\t\tvalue: upd_ts\r\n\t\t\t});\r\n\t\t}\r\n\r\n\t\t\
    var sensor_id = parseInt(items[item_idx].id).toString(16).slice(-5);\r\n\r\n\t\
    \tprocessed_sensors.push({\r\n\t\t\tid: sensor_id,\r\n\t\t\tname: items[item_idx].name.trim()\
    \ === '' ? sensor_id : items[item_idx].name,\r\n\t\t\tgateway: gateway,\r\n\t\t\
    \tmetrics: sensor_metrics\r\n\t\t});\r\n\r\n\t\tdelete items[item_idx];\r\n\t\
    }\r\n\r\n\treturn JSON.stringify(processed_sensors);\r\n}\r\ncatch (error) {\r\
    \n\tZabbix.log(3, '[ Aranet scraper ] ERROR: ' + error);\r\n\tthrow 'Scraping\
    \ failed: ' + error;\r\n}"
  value_type: text
