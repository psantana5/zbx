discovery_rules:
- name: Battery voltage discovery
  key: aranet.battery.voltage.discovery
  interval: '0'
  type: dependent
  master_item_key: aranet.sensor.discovery
  filter:
  - macro: '{#GATEWAY_ID}'
    value: '{$ARANET.LLD.FILTER.GATEWAY_ID.MATCHES}'
  - macro: '{#GATEWAY_NAME}'
    value: '{$ARANET.LLD.FILTER.GATEWAY_NAME.MATCHES}'
  - macro: '{#GATEWAY_NAME}'
    value: '{$ARANET.LLD.FILTER.GATEWAY_NAME.NOT_MATCHES}'
  - macro: '{#METRIC}'
    value: Battery voltage
  - macro: '{#SENSOR_ID}'
    value: '{$ARANET.LLD.FILTER.SENSOR_ID.MATCHES}'
  - macro: '{#SENSOR_NAME}'
    value: '{$ARANET.LLD.FILTER.SENSOR_NAME.MATCHES}'
  - macro: '{#SENSOR_NAME}'
    value: '{$ARANET.LLD.FILTER.SENSOR_NAME.NOT_MATCHES}'
  item_prototypes:
  - name: '{#METRIC}: [{#GATEWAY_NAME}] {#SENSOR_NAME}'
    key: aranet.battery.voltage["{#GATEWAY_ID}", "{#SENSOR_ID}"]
    interval: '0'
    type: dependent
    units: '{#UNIT}'
  trigger_prototypes:
  - name: 'Aranet: {#METRIC}: Critically low battery voltage on "[{#GATEWAY_NAME}]
      {#SENSOR_NAME}"'
    expression: max(/Aranet Cloud/aranet.battery.voltage["{#GATEWAY_ID}", "{#SENSOR_ID}"],5m)
      < 2
    severity: high
  - name: 'Aranet: {#METRIC}: Low battery voltage on "[{#GATEWAY_NAME}] {#SENSOR_NAME}"'
    expression: max(/Aranet Cloud/aranet.battery.voltage["{#GATEWAY_ID}", "{#SENSOR_ID}"],5m)
      < 1
    severity: warning
