triggers:
- name: 'Oracle: Port {$ORACLE.PORT} is unavailable'
  expression: max(/Oracle by ODBC/net.tcp.service[tcp,,1521],#3)=0  and max(/Oracle
    by ODBC/proc.num[,,,"tnslsnr LISTENER"],#3)>0
  severity: disaster
  description: The TCP port of the Oracle Server service is currently unavailable.
  tags:
  - tag: scope
    value: availability
- name: 'Oracle: Too many database files'
  expression: min(/Oracle by ODBC/oracle.db_files_count,5m) * 100 / last(/Oracle by
    ODBC/oracle.db_files_limit) > 80
  severity: warning
  description: The number of datafiles is higher than `{$ORACLE.DB.FILE.MAX.WARN}`%
    of the available datafile limit.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Instance hostname has changed'
  expression: last(/Oracle by ODBC/oracle.instance_hostname,#1)<>last(/Oracle by ODBC/oracle.instance_hostname,#2)
    and length(last(/Oracle by ODBC/oracle.instance_hostname))>0
  severity: information
  description: An Oracle Database instance hostname has changed. Acknowledge to close
    the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Instance name has changed'
  expression: last(/Oracle by ODBC/oracle.instance_name,#1)<>last(/Oracle by ODBC/oracle.instance_name,#2)
    and length(last(/Oracle by ODBC/oracle.instance_name))>0
  severity: information
  description: An Oracle Database instance name has changed. Acknowledge to close
    the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Total PGA inuse is too high'
  expression: min(/Oracle by ODBC/oracle.total_pga_used,5m) * 100 / last(/Oracle by
    ODBC/oracle.pga_target) > 90
  severity: warning
  description: The total PGA currently consumed by work areas is more than `{$ORACLE.PGA.USE.MAX.WARN}`%
    of `PGA_AGGREGATE_TARGET`.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Too many active processes'
  expression: min(/Oracle by ODBC/oracle.processes_count,5m) * 100 / last(/Oracle
    by ODBC/oracle.processes_limit) > 80
  severity: warning
  description: Active processes are using more than `{$ORACLE.PROCESSES.MAX.WARN}`%
    of the available number of processes.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Number of REDO logs available for switching is too low'
  expression: max(/Oracle by ODBC/oracle.redo_logs_available,5m) < 3
  severity: warning
  description: The number of inactive/unused redos available for log switching is
    low (risk of database downtime).
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Too high database concurrency'
  expression: min(/Oracle by ODBC/oracle.session_concurrency_rate,5m) > 80
  severity: warning
  description: The concurrency rate exceeds `{$ORACLE.CONCURRENCY.MAX.WARN}`%. A high
    contention value does not indicate the root cause of the problem, but is a signal
    to review resource consumption (determine the "heaviest" queries in the database,
    trace sessions, etc.) This will help find the root cause and possible optimization
    points both in database configuration and the logic of building queries.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Too many active sessions'
  expression: min(/Oracle by ODBC/oracle.session_count,5m) * 100 / last(/Oracle by
    ODBC/oracle.session_limit) > 80
  severity: warning
  description: Active sessions are using more than `{$ORACLE.SESSIONS.MAX.WARN}`%
    of the available sessions.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Too many locked sessions'
  expression: min(/Oracle by ODBC/oracle.session_lock_rate,5m) > 20
  severity: warning
  description: The number of locked sessions exceeds `{$ORACLE.SESSIONS.LOCK.MAX.WARN}`%
    of the running sessions.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Too many sessions locked'
  expression: min(/Oracle by ODBC/oracle.session_long_time_locked,5m) > 3
  severity: warning
  description: The number of locked sessions exceeding `{$ORACLE.SESSION.LOCK.MAX.TIME}`
    seconds is too high. Long-term locks can negatively affect the database performance.
    Therefore, if they are detected, you should first find the most difficult queries
    from the database point of view and then analyze possible resource leaks.
  tags:
  - tag: scope
    value: performance
- name: 'Oracle: Shared pool free is too low'
  expression: max(/Oracle by ODBC/oracle.shared_pool_free,5m)<5
  severity: warning
  description: The free memory percent of the shared pool has been less than `{$ORACLE.SHARED.FREE.MIN.WARN}`%
    for the last 5 minutes.
  tags:
  - tag: scope
    value: capacity
- name: 'Oracle: Host has been restarted'
  expression: last(/Oracle by ODBC/oracle.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Failed to fetch info data'
  expression: nodata(/Oracle by ODBC/oracle.uptime,5m)=1
  severity: warning
  description: Zabbix has not received any data for the items for the last 5 minutes.
    The database might be unavailable for connecting.
  tags:
  - tag: scope
    value: availability
- name: 'Oracle: Zabbix account will expire soon'
  expression: last(/Oracle by ODBC/oracle.user_expire_password)  < 7
  severity: warning
  description: The password for the Zabbix user in the database expires soon.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: Version has changed'
  expression: last(/Oracle by ODBC/oracle.version,#1)<>last(/Oracle by ODBC/oracle.version,#2)
    and length(last(/Oracle by ODBC/oracle.version))>0
  severity: information
  description: The Oracle Database version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Oracle: LISTENER process is not running'
  expression: max(/Oracle by ODBC/proc.num[,,,"tnslsnr LISTENER"],#3)=0
  severity: disaster
  description: The Oracle listener process is not running.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Archive log discovery
  key: oracle.archivelog.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_archivelog,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  item_prototypes:
  - name: 'Archivelog ''{#DEST_NAME}'': Get archive log info'
    key: db.odbc.get[get_archivelog_{#DEST_NAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    interval: 5m
    type: db_monitor
    params: "SELECT\r\nd.dest_name, DECODE (d.status, 'VALID',3, 'DEFERRED', 2, 'ERROR',\
      \ 1, 0) AS status,\r\nd.log_sequence,\r\nd.error\r\nFROM v$archive_dest d ,\
      \ v$database db\r\nWHERE d.dest_name = '{#DEST_NAME}' AND d.status != 'INACTIVE'\
      \ AND db.log_mode = 'ARCHIVELOG';"
    value_type: text
  - name: 'Archivelog ''{#DEST_NAME}'': Error'
    key: oracle.archivelog_error["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_archivelog_{#DEST_NAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: text
  - name: 'Archivelog ''{#DEST_NAME}'': Last sequence'
    key: oracle.archivelog_log_sequence["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_archivelog_{#DEST_NAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  - name: 'Archivelog ''{#DEST_NAME}'': Status'
    key: oracle.archivelog_log_status["{#DEST_NAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_archivelog_{#DEST_NAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Oracle: Archivelog ''{#DEST_NAME}'': Log Archive is not valid'
    expression: last(/Oracle by ODBC/oracle.archivelog_log_status["{#DEST_NAME}"])<2
    severity: high
- name: ASM disk groups discovery
  key: oracle.asm.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_asm,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  item_prototypes:
  - name: 'ASM ''{#DGNAME}'': Get ASM stats'
    key: db.odbc.get[get_asm_{#DGNAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    interval: 1m
    type: db_monitor
    params: "SELECT\r\nname AS dgname,\r\nROUND(total_mb / DECODE(TYPE, 'NORMAL',\
      \ 2, 'HIGH', 3, 'EXTERN', 1)*1024*1024) AS size_byte,\r\nROUND(usable_file_mb*1024*1024\
      \ ) AS free_size_byte,\r\nROUND(100-(usable_file_mb /(total_mb / DECODE(TYPE,\
      \ 'NORMAL', 2, 'HIGH', 3, 'EXTERN', 1)))* 100, 2) AS used_percent\r\nFROM v$asm_diskgroup_stat\r\
      \nWHERE name = '{#DGNAME}';"
    value_type: text
  - name: 'ASM ''{#DGNAME}'': Free size'
    key: oracle.asm_free_size["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_asm_{#DGNAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: 'ASM ''{#DGNAME}'': Total size'
    key: oracle.asm_total_size["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_asm_{#DGNAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: 'ASM ''{#DGNAME}'': Used size, percent'
    key: oracle.asm_used_pct["{#DGNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_asm_{#DGNAME}_stat,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    units: '%'
  trigger_prototypes:
  - name: 'Oracle: ASM ''{#DGNAME}'': Disk group usage is too high'
    expression: min(/Oracle by ODBC/oracle.asm_used_pct["{#DGNAME}"],5m)>95
    severity: high
  - name: 'Oracle: ASM ''{#DGNAME}'': Disk group usage is too high'
    expression: min(/Oracle by ODBC/oracle.asm_used_pct["{#DGNAME}"],5m)>90
    severity: warning
- name: Database discovery
  key: oracle.db.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_db,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  filter:
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$ORACLE.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Database ''{#DBNAME}'': Get CDB and No-CDB info'
    key: db.odbc.get[get_cdb_{#DBNAME}_info,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    interval: 1m
    type: db_monitor
    params: "SELECT name as DBNAME,\r\nDECODE(open_mode, 'MOUNTED', 1, 'READ ONLY',\
      \ 2, 'READ WRITE', 3, 'READ ONLY WITH APPLY', 4, 'MIGRATE', 5, 0) AS open_mode,\r\
      \nDECODE(database_role, 'SNAPSHOT STANDBY', 1, 'LOGICAL STANDBY', 2, 'PHYSICAL\
      \ STANDBY', 3, 'PRIMARY', 4, 'FAR SYNC', 5, 0) AS ROLE,\r\nDECODE(force_logging,\
      \ 'YES',1,'NO',0,0) AS force_logging,\r\nDECODE(log_mode, 'MANUAL',2 ,'ARCHIVELOG',1,'NOARCHIVELOG',0,0)\
      \ AS log_mode\r\nFROM v$database\r\nWHERE name = '{#DBNAME}';"
    value_type: text
  - name: 'Database ''{#DBNAME}'': Force logging'
    key: oracle.db_force_logging["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_cdb_{#DBNAME}_info,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Log mode'
    key: oracle.db_log_mode["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_cdb_{#DBNAME}_info,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Open status'
    key: oracle.db_open_mode["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_cdb_{#DBNAME}_info,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  - name: 'Database ''{#DBNAME}'': Role'
    key: oracle.db_role["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_cdb_{#DBNAME}_info,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'Oracle: Database ''{#DBNAME}'': Force logging is deactivated for DB with
      active Archivelog'
    expression: last(/Oracle by ODBC/oracle.db_force_logging["{#DBNAME}"]) = 0 and
      last(/Oracle by ODBC/oracle.db_log_mode["{#DBNAME}"]) = 1
    severity: warning
  - name: 'Oracle: Database ''{#DBNAME}'': Open status in mount mode'
    expression: last(/Oracle by ODBC/oracle.db_open_mode["{#DBNAME}"])=1
    severity: warning
  - name: 'Oracle: Database ''{#DBNAME}'': Open status has changed'
    expression: last(/Oracle by ODBC/oracle.db_open_mode["{#DBNAME}"],#1)<>last(/Oracle
      by ODBC/oracle.db_open_mode["{#DBNAME}"],#2)
    severity: information
    allow_manual_close: true
  - name: 'Oracle: Database ''{#DBNAME}'': Role has changed'
    expression: last(/Oracle by ODBC/oracle.db_role["{#DBNAME}"],#1)<>last(/Oracle
      by ODBC/oracle.db_role["{#DBNAME}"],#2)
    severity: information
    allow_manual_close: true
