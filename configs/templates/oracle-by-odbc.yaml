template: Oracle by ODBC
description: "1. Create an Oracle user for monitoring.\r\n\r\n2. Set the hostname\
  \ or IP address of the Oracle DB instance, user name and password in host macros\
  \ ({$ORACLE.HOST}, {$ORACLE.USER} and {$ORACLE.PASSWORD}).\r\n  Do not forget to\
  \ install the Microsoft ODBC driver on the Zabbix server or the Zabbix proxy.\r\n\
  \  See Oracle documentation for instructions: https://www.oracle.com/database/technologies/releasenote-odbc-ic.html.\r\
  \n\r\n  Note! Credentials in the odbc.ini do not work for Oracle.\r\n  Note! Be\
  \ sure that ODBC connects to Oracle with session parameter NLS_NUMERIC_CHARACTERS=\
  \ '.,' It is important for correct display float numbers in Zabbix.\r\nThe \"Service's\
  \ TCP port state\" item uses {$ORACLE.HOST} and {$ORACLE.PORT} macros to check the\
  \ availability of the listener.\r\n\r\nGenerated by official Zabbix template tool\
  \ \"Templator\""
groups:
- Templates
items:
- name: Get archive log
  key: db.odbc.get[get_archivelog,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1h
  type: db_monitor
  params: "SELECT d.dest_name\r\nFROM v$archive_dest d , v$database db WHERE d.status\
    \ != 'INACTIVE' AND db.log_mode = 'ARCHIVELOG';"
  value_type: text
  description: Gets the destinations of the log archive.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get ASM disk groups
  key: db.odbc.get[get_asm,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1h
  type: db_monitor
  params: SELECT name AS dgname FROM v$asm_diskgroup;
  value_type: text
  description: Gets the ASM disk groups.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get database
  key: db.odbc.get[get_db,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1h
  type: db_monitor
  params: SELECT name as DBNAME, DECODE(CDB, 'YES', 'CDB', 'No-CDB') AS TYPE  FROM
    V$DATABASE;
  value_type: text
  description: Gets the databases in the database management system (DBMS).
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get instance state
  key: db.odbc.get[get_instance_state,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1m
  type: db_monitor
  params: "SELECT\r\nINSTANCE_NAME,\r\nHOST_NAME,\r\nVERSION || '-' || EDITION AS\
    \ VERSION,\r\nfloor((SYSDATE - startup_time)*60*60*24) AS UPTIME,\r\ndecode(status,'STARTED',1,'MOUNTED',2,'OPEN',3,'OPEN\
    \ MIGRATE',4, 0) AS STATUS,\r\ndecode(archiver,'STOPPED',1,'STARTED',2,'FAILED',3,\
    \ 0) AS  ARCHIVER,\r\ndecode(instance_role,'PRIMARY_INSTANCE',1,'SECONDARY_INSTANCE',2,\
    \ 0) AS  INSTANCE_ROLE\r\nFROM v$instance;"
  value_type: text
  description: Gets the state of the current instance.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get PDB
  key: db.odbc.get[get_pdb,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1h
  type: db_monitor
  params: SELECT CON_ID, name as DBNAME FROM V$PDBS;
  value_type: text
  description: Gets the pluggable database (PDB) in DBMS.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get system metrics
  key: db.odbc.get[get_system_metrics,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 0;m0-59
  type: db_monitor
  params: "SELECT 'SYS::' || METRIC_NAME AS METRIC, ROUND(VALUE,3) as VALUE\r\n FROM\
    \ V$SYSMETRIC WHERE GROUP_ID = 2\r\nUNION\r\n  SELECT 'SYSPARAM::' || INITCAP(NAME)\
    \ AS METRIC, to_number(VALUE)\r\n  FROM V$SYSTEM_PARAMETER WHERE NAME IN ('sessions',\
    \ 'processes', 'db_files')\r\nUNION\r\n SELECT 'SESSION::Long time locked' ,count(*)\
    \ FROM V$SESSION s WHERE s.BLOCKING_SESSION IS NOT NULL AND s.BLOCKING_SESSION_STATUS='VALID'\
    \ AND s.SECONDS_IN_WAIT > {$ORACLE.SESSION.LOCK.MAX.TIME}\r\nUNION\r\nSELECT 'SESSION::Lock\
    \ rate' ,(cnt_block / cnt_all)* 100 pct\r\nFROM ( SELECT COUNT(*) cnt_block FROM\
    \ v$session WHERE blocking_session IS NOT NULL), ( SELECT COUNT(*) cnt_all FROM\
    \ v$session)\r\nUNION\r\n  SELECT 'SESSION::Long time locked' ,count(*) FROM V$SESSION\
    \ s WHERE s.BLOCKING_SESSION IS NOT NULL AND s.BLOCKING_SESSION_STATUS='VALID'\
    \ AND s.SECONDS_IN_WAIT > {$ORACLE.SESSION.LOCK.MAX.TIME}\r\nUNION\r\n SELECT\
    \ 'SESSION::Total', COUNT(*) AS VALUE FROM V$SESSION\r\nUNION\r\nSELECT 'SESSION::Concurrency\
    \ rate', NVL(ROUND(SUM(duty_act.cnt*100 / num_cores.val)), 0)\r\nFROM\r\n( SELECT\
    \ DECODE(session_state, 'ON CPU', 'CPU', wait_class) wait_class, ROUND(COUNT(*)/(60\
    \ * 15), 1) cnt\r\nFROM v$active_session_history sh\r\nWHERE sh.sample_time >=\
    \ SYSDATE - 15 / 1440 AND DECODE(session_state, 'ON CPU', 'CPU', wait_class) IN('Concurrency')\r\
    \nGROUP BY DECODE(session_state, 'ON CPU', 'CPU', wait_class)) duty_act,\r\n(\
    \ SELECT SUM(value) val FROM v$osstat WHERE stat_name = 'NUM_CPU_CORES') num_cores\r\
    \nUNION\r\n SELECT 'PGA::' || INITCAP(NAME), VALUE FROM V$PGASTAT\r\nUNION\r\n\
    \ SELECT 'FRA::Space Limit' AS METRIC, space_limit AS VALUE FROM V$RECOVERY_FILE_DEST\r\
    \nUNION\r\n SELECT 'FRA::Space Used', space_used AS VALUE FROM V$RECOVERY_FILE_DEST\r\
    \nUNION\r\n SELECT 'FRA::Space Reclaimable', space_reclaimable AS VALUE FROM V$RECOVERY_FILE_DEST\r\
    \nUNION\r\n SELECT 'FRA::Number Of Files', number_of_files AS VALUE FROM V$RECOVERY_FILE_DEST\r\
    \nUNION\r\n SELECT 'FRA::Usable Pct', DECODE(space_limit, 0, 0,(100-(100 *(space_used-space_reclaimable)/\
    \ space_limit))) AS VALUE FROM V$RECOVERY_FILE_DEST\r\nUNION\r\n SELECT 'FRA::Restore\
    \ Point', COUNT(*) AS VALUE FROM V$RESTORE_POINT\r\nUNION\r\n SELECT 'PROC::Procnum',\
    \ COUNT(*) FROM v$process\r\nUNION\r\n SELECT 'DATAFILE::Count', COUNT(*) FROM\
    \ v$datafile\r\nUNION\r\n SELECT 'SGA::' || INITCAP(pool), SUM(bytes) FROM V$SGASTAT\r\
    \n WHERE pool IN ( 'java pool', 'large pool' ) GROUP BY pool\r\nUNION\r\n SELECT\
    \ 'SGA::Shared Pool', SUM(bytes) FROM V$SGASTAT\r\n WHERE pool = 'shared pool'\
    \ AND name NOT IN ('library cache', 'dictionary cache', 'free memory', 'sql area')\r\
    \nUNION\r\n SELECT 'SGA::' || INITCAP(name), bytes FROM V$SGASTAT\r\n WHERE pool\
    \ IS NULL AND name IN ('log_buffer', 'fixed_sga')\r\nUNION\r\n SELECT 'SGA::Buffer_Cache',\
    \ SUM(bytes) FROM V$SGASTAT\r\n WHERE pool IS NULL AND name IN ('buffer_cache',\
    \ 'db_block_buffers')\r\nUNION\r\n SELECT 'REDO::Available', count(*) from v$log\
    \ t where t.status in ('INACTIVE', 'UNUSED')\r\nUNION\r\n SELECT 'USER::Expire\
    \ password', ROUND(DECODE(SIGN(NVL(u.expiry_date, SYSDATE + 999) - SYSDATE),-1,\
    \ 0, NVL(u.expiry_date, SYSDATE + 999) - SYSDATE)) exp_passwd_days_before\r\n\
    FROM dba_users u WHERE username = UPPER('{$ORACLE.USER}');"
  value_type: text
  description: Gets the values of the system metrics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get tablespace
  key: db.odbc.get[get_tablespace,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  interval: 1h
  type: db_monitor
  params: "SELECT\r\n\tCON_ID,\r\n\tNVL(CON$NAME, 'DB') CON_NAME,\r\n\tTABLESPACE_NAME\
    \ TABLESPACE,\r\n\tCONTENTS\r\nFROM\r\n\tCDB_TABLESPACES;"
  value_type: text
  description: Gets tablespaces in DBMS.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
