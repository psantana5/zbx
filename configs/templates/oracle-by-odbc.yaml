- name: Tablespace discovery
  key: oracle.tablespace.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_tablespace,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
  filter:
  - macro: '{#CON_NAME}'
    value: '{$ORACLE.TABLESPACE.CONTAINER.MATCHES}'
  - macro: '{#CON_NAME}'
    value: '{$ORACLE.TABLESPACE.CONTAINER.NOT_MATCHES}'
  - macro: '{#TABLESPACE}'
    value: '{$ORACLE.TABLESPACE.NAME.MATCHES}'
  - macro: '{#TABLESPACE}'
    value: '{$ORACLE.TABLESPACE.NAME.NOT_MATCHES}'
  item_prototypes:
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Get tablespaces stats'
    key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    interval: 1m
    type: db_monitor
    params: "SELECT df.CON_NAME,\r\n       df.TABLESPACE_NAME                  AS\
      \ TABLESPACE,\r\n       df.CONTENTS                         AS TYPE,\r\n   \
      \    NVL(SUM(df.BYTES), 0)               AS FILE_BYTES,\r\n       NVL(SUM(df.MAX_BYTES),\
      \ 0)           AS MAX_BYTES,\r\n       NVL(SUM(f.FREE), 0)                 AS\
      \ FREE_BYTES,\r\n       NVL(SUM(df.BYTES) - SUM(f.FREE), 0) AS USED_BYTES,\r\
      \n       ROUND(CASE SUM(df.MAX_BYTES)\r\n                 WHEN 0 THEN 0\r\n\
      \                 ELSE (SUM(df.BYTES) / SUM(df.MAX_BYTES) * 100)\r\n       \
      \          END, 2)                   AS USED_PCT_MAX,\r\n       ROUND(CASE SUM(df.BYTES)\r\
      \n                 WHEN 0 THEN 0\r\n                 ELSE (NVL(SUM(df.BYTES)\
      \ - SUM(f.FREE), 0)) / SUM(df.BYTES) * 100\r\n                 END, 2)     \
      \              AS USED_FILE_PCT,\r\n       ROUND(CASE SUM(df.MAX_BYTES)\r\n\
      \                 WHEN 0 THEN 0\r\n                 ELSE NVL(SUM(df.BYTES) -\
      \ SUM(f.FREE), 0) / SUM(df.MAX_BYTES) * 100\r\n                 END, 2)    \
      \               AS USED_FROM_MAX_PCT,\r\n       CASE df.STATUS\r\n         \
      \  WHEN 'ONLINE' THEN 1\r\n           WHEN 'OFFLINE' THEN 2\r\n           WHEN\
      \ 'READ ONLY' THEN 3\r\n           ELSE 0\r\n           END                \
      \             AS STATUS\r\nFROM (SELECT ct.CON$NAME                        \
      \      AS CON_NAME,\r\n             cdf.FILE_ID,\r\n             ct.CONTENTS,\r\
      \n             ct.STATUS,\r\n             cdf.FILE_NAME,\r\n             cdf.TABLESPACE_NAME,\r\
      \n             TRUNC(cdf.BYTES)                         AS BYTES,\r\n      \
      \       TRUNC(GREATEST(cdf.BYTES, cdf.MAXBYTES)) AS MAX_BYTES\r\n      FROM\
      \ CDB_DATA_FILES cdf,\r\n           CDB_TABLESPACES ct\r\n      WHERE cdf.TABLESPACE_NAME\
      \ = ct.TABLESPACE_NAME\r\n        AND cdf.CON_ID = ct.CON_ID\r\n        AND\
      \ (ct.CON_ID = '{#CON_ID}' or (ct.CON$NAME is null and ct.CON_ID = 0))\r\n \
      \       AND cdf.TABLESPACE_NAME = '{#TABLESPACE}'\r\n        AND ct.CONTENTS\
      \ = '{#CONTENTS}') df,\r\n     (SELECT TRUNC(SUM(BYTES)) AS FREE,\r\n      \
      \       FILE_ID\r\n      FROM CDB_FREE_SPACE\r\n      GROUP BY FILE_ID) f\r\n\
      WHERE df.FILE_ID = f.FILE_ID (+)\r\nGROUP BY df.CON_NAME,\r\n         df.TABLESPACE_NAME,\r\
      \n         df.CONTENTS,\r\n         df.STATUS\r\nUNION ALL\r\nSELECT Y.CON_NAME,\r\
      \n       Y.NAME                                   AS TABLESPACE,\r\n       Y.CONTENTS\
      \                               AS TYPE,\r\n       NVL(SUM(Y.BYTES), 0)    \
      \                 AS FILE_BYTES,\r\n       NVL(SUM(Y.MAX_BYTES), 0)        \
      \         AS MAX_BYTES,\r\n       NVL(MAX(NVL(Y.FREE_BYTES, 0)), 0)        AS\
      \ FREE_BYTES,\r\n       NVL(SUM(Y.BYTES) - MAX(Y.FREE_BYTES), 0) AS USED_BYTES,\r\
      \n       ROUND(CASE SUM(Y.MAX_BYTES)\r\n                 WHEN 0 THEN 0\r\n \
      \                ELSE (SUM(Y.BYTES) / SUM(Y.MAX_BYTES) * 100)\r\n          \
      \       END, 2)                                    AS USED_PCT_MAX,\r\n    \
      \   ROUND(CASE SUM(Y.BYTES)\r\n                 WHEN 0 THEN 0\r\n          \
      \       ELSE (NVL(SUM(Y.BYTES) - MAX(Y.FREE_BYTES), 0)) / SUM(Y.BYTES) * 100\r\
      \n                 END, 2)                                    AS USED_FILE_PCT,\r\
      \n       ROUND(CASE SUM(Y.MAX_BYTES)\r\n                 WHEN 0 THEN 0\r\n \
      \                ELSE (NVL(SUM(Y.BYTES) - MAX(Y.FREE_BYTES), 0)) / SUM(Y.MAX_BYTES)\
      \ * 100\r\n                 END, 2)                                    AS USED_FROM_MAX_PCT,\r\
      \n       CASE Y.STATUS\r\n           WHEN 'ONLINE' THEN 1\r\n           WHEN\
      \ 'OFFLINE' THEN 2\r\n           WHEN 'READ ONLY' THEN 3\r\n           ELSE\
      \ 0\r\n           END                                  AS STATUS\r\nFROM (SELECT\
      \ ct.CON$NAME                  AS CON_NAME,\r\n             ctf.TABLESPACE_NAME\
      \          AS NAME,\r\n             ct.CONTENTS,\r\n             ctf.STATUS\
      \                   AS STATUS,\r\n             ctf.BYTES                   \
      \ AS BYTES,\r\n             (SELECT ((f.TOTAL_BLOCKS - s.TOT_USED_BLOCKS) *\
      \ vp.VALUE)\r\n              FROM (SELECT CON_ID,\r\n                      \
      \     TABLESPACE_NAME,\r\n                           SUM(USED_BLOCKS) TOT_USED_BLOCKS\r\
      \n                    FROM V$SORT_SEGMENT\r\n                    WHERE TABLESPACE_NAME\
      \ != 'DUMMY'\r\n                    GROUP BY CON_ID,\r\n                   \
      \          TABLESPACE_NAME) s,\r\n                   (SELECT CON_ID,\r\n   \
      \                        TABLESPACE_NAME,\r\n                           SUM(BLOCKS)\
      \ TOTAL_BLOCKS\r\n                    FROM CDB_TEMP_FILES\r\n              \
      \      WHERE TABLESPACE_NAME != 'DUMMY'\r\n                    GROUP BY CON_ID,\r\
      \n                             TABLESPACE_NAME) f,\r\n                   (SELECT\
      \ VALUE\r\n                    FROM V$PARAMETER\r\n                    WHERE\
      \ NAME = 'db_block_size') vp\r\n              WHERE f.TABLESPACE_NAME = s.TABLESPACE_NAME\r\
      \n                AND f.TABLESPACE_NAME = ctf.TABLESPACE_NAME\r\n          \
      \      AND f.CON_ID = s.CON_ID\r\n                AND f.CON_ID = ct.CON_ID)\
      \ AS FREE_BYTES,\r\n             CASE\r\n                 WHEN ctf.MAXBYTES\
      \ = 0 THEN ctf.BYTES\r\n                 ELSE ctf.MAXBYTES\r\n             \
      \    END                      AS MAX_BYTES\r\n      FROM CDB_TEMP_FILES ctf,\r\
      \n           CDB_TABLESPACES ct\r\n      WHERE ctf.TABLESPACE_NAME = ct.TABLESPACE_NAME\r\
      \n        AND ctf.CON_ID = ct.CON_ID\r\n        AND (ct.CON_ID = '{#CON_ID}'\
      \ or (ct.CON$NAME is null and ct.CON_ID = 0))\r\n        AND ctf.TABLESPACE_NAME\
      \ = '{#TABLESPACE}'\r\n        AND ct.CONTENTS = '{#CONTENTS}') Y\r\nGROUP BY\
      \ Y.CON_NAME,\r\n         Y.NAME,\r\n         Y.CONTENTS,\r\n         Y.STATUS;"
    value_type: text
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace allocated, bytes'
    key: oracle.tbs_alloc_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace free, bytes'
    key: oracle.tbs_free_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace MAX size, bytes'
    key: oracle.tbs_max_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Open status'
    key: oracle.tbs_status["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace used, bytes'
    key: oracle.tbs_used_bytes["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    value_type: unsigned
    units: B
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage, percent'
    key: oracle.tbs_used_file_pct["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    units: '%'
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage from MAX, percent'
    key: oracle.tbs_used_from_max_pct["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    units: '%'
  - name: '''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace allocated, percent'
    key: oracle.tbs_used_pct["{#CON_ID}","{#TABLESPACE}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get[get_{#CON_ID}_tablespace_{#TABLESPACE}_stats,,"Driver={$ORACLE.DRIVER};DBQ=//{$ORACLE.HOST}:{$ORACLE.PORT}/{$ORACLE.SERVICE};"]
    units: '%'
  trigger_prototypes:
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace is OFFLINE'
    expression: last(/Oracle by ODBC/oracle.tbs_status["{#CON_ID}","{#TABLESPACE}"])=2
    severity: warning
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace status has changed'
    expression: last(/Oracle by ODBC/oracle.tbs_status["{#CON_ID}","{#TABLESPACE}"],#1)<>last(/Oracle
      by ODBC/oracle.tbs_status["{#CON_ID}","{#TABLESPACE}"],#2)
    severity: information
    allow_manual_close: true
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage is too
      high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_file_pct["{#CON_ID}","{#TABLESPACE}"],5m)>95
    severity: high
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage is too
      high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_file_pct["{#CON_ID}","{#TABLESPACE}"],5m)>90
    severity: warning
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage from MAX
      is too high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_from_max_pct["{#CON_ID}","{#TABLESPACE}"],5m)>95
    severity: high
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace usage from MAX
      is too high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_from_max_pct["{#CON_ID}","{#TABLESPACE}"],5m)>90
    severity: warning
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace utilization is
      too high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_pct["{#CON_ID}","{#TABLESPACE}"],5m)>90
    severity: high
  - name: 'Oracle: ''{#CON_NAME}'' TBS ''{#TABLESPACE}'': Tablespace utilization is
      too high'
    expression: min(/Oracle by ODBC/oracle.tbs_used_pct["{#CON_ID}","{#TABLESPACE}"],5m)>80
    severity: warning
