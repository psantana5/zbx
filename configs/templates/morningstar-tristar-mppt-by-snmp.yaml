discovery_rules:
- name: Battery voltage discovery
  key: battery.voltage.discovery
  interval: '0'
  type: dependent
  master_item_key: battery.voltage.discovery[batteryVoltage.0]
  item_prototypes:
  - name: 'Battery: Voltage{#SINGLETON}'
    key: battery.voltage[batteryVoltage.0{#SINGLETON}]
    interval: 1m
    units: V
  trigger_prototypes:
  - name: 'Morningstar TriStar MPPT: Battery: Critically low battery voltage'
    expression: max(/Morningstar TriStar MPPT by SNMP/battery.voltage[batteryVoltage.0{#SINGLETON}],5m)<{#VOLTAGE.MIN.CRIT}
    severity: high
  - name: 'Morningstar TriStar MPPT: Battery: Low battery voltage'
    expression: max(/Morningstar TriStar MPPT by SNMP/battery.voltage[batteryVoltage.0{#SINGLETON}],5m)<{#VOLTAGE.MIN.WARN}
    severity: warning
  - name: 'Morningstar TriStar MPPT: Battery: Critically high battery voltage'
    expression: min(/Morningstar TriStar MPPT by SNMP/battery.voltage[batteryVoltage.0{#SINGLETON}],5m)>{#VOLTAGE.MAX.CRIT}
    severity: high
  - name: 'Morningstar TriStar MPPT: Battery: High battery voltage'
    expression: min(/Morningstar TriStar MPPT by SNMP/battery.voltage[batteryVoltage.0{#SINGLETON}],5m)>{#VOLTAGE.MAX.WARN}
    severity: warning
