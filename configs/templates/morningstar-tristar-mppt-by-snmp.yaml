- name: 'Status: Alarms'
  key: status.alarms[alarms.0]
  interval: 1m
  value_type: text
  description: "MIB: TRISTAR-MPPT\r\nDescription:Faults\r\nModbus address:0x002c"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: status
- name: 'Status: Faults'
  key: status.faults[faults.0]
  interval: 1m
