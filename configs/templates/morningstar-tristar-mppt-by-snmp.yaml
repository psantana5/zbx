- name: 'Morningstar TriStar MPPT: Status: Device has been restarted'
  expression: (last(/Morningstar TriStar MPPT by SNMP/status.hw.uptime)>0 and last(/Morningstar
    TriStar MPPT by SNMP/status.hw.uptime)<10m) or (last(/Morningstar TriStar MPPT
    by SNMP/status.hw.uptime)=0 and last(/Morningstar TriStar MPPT by SNMP/status.net.uptime)<10m)
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Morningstar TriStar MPPT: Status: Failed to fetch data'
  expression: nodata(/Morningstar TriStar MPPT by SNMP/status.net.uptime,5m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 5 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'Morningstar TriStar MPPT: Temperature: Critically low battery temperature'
  expression: max(/Morningstar TriStar MPPT by SNMP/temp.battery[batteryTemperature.0],5m)<-20
