template: Microsoft SharePoint by HTTP
description: "Overview:\r\nTemplate receives data via HTTP Agent.\r\nSetup:\r\nCreate\
  \ a new host.\r\nDefine macros according to your Sharepoint web portal.\r\nIt is\
  \ recommended to fill in the values of the filter macros to avoid getting redundant\
  \ data.\r\n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Get directory structure
  key: sharepoint.get_dir
  interval: '{$SHAREPOINT.GET_INTERVAL}'
  type: script
  params: "try {\r\n\r\n\tconst js_start = new Date().getTime();\r\n\r\n\tvar params\
    \ = JSON.parse(value);\r\n\tvar result = {\r\n\t\tstatus: 0,\r\n\t\tdata: {}\r\
    \n\t};\r\n\r\n\tvar req = new HttpRequest();\r\n\r\n\tvar out = {};\r\n\tvar queue\
    \ = [];\r\n\r\n\tvar node;\r\n\tvar obj_iter_by_name;\r\n\tvar cpath;\r\n\r\n\t\
    var current_folder;\r\n\tvar child_folders;\r\n\tvar child_files;\r\n\tvar obj_iter_file;\r\
    \n\r\n\treq.addHeader('Accept: application/json; odata=verbose');\r\n\treq.setHttpAuth(HTTPAUTH_NTLM,\
    \ params.user, params.password);\r\n\tqueue.push({\r\n\t\tpatch: params.root,\r\
    \n\t\tjson: []\r\n\t});\r\n\r\n\twhile (queue.length) {\r\n\t\tnode = queue.pop();\r\
    \n\t\tobj_iter_by_name = out;\r\n\t\tcpath = node.json.slice()\r\n\r\n\t\tcurrent_folder\
    \ = JSON.parse(req.get(encodeURI(params.url + \"/_api/web/GetFolderByServerRelativeUrl('\"\
    \ + node.patch.replace(\"'\", \"''\") + \"')\")));\r\n\r\n\t\tresult.status =\
    \ req.getStatus();\r\n\t\tif (result.status != 200) {\r\n\t\t\tthrow result.status;\r\
    \n\t\t}\r\n\r\n\t\tcpath.forEach(function (nd) {\r\n\t\t\tobj_iter_by_name = obj_iter_by_name[nd]\r\
    \n\t\t});\r\n\r\n\t\tobj_iter_by_name[current_folder.d.Name] = {\r\n\t\t\tmeta:\
    \ {\r\n\t\t\t\tsize: 0,\r\n\t\t\t\tcreated: Math.round(new Date(current_folder.d.TimeCreated).getTime()\
    \ / 1000),\r\n\t\t\t\tmodified: Math.round(new Date(current_folder.d.TimeLastModified).getTime()\
    \ / 1000)\r\n\t\t\t},\r\n\t\t\tdata: {}\r\n\t\t}\r\n\r\n\t\tchild_folders = JSON.parse(req.get(encodeURI(params.url\
    \ + \"/_api/web/GetFolderByServerRelativeUrl('\" + node.patch.replace(\"'\", \"\
    ''\") + \"')/Folders\")));\r\n\r\n\t\tcpath.push(current_folder.d.Name, \"data\"\
    );\r\n\t\tchild_folders.d.results.forEach(function (dir) {\r\n\t\t\tqueue.push({\r\
    \n\t\t\t\tpatch: dir.ServerRelativeUrl,\r\n\t\t\t\tjson: cpath\r\n\t\t\t});\r\n\
    \t\t});\r\n\r\n\t\tchild_files = JSON.parse(req.get(encodeURI(params.url + \"\
    /_api/web/GetFolderByServerRelativeUrl('\" + node.patch.replace(\"'\", \"''\"\
    ) + \"')/Files\")));\r\n\t\tchild_files.d.results.forEach(function (file) {\r\n\
    \t\t\tobj_iter_by_name[current_folder.d.Name].data[file.Name] = {\r\n\t\t\t\t\
    meta: {\r\n\t\t\t\t\tsize: file.Length,\r\n\t\t\t\t\tcreated: Math.round(new Date(file.TimeCreated).getTime()\
    \ / 1000),\r\n\t\t\t\t\tmodified: Math.round(new Date(file.TimeLastModified).getTime()\
    \ / 1000)\r\n\t\t\t\t}\r\n\t\t\t};\r\n\r\n\t\t\tobj_iter_file = out;\r\n\t\t\t\
    cpath.forEach(function (nd) {\r\n\t\t\t\tobj_iter_file = obj_iter_file[nd];\r\n\
    \t\t\t\tif (nd != \"data\") {\r\n\t\t\t\t\tobj_iter_file.meta.size += +file.Length;\r\
    \n\t\t\t\t}\r\n\t\t\t});\r\n\t\t});\r\n\r\n\t}\r\n\r\n\tresult.data = out;\r\n\
    \r\n} catch (error) {\r\n\tZabbix.log(3, \"Sharepoint fs scan failed: \" + params.url\
    \ + \" Error: \" + error);\r\n\tif (!Number.isInteger(error))\r\n\t\tresult.status\
    \ = 520;\r\n}\r\n\r\nresult.time = new Date().getTime() - js_start;\r\nreturn\
    \ JSON.stringify(result);"
  value_type: text
  description: Used to get directory structure information
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'Get directory structure: Status'
  key: sharepoint.get_dir.status
  interval: '0'
  type: dependent
  master_item_key: sharepoint.get_dir
  value_type: unsigned
  description: HTTP response (status) code. Indicates whether the HTTP request was
    successfully completed. Additional information is available in the server log
    file.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: 'Get directory structure: Exec time'
  key: sharepoint.get_dir.time
  interval: '0'
  type: dependent
  master_item_key: sharepoint.get_dir
  value_type: unsigned
  units: '!ms'
  description: The time taken to execute the script for obtaining the data structure
    (in ms). Less is better.
  history: 31d
  tags:
  - tag: component
    value: performance
- name: Health score
  key: sharepoint.health_score
  interval: 1m
  type: http_agent
  value_type: unsigned
  description: This item specifies a value between 0 and 10, where 0 represents a
    low load and a high ability to process requests and 10 represents a high load
    and that the server is throttling requests to maintain adequate throughput.
  history: 31d
  tags:
  - tag: component
    value: health
triggers:
- name: 'MS SharePoint: Error getting directory structure.'
  expression: last(/Microsoft SharePoint by HTTP/sharepoint.get_dir.status)<>200
  severity: warning
  description: Error getting directory structure. Check the Zabbix server log for
    more details.
  tags:
  - tag: scope
    value: availability
- name: 'MS SharePoint: Server responds slowly to API request'
  expression: last(/Microsoft SharePoint by HTTP/sharepoint.get_dir.time)>2000
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'MS SharePoint: Bad health score'
  expression: last(/Microsoft SharePoint by HTTP/sharepoint.health_score)>"5"
  severity: average
  tags:
  - tag: scope
    value: performance
discovery_rules:
- name: Directory discovery
  key: sharepoint.directory.discovery
  interval: '{$SHAREPOINT.LLD_INTERVAL}'
  type: script
  filter:
  - macro: '{#SHAREPOINT.LLD.FULL_PATH}'
    value: '{$SHAREPOINT.LLD.FILTER.FULL_PATH.MATCHES}'
  - macro: '{#SHAREPOINT.LLD.FULL_PATH}'
    value: '{$SHAREPOINT.LLD.FILTER.FULL_PATH.NOT_MATCHES}'
  - macro: '{#SHAREPOINT.LLD.NAME}'
    value: '{$SHAREPOINT.LLD.FILTER.NAME.MATCHES}'
  - macro: '{#SHAREPOINT.LLD.NAME}'
    value: '{$SHAREPOINT.LLD.FILTER.NAME.NOT_MATCHES}'
  - macro: '{#SHAREPOINT.LLD.TYPE}'
    value: '{$SHAREPOINT.LLD.FILTER.TYPE.MATCHES}'
  - macro: '{#SHAREPOINT.LLD.TYPE}'
    value: '{$SHAREPOINT.LLD.FILTER.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: Created ({#SHAREPOINT.LLD.FULL_PATH})
    key: sharepoint.created["{#SHAREPOINT.LLD.FULL_PATH}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: unixtime
  - name: Modified ({#SHAREPOINT.LLD.FULL_PATH})
    key: sharepoint.modified["{#SHAREPOINT.LLD.FULL_PATH}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: unixtime
  - name: Size ({#SHAREPOINT.LLD.FULL_PATH})
    key: sharepoint.size["{#SHAREPOINT.LLD.FULL_PATH}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'MS SharePoint: Sharepoint object is changed'
    expression: last(/Microsoft SharePoint by HTTP/sharepoint.modified["{#SHAREPOINT.LLD.FULL_PATH}"],#1)<>last(/Microsoft
      SharePoint by HTTP/sharepoint.modified["{#SHAREPOINT.LLD.FULL_PATH}"],#2)
    severity: information
    allow_manual_close: true
