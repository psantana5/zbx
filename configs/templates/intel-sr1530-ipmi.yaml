- name: 'Intel SR1530: BB Ambient Temp Critical [{ITEM.VALUE}]'
  expression: last(/Intel SR1530 IPMI/bb_ambient_temp)<5 or last(/Intel SR1530 IPMI/bb_ambient_temp)>66
