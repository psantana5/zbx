- name: 'Intel SR1530: BB +5.0V Critical [{ITEM.VALUE}]'
  expression: last(/Intel SR1530 IPMI/bb_5.0v)<4.362 or last(/Intel SR1530 IPMI/bb_5.0v)>5.663
