template: Intel SR1530 IPMI
description: "Template for monitoring Intel SR1530 server system.\r\n\r\nGenerated\
  \ by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: BB +1.8V SM
  key: bb_1.8v_sm
  interval: 1m
  type: ipmi_agent
  units: V
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: BB +3.3V
  key: bb_3.3v
  interval: 1m
  type: ipmi_agent
  units: V
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: BB +3.3V STBY
  key: bb_3.3v_stby
  interval: 1m
  type: ipmi_agent
  units: V
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: BB +5.0V
  key: bb_5.0v
  interval: 1m
  type: ipmi_agent
  units: V
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: BB Ambient Temp
  key: bb_ambient_temp
  interval: 1m
  type: ipmi_agent
  units: C
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: temperature
- name: Power
  key: power
  interval: 1m
  type: ipmi_agent
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: Processor Vcc
  key: processor_vcc
  interval: 1m
  type: ipmi_agent
  units: V
  history: 31d
  tags:
  - tag: component
    value: system
  - tag: component
    value: voltage
- name: System Fan 3
  key: system_fan_3
  interval: 1m
  type: ipmi_agent
  units: RPM
  history: 31d
  tags:
  - tag: component
    value: fan
  - tag: component
    value: system
triggers:
- name: 'Intel SR1530: BB +1.8V SM Critical [{ITEM.VALUE}]'
  expression: last(/Intel SR1530 IPMI/bb_1.8v_sm)<1.597 or last(/Intel SR1530 IPMI/bb_1.8v_sm)>2.019
  severity: disaster
  tags:
  - tag: scope
    value: availability
- name: 'Intel SR1530: BB +1.8V SM Non-Critical [{ITEM.VALUE}]'
  expression: last(/Intel SR1530 IPMI/bb_1.8v_sm)<1.646 or last(/Intel SR1530 IPMI/bb_1.8v_sm)>1.960
  severity: high
  tags:
  - tag: scope
    value: availability
- name: 'Intel SR1530: BB +3.3V Critical [{ITEM.VALUE}]'
  expression: last(/Intel SR1530 IPMI/bb_3.3v)<2.876 or last(/Intel SR1530 IPMI/bb_3.3v)>3.729
