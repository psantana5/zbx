template: Elasticsearch Cluster by HTTP
description: "The template to monitor Elasticsearch by Zabbix that work without any\
  \ external scripts.\r\nIt works with both standalone and cluster instances.\r\n\
  The metrics are collected in one pass remotely using an HTTP agent.\r\nThey are\
  \ getting values from REST API '_cluster/health', '_cluster/stats', '_nodes/stats'\
  \ requests.\r\n\r\nSetup:\r\n\r\n1. Set the hostname or IP address of the Elasticsearch\
  \ host in the '{$ELASTICSEARCH.HOST}' macro.\r\n\r\n2. Set the login and password\
  \ in the '{$ELASTICSEARCH.USERNAME}' and '{$ELASTICSEARCH.PASSWORD}' macros.\r\n\
  \r\n3. If you use an atypical location of ES API, don't forget to change the macros\
  \ '{$ELASTICSEARCH.SCHEME}','{$ELASTICSEARCH.PORT}'.\r\n\r\nYou can discuss this\
  \ template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/399473-discussion-thread-for-official-zabbix-template-for-elasticsearch\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Delayed unassigned shards
  key: es.cluster.delayed_unassigned_shards
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of shards whose allocation has been delayed by the timeout
    settings.
  history: 31d
  tags:
  - tag: component
    value: shards
- name: Get cluster health
  key: es.cluster.get_health
  interval: 1m
  type: http_agent
  value_type: text
  description: Returns the health status of a cluster.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get cluster stats
  key: es.cluster.get_stats
  interval: 1m
  type: http_agent
  value_type: text
  description: Returns cluster statistics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Inactive shards percentage
  key: es.cluster.inactive_shards_percent_as_number
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  units: '%'
  description: The ratio of inactive shards in the cluster expressed as a percentage.
  history: 31d
  tags:
  - tag: component
    value: shards
- name: Number of initializing shards
  key: es.cluster.initializing_shards
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of shards that are under initialization.
  history: 31d
  tags:
  - tag: component
    value: shards
- name: Number of data nodes
  key: es.cluster.number_of_data_nodes
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of nodes that are dedicated to data nodes.
  history: 31d
  tags:
  - tag: component
    value: nodes
- name: Number of nodes
  key: es.cluster.number_of_nodes
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of nodes within the cluster.
  history: 31d
  tags:
  - tag: component
    value: nodes
- name: Number of pending tasks
  key: es.cluster.number_of_pending_tasks
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of cluster-level changes that have not yet been executed.
  history: 31d
  tags:
  - tag: component
    value: tasks
- name: Number of relocating shards
  key: es.cluster.relocating_shards
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of shards that are under relocation.
  history: 31d
  tags:
  - tag: component
    value: shards
- name: Cluster health status
  key: es.cluster.status
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: "Health status of the cluster, based on the state of its primary and\
    \ replica shards. Statuses are:\r\ngreen\r\nAll shards are assigned.\r\nyellow\r\
    \nAll primary shards are assigned, but one or more replica shards are unassigned.\
    \ If a node in the cluster fails, some data could be unavailable until that node\
    \ is repaired.\r\nred\r\nOne or more primary shards are unassigned, so some data\
    \ is unavailable. This can occur briefly during cluster startup as primary shards\
    \ are assigned."
  history: 31d
  tags:
  - tag: component
    value: health
- name: Task max waiting in queue
  key: es.cluster.task_max_waiting_in_queue
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  units: s
  description: The time expressed in seconds since the earliest initiated task is
    waiting for being performed.
  history: 31d
  tags:
  - tag: component
    value: tasks
- name: Number of unassigned shards
  key: es.cluster.unassigned_shards
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_health
  value_type: unsigned
  description: The number of shards that are not allocated.
  history: 31d
  tags:
  - tag: component
    value: shards
- name: Indices with shards assigned to nodes
  key: es.indices.count
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  description: The total number of indices with shards assigned to the selected nodes.
  history: 31d
  tags:
  - tag: component
    value: indices
- name: Number of non-deleted documents
  key: es.indices.docs.count
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  description: "The total number of non-deleted documents across all primary shards\
    \ assigned to the selected nodes.\r\nThis number is based on the documents in\
    \ Lucene segments and may include the documents from nested fields."
  history: 31d
  tags:
  - tag: component
    value: documents
- name: Nodes with the data role
  key: es.nodes.count.data
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  description: The number of selected nodes with the data role.
  history: 31d
  tags:
  - tag: component
    value: nodes
- name: Nodes with the ingest role
  key: es.nodes.count.ingest
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  description: The number of selected nodes with the ingest role.
  history: 31d
  tags:
  - tag: component
    value: nodes
- name: Nodes with the master role
  key: es.nodes.count.master
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  description: The number of selected nodes with the master role.
  history: 31d
  tags:
  - tag: component
    value: nodes
- name: Total available size to JVM in all file stores
  key: es.nodes.fs.available_in_bytes
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  units: B
  description: "The total number of bytes available to JVM in the file stores across\
    \ all selected nodes.\r\nDepending on OS or process-level restrictions, this number\
    \ may be less than nodes.fs.free_in_byes.\r\nThis is the actual amount of free\
    \ disk space the selected Elasticsearch nodes can use."
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Total size of all file stores
  key: es.nodes.fs.total_in_bytes
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  value_type: unsigned
  units: B
  description: The total size in bytes of all file stores across all selected nodes.
  history: 31d
  tags:
  - tag: component
    value: storage
- name: Get nodes stats
  key: es.nodes.get_stats
  interval: 1m
  type: http_agent
  value_type: text
  description: Returns cluster nodes statistics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Cluster uptime
  key: es.nodes.jvm.max_uptime
  interval: '0'
  type: dependent
  master_item_key: es.cluster.get_stats
  units: s
  description: Uptime duration in seconds since JVM has last started.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Service response time
  key: net.tcp.service.perf["{$ELASTICSEARCH.SCHEME}","{$ELASTICSEARCH.HOST}","{$ELASTICSEARCH.PORT}"]
  interval: 1m
  type: simple_check
  units: s
  description: Checks performance of the TCP service.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Service status
  key: net.tcp.service["{$ELASTICSEARCH.SCHEME}","{$ELASTICSEARCH.HOST}","{$ELASTICSEARCH.PORT}"]
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: Checks if the service is running and accepting TCP connections.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Elasticsearch: Cluster has the initializing shards'
  expression: min(/Elasticsearch Cluster by HTTP/es.cluster.initializing_shards,10m)>0
  severity: average
  description: The cluster has the initializing shards longer than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: Cluster does not have enough space for resharding'
  expression: ((last(/Elasticsearch Cluster by HTTP/es.nodes.fs.total_in_bytes) -
    last(/Elasticsearch Cluster by HTTP/es.nodes.fs.available_in_bytes)) / (last(/Elasticsearch
    Cluster by HTTP/es.cluster.number_of_data_nodes) - (last(/Elasticsearch Cluster
    by HTTP/es.cluster.number_of_data_nodes) >= 2)) > last(/Elasticsearch Cluster
    by HTTP/es.nodes.fs.available_in_bytes)) and (last(/Elasticsearch Cluster by HTTP/es.cluster.number_of_data_nodes)
    > 1)
  severity: high
  description: There is not enough disk space for index resharding.
  tags:
  - tag: scope
    value: capacity
- name: 'Elasticsearch: Cluster does not have enough space (single node)'
  expression: (last(/Elasticsearch Cluster by HTTP/es.nodes.fs.available_in_bytes)
    < 10G) and last(/Elasticsearch Cluster by HTTP/es.cluster.number_of_data_nodes)
    = 1
  severity: high
  description: "The total number of bytes available to JVM in the file store is less\
    \ than `{$ELASTICSEARCH.SINGLE.NODE.JVM.SPACE.MIN}`.\r\nThis is the actual amount\
    \ of free disk space the selected Elasticsearch node can use."
  tags:
  - tag: scope
    value: capacity
- name: 'Elasticsearch: The number of nodes within the cluster has decreased'
  expression: change(/Elasticsearch Cluster by HTTP/es.cluster.number_of_nodes)<0
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: The number of nodes within the cluster has increased'
  expression: change(/Elasticsearch Cluster by HTTP/es.cluster.number_of_nodes)>0
  severity: information
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: Health is YELLOW'
  expression: last(/Elasticsearch Cluster by HTTP/es.cluster.status)=1
  severity: average
  description: "All primary shards are assigned, but one or more replica shards are\
    \ unassigned.\r\nIf a node in the cluster fails, some data could be unavailable\
    \ until that node is repaired."
  tags:
  - tag: scope
    value: availability
- name: 'Elasticsearch: Health is RED'
  expression: last(/Elasticsearch Cluster by HTTP/es.cluster.status)=2
  severity: high
  description: "One or more primary shards are unassigned, so some data is unavailable.\r\
    \nThis can occur briefly during cluster startup as primary shards are assigned."
  tags:
  - tag: scope
    value: availability
- name: 'Elasticsearch: Health is UNKNOWN'
  expression: last(/Elasticsearch Cluster by HTTP/es.cluster.status)=255
  severity: high
  description: The health status of the cluster is unknown or cannot be obtained.
  tags:
  - tag: scope
    value: availability
- name: 'Elasticsearch: Cluster has the unassigned shards'
  expression: min(/Elasticsearch Cluster by HTTP/es.cluster.unassigned_shards,10m)>0
  severity: average
  description: The cluster has the unassigned shards longer than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: Cluster has only two master nodes'
  expression: last(/Elasticsearch Cluster by HTTP/es.nodes.count.master)=2
  severity: disaster
  description: The cluster has only two nodes with a master role and will be unavailable
    if one of them breaks.
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: Cluster has been restarted'
  expression: last(/Elasticsearch Cluster by HTTP/es.nodes.jvm.max_uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Elasticsearch: Service response time is too high'
  expression: min(/Elasticsearch Cluster by HTTP/net.tcp.service.perf["http","<SET
    ELASTICSEARCH HOST>","9200"],5m)>10s
  severity: warning
  description: The performance of the TCP service is very low.
  tags:
  - tag: scope
    value: performance
- name: 'Elasticsearch: Service is down'
  expression: last(/Elasticsearch Cluster by HTTP/net.tcp.service["http","<SET ELASTICSEARCH
    HOST>","9200"])=0
  severity: average
  description: The service is unavailable or does not accept TCP connections.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Cluster nodes discovery
  key: es.nodes.discovery
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'ES {#ES.NODE}: Flush latency'
    key: es.node.indices.flush.latency[{#ES.NODE}]
    interval: 1m
    type: calculated
    params: change(//es.node.indices.flush.total_time_in_millis[{#ES.NODE}]) / ( change(//es.node.indices.flush.total[{#ES.NODE}])
      + (change(//es.node.indices.flush.total[{#ES.NODE}]) = 0) )
    units: ms
  - name: 'ES {#ES.NODE}: Indexing latency'
    key: es.node.indices.indexing.index_latency[{#ES.NODE}]
    interval: 1m
    type: calculated
    params: change(//es.node.indices.indexing.index_time_in_millis[{#ES.NODE}]) /
      ( change(//es.node.indices.indexing.index_total[{#ES.NODE}]) + (change(//es.node.indices.indexing.index_total[{#ES.NODE}])
      = 0) )
    units: ms
  - name: 'ES {#ES.NODE}: Fetch latency'
    key: es.node.indices.search.fetch_latency[{#ES.NODE}]
    interval: 1m
    type: calculated
    params: change(//es.node.indices.search.fetch_time_in_millis[{#ES.NODE}]) / (
      change(//es.node.indices.search.fetch_total[{#ES.NODE}]) + (change(//es.node.indices.search.fetch_total[{#ES.NODE}])
      = 0) )
    units: ms
  - name: 'ES {#ES.NODE}: Query latency'
    key: es.node.indices.search.query_latency[{#ES.NODE}]
    interval: 1m
    type: calculated
    params: "change(//es.node.indices.search.query_time_in_millis[{#ES.NODE}]) /\r\
      \n( change(//es.node.indices.search.query_total[{#ES.NODE}]) + (change(//es.node.indices.search.query_total[{#ES.NODE}])\
      \ = 0) )"
    units: ms
  - name: 'ES {#ES.NODE}: Get data'
    key: es.node.get.data[{#ES.NODE}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'ES {#ES.NODE}: Total available size'
    key: es.node.fs.total.available_in_bytes[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: B
  - name: 'ES {#ES.NODE}: Total size'
    key: es.node.fs.total.total_in_bytes[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: B
  - name: 'ES {#ES.NODE}: Number of open HTTP connections'
    key: es.node.http.current_open[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Rate of HTTP connections opened'
    key: es.node.http.opened.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Total number of index flushes to disk'
    key: es.node.indices.flush.total[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Total time spent on flushing indices to disk'
    key: es.node.indices.flush.total_time_in_millis[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: ms
  - name: 'ES {#ES.NODE}: Current indexing operations'
    key: es.node.indices.indexing.index_current[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Total time spent performing indexing'
    key: es.node.indices.indexing.index_time_in_millis[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: ms
  - name: 'ES {#ES.NODE}: Total number of indexing'
    key: es.node.indices.indexing.index_total[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Time spent throttling operations'
    key: es.node.indices.indexing.throttle_time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Time spent throttling merge operations'
    key: es.node.indices.merges.total_throttled_time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Time spent throttling recovery operations'
    key: es.node.indices.recovery.throttle_time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Rate of index refreshes'
    key: es.node.indices.refresh.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Time spent performing refresh'
    key: es.node.indices.refresh.time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Rate of fetch'
    key: es.node.indices.search.fetch.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Current fetch operations'
    key: es.node.indices.search.fetch_current[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Time spent performing fetch'
    key: es.node.indices.search.fetch_time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Total time spent performing fetch'
    key: es.node.indices.search.fetch_time_in_millis[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: ms
  - name: 'ES {#ES.NODE}: Total number of fetch'
    key: es.node.indices.search.fetch_total[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Rate of queries'
    key: es.node.indices.search.query.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Current query operations'
    key: es.node.indices.search.query_current[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Time spent performing query'
    key: es.node.indices.search.query_time[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Total time spent performing query'
    key: es.node.indices.search.query_time_in_millis[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: ms
  - name: 'ES {#ES.NODE}: Total number of query'
    key: es.node.indices.search.query_total[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Amount of JVM heap committed'
    key: es.node.jvm.mem.heap_committed_in_bytes[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: B
  - name: 'ES {#ES.NODE}: Maximum JVM memory available for use'
    key: es.node.jvm.mem.heap_max_in_bytes[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: B
  - name: 'ES {#ES.NODE}: Amount of JVM heap currently in use'
    key: es.node.jvm.mem.heap_used_in_bytes[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
    units: B
  - name: 'ES {#ES.NODE}: Percent of JVM heap currently in use'
    key: es.node.jvm.mem.heap_used_percent[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: '%'
  - name: 'ES {#ES.NODE}: Node uptime'
    key: es.node.jvm.uptime[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: s
  - name: 'ES {#ES.NODE}: Refresh thread pool active threads'
    key: es.node.thread_pool.refresh.active[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Refresh thread pool executor tasks completed'
    key: es.node.thread_pool.refresh.completed.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Refresh thread pool tasks in queue'
    key: es.node.thread_pool.refresh.queue[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Refresh thread pool executor tasks rejected'
    key: es.node.thread_pool.refresh.rejected.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Search thread pool active threads'
    key: es.node.thread_pool.search.active[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Search thread pool executor tasks completed'
    key: es.node.thread_pool.search.completed.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Search thread pool tasks in queue'
    key: es.node.thread_pool.search.queue[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Search thread pool executor tasks rejected'
    key: es.node.thread_pool.search.rejected.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Write thread pool active threads'
    key: es.node.thread_pool.write.active[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Write thread pool executor tasks completed'
    key: es.node.thread_pool.write.completed.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  - name: 'ES {#ES.NODE}: Write thread pool tasks in queue'
    key: es.node.thread_pool.write.queue[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    value_type: unsigned
  - name: 'ES {#ES.NODE}: Write thread pool executor tasks rejected'
    key: es.node.thread_pool.write.rejected.rate[{#ES.NODE}]
    interval: '0'
    type: dependent
    master_item_key: es.node.get.data[{#ES.NODE}]
    units: rps
  trigger_prototypes:
  - name: 'Elasticsearch: ES {#ES.NODE}: Flush latency is too high'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.indices.flush.latency[{#ES.NODE}],5m)>100
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Indexing latency is too high'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.indices.indexing.index_latency[{#ES.NODE}],5m)>100
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Fetch latency is too high'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.indices.search.fetch_latency[{#ES.NODE}],5m)>100
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Query latency is too high'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.indices.search.query_latency[{#ES.NODE}],5m)>100
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Percent of JVM heap in use is critical'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.jvm.mem.heap_used_percent[{#ES.NODE}],1h)>95
    severity: high
  - name: 'Elasticsearch: ES {#ES.NODE}: Percent of JVM heap in use is high'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.jvm.mem.heap_used_percent[{#ES.NODE}],1h)>85
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Node has been restarted'
    expression: last(/Elasticsearch Cluster by HTTP/es.node.jvm.uptime[{#ES.NODE}])<10m
    severity: information
    allow_manual_close: true
  - name: 'Elasticsearch: ES {#ES.NODE}: Refresh thread pool executor has the rejected
      tasks'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.thread_pool.refresh.rejected.rate[{#ES.NODE}],5m)>0
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Search thread pool executor has the rejected
      tasks'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.thread_pool.search.rejected.rate[{#ES.NODE}],5m)>0
    severity: warning
  - name: 'Elasticsearch: ES {#ES.NODE}: Write thread pool executor has the rejected
      tasks'
    expression: min(/Elasticsearch Cluster by HTTP/es.node.thread_pool.write.rejected.rate[{#ES.NODE}],5m)>0
    severity: warning
