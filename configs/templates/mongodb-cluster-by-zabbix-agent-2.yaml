template: MongoDB cluster by Zabbix agent 2
description: "Get MongoDB metrics from plugin for the zabbix-agent2.\r\n  1. Setup\
  \ and configure zabbix-agent2 compiled with the MongoDB monitoring plugin.\r\n \
  \ 2. Set the {$MONGODB.CONNSTRING} such as <protocol(host:port)> or named session.\r\
  \n  3. Set the user name and password in host macros ({$MONGODB.USER}, {$MONGODB.PASSWORD})\
  \ if you want to override parameters from the Zabbix agent configuration file.\r\
  \n\r\n  All sharded Mongodb nodes (mongod) will be discovered with attached template\
  \ \"MongoDB node\".\r\n\r\nYou can discuss this template or leave feedback on our\
  \ forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/420659-discussion-thread-for-official-zabbix-template-db-mongodb\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Configserver heartbeat
  key: mongodb.config_server_heartbeat
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: s
  description: Difference between the latest optime of the CSRS primary that the mongos
    has seen and cluster time.
  history: 31d
  tags:
  - tag: component
    value: configserver
- name: 'Connection pool: available'
  key: mongodb.connection_pool.available
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: The total number of available outgoing connections from the current
    mongos instance to other members of the sharded cluster.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connection pool: client connections'
  key: mongodb.connection_pool.client
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: The number of active and stored outgoing synchronous connections from
    the current mongos instance to other members of the sharded cluster.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connection pool: created, rate'
  key: mongodb.connection_pool.created.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The total number of outgoing connections created per second by the
    current mongos instance to other members of the sharded cluster.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connection pool: in use'
  key: mongodb.connection_pool.in_use
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Reports the total number of outgoing connections from the current mongos
    instance to other members of the sharded cluster set that are currently in use.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connection pool: refreshing'
  key: mongodb.connection_pool.refreshing
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Reports the total number of outgoing connections from the current mongos
    instance to other members of the sharded cluster that are currently being refreshed.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: 'Connection pool: scoped'
  key: mongodb.connection_pool.scoped
  interval: '0'
  type: dependent
  master_item_key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Number of active and stored outgoing scoped synchronous connections
    from the current mongos instance to other members of the sharded cluster.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections, active
  key: mongodb.connections.active
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: "The number of active client connections to the server.\r\nActive client\
    \ connections refers to client connections that currently have operations in progress.\r\
    \nAvailable starting in  4.0.7, 0 for older versions."
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections, available
  key: mongodb.connections.available
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: '"The number of unused incoming connections available."'
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Connections, current
  key: mongodb.connections.current
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: "The number of incoming connections from clients to the database server.\r\
    \nThis number includes the current shell session."
  history: 31d
  tags:
  - tag: component
    value: connections
- name: New connections, rate
  key: mongodb.connections.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: '"Rate of all incoming connections created to the server."'
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Get mongodb.connpool.stats
  key: mongodb.connpool.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 1m
  value_type: text
  description: Returns current info about connpool.stats.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: connections
  - tag: component
    value: raw
- name: 'Cursor: open pinned'
  key: mongodb.cursor.open.pinned
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Number of pinned open cursors.
  history: 31d
  tags:
  - tag: component
    value: cursors
- name: 'Cursor: open total'
  key: mongodb.cursor.open.total
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Number of cursors that MongoDB is maintaining for clients.
  history: 31d
  tags:
  - tag: component
    value: cursors
- name: 'Cursor: timed out, rate'
  key: mongodb.cursor.timed_out.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: Number of cursors that time out, per second.
  history: 31d
  tags:
  - tag: component
    value: cursors
- name: Jumbo chunks
  key: mongodb.jumbo_chunks.count["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 1m
  value_type: unsigned
  description: Total number of 'jumbo' chunks in the mongo cluster.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Last seen configserver
  key: mongodb.last_seen_config_server
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: unixtime
  description: The latest optime of the CSRS primary that the mongos has seen.
  history: 31d
  tags:
  - tag: component
    value: configserver
- name: Architecture
  key: mongodb.mem.bits
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: bit
  description: A number, either 64 or 32, that indicates whether the MongoDB instance
    is compiled for 64-bit or 32-bit architecture.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'Memory: resident'
  key: mongodb.mem.resident
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: B
  description: Amount of memory currently used by the database process.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Memory: virtual'
  key: mongodb.mem.virtual
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: B
  description: Amount of virtual memory used by the mongos process.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: 'Cursor: open no timeout'
  key: mongodb.metrics.cursor.open.no_timeout
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: Number of open cursors with the option DBQuery.Option.noTimeout set
    to prevent timeout after a period of inactivity.
  history: 31d
  tags:
  - tag: component
    value: cursors
- name: Bytes in, rate
  key: mongodb.network.bytes_in.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The total number of bytes that the server has received over network
    connections initiated by clients or other mongod/mongos instances per second.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Bytes out, rate
  key: mongodb.network.bytes_out.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  units: Bps
  description: The total number of bytes that the server has sent over network connections
    initiated by clients or other mongod/mongos instances per second.
  history: 31d
  tags:
  - tag: component
    value: network
- name: Requests, rate
  key: mongodb.network.numRequests.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  units: '!Rps'
  description: Number of distinct requests that the server has received per second.
  history: 31d
  tags:
  - tag: component
    value: network
- name: 'Operations: command'
  key: mongodb.opcounters.command.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: "The number of commands issued to the database per second.\r\nCounts\
    \ all commands except the write commands: insert, update, and delete."
  history: 31d
  tags:
  - tag: component
    value: operations
- name: 'Operations: delete'
  key: mongodb.opcounters.delete.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The number of delete operations the mongos instance per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: 'Operations: getmore, rate'
  key: mongodb.opcounters.getmore.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: "The number of \"getmore\" operations the mongos per second. This counter\
    \ can be high even if the query count is low.\r\nSecondary nodes send getMore\
    \ operations as part of the replication process."
  history: 31d
  tags:
  - tag: component
    value: operations
- name: 'Operations: insert, rate'
  key: mongodb.opcounters.insert.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The number of insert operations received the mongos instance per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: 'Operations: query, rate'
  key: mongodb.opcounters.query.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The number of queries received the mongos instance per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: 'Operations: update, rate'
  key: mongodb.opcounters.update.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: The number of update operations the mongos instance per second.
  history: 31d
  tags:
  - tag: component
    value: operations
- name: Ping
  key: mongodb.ping["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30s
  value_type: unsigned
  description: Test if a connection is alive or not.
  history: 31d
  tags:
  - tag: component
    value: health
- name: Get server status
  key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 1m
  value_type: text
  description: The mongos statistic
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Uptime
  key: mongodb.uptime
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  units: s
  description: Number of seconds since the Mongos server start.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Mongos version
  key: mongodb.version
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: char
  description: Version of the Mongos server
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
triggers:
- name: 'MongoDB cluster: Available connections is low'
  expression: max(/MongoDB cluster by Zabbix agent 2/mongodb.connections.available,5m)<1000
  severity: warning
  description: "Too few available connections.\r\nConsider this value in combination\
    \ with the value of connections current to understand the connection load on the\
    \ database."
  tags:
  - tag: scope
    value: capacity
- name: 'MongoDB cluster: Too many cursors opened by MongoDB for clients'
  expression: min(/MongoDB cluster by Zabbix agent 2/mongodb.cursor.open.total,5m)>10000
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'MongoDB cluster: Too many cursors are timing out'
  expression: min(/MongoDB cluster by Zabbix agent 2/mongodb.cursor.timed_out.rate,5m)>1
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'MongoDB cluster: Connection to mongos proxy is unavailable'
  expression: last(/MongoDB cluster by Zabbix agent 2/mongodb.ping["tcp://localhost:27017","",""])=0
  severity: high
  description: Connection to mongos proxy instance is currently unavailable.
  tags:
  - tag: scope
    value: availability
- name: 'MongoDB cluster: Mongos server has been restarted'
  expression: last(/MongoDB cluster by Zabbix agent 2/mongodb.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MongoDB cluster: Failed to fetch info data'
  expression: nodata(/MongoDB cluster by Zabbix agent 2/mongodb.uptime,10m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 10 minutes
  tags:
  - tag: scope
    value: notice
- name: 'MongoDB cluster: Version has changed'
  expression: last(/MongoDB cluster by Zabbix agent 2/mongodb.version,#1)<>last(/MongoDB
    cluster by Zabbix agent 2/mongodb.version,#2) and length(last(/MongoDB cluster
    by Zabbix agent 2/mongodb.version))>0
  severity: information
  description: MongoDB cluster version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Config servers discovery
  key: mongodb.cfg.discovery["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30m
- name: Collection discovery
  key: mongodb.collections.discovery["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30m
  filter:
  - macro: '{#COLLECTION}'
    value: '{$MONGODB.LLD.FILTER.COLLECTION.MATCHES}'
  - macro: '{#COLLECTION}'
    value: '{$MONGODB.LLD.FILTER.COLLECTION.NOT_MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Get collection stats {#DBNAME}.{#COLLECTION}'
    key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    interval: 1m
    value_type: text
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Objects, avg size'
    key: mongodb.collection.avg_obj_size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    units: B
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped'
    key: mongodb.collection.capped["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: char
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Objects, count'
    key: mongodb.collection.count["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped, max number'
    key: mongodb.collection.max["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped, max size'
    key: mongodb.collection.max_size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Indexes'
    key: mongodb.collection.nindexes["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Size'
    key: mongodb.collection.size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Storage size'
    key: mongodb.collection.storage_size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
    units: B
- name: Database discovery
  key: mongodb.db.discovery["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30m
  filter:
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: 'MongoDB {#DBNAME}: Get db stats {#DBNAME}'
    key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    interval: 1m
    value_type: text
  - name: 'MongoDB {#DBNAME}: Size, data'
    key: mongodb.db.data_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Extents'
    key: mongodb.db.extents["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}: Size, file'
    key: mongodb.db.file_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Size, index'
    key: mongodb.db.index_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Objects, count'
    key: mongodb.db.objects["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}: Objects, avg size'
    key: mongodb.db.size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    units: B
  - name: 'MongoDB {#DBNAME}: Size, storage'
    key: mongodb.db.storage_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
