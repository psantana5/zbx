template: ClickHouse by HTTP
description: "This template is designed for the effortless deployment of ClickHouse\
  \ monitoring by Zabbix via HTTP and doesn't require any external scripts.\r\n\r\n\
  Setup:\r\n\r\n1. Create a user to monitor the service. For example, you could create\
  \ a file '/etc/clickhouse-server/users.d/zabbix.xml' with the following content:\r\
  \n\r\n<yandex>\r\n  <users>\r\n    <zabbix>\r\n      <password>zabbix_pass</password>\r\
  \n      <networks incl=\"networks\" />\r\n      <profile>web</profile>\r\n     \
  \ <quota>default</quota>\r\n      <allow_databases>\r\n        <database>test</database>\r\
  \n      </allow_databases>\r\n    </zabbix>\r\n  </users>\r\n</yandex>\r\n\r\n2.\
  \ Set the hostname or IP address of the ClickHouse HTTP endpoint in the '{$CLICKHOUSE.HOST}'\
  \ macro. You can also change the port in the '{$CLICKHOUSE.PORT}' macro and scheme\
  \ in the '{$CLICKHOUSE.SCHEME}' macro if necessary.\r\n\r\n3. Set the login and\
  \ password in the macros '{$CLICKHOUSE.USER}' and '{$CLICKHOUSE.PASSWORD}'. If you\
  \ don't need an authentication - remove headers from HTTP-Agent type items.\r\n\r\
  \nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Current distribute connections
  key: clickhouse.connections.distribute
  interval: '0'
  type: dependent
  master_item_key: clickhouse.system.metrics
  value_type: unsigned
  description: Number of connections to remote servers sending data that was INSERTed
    into Distributed tables.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Current HTTP connections
  key: clickhouse.connections.http
  interval: '0'
  type: dependent
  master_item_key: clickhouse.system.metrics
  value_type: unsigned
  description: Number of connections to HTTP server.
  history: 31d
