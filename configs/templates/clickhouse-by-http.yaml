- name: Replicas
  key: clickhouse.replicas.discovery
  interval: '0'
  type: dependent
  master_item_key: clickhouse.replicas
  filter:
  - macro: '{#DB}'
    value: '{$CLICKHOUSE.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DB}'
    value: '{$CLICKHOUSE.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: '{#DB}.{#TABLE}: Get replicas info'
    key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: '{#DB}.{#TABLE}: Active replicas'
    key: clickhouse.replica.active_replicas["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica future parts'
    key: clickhouse.replica.future_parts["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica queue inserts size'
    key: clickhouse.replica.inserts_in_queue["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica readonly'
    key: clickhouse.replica.is_readonly["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica session expired'
    key: clickhouse.replica.is_session_expired["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica lag'
    key: clickhouse.replica.lag["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
  - name: '{#DB}.{#TABLE}: Replica log max index'
    key: clickhouse.replica.log_max_index["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica log pointer'
    key: clickhouse.replica.log_pointer["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica queue merges size'
    key: clickhouse.replica.merges_in_queue["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica parts to check'
    key: clickhouse.replica.parts_to_check["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Replica queue size'
    key: clickhouse.replica.queue_size["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  - name: '{#DB}.{#TABLE}: Total replicas'
    key: clickhouse.replica.total_replicas["{#DB}.{#TABLE}"]
    interval: '0'
    type: dependent
    master_item_key: clickhouse.replica.info_raw["{#DB}.{#TABLE}"]
    value_type: unsigned
  trigger_prototypes:
  - name: 'ClickHouse: {#DB}.{#TABLE}: Number of active replicas less than number
      of total replicas'
    expression: max(/ClickHouse by HTTP/clickhouse.replica.active_replicas["{#DB}.{#TABLE}"],5m)
      < last(/ClickHouse by HTTP/clickhouse.replica.total_replicas["{#DB}.{#TABLE}"])
    severity: warning
  - name: 'ClickHouse: {#DB}.{#TABLE} Replica is readonly'
    expression: min(/ClickHouse by HTTP/clickhouse.replica.is_readonly["{#DB}.{#TABLE}"],5m)=1
    severity: warning
  - name: 'ClickHouse: {#DB}.{#TABLE} Replica session is expired'
    expression: min(/ClickHouse by HTTP/clickhouse.replica.is_session_expired["{#DB}.{#TABLE}"],5m)=1
    severity: warning
  - name: 'ClickHouse: {#DB}.{#TABLE}: Difference between log_max_index and log_pointer
      is too high'
    expression: min(/ClickHouse by HTTP/clickhouse.replica.lag["{#DB}.{#TABLE}"],5m)
      > 30
    severity: warning
  - name: 'ClickHouse: {#DB}.{#TABLE}: Too many operations in queue'
    expression: min(/ClickHouse by HTTP/clickhouse.replica.queue_size["{#DB}.{#TABLE}"],5m)>20
    severity: warning
