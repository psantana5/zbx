triggers:
- name: 'ClickHouse: Too many distributed files to insert'
  expression: min(/ClickHouse by HTTP/clickhouse.distributed.files,5m)>600
  severity: warning
  description: Clickhouse servers and <remote_servers> in config.xml (https://clickhouse.tech/docs/en/operations/table_engines/distributed/)
  tags:
  - tag: scope
    value: capacity
- name: 'ClickHouse: Too many throttled insert queries'
  expression: min(/ClickHouse by HTTP/clickhouse.insert.delay,5m)>0
  severity: warning
  description: Clickhouse have INSERT queries that are throttled due to high number
    of active data parts for partition in a MergeTree, please decrease INSERT frequency
  tags:
  - tag: scope
    value: performance
- name: 'ClickHouse: Too many MergeTree parts'
  expression: min(/ClickHouse by HTTP/clickhouse.max.part.count.for.partition,5m)>300
    * 0.9
  severity: warning
  description: "Descease INSERT queries frequency.\r\nClickhouse MergeTree table engine\
    \ split each INSERT query to partitions (PARTITION BY expression)\r\nand add one\
    \ or more PARTS per INSERT inside each partition,\r\nafter that background merge\
    \ process run, and when you have too much unmerged parts inside partition,\r\n\
    SELECT queries performance can significate degrade, so clickhouse try delay insert,\
    \ or abort it."
  tags:
  - tag: scope
    value: performance
- name: 'ClickHouse: Too many network errors'
  expression: min(/ClickHouse by HTTP/clickhouse.network.error.rate,5m)>5
  severity: warning
  description: Number of errors (timeouts and connection failures) during query execution,
    background pool tasks and DNS cache update is too high.
  tags:
  - tag: scope
    value: availability
- name: 'ClickHouse: Service is down'
  expression: last(/ClickHouse by HTTP/clickhouse.ping)=0 or last(/ClickHouse by HTTP/net.tcp.service[http,"<SET
    CLICKHOUSE HOST>","8123"]) = 0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'ClickHouse: There are queries running is long'
  expression: last(/ClickHouse by HTTP/clickhouse.process.elapsed)>600
  severity: average
  tags:
  - tag: scope
    value: performance
- name: 'ClickHouse: Replication lag is too high'
  expression: min(/ClickHouse by HTTP/clickhouse.replicas.max.absolute.delay,5m)>600
  severity: warning
  description: "When replica have too much lag, it can be skipped from Distributed\
    \ SELECT Queries without errors\r\nand you will have wrong query results."
  tags:
  - tag: scope
    value: performance
- name: 'ClickHouse: Configuration has been changed'
  expression: last(/ClickHouse by HTTP/clickhouse.system.settings,#1)<>last(/ClickHouse
    by HTTP/clickhouse.system.settings,#2) and length(last(/ClickHouse by HTTP/clickhouse.system.settings))>0
  severity: information
  description: ClickHouse configuration has been changed. Acknowledge to close the
    problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'ClickHouse: Host has been restarted'
  expression: last(/ClickHouse by HTTP/clickhouse.uptime)<10m
  severity: information
  description: The host uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'ClickHouse: Failed to fetch info data'
  expression: nodata(/ClickHouse by HTTP/clickhouse.uptime,30m)=1
  severity: warning
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'ClickHouse: Version has changed'
  expression: last(/ClickHouse by HTTP/clickhouse.version,#1)<>last(/ClickHouse by
    HTTP/clickhouse.version,#2) and length(last(/ClickHouse by HTTP/clickhouse.version))>0
  severity: information
  description: The ClickHouse version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'ClickHouse: Too many ZooKeeper sessions opened'
  expression: min(/ClickHouse by HTTP/clickhouse.zookeeper.session,5m)>1
  severity: warning
  description: "Number of sessions (connections) to ZooKeeper.\r\nShould be no more\
    \ than one, because using more than one connection to ZooKeeper may lead to bugs\
    \ due to lack of linearizability (stale reads) that ZooKeeper consistency model\
    \ allows."
  tags:
  - tag: scope
    value: performance
- name: 'ClickHouse: Port {$CLICKHOUSE.PORT} is unavailable'
  expression: last(/ClickHouse by HTTP/net.tcp.service[http,"<SET CLICKHOUSE HOST>","8123"])=0
  severity: average
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Databases
  key: clickhouse.db.discovery
  interval: '0'
  type: dependent
  master_item_key: clickhouse.databases
  filter:
  - macro: '{#DB}'
    value: '{$CLICKHOUSE.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DB}'
    value: '{$CLICKHOUSE.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: '{#DB}: Get DB info'
    key: clickhouse.db.info_raw["{#DB}"]
    interval: '0'
    type: dependent
    value_type: text
