- name: Checksum of /etc/passwd
  key: vfs.file.cksum[/etc/passwd,sha256]
  interval: 15m
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: security
- name: Get filesystems
  key: vfs.fs.get
  interval: 1m
  value_type: text
  description: The `vfs.fs.get` key acquires raw information set about the filesystems.
    Later to be extracted by preprocessing in dependent items.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Available memory
  key: vm.memory.size[available]
  interval: 1m
  value_type: unsigned
  units: B
  description: "The available memory:\r\n- in Linux = free + buffers + cache;\r\n\
    - on other platforms calculation may vary.\r\n\r\nSee also Appendixes in Zabbix\
    \ Documentation about parameters of the `vm.memory.size` item."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Available memory in %
  key: vm.memory.size[pavailable]
  interval: 1m
  units: '%'
  description: The available memory as percentage of the total. See also Appendixes
    in Zabbix Documentation about parameters of the `vm.memory.size` item.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Total memory
  key: vm.memory.size[total]
  interval: 1m
  value_type: unsigned
  units: B
  description: Total memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory utilization
  key: vm.memory.utilization
  interval: '0'
  type: dependent
  units: '%'
  description: The percentage of used memory is calculated as `100-pavailable`.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Zabbix agent availability
  key: zabbix[host,agent,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: Used for monitoring the availability status of the agent.
  history: 31d
  tags:
  - tag: component
    value: system
triggers:
- name: 'Linux: Configured max number of open filedescriptors is too low'
  expression: last(/Linux by Zabbix agent/kernel.maxfiles)<256
  severity: information
  tags:
  - tag: scope
    value: performance
- name: 'Linux: Configured max number of processes is too low'
  expression: last(/Linux by Zabbix agent/kernel.maxproc)<1024
  severity: information
  tags:
  - tag: scope
    value: performance
- name: 'Linux: Getting closer to process limit'
  expression: last(/Linux by Zabbix agent/proc.num)/last(/Linux by Zabbix agent/kernel.maxproc)*100>80
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Linux: Load average is too high'
  expression: "min(/Linux by Zabbix agent/system.cpu.load[all,avg1],5m)/last(/Linux\
    \ by Zabbix agent/system.cpu.num)>1.5\r\nand last(/Linux by Zabbix agent/system.cpu.load[all,avg5])>0\r\
    \nand last(/Linux by Zabbix agent/system.cpu.load[all,avg15])>0"
  severity: average
  description: The load average per CPU is too high. The system may be slow to respond.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: High CPU utilization'
  expression: min(/Linux by Zabbix agent/system.cpu.util,5m)>90
  severity: warning
  description: CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Linux: System name has changed'
  expression: change(/Linux by Zabbix agent/system.hostname) and length(last(/Linux
    by Zabbix agent/system.hostname))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Linux: System time is out of sync'
  expression: fuzzytime(/Linux by Zabbix agent/system.localtime,60s)=0
  severity: warning
  recovery_expression: fuzzytime(/Linux by Zabbix agent/system.localtime,10s)=1
  description: The host's system time is different from Zabbix server time.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Linux: Operating system description has changed'
  expression: change(/Linux by Zabbix agent/system.sw.os) and length(last(/Linux by
    Zabbix agent/system.sw.os))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Linux: Number of installed packages has been changed'
  expression: change(/Linux by Zabbix agent/system.sw.packages.get)<>0
  severity: warning
  tags:
  - tag: scope
    value: notice
- name: 'Linux: High swap space usage'
  expression: max(/Linux by Zabbix agent/system.swap.size[,pfree],5m)<50 and last(/Linux
    by Zabbix agent/system.swap.size[,total])>0
  severity: warning
  description: If there is no swap configured, this trigger is ignored.
  tags:
  - tag: scope
    value: capacity
- name: 'Linux: {HOST.NAME} has been restarted'
  expression: last(/Linux by Zabbix agent/system.uptime)<10m
  severity: warning
  description: The host uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Linux: /etc/passwd has been changed'
  expression: last(/Linux by Zabbix agent/vfs.file.cksum[/etc/passwd,sha256],#1)<>last(/Linux
    by Zabbix agent/vfs.file.cksum[/etc/passwd,sha256],#2)
  severity: information
  tags:
  - tag: scope
    value: security
- name: 'Linux: Lack of available memory'
  expression: max(/Linux by Zabbix agent/vm.memory.size[available],5m)<20M and last(/Linux
    by Zabbix agent/vm.memory.size[total])>0
  severity: average
  description: The system is running out of memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: High memory utilization'
  expression: min(/Linux by Zabbix agent/vm.memory.utilization,5m)>90
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: Zabbix agent is not available'
  expression: max(/Linux by Zabbix agent/zabbix[host,agent,available],3m)=0
  severity: average
  description: For passive agents only, host availability is used with `{$AGENT.TIMEOUT}`
    as a time threshold.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Network interface discovery
  key: net.if.discovery
  interval: 1h
  filter:
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}: Inbound packets discarded'
    key: net.if.in["{#IFNAME}",dropped]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}: Inbound packets with errors'
    key: net.if.in["{#IFNAME}",errors]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}: Bits received'
    key: net.if.in["{#IFNAME}"]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}: Outbound packets discarded'
    key: net.if.out["{#IFNAME}",dropped]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}: Outbound packets with errors'
    key: net.if.out["{#IFNAME}",errors]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}: Bits sent'
    key: net.if.out["{#IFNAME}"]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}: Operational status'
    key: vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}: Speed'
    key: vfs.file.contents["/sys/class/net/{#IFNAME}/speed"]
    interval: 5m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}: Interface type'
    key: vfs.file.contents["/sys/class/net/{#IFNAME}/type"]
    interval: 1h
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: Interface {#IFNAME}: High error rate'
    expression: "min(/Linux by Zabbix agent/net.if.in[\"{#IFNAME}\",errors],5m)>2\r\
      \nor min(/Linux by Zabbix agent/net.if.out[\"{#IFNAME}\",errors],5m)>2"
    severity: warning
    recovery_expression: "max(/Linux by Zabbix agent/net.if.in[\"{#IFNAME}\",errors],5m)<2*0.8\r\
      \nand max(/Linux by Zabbix agent/net.if.out[\"{#IFNAME}\",errors],5m)<2*0.8"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}: High bandwidth usage'
    expression: "(avg(/Linux by Zabbix agent/net.if.in[\"{#IFNAME}\"],15m)>(90/100)*last(/Linux\
      \ by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"]) or\r\
      \navg(/Linux by Zabbix agent/net.if.out[\"{#IFNAME}\"],15m)>(90/100)*last(/Linux\
      \ by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"])) and\r\
      \nlast(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"\
      ])>0"
    severity: warning
    recovery_expression: "avg(/Linux by Zabbix agent/net.if.in[\"{#IFNAME}\"],15m)<((90-3)/100)*last(/Linux\
      \ by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"]) and\r\
      \navg(/Linux by Zabbix agent/net.if.out[\"{#IFNAME}\"],15m)<((90-3)/100)*last(/Linux\
      \ by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"])"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}: Ethernet has changed to lower speed than it
      was before'
    expression: "change(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"\
      ])<0 and last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"\
      ])>0\r\nand\r\n(last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/type\"\
      ])=6 or last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/type\"\
      ])=1)\r\nand\r\n(last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/operstate\"\
      ])<>2)"
    severity: information
    recovery_expression: "(change(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"\
      ])>0 and last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/speed\"\
      ],#2)>0) or\r\n(last(/Linux by Zabbix agent/vfs.file.contents[\"/sys/class/net/{#IFNAME}/operstate\"\
      ])=2)"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}: Link down'
    expression: 1=1 and last(/Linux by Zabbix agent/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2
      and (last(/Linux by Zabbix agent/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#1)<>last(/Linux
      by Zabbix agent/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#2))
    severity: average
    recovery_expression: last(/Linux by Zabbix agent/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2
      or 1=0
    allow_manual_close: true
- name: Block devices discovery
  key: vfs.dev.discovery
  interval: 1h
  filter:
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.MATCHES}'
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.NOT_MATCHES}'
  - macro: '{#DEVTYPE}'
    value: disk
  item_prototypes:
  - name: '{#DEVNAME}: Disk read request avg waiting time (r_await)'
    key: vfs.dev.read.await[{#DEVNAME}]
    interval: 1m
    type: calculated
    units: '!ms'
  - name: '{#DEVNAME}: Disk write request avg waiting time (w_await)'
    key: vfs.dev.write.await[{#DEVNAME}]
    interval: 1m
    type: calculated
    units: '!ms'
  - name: '{#DEVNAME}: Get stats'
    key: vfs.file.contents[/sys/block/{#DEVNAME}/stat]
    interval: 1m
    value_type: text
  - name: '{#DEVNAME}: Disk average queue size (avgqu-sz)'
    key: vfs.dev.queue_size[{#DEVNAME}]
    interval: '0'
    type: dependent
  - name: '{#DEVNAME}: Disk read rate'
    key: vfs.dev.read.rate[{#DEVNAME}]
    interval: '0'
    type: dependent
    units: '!r/s'
  - name: '{#DEVNAME}: Disk read time (rate)'
    key: vfs.dev.read.time.rate[{#DEVNAME}]
    interval: '0'
    type: dependent
  - name: '{#DEVNAME}: Disk utilization'
    key: vfs.dev.util[{#DEVNAME}]
    interval: '0'
    type: dependent
    units: '%'
  - name: '{#DEVNAME}: Disk write rate'
    key: vfs.dev.write.rate[{#DEVNAME}]
    interval: '0'
    type: dependent
    units: '!w/s'
  - name: '{#DEVNAME}: Disk write time (rate)'
    key: vfs.dev.write.time.rate[{#DEVNAME}]
    interval: '0'
    type: dependent
  trigger_prototypes:
  - name: 'Linux: {#DEVNAME}: Disk read/write request responses are too high'
    expression: min(/Linux by Zabbix agent/vfs.dev.read.await[{#DEVNAME}],15m) > 20
      or min(/Linux by Zabbix agent/vfs.dev.write.await[{#DEVNAME}],15m) > 20
    severity: warning
    allow_manual_close: true
- name: Mounted filesystem discovery
  key: vfs.fs.dependent.discovery
  interval: '0'
  filter:
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSNAME}]: Get data'
    key: vfs.fs.dependent[{#FSNAME},data]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'FS [{#FSNAME}]: Inodes: Free, in %'
    key: vfs.fs.dependent.inode[{#FSNAME},pfree]
    interval: '0'
    type: dependent
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Available'
    key: vfs.fs.dependent.size[{#FSNAME},free]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used, in %'
    key: vfs.fs.dependent.size[{#FSNAME},pused]
    interval: '0'
    type: dependent
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Total'
    key: vfs.fs.dependent.size[{#FSNAME},total]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used'
    key: vfs.fs.dependent.size[{#FSNAME},used]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'FS [{#FSNAME}]: Option: Read-only'
    key: vfs.fs.dependent[{#FSNAME},readonly]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by Zabbix agent/vfs.fs.dependent.inode[{#FSNAME},pfree],5m)<10
    severity: average
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by Zabbix agent/vfs.fs.dependent.inode[{#FSNAME},pfree],5m)<20
    severity: warning
  - name: 'Linux: FS [{#FSNAME}]: Space is critically low'
    expression: min(/Linux by Zabbix agent/vfs.fs.dependent.size[{#FSNAME},pused],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'Linux: FS [{#FSNAME}]: Space is low'
    expression: min(/Linux by Zabbix agent/vfs.fs.dependent.size[{#FSNAME},pused],5m)>80
    severity: warning
    allow_manual_close: true
  - name: 'Linux: FS [{#FSNAME}]: Filesystem has become read-only'
    expression: last(/Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly],#2)=0
      and last(/Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly])=1
    severity: average
    recovery_expression: last(/Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly])=0
    allow_manual_close: true
