template: Linux by Zabbix agent
description: "This is an official Linux template. It requires Zabbix agent 7.4 or\
  \ newer.\r\n\r\nNotes on filesystem (FS) discovery:\r\n- The ext4/3/2 filesystem\
  \ reserves space for privileged usage, typically set at 5% by default.\r\n- BTRFS\
  \ allocates a default of 10% of the volume for its own needs.\r\n- To mitigate potential\
  \ disasters, FS usage triggers are based on the maximum available space.\r\n  -\
  \ Utilization formula: 'pused = 100 - 100 * (available / total - free + available)'\r\
  \n- The FS utilization chart, derived from graph prototypes, reflects FS reserved\
  \ space as the difference between used and available space from the total volume.\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387225-discussion-thread-for-official-zabbix-template-for-linux\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Host name of Zabbix agent running
  key: agent.hostname
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Zabbix agent ping
  key: agent.ping
  interval: 1m
  value_type: unsigned
  description: The agent always returns "1" for this item. May be used in combination
    with `nodata()` for the availability check.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Version of Zabbix agent running
  key: agent.version
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Maximum number of open file descriptors
  key: kernel.maxfiles
  interval: 1h
  value_type: unsigned
  description: May be increased by using the `sysctl` utility or modifying the file
    `/etc/sysctl.conf`.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Maximum number of processes
  key: kernel.maxproc
  interval: 1h
  value_type: unsigned
  description: May be increased by using the `sysctl` utility or modifying the file
    `/etc/sysctl.conf`.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Number of processes
  key: proc.num
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: system
- name: Number of running processes
  key: proc.num[,,run]
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: system
- name: System boot time
  key: system.boottime
  interval: 15m
  value_type: unsigned
  units: unixtime
  history: 31d
  tags:
  - tag: component
    value: system
- name: Interrupts per second
  key: system.cpu.intr
  interval: 1m
  description: Number of interrupts processed.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (15m avg)
  key: system.cpu.load[all,avg15]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (1m avg)
  key: system.cpu.load[all,avg1]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (5m avg)
  key: system.cpu.load[all,avg5]
  interval: 1m
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Number of CPUs
  key: system.cpu.num
  interval: 1m
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Context switches per second
  key: system.cpu.switches
  interval: 1m
  description: The combined rate at which all processors on the computer are switched
    from one thread to another.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU utilization
  key: system.cpu.util
  interval: '0'
  type: dependent
  units: '%'
  description: CPU utilization expressed in %.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU guest time
  key: system.cpu.util[,guest]
  interval: 1m
  units: '%'
  description: Time spent on running a virtual CPU for a guest operating system.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU guest nice time
  key: system.cpu.util[,guest_nice]
  interval: 1m
  units: '%'
  description: Time spent on running a niced guest (a virtual CPU for guest operating
    systems under the control of the Linux kernel).
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU idle time
  key: system.cpu.util[,idle]
  interval: 1m
  units: '%'
  description: Time the CPU has spent doing nothing.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU interrupt time
  key: system.cpu.util[,interrupt]
  interval: 1m
  units: '%'
  description: Time the CPU has spent servicing hardware interrupts.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU iowait time
  key: system.cpu.util[,iowait]
  interval: 1m
  units: '%'
  description: Time the CPU has been waiting for I/O to complete.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU nice time
  key: system.cpu.util[,nice]
  interval: 1m
  units: '%'
  description: Time the CPU has spent running users' processes that have been niced.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU softirq time
  key: system.cpu.util[,softirq]
  interval: 1m
  units: '%'
  description: Time the CPU has been servicing software interrupts.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU steal time
  key: system.cpu.util[,steal]
  interval: 1m
  units: '%'
  description: The amount of "stolen" CPU from this virtual machine by the hypervisor
    for other tasks, such as running another virtual machine.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU system time
  key: system.cpu.util[,system]
  interval: 1m
  units: '%'
  description: Time the CPU has spent running the kernel and its processes.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU user time
  key: system.cpu.util[,user]
  interval: 1m
  units: '%'
  description: Time the CPU has spent running users' processes that are not niced.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System name
  key: system.hostname
  interval: 1h
  value_type: char
  description: The host name of the system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System local time
  key: system.localtime
  interval: 1m
  value_type: unsigned
  units: unixtime
  description: The local system time of the host.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Operating system architecture
  key: system.sw.arch
  interval: 1h
  value_type: char
  description: The architecture of the operating system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Operating system
  key: system.sw.os
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Number of installed packages
  key: system.sw.packages.get
  interval: 1h
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: os
- name: Free swap space
  key: system.swap.size[,free]
  interval: 1m
  value_type: unsigned
  units: B
  description: The free space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Free swap space in %
  key: system.swap.size[,pfree]
  interval: 1m
  units: '%'
  description: The free space of the swap volume/file expressed in %.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Total swap space
  key: system.swap.size[,total]
  interval: 1m
  value_type: unsigned
  units: B
  description: The total space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: System description
  key: system.uname
  interval: 15m
  value_type: char
  description: The information as normally returned by `uname -a`.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System uptime
  key: system.uptime
  interval: 30s
  value_type: unsigned
  units: uptime
  description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Number of logged in users
  key: system.users.num
  interval: 1m
  value_type: unsigned
  description: The number of users who are currently logged in.
  history: 31d
  tags:
  - tag: component
