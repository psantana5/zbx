    value: requests
- name: Application server status
  key: gitlab.liveness
  interval: 1m
  type: http_agent
  value_type: unsigned
  description: Checks whether the application server is running. This probe is used
    to know if Rails Controllers are not deadlocked due to a multi-threading.
  history: 31d
