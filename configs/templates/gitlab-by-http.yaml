  - tag: component
    value: database
- name: 'Database: Connection pool, size'
  key: gitlab.database.connection_pool_size
  interval: '0'
  type: dependent
  master_item_key: gitlab.get_metrics
  value_type: unsigned
  description: Total connection to the main database pool capacity.
  history: 31d
