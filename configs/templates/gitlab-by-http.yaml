template: GitLab by HTTP
description: "Get GitLab metrics by HTTP agent from Prometheus metrics endpoint.\r\
  \n\r\nTo access the metrics, the client IP address must be explicitly allowed. See\
  \ https://docs.gitlab.com/ee/administration/monitoring/ip_whitelist.html.\r\nOr\
  \ second method, using token variable from http://your.gitlab.address/admin/health_check\
  \ (fill {$GITLAB.HEALTH.TOKEN} macro with variable path like \"?token=your_token\"\
  ).\r\nDon't forget change macros {$GITLAB.URL}.\r\nSome metrics may not be collected\
  \ depending on your Gitlab instance version and configuration. See (Gitlab's documentation[)https://docs.gitlab.com/ee/administration/monitoring/prometheus/gitlab_metrics.html]\
  \ for further information about its metric collection.\r\n\r\nYou can discuss this\
  \ template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: 'Cache: Misses rate, total'
  key: gitlab.cache.misses_total.rate
  interval: '0'
  type: dependent
  master_item_key: gitlab.get_metrics
  description: The cache read miss count.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: 'Cache: Operations rate, total'
  key: gitlab.cache.operations_total.rate
  interval: '0'
  type: dependent
  master_item_key: gitlab.get_metrics
  description: The count of cache operations.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: 'Database: Connection pool, busy'
