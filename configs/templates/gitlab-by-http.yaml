  - tag: component
    value: sessions
- name: Get instance metrics
  key: gitlab.get_metrics
  interval: 1m
  type: http_agent
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: HTTP requests rate, 4xx
