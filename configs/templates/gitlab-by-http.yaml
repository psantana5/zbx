  - tag: component
    value: database
- name: 'Database: Connection pool, waiting'
  key: gitlab.database.connection_pool_waiting
  interval: '0'
  type: dependent
  master_item_key: gitlab.get_metrics
  value_type: unsigned
  description: Threads currently waiting on this queue.
