triggers:
- name: 'GitLab: Version has changed'
  expression: last(/GitLab by HTTP/gitlab.deployments.version,#1)<>last(/GitLab by
    HTTP/gitlab.deployments.version,#2) and length(last(/GitLab by HTTP/gitlab.deployments.version))>0
  severity: information
  description: The GitLab version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'GitLab: Too many HTTP requests failures'
  expression: min(/GitLab by HTTP/gitlab.http.requests.5xx.rate,5m)>2
  severity: warning
  description: '"Too many requests failed on GitLab instance with 5xx HTTP code"'
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Liveness check was failed'
  expression: last(/GitLab by HTTP/gitlab.liveness)=0
  severity: high
  description: The application server is not running or Rails Controllers are deadlocked.
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Gitlab instance is not able to accept traffic'
  expression: last(/GitLab by HTTP/gitlab.readiness)=0
  severity: high
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Too many Redis cache client exceptions'
  expression: min(/GitLab by HTTP/gitlab.redis.client_exceptions.cache.rate,5m)>2
  severity: warning
  description: '"Too many  Redis client exceptions during the requests to  Redis instance
    cache."'
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Too many Redis queues client exceptions'
  expression: min(/GitLab by HTTP/gitlab.redis.client_exceptions.queues.rate,5m)>2
  severity: warning
  description: '"Too many  Redis client exceptions during the requests to  Redis instance
    queues."'
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Too many Redis shared_state client exceptions'
  expression: min(/GitLab by HTTP/gitlab.redis.client_exceptions.shared_state.rate,5m)>2
  severity: warning
  description: '"Too many  Redis client exceptions during the requests to  Redis instance
    shared_state."'
  tags:
  - tag: scope
    value: availability
- name: 'GitLab: Current number of open files is too high'
  expression: min(/GitLab by HTTP/gitlab.ruby.file_descriptors.max,5m)/last(/GitLab
    by HTTP/gitlab.ruby.process_max_fds)*100>90
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'GitLab: Failed to fetch info data'
  expression: nodata(/GitLab by HTTP/gitlab.ruby.threads_running,30m)=1
  severity: warning
  description: Zabbix has not received a metrics data for the last 30 minutes
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Puma metrics discovery
  key: gitlab.puma.discovery
  interval: 3h
  type: http_agent
  item_prototypes:
  - name: Active connections
    key: gitlab.puma.active_connections[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Idle threads
    key: gitlab.puma.idle_threads[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Killer terminations, total
    key: gitlab.puma.killer_terminations_total[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Max threads
    key: gitlab.puma.max_threads[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Pool capacity
    key: gitlab.puma.pool_capacity[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Queued connections
    key: gitlab.puma.queued_connections[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Running threads
    key: gitlab.puma.running[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Running workers
    key: gitlab.puma.running_workers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Stale workers
    key: gitlab.puma.stale_workers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Workers
    key: gitlab.puma.workers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'GitLab: Puma instance thread utilization is too high'
    expression: min(/GitLab by HTTP/gitlab.puma.active_connections[{#SINGLETON}],5m)/last(/GitLab
      by HTTP/gitlab.puma.max_threads[{#SINGLETON}])*100>90
    severity: warning
  - name: 'GitLab: Puma is queueing requests'
    expression: min(/GitLab by HTTP/gitlab.puma.queued_connections[{#SINGLETON}],15m)>1
    severity: warning
- name: Unicorn metrics discovery
  key: gitlab.unicorn.discovery
  interval: 3h
  type: http_agent
  item_prototypes:
  - name: 'Unicorn: Active connections'
    key: gitlab.unicorn.active_connections[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Unicorn: Queued connections'
    key: gitlab.unicorn.queued_connections[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Unicorn: Workers'
    key: gitlab.unicorn.unicorn_workers[{#SINGLETON}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'GitLab: Unicorn worker utilization is too high'
    expression: min(/GitLab by HTTP/gitlab.unicorn.active_connections[{#SINGLETON}],5m)/last(/GitLab
      by HTTP/gitlab.unicorn.unicorn_workers[{#SINGLETON}])*100>90
    severity: warning
  - name: 'GitLab: Unicorn is queueing requests'
    expression: min(/GitLab by HTTP/gitlab.unicorn.queued_connections[{#SINGLETON}],5m)>1
    severity: warning
