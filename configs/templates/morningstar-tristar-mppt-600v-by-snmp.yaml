template: Morningstar TriStar MPPT 600V by SNMP
description: "MIBs used:\r\nTRISTAR-MPPT\r\n\r\nGenerated by official Zabbix template\
  \ tool \"Templator\""
groups:
- Templates
items:
- name: 'Array: Array Current'
  key: array.current[arrayCurrent.0]
  interval: 1m
  units: A
  description: "MIB: TRISTAR-MPPT\r\nDescription:Array Current\r\nScaling Factor:1.0\r\
    \nUnits:A\r\nRange:[-10, 80]\r\nModbus address:0x001d"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Sweep Pmax'
  key: array.sweep_pmax[arrayPmaxLastSweep.0]
  interval: 1m
  units: W
  description: "MIB: TRISTAR-MPPT\r\nDescription:Pmax (last sweep)\r\nScaling Factor:1.0\r\
    \nUnits:W\r\nRange:[-10, 5000]\r\nModbus address:0x003c"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Sweep Vmp'
  key: array.sweep_vmp[arrayVmpLastSweep.0]
  interval: 1m
  units: V
  description: "MIB: TRISTAR-MPPT\r\nDescription:Vmp (last sweep)\r\nScaling Factor:1.0\r\
    \nUnits:V\r\nRange:[-10, 650.0]\r\nModbus address:0x003d"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Sweep Voc'
