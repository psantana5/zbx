  description: "MIB: TRISTAR-MPPT\r\nDescription:Voc (last sweep)\r\nScaling Factor:1.0\r\
    \nUnits:V\r\nRange:[-10, 650.0]\r\nModbus address:0x003e"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Voltage'
  key: array.voltage[arrayVoltage.0]
  interval: 1m
  units: V
  description: "MIB: TRISTAR-MPPT\r\nDescription:Array Voltage\r\nScaling Factor:1.0\r\
    \nUnits:V\r\nRange:[-10, 650]\r\nModbus address:0x001b"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Battery: Battery Voltage discovery'
