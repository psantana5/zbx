- name: 'Status: Alarms'
  key: status.alarms[alarms.0]
  interval: 1m
  value_type: text
  description: "MIB: TRISTAR-MPPT\r\nDescription:Alarms\r\nModbus addresses:H=0x002e\
    \ L=0x002f"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: status
- name: 'Status: Faults'
  key: status.faults[faults.0]
  interval: 1m
  value_type: text
  description: "MIB: TRISTAR-MPPT\r\nDescription:Faults\r\nModbus addresses:H=0x002c\
    \ L=0x002d"
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: status
- name: 'Status: Uptime (hardware)'
  key: status.hw.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: The amount of time since this host was last initialized. Note that
    this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime
    is the uptime of the network management portion of the system.
  history: 31d
  tags:
  - tag: component
    value: status
- name: 'Status: Uptime (network)'
  key: status.net.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: The time (in hundredths of a second) since the network management portion
    of the system was last re-initialized.
  history: 31d
  tags:
  - tag: component
    value: status
- name: 'Battery: Target Voltage'
