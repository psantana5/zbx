template: MySQL by ODBC
description: "Requirements for template operation:\r\n1. Create a MySQL user for monitoring.\
  \ For example:\r\n\r\nCREATE USER 'zbx_monitor'@'%' IDENTIFIED BY '<password>';\r\
  \nGRANT REPLICATION CLIENT,PROCESS,SHOW DATABASES,SHOW VIEW ON *.* TO 'zbx_monitor'@'%';\r\
  \n\r\nFor more information please read the MySQL documentation https://dev.mysql.com/doc/refman/8.0/en/grant.html.\r\
  \n\r\nNOTE: In order to collect replication metrics, MariaDB Enterprise Server 10.5.8-5\
  \ and above and MariaDB Community Server 10.5.9 and above require the SLAVE MONITOR\
  \ privilege to be set for the monitoring user:\r\n\r\nGRANT REPLICATION CLIENT,PROCESS,SHOW\
  \ DATABASES,SHOW VIEW,SLAVE MONITOR ON *.* TO 'zbx_monitor'@'%';\r\n\r\nFor more\
  \ information please read the MariaDB documentation https://mariadb.com/docs/server/ref/mdb/privileges/SLAVE_MONITOR/.\r\
  \n\r\n2. Set the user name and password in the host macros ({$MYSQL.USER} and {$MYSQL.PASSWORD}).\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384189-discussion-thread-for-official-zabbix-template-db-mysql.\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Get database
  key: db.odbc.get[get_database,"{$MYSQL.DSN}"]
  interval: 1h
  type: db_monitor
  params: show databases
  value_type: text
  description: Used for scanning databases in DBMS.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get replication
  key: db.odbc.get[get_replication,"{$MYSQL.DSN}"]
  interval: 1h
  type: db_monitor
  params: show replica status
  value_type: text
  description: Gets replication status information.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get status variables
  key: db.odbc.get[get_status_variables,"{$MYSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: show global status
  value_type: text
  description: Gets server global status information.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Status
  key: db.odbc.select[ping,"{$MYSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: select "1"
  value_type: unsigned
  description: MySQL server status.
  history: 31d
  tags:
  - tag: component
    value: application
  - tag: component
    value: health
- name: Version
  key: db.odbc.select[version,"{$MYSQL.DSN}"]
  interval: 15m
  type: db_monitor
  params: select version()
  value_type: char
  description: MySQL server version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Aborted clients per second
  key: mysql.aborted_clients.rate
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_status_variables,"{$MYSQL.DSN}"]
  description: Number of connections that were aborted because the client died without
    closing the connection properly.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Aborted connections per second
  key: mysql.aborted_connects.rate
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_status_variables,"{$MYSQL.DSN}"]
  description: Number of failed attempts to connect to the MySQL server.
  history: 31d
  tags:
  - tag: component
    value: connections
- name: Binlog cache disk use
  key: mysql.binlog_cache_disk_use
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_status_variables,"{$MYSQL.DSN}"]
  description: Number of transactions that used a temporary disk cache because they
    could not fit in the regular binary log cache, being larger than `binlog_cache_size`.
  history: 31d
  tags:
  - tag: component
    value: cache
- name: Buffer pool efficiency
  key: mysql.buffer_pool_efficiency
  interval: 1m
  type: calculated
  params: "100 - (last(//mysql.innodb_buffer_pool_reads) / \r\n( last(//mysql.innodb_buffer_pool_read_requests)\
    \ + \r\n( last(//mysql.innodb_buffer_pool_read_requests) = 0 ) ) * 100 * \r\n\
    ( last(//mysql.innodb_buffer_pool_read_requests) > 0 ))"
  units: '%'
  description: The item shows how effectively the buffer pool is serving reads.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Buffer pool utilization
  key: mysql.buffer_pool_utilization
  interval: 1m
  type: calculated
  params: "( last(//mysql.innodb_buffer_pool_pages_total) - \r\nlast(//mysql.innodb_buffer_pool_pages_free)\
    \ ) / \r\n( last(//mysql.innodb_buffer_pool_pages_total) + \r\n( last(//mysql.innodb_buffer_pool_pages_total)\
    \ = 0 ) ) * 100 * \r\n( last(//mysql.innodb_buffer_pool_pages_total) > 0 )"
  units: '%'
  description: Ratio of used to total pages in the buffer pool.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Bytes received
