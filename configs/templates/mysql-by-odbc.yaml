  master_item_key: db.odbc.get[get_status_variables,"{$MYSQL.DSN}"]
  description: Number of times InnoDB waited for a free page before reading or creating
    a page. Normally, writes to the InnoDB buffer pool happen in the background. When
    no clean pages are available, dirty pages are flushed first in order to free some
    up. This counts the numbers of wait for this operation to finish. If this value
    is not small, look at the increasing `innodb_buffer_pool_size`.
  history: 31d
