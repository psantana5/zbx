triggers:
- name: 'MySQL: Service is down'
  expression: last(/MySQL by ODBC/db.odbc.select[ping,""])=0
  severity: high
  description: MySQL is down.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Version has changed'
  expression: last(/MySQL by ODBC/db.odbc.select[version,""],#1)<>last(/MySQL by ODBC/db.odbc.select[version,""],#2)
    and length(last(/MySQL by ODBC/db.odbc.select[version,""]))>0
  severity: information
  description: The MySQL version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'MySQL: Server has aborted connections'
  expression: min(/MySQL by ODBC/mysql.aborted_connects.rate,5m)>3
  severity: average
  description: The number of failed attempts to connect to the MySQL server is more
    than `{$MYSQL.ABORTED_CONN.MAX.WARN}` in the last 5 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Buffer pool utilization is too low'
  expression: max(/MySQL by ODBC/mysql.buffer_pool_utilization,5m)<50
  severity: warning
  description: The buffer pool utilization is less than `{$MYSQL.BUFF_UTIL.MIN.WARN}`%
    in the last 5 minutes. This means that there is a lot of unused RAM allocated
    for the buffer pool, which you can easily reallocate at the moment.
  tags:
  - tag: scope
    value: notice
- name: 'MySQL: Refused connections'
  expression: last(/MySQL by ODBC/mysql.connection_errors_max_connections.rate)>0
  severity: average
  description: Number of refused connections due to the `max_connections` limit being
    reached.
  tags:
  - tag: scope
    value: availability
- name: 'MySQL: Number of on-disk temporary tables created per second is high'
  expression: min(/MySQL by ODBC/mysql.created_tmp_disk_tables.rate,5m)>10
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Number of temporary files created per second is high'
  expression: min(/MySQL by ODBC/mysql.created_tmp_files.rate,5m)>10
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Number of internal temporary tables created per second is high'
  expression: min(/MySQL by ODBC/mysql.created_tmp_tables.rate,5m)>30
  severity: warning
  description: The application using the database may be in need of query optimization.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Server has slow queries'
  expression: min(/MySQL by ODBC/mysql.slow_queries.rate,5m)>3
  severity: warning
  description: The number of slow queries is more than `{$MYSQL.SLOW_QUERIES.MAX.WARN}`
    in the last 5 minutes.
  tags:
  - tag: scope
    value: performance
- name: 'MySQL: Service has been restarted'
  expression: last(/MySQL by ODBC/mysql.uptime)<10m
  severity: information
  description: MySQL uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MySQL: Failed to fetch info data'
  expression: nodata(/MySQL by ODBC/mysql.uptime,30m)=1
  severity: information
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Database discovery
  key: mysql.database.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_database,"{$MYSQL.DSN}"]
  filter:
  - macro: '{#DATABASE}'
    value: '{$MYSQL.DBNAME.MATCHES}'
  - macro: '{#DATABASE}'
    value: '{$MYSQL.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: Size of database {#DATABASE}
    key: db.odbc.select[{#DATABASE}_size,"{$MYSQL.DSN}"]
    interval: 5m
    type: db_monitor
    params: SELECT COALESCE(SUM(DATA_LENGTH + INDEX_LENGTH),0) FROM INFORMATION_SCHEMA.TABLES
      WHERE TABLE_SCHEMA="{#DATABASE}"
    value_type: unsigned
    units: B
- name: MariaDB discovery
  key: mysql.extra_metric.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.select[version,"{$MYSQL.DSN}"]
  item_prototypes:
  - name: Binlog commits
    key: mysql.binlog_commits[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Binlog group commits
    key: mysql.binlog_group_commits[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait count
    key: mysql.master_gtid_wait_count[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait timeouts
    key: mysql.master_gtid_wait_timeouts[{#SINGLETON}]
    interval: '0'
    type: dependent
  - name: Master GTID wait time
    key: mysql.master_gtid_wait_time[{#SINGLETON}]
    interval: '0'
    type: dependent
- name: Replication discovery
  key: mysql.replication.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_replication,"{$MYSQL.DSN}"]
  item_prototypes:
  - name: Replication {#REPLICA.NAME} status
    key: db.odbc.get["get_{#REPLICA.KEY}_status","{$MYSQL.DSN}"]
    interval: 1m
    type: db_monitor
    params: show {#REPLICA.KEY} status
    value_type: text
  - name: Replication Seconds Behind {#SOURCE.NAME}
    key: mysql.seconds_behind_master["{#REPLICA.KEY}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get["get_{#REPLICA.KEY}_status","{$MYSQL.DSN}"]
    value_type: unsigned
    units: s
  - name: Replication {#REPLICA.NAME} IO Running
    key: mysql.slave_io_running["{#REPLICA.KEY}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get["get_{#REPLICA.KEY}_status","{$MYSQL.DSN}"]
    value_type: char
  - name: Replication {#REPLICA.NAME} SQL Running
    key: mysql.slave_sql_running["{#REPLICA.KEY}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get["get_{#REPLICA.KEY}_status","{$MYSQL.DSN}"]
    value_type: char
  - name: Replication {#REPLICA.NAME} SQL Running State
    key: mysql.slave_sql_running_state["{#REPLICA.KEY}"]
    interval: '0'
    type: dependent
    master_item_key: db.odbc.get["get_{#REPLICA.KEY}_status","{$MYSQL.DSN}"]
    value_type: text
  trigger_prototypes:
  - name: 'MySQL: Replication lag is too high'
    expression: min(/MySQL by ODBC/mysql.seconds_behind_master["{#REPLICA.KEY}"],5m)>30m
    severity: warning
  - name: 'MySQL: The {#REPLICA.KEY} I/O thread is not running'
    expression: count(/MySQL by ODBC/mysql.slave_io_running["{#REPLICA.KEY}"],#1,"eq","No")=1
    severity: average
  - name: 'MySQL: The {#REPLICA.KEY} I/O thread is not connected to a replication
      {#SOURCE.KEY}'
    expression: count(/MySQL by ODBC/mysql.slave_io_running["{#REPLICA.KEY}"],#1,"ne","Yes")=1
    severity: warning
  - name: 'MySQL: The SQL thread is not running'
    expression: count(/MySQL by ODBC/mysql.slave_sql_running["{#REPLICA.KEY}"],#1,"eq","No")=1
    severity: warning
