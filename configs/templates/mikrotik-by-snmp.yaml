template: Mikrotik by SNMP
description: "Template Net Mikrotik\r\n\r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\
  \nMIKROTIK-MIB\r\nIF-MIB\r\n\r\nKnown Issues:\r\n\r\n  Description: Doesn't have\
  \ ifHighSpeed filled. Fixed in more recent versions\r\n  Version: RouterOS 6.28\
  \ or lower\r\n\r\n  Description: Doesn't have any temperature sensors\r\n  Version:\
  \ RouterOS 6.38.5\r\n  Device: Mikrotik 941-2nD, Mikrotik 951G-2HnD\r\n\r\nGenerated\
  \ by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: 'Mikrotik: SNMP walk network interfaces'
  key: net.if.walk
  interval: 1m
  value_type: text
  description: Discovering interfaces from IF-MIB.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk wireless interfaces
  key: net.if.wireless.walk
  interval: 1m
  value_type: text
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP walk system CPUs
  key: system.cpu.walk
  interval: 1m
  value_type: text
  description: "MIB: HOST-RESOURCES-MIB\r\nDiscovering system CPUs."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Firmware version
  key: system.hw.firmware
  interval: 1h
  value_type: char
  description: "MIB: MIKROTIK-MIB\r\nCurrent firmware version."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1h
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1h
  value_type: char
  description: "MIB: MIKROTIK-MIB\r\nRouterBOARD serial number."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Operating system
  key: system.sw.os[mtxrLicVersion.0]
  interval: 1h
  value_type: char
  description: "MIB: MIKROTIK-MIB\r\nSoftware version."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: SNMP walk mounted filesystems
  key: vfs.fs.walk
  interval: 1m
  value_type: text
  description: "MIB: HOST-RESOURCES-MIB\r\nDiscovering mounted filesystems."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Total memory
  key: vm.memory.total[hrStorageSize.Memory]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: HOST-RESOURCES-MIB\r\nThe size of the storage represented by\
    \ this entry, in\r\nunits of hrStorageAllocationUnits. This object is\r\nwritable\
    \ to allow remote configuration of the size of\r\nthe storage area in those cases\
    \ where such an\r\noperation makes sense and is possible on the\r\nunderlying\
    \ system. For example, the amount of main\r\nmemory allocated to a buffer pool\
    \ might be modified or\r\nthe amount of disk space allocated to virtual memory\r\
    \nmight be modified."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Used memory
  key: vm.memory.used[hrStorageUsed.Memory]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of the storage represented by\
    \ this entry that is allocated, in units of hrStorageAllocationUnits."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory utilization
  key: vm.memory.util[memoryUsedPercentage.Memory]
  interval: 1m
  type: calculated
  params: last(//vm.memory.used[hrStorageUsed.Memory])/last(//vm.memory.total[hrStorageSize.Memory])*100
  units: '%'
  description: Memory utilization in %.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'MikroTik: Unavailable by ICMP ping'
  expression: max(/Mikrotik by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'MikroTik: High ICMP ping loss'
  expression: min(/Mikrotik by SNMP/icmppingloss,5m)>20 and min(/Mikrotik by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'MikroTik: High ICMP ping response time'
  expression: avg(/Mikrotik by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'MikroTik: Firmware has changed'
  expression: last(/Mikrotik by SNMP/system.hw.firmware,#1)<>last(/Mikrotik by SNMP/system.hw.firmware,#2)
    and length(last(/Mikrotik by SNMP/system.hw.firmware))>0
  severity: information
  description: Firmware version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'MikroTik: Device has been replaced'
  expression: last(/Mikrotik by SNMP/system.hw.serialnumber,#1)<>last(/Mikrotik by
    SNMP/system.hw.serialnumber,#2) and length(last(/Mikrotik by SNMP/system.hw.serialnumber))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'MikroTik: Host has been restarted'
  expression: (last(/Mikrotik by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Mikrotik
    by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Mikrotik by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Mikrotik by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MikroTik: System name has changed'
  expression: last(/Mikrotik by SNMP/system.name,#1)<>last(/Mikrotik by SNMP/system.name,#2)
    and length(last(/Mikrotik by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'MikroTik: Operating system description has changed'
  expression: last(/Mikrotik by SNMP/system.sw.os[mtxrLicVersion.0],#1)<>last(/Mikrotik
    by SNMP/system.sw.os[mtxrLicVersion.0],#2) and length(last(/Mikrotik by SNMP/system.sw.os[mtxrLicVersion.0]))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'MikroTik: High memory utilization'
  expression: min(/Mikrotik by SNMP/vm.memory.util[memoryUsedPercentage.Memory],5m)>90
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'MikroTik: No SNMP data collection'
  expression: max(/Mikrotik by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: CPU discovery
  key: hrProcessorLoad.discovery
  interval: '0'
  type: dependent
  master_item_key: system.cpu.walk
  item_prototypes:
  - name: '#{#SNMPINDEX}: CPU utilization'
    key: system.cpu.util[hrProcessorLoad.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  trigger_prototypes:
  - name: 'MikroTik: #{#SNMPINDEX}: High CPU utilization'
    expression: min(/Mikrotik by SNMP/system.cpu.util[hrProcessorLoad.{#SNMPINDEX}],5m)>90
    severity: warning
- name: Temperature CPU discovery
  key: mtxrHlProcessorTemperature.discovery
  interval: 1h
  item_prototypes:
  - name: 'CPU: Temperature'
    key: sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'MikroTik: CPU: Temperature is above critical threshold'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)>75
    severity: high
    recovery_expression: max(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)<75-3
  - name: 'MikroTik: CPU: Temperature is above warning threshold'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)>70
    severity: warning
    recovery_expression: max(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)<70-3
  - name: 'MikroTik: CPU: Temperature is too low'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Mikrotik by SNMP/sensor.temp.value[mtxrHlProcessorTemperature.{#SNMPINDEX}],5m)>5+3
- name: Temperature sensor discovery
  key: mtxrHlTemperature.discovery
  interval: 1h
  item_prototypes:
  - name: 'Device: Temperature'
    key: sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'MikroTik: Device: Temperature is above critical threshold'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)<60-3
  - name: 'MikroTik: Device: Temperature is above warning threshold'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)<50-3
  - name: 'MikroTik: Device: Temperature is too low'
    expression: avg(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Mikrotik by SNMP/sensor.temp.value[mtxrHlTemperature.{#SNMPINDEX}],5m)>5+3
- name: LTE modem discovery
  key: mtxrLTEModem.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.wireless.walk
  filter:
  - macro: '{#IFNAME}'
    value: '{$IFNAME.LTEMODEM.MATCHES}'
  - macro: '{#IFTYPE}'
    value: ^1$
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): LTE modem RSRP'
    key: lte.modem.rsrp[mtxrLTEModemSignalRSRP.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: dbm
  - name: 'Interface {#IFNAME}({#IFALIAS}): LTE modem RSRQ'
    key: lte.modem.rsrq[mtxrLTEModemSignalRSRQ.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: db
  - name: 'Interface {#IFNAME}({#IFALIAS}): LTE modem RSSI'
    key: lte.modem.rssi[mtxrLTEModemSignalRSSI.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: dbm
  - name: 'Interface {#IFNAME}({#IFALIAS}): LTE modem SINR'
    key: lte.modem.sinr[mtxrLTEModemSignalSINR.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: db
  trigger_prototypes:
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): LTE modem RSRP is low'
    expression: max(/Mikrotik by SNMP/lte.modem.rsrp[mtxrLTEModemSignalRSRP.{#SNMPINDEX}],5m)
      < -100
    severity: warning
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): LTE modem RSRQ is low'
    expression: max(/Mikrotik by SNMP/lte.modem.rsrq[mtxrLTEModemSignalRSRQ.{#SNMPINDEX}],5m)
      < -20
    severity: warning
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): LTE modem RSSI is low'
    expression: max(/Mikrotik by SNMP/lte.modem.rssi[mtxrLTEModemSignalRSSI.{#SNMPINDEX}],5m)
      < -100
    severity: warning
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): LTE modem SINR is low'
    expression: max(/Mikrotik by SNMP/lte.modem.sinr[mtxrLTEModemSignalSINR.{#SNMPINDEX}],5m)
      < 0
    severity: warning
- name: AP channel discovery
  key: mtxrWlAp.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.wireless.walk
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: ^1$
  - macro: '{#IFTYPE}'
    value: ^71$
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP authenticated clients'
    key: ssid.authclient[mtxrWlApAuthClientCount.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP band'
    key: ssid.band[mtxrWlApBand.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Interface {#IFNAME}({#IFALIAS}): SSID'
    key: ssid.name[mtxrWlApSsid.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP noise floor'
    key: ssid.noise[mtxrWlApNoiseFloor.{#SNMPINDEX}]
    interval: '0'
    type: dependent
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP registered clients'
    key: ssid.regclient[mtxrWlApClientCount.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
- name: CAPsMAN AP channel discovery
  key: mtxrWlCMChannel.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.wireless.walk
  filter:
  - macro: '{#IFNAME}'
    value: '{$IFNAME.WIFI.MATCHES}'
  - macro: '{#IFTYPE}'
    value: ^1$
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP authenticated clients'
    key: ssid.authclient[mtxrWlCMAuthClientCount.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP channel'
    key: ssid.channel[mtxrWlCMChannel.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP registered clients'
    key: ssid.regclient[mtxrWlCMRegClientCount.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): AP state'
    key: ssid.state[mtxrWlCMState.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: char
  trigger_prototypes:
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): AP interface {#IFNAME}({#IFALIAS})
      is not running'
    expression: last(/Mikrotik by SNMP/ssid.state[mtxrWlCMState.{#SNMPINDEX}])<>"running-ap"
    severity: warning
- name: Network interfaces discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.walk
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Mikrotik by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>2\r\
      \nor min(/Mikrotik by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>2"
    severity: warning
    recovery_expression: "max(/Mikrotik by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<2*0.8\r\
      \nand max(/Mikrotik by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<2*0.8"
    allow_manual_close: true
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Mikrotik by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Mikrotik\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or\r\navg(/Mikrotik by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Mikrotik\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and\r\nlast(/Mikrotik by\
      \ SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/Mikrotik by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Mikrotik\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and\r\navg(/Mikrotik by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Mikrotik\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower
      speed than it was before'
    expression: "change(/Mikrotik by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0\
      \ and last(/Mikrotik by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\r\nand\
      \ (\r\nlast(/Mikrotik by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or\r\nlast(/Mikrotik\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or\r\nlast(/Mikrotik by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11\
      \ or\r\nlast(/Mikrotik by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/Mikrotik\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or\r\nlast(/Mikrotik by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\
      \n)\r\nand\r\n(last(/Mikrotik by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/Mikrotik by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\
      \ and last(/Mikrotik by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or\r\
      \n(last(/Mikrotik by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Mikrotik by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/Mikrotik by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Mikrotik
      by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/Mikrotik by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
- name: Storage discovery
  key: storage.discovery
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.walk
  filter:
  - macro: '{#STORAGE_TYPE}'
    value: .+4$
  - macro: '{#STORAGE_TYPE}'
    value: .+hrStorageFixedDisk
  item_prototypes:
  - name: 'Disk-{#SNMPINDEX}: Space utilization'
    key: vfs.fs.pused[hrStorageSize.{#SNMPINDEX}]
    interval: 1m
    type: calculated
    params: (last(//vfs.fs.used[hrStorageSize.{#SNMPINDEX}])/last(//vfs.fs.total[hrStorageSize.{#SNMPINDEX}]))*100
    units: '%'
  - name: 'Disk-{#SNMPINDEX}: Total space'
    key: vfs.fs.total[hrStorageSize.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'Disk-{#SNMPINDEX}: Used space'
    key: vfs.fs.used[hrStorageSize.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'MikroTik: Disk-{#SNMPINDEX}: Disk space is critically low'
    expression: "last(/Mikrotik by SNMP/vfs.fs.pused[hrStorageSize.{#SNMPINDEX}])>90\
      \ and\r\n((last(/Mikrotik by SNMP/vfs.fs.total[hrStorageSize.{#SNMPINDEX}])-last(/Mikrotik\
      \ by SNMP/vfs.fs.used[hrStorageSize.{#SNMPINDEX}]))<\"{$VFS.FS.FREE.MIN.CRIT:\\\
      \"Disk-{#SNMPINDEX}\\\"}\" or timeleft(/Mikrotik by SNMP/vfs.fs.pused[hrStorageSize.{#SNMPINDEX}],1h,100)<1d)"
    severity: average
    allow_manual_close: true
  - name: 'MikroTik: Disk-{#SNMPINDEX}: Disk space is low'
    expression: "last(/Mikrotik by SNMP/vfs.fs.pused[hrStorageSize.{#SNMPINDEX}])>80\
      \ and\r\n((last(/Mikrotik by SNMP/vfs.fs.total[hrStorageSize.{#SNMPINDEX}])-last(/Mikrotik\
      \ by SNMP/vfs.fs.used[hrStorageSize.{#SNMPINDEX}]))<\"{$VFS.FS.FREE.MIN.WARN:\\\
      \"Disk-{#SNMPINDEX}\\\"}\" or timeleft(/Mikrotik by SNMP/vfs.fs.pused[hrStorageSize.{#SNMPINDEX}],1h,100)<1d)"
    severity: warning
    allow_manual_close: true
