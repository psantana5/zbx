template: Hikvision camera by HTTP
description: "This template is designed for the effortless deployment of Hikvision\
  \ cameras monitoring by Zabbix via HTTP and doesn't require any external scripts.\r\
  \n\r\nSample device overview page:\r\nhttps://www.hikvision.com/en/products/IP-Products/Network-Cameras/\r\
  \n\r\nSetup:\r\n\r\n1. Set the hostname or IP address of the Hikvision ISAPI host\
  \ in the '{$HIKVISION_ISAPI_HOST}' macro.\r\n\r\n2. Set the user name and password\
  \ in the '{$PASSWORD}' and '{$USER}' macros.\r\n\r\n3. Change other macros according\
  \ to your camera configuration if necessary.\r\n\r\nGenerated by official Zabbix\
  \ template tool \"Templator\""
groups:
- Templates
