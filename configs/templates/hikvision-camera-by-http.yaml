triggers:
- name: 'Hikvision: High CPU utilization'
  expression: min(/Hikvision camera by HTTP/hikvision_cam.cpu.util,5m)>90
  severity: warning
  description: The CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Hikvision: Version has changed'
  expression: last(/Hikvision camera by HTTP/hikvision_cam.firmware_version,#1)<>last(/Hikvision
    camera by HTTP/hikvision_cam.firmware_version,#2) and length(last(/Hikvision camera
    by HTTP/hikvision_cam.firmware_version))>0
  severity: information
  description: Hikvision camera version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Hikvision: Authorisation error'
  expression: "last(/Hikvision camera by HTTP/hikvision_cam.get_info.login_status)=1\
    \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.get_streaming.login_status)=1\
    \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.get_status.login_status)=1"
  severity: warning
  description: Check the correctness of the authorization data
  tags:
  - tag: scope
    value: notice
- name: 'Hikvision: Error receiving data'
  expression: "last(/Hikvision camera by HTTP/hikvision_cam.get_info.login_status)=2\
    \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.get_streaming.login_status)=2\
    \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.get_status.login_status)=2"
  severity: warning
  description: Check the availability of the HTTP port
  tags:
  - tag: scope
    value: notice
- name: 'Hikvision: High memory utilization'
  expression: min(/Hikvision camera by HTTP/hikvision_cam.memory.usage,5m)>95
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: performance
- name: 'Hikvision: Camera has been replaced'
  expression: last(/Hikvision camera by HTTP/hikvision_cam.serial_number,#1)<>last(/Hikvision
    camera by HTTP/hikvision_cam.serial_number,#2) and length(last(/Hikvision camera
    by HTTP/hikvision_cam.serial_number))>0
  severity: information
  description: Camera serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Hikvision: Camera has been restarted'
  expression: last(/Hikvision camera by HTTP/hikvision_cam.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: PTZ discovery
  key: hikvision_cam.ptz.discovery
  interval: 1d
  type: http_agent
  item_prototypes:
  - name: 'Channel "{#PTZ_CHANNEL_ID}": Get PTZ info'
    key: hikvision_cam.get_ptz[{#PTZ_CHANNEL_ID}]
    interval: 1m
    type: http_agent
    value_type: text
  - name: 'Channel "{#PTZ_CHANNEL_ID}": Get PTZ info: Channel "{#PTZ_CHANNEL_ID}":
      Login status'
    key: hikvision_cam.get_ptz.login_status[{#PTZ_CHANNEL_ID}]
    interval: '0'
    type: dependent
    master_item_key: hikvision_cam.get_ptz[{#PTZ_CHANNEL_ID}]
    value_type: unsigned
  - name: 'Channel "{#PTZ_CHANNEL_ID}": Absolute zoom'
    key: hikvision_cam.ptz.absolute_zoom[{#PTZ_CHANNEL_ID}]
    interval: '0'
    type: dependent
    master_item_key: hikvision_cam.get_ptz[{#PTZ_CHANNEL_ID}]
    units: '!x'
  - name: 'Channel "{#PTZ_CHANNEL_ID}": Azimuth'
    key: hikvision_cam.ptz.azimuth[{#PTZ_CHANNEL_ID}]
    interval: '0'
    type: dependent
    master_item_key: hikvision_cam.get_ptz[{#PTZ_CHANNEL_ID}]
    units: '!°'
  - name: 'Channel "{#PTZ_CHANNEL_ID}": Elevation'
    key: hikvision_cam.ptz.elevation[{#PTZ_CHANNEL_ID}]
    interval: '0'
    type: dependent
    master_item_key: hikvision_cam.get_ptz[{#PTZ_CHANNEL_ID}]
    units: '!°'
  trigger_prototypes:
  - name: 'Hikvision: Channel "{#PTZ_CHANNEL_ID}": Authorisation error'
    expression: last(/Hikvision camera by HTTP/hikvision_cam.get_ptz.login_status[{#PTZ_CHANNEL_ID}])=1
    severity: warning
    allow_manual_close: true
  - name: 'Hikvision: Channel "{#PTZ_CHANNEL_ID}": Error receiving data'
    expression: last(/Hikvision camera by HTTP/hikvision_cam.get_ptz.login_status[{#PTZ_CHANNEL_ID}])=2
    severity: warning
    allow_manual_close: true
  - name: 'Hikvision: Channel "{#PTZ_CHANNEL_ID}": PTZ position changed'
    expression: "last(/Hikvision camera by HTTP/hikvision_cam.ptz.absolute_zoom[{#PTZ_CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.ptz.absolute_zoom[{#PTZ_CHANNEL_ID}],#2) or \r\
      \nlast(/Hikvision camera by HTTP/hikvision_cam.ptz.azimuth[{#PTZ_CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.ptz.azimuth[{#PTZ_CHANNEL_ID}],#2) or \r\nlast(/Hikvision\
      \ camera by HTTP/hikvision_cam.ptz.elevation[{#PTZ_CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.ptz.elevation[{#PTZ_CHANNEL_ID}],#2)"
    severity: information
    allow_manual_close: true
- name: Streaming channels discovery
  key: hikvision_cam.streaming.discovery
  interval: 1d
  type: http_agent
  filter:
  - macro: '{#CHANNEL_ENABLED}'
    value: 'true'
  item_prototypes:
  - name: 'Channel "{#CHANNEL_ID}": Constant bitRate'
    key: hikvision_cam.constant_bit_rate[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!kbit/s'
  - name: 'Channel "{#CHANNEL_ID}": Fixed quality'
    key: hikvision_cam.fixed_quality[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '%'
  - name: 'Channel "{#CHANNEL_ID}": GovLength'
    key: hikvision_cam.gov_length[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Channel "{#CHANNEL_ID}": H264Profile'
    key: hikvision_cam.h264Profile[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Channel "{#CHANNEL_ID}": Key frame interval'
    key: hikvision_cam.key_frame_interval[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Channel "{#CHANNEL_ID}": Frame rate (max)'
    key: hikvision_cam.max_frame_rate[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!fps'
  - name: 'Channel "{#CHANNEL_ID}": Smoothing'
    key: hikvision_cam.smoothing[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Channel "{#CHANNEL_ID}": Snapshot image type'
    key: hikvision_cam.snap_shot_image_type[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Channel "{#CHANNEL_ID}": VBR lower'
    key: hikvision_cam.vbr_lower_cap[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!kbit/s'
  - name: 'Channel "{#CHANNEL_ID}": VBR upper'
    key: hikvision_cam.vbr_upper_cap[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!kbit/s'
  - name: 'Channel "{#CHANNEL_ID}": Video codec type'
    key: hikvision_cam.video_codec_type[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Channel "{#CHANNEL_ID}": Video quality control type'
    key: hikvision_cam.video_quality_control_type[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'Channel "{#CHANNEL_ID}": Resolution height'
    key: hikvision_cam.video_resolution_height[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!px'
  - name: 'Channel "{#CHANNEL_ID}": Resolution width'
    key: hikvision_cam.video_resolution_width[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: '!px'
  - name: 'Channel "{#CHANNEL_ID}": Video scan type'
    key: hikvision_cam.video_scan_type[{#CHANNEL_ID}]
    interval: '0'
    type: dependent
    value_type: char
  trigger_prototypes:
  - name: 'Hikvision: Channel "{#CHANNEL_ID}": Parameters of video stream are changed'
    expression: "last(/Hikvision camera by HTTP/hikvision_cam.fixed_quality[{#CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.fixed_quality[{#CHANNEL_ID}],#2) or\r\nlast(/Hikvision\
      \ camera by HTTP/hikvision_cam.constant_bit_rate[{#CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.constant_bit_rate[{#CHANNEL_ID}],#2) or\r\nlast(/Hikvision\
      \ camera by HTTP/hikvision_cam.video_quality_control_type[{#CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.video_quality_control_type[{#CHANNEL_ID}],#2)\
      \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.video_resolution_width[{#CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.video_resolution_width[{#CHANNEL_ID}],#2) or\r\
      \nlast(/Hikvision camera by HTTP/hikvision_cam.video_resolution_height[{#CHANNEL_ID}],#1)<>last(/Hikvision\
      \ camera by HTTP/hikvision_cam.video_resolution_height[{#CHANNEL_ID}],#2)"
    severity: information
    allow_manual_close: true
  - name: 'Hikvision: Channel "{#CHANNEL_ID}": Invalid video stream resolution parameters'
    expression: "last(/Hikvision camera by HTTP/hikvision_cam.video_resolution_height[{#CHANNEL_ID}])<>1080\
      \ or\r\nlast(/Hikvision camera by HTTP/hikvision_cam.video_resolution_width[{#CHANNEL_ID}])<>1920"
    severity: warning
    allow_manual_close: true
