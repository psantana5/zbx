template: Jenkins by HTTP
description: "Get Jenkins metrics by HTTP agent.\r\nMetrics are collected by requests\
  \ to Metrics API. Install  Metrics plugin and configure access to the Metrics Servlet\
  \ by issuing API key.\r\nDon't forget to change macros {$JENKINS.URL}, {$JENKINS.USER},\
  \ {$JENKINS.API.TOKEN}, {$JENKINS.API.KEY}.\r\n\r\nYou can discuss this template\
  \ or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
