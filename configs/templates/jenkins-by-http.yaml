  description: The number of seconds since the Jenkins master JVM started.
  history: 31d
  tags:
  - tag: component
    value: application
- name: Temporary space check
  key: jenkins.temporary_space
  interval: '0'
  type: dependent
  master_item_key: jenkins.healthcheck
  value_type: unsigned
  description: Returns FAIL if any of the Jenkins temporary space monitors are reporting
    the temporary space as less than the configured threshold.
  history: 31d
  tags:
  - tag: component
    value: disk
- name: Temporary space check message
  key: jenkins.temporary_space.message
  interval: '0'
  type: dependent
  master_item_key: jenkins.healthcheck
  value_type: char
  description: The message will reference the first node which fails this check. There
    may be other nodes that fail the check, but this health check is designed to fail
    fast.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: disk
- name: Thread deadlock check
  key: jenkins.thread_deadlock
  interval: '0'
  type: dependent
  master_item_key: jenkins.healthcheck
  value_type: unsigned
  description: Returns FAIL if there are any deadlocked threads in the Jenkins master
    JVM.
  history: 31d
  tags:
  - tag: component
    value: threads
- name: Thread deadlock check message
  key: jenkins.thread_deadlock.message
  interval: '0'
  type: dependent
  master_item_key: jenkins.healthcheck
  value_type: char
  description: The message of thread deadlock health check.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Get timers
  key: jenkins.timers.raw
  interval: '0'
  type: dependent
  master_item_key: jenkins.get_metrics
  value_type: text
  description: Raw items for timers metrics.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Version
  key: jenkins.version
  interval: '0'
  type: dependent
  master_item_key: jenkins.gauges.raw
  value_type: char
  description: Version of Jenkins server.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
triggers:
- name: 'Jenkins: Current number of used files is too high'
  expression: min(/Jenkins by HTTP/jenkins.descriptor.ratio,5m)>85
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'Jenkins: Disk space is too low'
  expression: last(/Jenkins by HTTP/jenkins.disk_space)=0 and length(last(/Jenkins
    by HTTP/jenkins.disk_space.message))>0
  severity: warning
  description: "Jenkins disk space monitors are reporting the disk space as less than\
    \ the configured threshold. The message will reference the first node which fails\
    \ this check.\r\nHealth check message: {{ITEM.LASTVALUE2}.regsub(\"(.*)\",\\1)}"
  tags:
  - tag: scope
    value: capacity
- name: 'Jenkins: Service has no online nodes'
  expression: last(/Jenkins by HTTP/jenkins.node.online)=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Jenkins: Service is down'
  expression: last(/Jenkins by HTTP/jenkins.ping)=0
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Jenkins: One or more Jenkins plugins failed to start'
  expression: last(/Jenkins by HTTP/jenkins.plugins)=0 and length(last(/Jenkins by
    HTTP/jenkins.plugins.message))>0
  severity: information
  description: "A failure is typically indicative of a potential issue within the\
    \ Jenkins installation that will either be solved by explicitly disabling the\
    \ failing plugin(s) or by resolving the corresponding plugin dependency issues.\r\
    \nHealth check message: {{ITEM.LASTVALUE2}.regsub(\"(.*)\",\\1)}"
  tags:
  - tag: scope
    value: notice
- name: 'Jenkins: Host has been restarted'
  expression: last(/Jenkins by HTTP/jenkins.system.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Jenkins: Temporary space is too low'
  expression: last(/Jenkins by HTTP/jenkins.temporary_space)=0 and length(last(/Jenkins
    by HTTP/jenkins.temporary_space.message))>0
  severity: warning
  description: "Jenkins temporary space monitors are reporting the temporary space\
    \ as less than the configured threshold. The message will reference the first\
    \ node which fails this check.\r\nHealth check message: {{ITEM.LASTVALUE2}.regsub(\"\
    (.*)\",\\1)}"
  tags:
  - tag: scope
    value: capacity
- name: 'Jenkins: There are deadlocked threads in Jenkins master JVM'
  expression: last(/Jenkins by HTTP/jenkins.thread_deadlock)=0 and length(last(/Jenkins
    by HTTP/jenkins.thread_deadlock.message))>0
  severity: warning
  description: "There are any deadlocked threads in the Jenkins master JVM.\r\nHealth\
    \ check message: {{ITEM.LASTVALUE2}.regsub('(.*)',\\1)}"
  tags:
  - tag: scope
    value: performance
- name: 'Jenkins: Version has changed'
  expression: last(/Jenkins by HTTP/jenkins.version,#1)<>last(/Jenkins by HTTP/jenkins.version,#2)
    and length(last(/Jenkins by HTTP/jenkins.version))>0
  severity: information
  description: The Jenkins version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Computers discovery
  key: jenkins.computers
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'Computer [{#DISPLAY_NAME}]: Get computer'
    key: jenkins.computer.get[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Computer [{#DISPLAY_NAME}]: Available physical memory'
    key: jenkins.computer.available_physical_memory[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  - name: 'Computer [{#DISPLAY_NAME}]: Available swap space'
    key: jenkins.computer.available_swap_space[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  - name: 'Computer [{#DISPLAY_NAME}]: Clock difference'
    key: jenkins.computer.clock_difference[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    units: s
  - name: 'Computer [{#DISPLAY_NAME}]: Available disk space'
    key: jenkins.computer.disk_space[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  - name: 'Computer [{#DISPLAY_NAME}]: Idle'
    key: jenkins.computer.idle[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
  - name: 'Computer [{#DISPLAY_NAME}]: Executors'
    key: jenkins.computer.numExecutors[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
  - name: 'Computer [{#DISPLAY_NAME}]: Offline cause reason'
    key: jenkins.computer.offline.reason[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: char
  - name: 'Computer [{#DISPLAY_NAME}]: Response time average'
    key: jenkins.computer.response_time[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: s
  - name: 'Computer [{#DISPLAY_NAME}]: State'
    key: jenkins.computer.state[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
  - name: 'Computer [{#DISPLAY_NAME}]: Temporarily offline'
    key: jenkins.computer.temp_offline[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
  - name: 'Computer [{#DISPLAY_NAME}]: Available temp space'
    key: jenkins.computer.temp_space[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  - name: 'Computer [{#DISPLAY_NAME}]: Total physical memory'
    key: jenkins.computer.total_physical_memory[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  - name: 'Computer [{#DISPLAY_NAME}]: Total swap space'
    key: jenkins.computer.total_swap_space[{#DISPLAY_NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.computer.get[{#DISPLAY_NAME}]
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Jenkins: Computer [{#DISPLAY_NAME}]: Node is down'
    expression: last(/Jenkins by HTTP/jenkins.computer.state[{#DISPLAY_NAME}])=1 and
      length(last(/Jenkins by HTTP/jenkins.computer.offline.reason[{#DISPLAY_NAME}]))>0
    severity: average
  - name: 'Jenkins: Computer [{#DISPLAY_NAME}]: Node is temporarily offline'
    expression: last(/Jenkins by HTTP/jenkins.computer.temp_offline[{#DISPLAY_NAME}])=1
      and length(last(/Jenkins by HTTP/jenkins.computer.offline.reason[{#DISPLAY_NAME}]))>0
    severity: information
    allow_manual_close: true
- name: Jobs discovery
  key: jenkins.jobs
  interval: 1h
  type: http_agent
  item_prototypes:
  - name: 'Job [{#NAME}]: Get job'
    key: jenkins.job.get[{#NAME}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'Job [{#NAME}]: Health score'
    key: jenkins.build.health[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
  - name: 'Job [{#NAME}]: Last Build duration'
    key: jenkins.last_build.duration[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: s
  - name: 'Job [{#NAME}]: Last Build number'
    key: jenkins.last_build.number[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
  - name: 'Job [{#NAME}]: Last Build result'
    key: jenkins.last_build.result[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: char
  - name: 'Job [{#NAME}]: Last Build timestamp'
    key: jenkins.last_build.timestamp[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: unixtime
  - name: 'Job [{#NAME}]: Last Failed Build duration'
    key: jenkins.last_failed_build.duration[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: s
  - name: 'Job [{#NAME}]: Last Failed Build number'
    key: jenkins.last_failed_build.number[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
  - name: 'Job [{#NAME}]: Last Failed Build timestamp'
    key: jenkins.last_failed_build.timestamp[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: unixtime
  - name: 'Job [{#NAME}]: Last Successful Build duration'
    key: jenkins.last_successful_build.duration[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: s
  - name: 'Job [{#NAME}]: Last Successful Build number'
    key: jenkins.last_successful_build.number[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
  - name: 'Job [{#NAME}]: Last Successful Build timestamp'
    key: jenkins.last_successful_build.timestamp[{#NAME}]
    interval: '0'
    type: dependent
    master_item_key: jenkins.job.get[{#NAME}]
    value_type: unsigned
    units: unixtime
  trigger_prototypes:
  - name: 'Jenkins: Job [{#NAME}]: Job is unhealthy'
    expression: last(/Jenkins by HTTP/jenkins.build.health[{#NAME}])<50
    severity: warning
    allow_manual_close: true
