template: Linux by SNMP
description: "This is an official Linux template. It requires an SNMP client.\r\n\r\
  \nMIBs used:\r\nEtherLike-MIB\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nUCD-DISKIO-MIB\r\
  \nUCD-SNMP-MIB\r\nIF-MIB\r\n\r\nNotes on filesystem (FS) discovery:\r\n  - The ext4/3/2\
  \ FS reserves space for privileged usage, typically set at 5% by default.\r\n  -\
  \ BTRFS allocates a default of 10% of the volume for its own needs.\r\n  - To mitigate\
  \ potential disasters, FS usage triggers are based on the maximum available space.\r\
  \n    - Utilization formula: 'pused = 100 * (used / used + available)'\r\n  - The\
  \ FS utilization chart, derived from graph prototypes, reflects FS reserved space\
  \ as the difference between used and available space from the total volume.\r\n\r\
  \nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387225-discussion-thread-for-official-zabbix-template-for-linux\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: 'Linux: SNMP walk EtherLike-MIB interfaces'
  key: net.if.duplex.walk
  interval: 1m
  value_type: text
  description: Discovering interfaces from IF-MIB and EtherLike-MIB. Interfaces with
    `up(1)` Operational Status are discovered.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: 'Linux: SNMP walk network interfaces'
  key: net.if.walk
  interval: 1m
  value_type: text
  description: Discovering interfaces from IF-MIB.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Interrupts per second
  key: system.cpu.intr[ssRawInterrupts.0]
  interval: 1m
  description: Number of interrupts processed.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (15m avg)
  key: system.cpu.load.avg15[laLoad.3]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.load.walk
  description: 'MIB: UCD-SNMP-MIB'
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (1m avg)
  key: system.cpu.load.avg1[laLoad.1]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.load.walk
  description: 'MIB: UCD-SNMP-MIB'
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (5m avg)
  key: system.cpu.load.avg5[laLoad.2]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.load.walk
  description: 'MIB: UCD-SNMP-MIB'
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: SNMP walk CPU load averages
  key: system.cpu.load.walk
  interval: 1m
  value_type: text
  description: "MIB: UCD-SNMP-MIB\r\nSNMP walk through laTable. The collected data\
    \ used in dependent CPU load average items."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: cpu
  - tag: component
    value: raw
- name: Number of CPUs
  key: system.cpu.num[snmp]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.walk
  value_type: unsigned
  description: Count the number of CPU cores by counting number of cores discovered
    in hrProcessorTable using LLD.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Context switches per second
  key: system.cpu.switches[ssRawContexts.0]
  interval: 1m
  description: The combined rate at which all processors on the computer are switched
    from one thread to another.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: SNMP walk system CPUs
  key: system.cpu.walk
  interval: 1m
  value_type: text
  description: "MIB: HOST-RESOURCES-MIB\r\nDiscovering system CPUs."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
  - tag: component
    value: cpu
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Free swap space
  key: system.swap.free[memAvailSwap.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: UCD-SNMP-MIB\r\nThe amount of swap space currently unused or\
    \ available."
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Free swap space in %
  key: system.swap.pfree[snmp]
  interval: 1m
  type: calculated
  params: last(//system.swap.free[memAvailSwap.0])/last(//system.swap.total[memTotalSwap.0])*100
  units: '%'
  description: The free space of the swap volume/file expressed in %.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Total swap space
  key: system.swap.total[memTotalSwap.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: UCD-SNMP-MIB\r\nThe total amount of swap space configured for\
    \ this host."
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: SNMP walk block devices
  key: vfs.dev.walk
  interval: 1m
  value_type: text
  description: Block devices are discovered from UCD-DISKIO-MIB::diskIOTable (http://net-snmp.sourceforge.net/docs/mibs/ucdDiskIOMIB.html#diskIOTable).
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: SNMP walk mounted filesystems
  key: vfs.fs.walk
  interval: 1m
  value_type: text
  description: "MIB: UCD-SNMP-MIB\r\nSnmp walk through dskEntry table. Collected data\
    \ used in filesystem lld and dependent item prototypes."
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
  - tag: component
    value: storage
- name: Available memory
  key: vm.memory.available[snmp]
  interval: 1m
  type: calculated
  params: last(//vm.memory.free[memAvailReal.0])+last(//vm.memory.buffers[memBuffer.0])+last(//vm.memory.cached[memCached.0])
  value_type: unsigned
  units: B
  description: Please note that memory utilization is a rough estimate, since memory
    available is calculated as free+buffers+cached, which is not 100% accurate, but
    the best we can get using SNMP.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory (buffers)
  key: vm.memory.buffers[memBuffer.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: UCD-SNMP-MIB\r\nMemory used by kernel buffers (Buffers in /proc/meminfo)."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory (cached)
  key: vm.memory.cached[memCached.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: UCD-SNMP-MIB\r\nMemory used by the page cache and slabs (Cached\
    \ and Slab in /proc/meminfo)."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Free memory
  key: vm.memory.free[memAvailReal.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: 'MIB: UCD-SNMP-MIB'
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Total memory
  key: vm.memory.total[memTotalReal.0]
  interval: 1m
  value_type: unsigned
  units: B
  description: "MIB: UCD-SNMP-MIB\r\nTotal memory expressed in bytes."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory utilization
  key: vm.memory.util[snmp]
  interval: 1m
  type: calculated
  params: (last(//vm.memory.total[memTotalReal.0])-(last(//vm.memory.free[memAvailReal.0])+last(//vm.memory.buffers[memBuffer.0])+last(//vm.memory.cached[memCached.0])))/last(//vm.memory.total[memTotalReal.0])*100
  units: '%'
  description: Please note that memory utilization is a rough estimate, since memory
    available is calculated as free+buffers+cached, which is not 100% accurate, but
    the best we can get using SNMP.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Linux: Unavailable by ICMP ping'
  expression: max(/Linux by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Linux: High ICMP ping loss'
  expression: min(/Linux by SNMP/icmppingloss,5m)>20 and min(/Linux by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Linux: High ICMP ping response time'
  expression: avg(/Linux by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Linux: Load average is too high'
  expression: "min(/Linux by SNMP/system.cpu.load.avg1[laLoad.1],5m)/last(/Linux by\
    \ SNMP/system.cpu.num[snmp])>1.5\r\nand last(/Linux by SNMP/system.cpu.load.avg5[laLoad.2])>0\r\
    \nand last(/Linux by SNMP/system.cpu.load.avg15[laLoad.3])>0"
  severity: average
  description: The load average per CPU is too high. The system may be slow to respond.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: Host has been restarted'
  expression: (last(/Linux by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Linux
    by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Linux by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Linux by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Linux: System name has changed'
  expression: last(/Linux by SNMP/system.name,#1)<>last(/Linux by SNMP/system.name,#2)
    and length(last(/Linux by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Linux: High swap space usage'
  expression: max(/Linux by SNMP/system.swap.pfree[snmp],5m)<50 and last(/Linux by
    SNMP/system.swap.total[memTotalSwap.0])>0
  severity: warning
  description: If there is no swap configured, this trigger is ignored.
  tags:
  - tag: scope
    value: capacity
- name: 'Linux: Lack of available memory'
  expression: max(/Linux by SNMP/vm.memory.available[snmp],5m)<20M and last(/Linux
    by SNMP/vm.memory.total[memTotalReal.0])>0
  severity: average
  description: The system is running out of memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: High memory utilization'
  expression: min(/Linux by SNMP/vm.memory.util[snmp],5m)>90
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: No SNMP data collection'
  expression: max(/Linux by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: CPU discovery
  key: cpu.discovery[snmp]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.num[snmp]
  item_prototypes:
  - name: CPU guest time
    key: system.cpu.guest[ssCpuRawGuest.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU guest nice time
    key: system.cpu.guest_nice[ssCpuRawGuestNice.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU idle time
    key: system.cpu.idle[ssCpuRawIdle.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU interrupt time
    key: system.cpu.interrupt[ssCpuRawInterrupt.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU iowait time
    key: system.cpu.iowait[ssCpuRawWait.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU nice time
    key: system.cpu.nice[ssCpuRawNice.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU softirq time
    key: system.cpu.softirq[ssCpuRawSoftIRQ.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU steal time
    key: system.cpu.steal[ssCpuRawSteal.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU system time
    key: system.cpu.system[ssCpuRawSystem.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU user time
    key: system.cpu.user[ssCpuRawUser.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: CPU utilization
    key: system.cpu.util[snmp,{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: system.cpu.idle[ssCpuRawIdle.{#SNMPINDEX}]
    units: '%'
  trigger_prototypes:
  - name: 'Linux: High CPU utilization'
    expression: min(/Linux by SNMP/system.cpu.util[snmp,{#SNMPINDEX}],5m)>90
    severity: warning
- name: Network interfaces discovery
  key: net.if.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.walk
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Linux by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>2\r\
      \nor min(/Linux by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>2"
    severity: warning
    recovery_expression: "max(/Linux by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<2*0.8\r\
      \nand max(/Linux by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<2*0.8"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Linux by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Linux\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or\r\navg(/Linux by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>(90/100)*last(/Linux\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and\r\nlast(/Linux by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/Linux by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Linux\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and\r\navg(/Linux by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/Linux\
      \ by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed
      than it was before'
    expression: "change(/Linux by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0 and\
      \ last(/Linux by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\r\nand (\r\n\
      last(/Linux by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or\r\nlast(/Linux by\
      \ SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or\r\nlast(/Linux by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11\
      \ or\r\nlast(/Linux by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/Linux\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or\r\nlast(/Linux by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\
      \n)\r\nand\r\n(last(/Linux by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/Linux by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\
      \ and last(/Linux by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or\r\
      \n(last(/Linux by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Linux by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/Linux by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Linux
      by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/Linux by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
- name: EtherLike-MIB Discovery
  key: net.if.duplex.discovery
  interval: '0'
  type: dependent
  master_item_key: net.if.duplex.walk
  filter:
  - macro: '{#IFOPERSTATUS}'
    value: '1'
  - macro: '{#SNMPVALUE}'
    value: (2|3)
  - macro: '{#SNMPVALUE}'
    value: ''
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Duplex status'
    key: net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): In half-duplex mode'
    expression: last(/Linux by SNMP/net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}])=2
    severity: warning
    allow_manual_close: true
- name: Block devices discovery
  key: vfs.dev.discovery[snmp]
  interval: '0'
  type: dependent
  master_item_key: vfs.dev.walk
  filter:
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.MATCHES}'
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.NOT_MATCHES}'
  item_prototypes:
  - name: '{#DEVNAME}: Disk read rate'
    key: vfs.dev.read.rate[diskIOReads.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '!r/s'
  - name: '{#DEVNAME}: Disk utilization'
    key: vfs.dev.util[diskIOLA1.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '%'
  - name: '{#DEVNAME}: Disk write rate'
    key: vfs.dev.write.rate[diskIOWrites.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    units: '!w/s'
- name: Mounted filesystem discovery
  key: vfs.fs.discovery[snmp]
  interval: '0'
  type: dependent
  master_item_key: vfs.fs.walk
  filter:
  - macro: '{#FSDEVICE}'
    value: '{$VFS.FS.FSDEVICE.MATCHES}'
  - macro: '{#FSDEVICE}'
    value: '{$VFS.FS.FSDEVICE.NOT_MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSNAME}]: Get data'
    key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'FS [{#FSNAME}]: Space: Available'
    key: vfs.fs.free[dskAvail.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    units: B
  - name: 'FS [{#FSNAME}]: Inodes: Free, in %'
    key: vfs.fs.inode.pfree[{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Used, in %'
    key: vfs.fs.pused[{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Total'
    key: vfs.fs.total[dskTotal.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used'
    key: vfs.fs.used[dskUsed.{#SNMPINDEX}]
    interval: '0'
    type: dependent
    master_item_key: vfs.fs.walk.data[dskEntry.{#SNMPINDEX}]
    units: B
  trigger_prototypes:
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by SNMP/vfs.fs.inode.pfree[{#SNMPINDEX}],5m)<10
    severity: average
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by SNMP/vfs.fs.inode.pfree[{#SNMPINDEX}],5m)<20
    severity: warning
  - name: 'Linux: FS [{#FSNAME}]: Space is critically low'
    expression: min(/Linux by SNMP/vfs.fs.pused[{#SNMPINDEX}],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'Linux: FS [{#FSNAME}]: Space is low'
    expression: min(/Linux by SNMP/vfs.fs.pused[{#SNMPINDEX}],5m)>80
    severity: warning
    allow_manual_close: true
