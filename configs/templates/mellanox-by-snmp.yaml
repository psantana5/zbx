template: Mellanox by SNMP
description: "The updated template for monitoring the Mellanox network switches over\
  \ SNMP agent. All items collected in one template without any linked templates.\r\
  \n\r\nMIBs used:\r\nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nENTITY-SENSORS-MIB\r\nENTITY-STATE-MIB\r\
  \nENTITY-MIB\r\nIF-MIB\r\n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \  If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: CPU utilization
  key: system.cpu.util
  interval: 1m
  units: '%'
  description: "MIB: HOST-RESOURCES-MIB\r\nThe average, over the last minute, of the\
    \ percentage of time that processors was not idle.\r\nImplementations may approximate\
    \ this one minute smoothing period if necessary."
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe physical location of this node (e.g., `telephone\
    \ closet, 3rd floor').  If the location is unknown, the value is the zero-length\
    \ string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name.  If the\
    \ name is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nThe time (in hundredths of a second) since the\
    \ network management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity.  This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Mellanox: Unavailable by ICMP ping'
  expression: max(/Mellanox by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout.  Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Mellanox: High ICMP ping loss'
  expression: min(/Mellanox by SNMP/icmppingloss,5m)>20 and min(/Mellanox by SNMP/icmppingloss,5m)<100
  severity: warning
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Mellanox: High ICMP ping response time'
  expression: avg(/Mellanox by SNMP/icmppingsec,5m)>0.15
  severity: warning
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Mellanox: High CPU utilization'
  expression: min(/Mellanox by SNMP/system.cpu.util,5m)>90
  severity: warning
  description: The CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Mellanox: Host has been restarted'
  expression: "(last(/Mellanox by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Mellanox\
    \ by SNMP/system.hw.uptime[hrSystemUptime.0])<10m)\r\nor (last(/Mellanox by SNMP/system.hw.uptime[hrSystemUptime.0])=0\
    \ and last(/Mellanox by SNMP/system.net.uptime[sysUpTime.0])<10m)"
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Mellanox: System name has changed'
  expression: last(/Mellanox by SNMP/system.name,#1)<>last(/Mellanox by SNMP/system.name,#2)
    and length(last(/Mellanox by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Mellanox: No SNMP data collection'
  expression: max(/Mellanox by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Entity Discovery
  key: entity.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '3'
  item_prototypes:
  - name: '{#ENT_NAME}: Hardware model name'
    key: system.hw.model[entPhysicalModelName.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#ENT_NAME}: Hardware serial number'
    key: system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  trigger_prototypes:
  - name: 'Mellanox: {#ENT_NAME}: Device has been replaced'
    expression: last(/Mellanox by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#1)<>last(/Mellanox
      by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#2) and length(last(/Mellanox
      by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
- name: Fan Discovery
  key: fan.discovery
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: '10'
  item_prototypes:
  - name: '{#SENSOR_INFO}: Fan speed'
    key: sensor.fan.speed[entPhySensorValue.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: rpm
  - name: '{#SENSOR_INFO}: Fan status'
    key: sensor.fan.status[entPhySensorOperStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Mellanox: {#SENSOR_INFO}: Fan is in critical state'
    expression: count(/Mellanox by SNMP/sensor.fan.status[entPhySensorOperStatus.{#SNMPINDEX}],#1,"eq","3")=1
    severity: average
- name: Network interfaces discovery
  key: net.if.discovery
  interval: 1h
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
    interval: 5m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: 1h
    value_type: unsigned
  trigger_prototypes:
  - name: 'Mellanox: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Mellanox by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>\"\
      {$IF.ERRORS.WARN:\\\"{#IFNAME}\\\"}\"\r\nor min(/Mellanox by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>\"\
      {$IF.ERRORS.WARN:\\\"{#IFNAME}\\\"}\""
    severity: warning
    recovery_expression: "max(/Mellanox by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<\"\
      {$IF.ERRORS.WARN:\\\"{#IFNAME}\\\"}\"*0.8\r\nand max(/Mellanox by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<\"\
      {$IF.ERRORS.WARN:\\\"{#IFNAME}\\\"}\"*0.8"
    allow_manual_close: true
  - name: 'Mellanox: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Mellanox by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>(\"\
      {$IF.UTIL.MAX:\\\"{#IFNAME}\\\"}\"/100)*last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])\
      \ or\r\navg(/Mellanox by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>(\"\
      {$IF.UTIL.MAX:\\\"{#IFNAME}\\\"}\"/100)*last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]))\
      \ and\r\nlast(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/Mellanox by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<((\"\
      {$IF.UTIL.MAX:\\\"{#IFNAME}\\\"}\"-3)/100)*last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])\
      \ and\r\navg(/Mellanox by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<((\"\
      {$IF.UTIL.MAX:\\\"{#IFNAME}\\\"}\"-3)/100)*last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'Mellanox: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower
      speed than it was before'
    expression: "change(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0\
      \ and last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\r\nand\
      \ (\r\nlast(/Mellanox by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or\r\nlast(/Mellanox\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or\r\nlast(/Mellanox by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11\
      \ or\r\nlast(/Mellanox by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/Mellanox\
      \ by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or\r\nlast(/Mellanox by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\
      \n)\r\nand\r\n(last(/Mellanox by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\
      \ and last(/Mellanox by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or\r\
      \n(last(/Mellanox by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'Mellanox: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Mellanox by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/Mellanox by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Mellanox
      by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/Mellanox by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
- name: PSU Discovery
  key: psu.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '6'
  item_prototypes:
  - name: '{#ENT_NAME}: Power supply status'
    key: sensor.psu.status[entStateOper.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Mellanox: {#ENT_NAME}: Power supply is in critical state'
    expression: count(/Mellanox by SNMP/sensor.psu.status[entStateOper.{#SNMPINDEX}],#1,"eq","2")=1
    severity: average
- name: Temperature Discovery
  key: temp.discovery
  interval: 1h
  filter:
  - macro: '{#SENSOR_PRECISION}'
    value: '1'
  - macro: '{#SENSOR_TYPE}'
    value: '8'
  item_prototypes:
  - name: '{#SENSOR_INFO}: Temperature status'
    key: sensor.temp.status[entPhySensorOperStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: '{#SENSOR_INFO}: Temperature'
    key: sensor.temp.value[entPhySensorValue.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'Mellanox: {#SENSOR_INFO}: Temperature is above warning threshold'
    expression: "avg(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)>50\r\
      \nor\r\nlast(/Mellanox by SNMP/sensor.temp.status[entPhySensorOperStatus.{#SNMPINDEX}])=3"
    severity: warning
    recovery_expression: max(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)<50-3
  - name: 'Mellanox: {#SENSOR_INFO}: Temperature is above critical threshold'
    expression: avg(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)<60-3
  - name: 'Mellanox: {#SENSOR_INFO}: Temperature is too low'
    expression: avg(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Mellanox by SNMP/sensor.temp.value[entPhySensorValue.{#SNMPINDEX}],5m)>5+3
- name: Storage discovery
  key: vfs.fs.discovery[snmp]
  interval: 1h
  filter:
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#FSNAME}: Space utilization'
    key: vfs.fs.pused[storageUsedPercentage.{#SNMPINDEX}]
    interval: 1m
    type: calculated
    params: (last(//vfs.fs.used[hrStorageUsed.{#SNMPINDEX}])/last(//vfs.fs.total[hrStorageSize.{#SNMPINDEX}]))*100
    units: '%'
  - name: '{#FSNAME}: Total space'
    key: vfs.fs.total[hrStorageSize.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#FSNAME}: Used space'
    key: vfs.fs.used[hrStorageUsed.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'Mellanox: {#FSNAME}: Disk space is critically low'
    expression: "last(/Mellanox by SNMP/vfs.fs.pused[storageUsedPercentage.{#SNMPINDEX}])>\"\
      {$VFS.FS.PUSED.MAX.CRIT:\\\"{#FSNAME}\\\"}\" and\r\n((last(/Mellanox by SNMP/vfs.fs.total[hrStorageSize.{#SNMPINDEX}])-last(/Mellanox\
      \ by SNMP/vfs.fs.used[hrStorageUsed.{#SNMPINDEX}]))<5G or timeleft(/Mellanox\
      \ by SNMP/vfs.fs.pused[storageUsedPercentage.{#SNMPINDEX}],1h,100)<1d)"
    severity: average
    allow_manual_close: true
  - name: 'Mellanox: {#FSNAME}: Disk space is low'
    expression: "last(/Mellanox by SNMP/vfs.fs.pused[storageUsedPercentage.{#SNMPINDEX}])>\"\
      {$VFS.FS.PUSED.MAX.WARN:\\\"{#FSNAME}\\\"}\" and\r\n((last(/Mellanox by SNMP/vfs.fs.total[hrStorageSize.{#SNMPINDEX}])-last(/Mellanox\
      \ by SNMP/vfs.fs.used[hrStorageUsed.{#SNMPINDEX}]))<10G or timeleft(/Mellanox\
      \ by SNMP/vfs.fs.pused[storageUsedPercentage.{#SNMPINDEX}],1h,100)<1d)"
    severity: warning
    allow_manual_close: true
- name: Memory discovery
  key: vm.memory.discovery
  interval: 1h
  filter:
  - macro: '{#MEMNAME}'
    value: '{$MEMORY.NAME.MATCHES}'
  - macro: '{#MEMNAME}'
    value: '{$MEMORY.NAME.NOT_MATCHES}'
  - macro: '{#MEMTYPE}'
    value: '{$MEMORY.TYPE.MATCHES}'
  - macro: '{#MEMTYPE}'
    value: '{$MEMORY.TYPE.NOT_MATCHES}'
  item_prototypes:
  - name: '{#MEMNAME}: Total memory'
    key: vm.memory.total[hrStorageSize.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#MEMNAME}: Used memory'
    key: vm.memory.used[hrStorageUsed.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#MEMNAME}: Memory utilization'
    key: vm.memory.util[memoryUsedPercentage.{#SNMPINDEX}]
    interval: 1m
    type: calculated
    params: last(//vm.memory.used[hrStorageUsed.{#SNMPINDEX}])/last(//vm.memory.total[hrStorageSize.{#SNMPINDEX}])*100
    units: '%'
  trigger_prototypes:
  - name: 'Mellanox: {#MEMNAME}: High memory utilization'
    expression: min(/Mellanox by SNMP/vm.memory.util[memoryUsedPercentage.{#SNMPINDEX}],5m)>90
    severity: average
