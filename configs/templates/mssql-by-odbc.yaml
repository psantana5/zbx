  description: For internal use only.
  history: 31d
  tags:
  - tag: component
    value: wait-time
- name: Total average wait time raw
  key: mssql.average_wait_time_raw
  interval: '0'
  type: dependent
  master_item_key: mssql.locks_info.raw
  value_type: unsigned
  units: ms
  description: Average amount of wait time (in milliseconds) for each lock request
