  - tag: component
    value: wait-time
- name: Batch requests per second
  key: mssql.batch_requests_sec.rate
  interval: '0'
  type: dependent
  master_item_key: mssql.sql_statistics.raw
  units: rps
  description: Number of Transact-SQL command batches received per second. This statistic
    is affected by all constraints (such as I/O, number of users, cache size, complexity
    of requests, and so on). High batch requests mean good throughput.
  history: 31d
  tags:
  - tag: component
    value: performance
- name: Buffer cache hit ratio
  key: mssql.buffer_cache_hit_ratio
  interval: '0'
  type: dependent
  master_item_key: mssql.buffer_manager.raw
  units: '%'
  description: Indicates the percentage of pages found in the buffer cache without
    having to read from the disk. The ratio is the total number of cache hits divided
    by the total number of cache lookups over the last few thousand page accesses.
    After a long period of time, the ratio changes very little. Since reading from
    the cache is much less expensive than reading from the disk, a higher value is
    preferred for this item. To increase the buffer cache hit ratio, consider increasing
    the amount of memory available to MSSQL Server or using the buffer pool extension
    feature.
  history: 31d
  tags:
  - tag: component
    value: cache
