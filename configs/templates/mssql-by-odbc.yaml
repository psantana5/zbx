template: MSSQL by ODBC
description: "This template is designed for the effortless deployment of MSSQL monitoring\
  \ by Zabbix via ODBC and doesn't require any external scripts.\r\n\r\nSetup:\r\n\
  \r\n1. Create an MSSQL user for monitoring.\r\n\r\n  View Server State and View\
  \ Any Definition permissions should be granted to the user.\r\n  Grant this user\
  \ read permissions to the sysjobschedules, sysjobhistory, and sysjobs tables.\r\n\
  \r\n  For more information, see MSSQL documentation:\r\n  \r\n  - Create a database\
  \ user: https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/create-a-database-user?view=sql-server-ver16\r\
  \n  \r\n  - GRANT Server Permissions: https://docs.microsoft.com/en-us/sql/t-sql/statements/grant-server-permissions-transact-sql?view=sql-server-ver16\r\
  \n  \r\n  - Configure a User to Create and Manage SQL Server Agent Jobs: https://docs.microsoft.com/en-us/sql/ssms/agent/configure-a-user-to-create-and-manage-sql-server-agent-jobs?view=sql-server-ver16\r\
  \n\r\n2. Set the user name and password in the host macros ({$MSSQL.USER} and {$MSSQL.PASSWORD}).\r\
  \n\r\n3. Do not forget to install Microsoft ODBC driver on Zabbix server or Zabbix\
  \ proxy and specify data source name in macro {$MSSQL.DSN}.\r\n  \r\n  See Microsoft\
  \ documentation for instructions: https://docs.microsoft.com/en-us/sql/connect/odbc/linux-mac/installing-the-microsoft-odbc-driver-for-sql-server?view=sql-server-ver16.\r\
  \n\r\n  Note! Credentials in the odbc.ini do not work for MSSQL.\r\n\r\nThe \"Service's\
  \ TCP port state\" item uses the {$MSSQL.HOST} and {$MSSQL.PORT} macros to check\
  \ the availability of the MSSQL instance, change these if necessary. Keep in mind\
  \ that if dynamic ports are used on the MSSQL server side, this check will not work\
  \ correctly.\r\n\r\nIf your instance uses a non-default TCP port, set the port in\
  \ your section of odbc.ini in the line Server = IP or FQDN name, port.\r\n\r\nNote:\
  \ You can use the context macros {$MSSQL.BACKUP_FULL.USED}, {$MSSQL.BACKUP_LOG.USED},\
  \ and {$MSSQL.BACKUP_DIFF.USED} to disable backup age triggers for a certain database.\
  \ If set to a value other than \"1\", the trigger expression for the backup age\
  \ will not fire.\r\n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Get availability groups
  key: db.odbc.get[get_availability_group,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT\r\n  ag.name as group_name,\r\n  ISNULL(ags.primary_recovery_health,\
    \ 2) as primary_recovery_health,\r\n  ISNULL(ags.primary_replica, 'Unknown') as\
    \ primary_replica,\r\n  ISNULL(\r\n    ags.secondary_recovery_health, 2\r\n  )\
    \ as secondary_recovery_health,\r\n  ags.synchronization_health as synchronization_health\r\
    \nFROM\r\n  sys.dm_hadr_availability_group_states ags\r\nJOIN sys.availability_groups\
    \ ag ON ag.group_id = ags.group_id"
  value_type: text
  description: The item gets availability group states - name, primary and secondary
    health, synchronization health.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get database
  key: db.odbc.get[get_database,"{$MSSQL.DSN}"]
  interval: 1h
  type: db_monitor
  params: "SELECT name as dbname, recovery_model\r\nFROM sys.databases"
  value_type: text
  description: Getting databases - database name and recovery model.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get DB mirroring
  key: db.odbc.get[get_db_mirroring,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT\r\n  ISNULL(m.mirroring_role, 0) as mirroring_role,\r\n  ISNULL(m.mirroring_role_sequence,\
    \ 0) as mirroring_role_sequence,\r\n  ISNULL(m.mirroring_state, 7) as mirroring_state,\r\
    \n  ISNULL(m.mirroring_witness_state, 3) as mirroring_witness_state,\r\n  ISNULL(m.mirroring_safety_level,\
    \ 3) as mirroring_safety_level,\r\n  db_name(m.database_id) as dbname\r\nFROM\r\
    \n  sys.database_mirroring as m\r\nWHERE\r\n  m.mirroring_state_desc IS NOT NULL"
  value_type: text
  description: Getting DB mirroring.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get job status
  key: db.odbc.get[get_job_status,"{$MSSQL.DSN}"]
  interval: 10m
  type: db_monitor
  params: "SELECT sj.name AS job_name,\r\n  sj.enabled AS enabled,\r\n  sjs.last_run_outcome\
    \ AS run_status,\r\n  sjs.last_outcome_message AS last_run_status_message,\r\n\
    \  sjs.last_run_duration/10000*3600 + sjs.last_run_duration/100%100*60 + sjs.last_run_duration%100\
    \ AS run_duration,\r\n  CASE sjs.last_run_date\r\n    WHEN 0 THEN NULL\r\n   \
    \ ELSE CONVERT(\r\n      VARCHAR(25),\r\n      TODATETIMEOFFSET(msdb.dbo.agent_datetime(sjs.last_run_date,sjs.last_run_time),\
    \ DATEPART(TZoffset, SYSDATETIMEOFFSET())),\r\n      126)\r\n  END AS last_run_date_time,\r\
    \n  sja.next_scheduled_run_date AS next_run_date_time\r\nFROM msdb..sysjobs AS\
    \ sj\r\nLEFT JOIN msdb..sysjobservers AS sjs\r\n  ON sj.job_id = sjs.job_id\r\n\
    LEFT JOIN (\r\n  SELECT job.job_id,\r\n    max(act.session_id) AS s_id,\r\n  \
    \  CONVERT(\r\n      VARCHAR(25),\r\n      TODATETIMEOFFSET(max(act.next_scheduled_run_date),\
    \ DATEPART(TZoffset, SYSDATETIMEOFFSET())),\r\n      126) AS next_scheduled_run_date\r\
    \n  FROM msdb..sysjobs AS job\r\n  LEFT JOIN msdb..sysjobactivity AS act\r\n \
    \   ON act.job_id = job.job_id\r\n  GROUP BY  job.job_id ) AS sja\r\n    ON sja.job_id\
    \ = sj.job_id\r\nWHERE Enabled = 1"
  value_type: text
  description: The item gets the SQL agent job status.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get last backup
  key: db.odbc.get[get_last_backup,"{$MSSQL.DSN}"]
  interval: 10m
  type: db_monitor
  params: "SELECT bs.database_name as dbname,\r\n  [type], \r\n  DATEDIFF(SECOND,\
    \ bs.backup_finish_date, getdate()) as time_since_last_backup, \r\n  (DATEDIFF(SECOND,\
    \ bs.backup_start_date, bs.backup_finish_date)) as duration,\r\n  db.recovery_model\
    \ as db_recovery_model\r\nFROM msdb.dbo.backupset as bs\r\nLEFT JOIN sys.databases\
    \ as db ON bs.database_name = db.name\r\nWHERE bs.database_name not in (\r\n \
    \ SELECT AGDatabases.database_name AS Databasename\r\n  FROM sys.dm_hadr_availability_group_states\
    \ States\r\n  INNER JOIN master.sys.availability_groups Groups \r\n    ON States.group_id\
    \ = Groups.group_id\r\n  INNER JOIN sys.availability_databases_cluster AGDatabases\
    \ \r\n    ON Groups.group_id = AGDatabases.group_id\r\n  WHERE primary_replica\
    \ != @@Servername OR primary_replica is NULL\r\n) and db.name is not NULL\r\n\
    GROUP BY bs.database_name, \r\n  backup_finish_date, \r\n  [type], \r\n  backup_start_date,\r\
    \n  db.recovery_model\r\nHAVING backup_finish_date = (\r\n  SELECT MAX(backup_finish_date)\r\
    \n  FROM msdb.dbo.backupset \r\n  WHERE database_name = bs.database_name \r\n\
    \    AND bs.type = [type]\r\n)\r\nORDER BY bs.database_name"
  value_type: text
  description: The item gets information about backup processes.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get local DB
  key: db.odbc.get[get_local_db,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT ag.name AS group_name, \r\n  drs.database_state as database_state,\
    \ \r\n  drs.is_suspended as is_suspended, \r\n  drs.synchronization_health as\
    \ synchronization_health, \r\n  arcs.replica_server_name AS replica_name,\r\n\
    \  db_name(drs.database_id) AS dbname, \r\n  drs.is_local\r\nFROM sys.dm_hadr_database_replica_states\
    \ drs \r\nJOIN sys.dm_hadr_availability_replica_cluster_states arcs\r\n  ON arcs.replica_id\
    \ = drs.replica_id\r\nJOIN sys.availability_groups ag \r\n  ON ag.group_id = arcs.group_id\r\
    \nJOIN sys.dm_hadr_availability_replica_states ars \r\n  ON ars.replica_id = arcs.replica_id\r\
    \nWHERE drs.is_local = 1"
  value_type: text
  description: Getting the states of the local availability database.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get non-local DB
  key: db.odbc.get[get_non_local_db,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT ag.name AS group_name, \r\n  ISNULL(drs.log_send_queue_size, 0)\
    \ as log_send_queue_size, \r\n  ISNULL(drs.redo_queue_size, 0) as redo_queue_size,\
    \ \r\n  arcs.replica_server_name AS replica_name,\r\n  db_name(drs.database_id)\
    \ AS dbname, \r\n  drs.is_local\r\nFROM sys.dm_hadr_database_replica_states drs\
    \ \r\nJOIN sys.dm_hadr_availability_replica_cluster_states arcs\r\n  ON arcs.replica_id\
    \ = drs.replica_id\r\nJOIN sys.availability_groups ag \r\n  ON ag.group_id = arcs.group_id\r\
    \nJOIN sys.dm_hadr_availability_replica_states ars \r\n  ON ars.replica_id = arcs.replica_id\r\
    \nWHERE drs.is_local = 0"
  value_type: text
  description: Getting the non-local availability database.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get quorum
  key: db.odbc.get[get_quorum,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT quorum_type, quorum_state, cluster_name\r\nFROM sys.dm_hadr_cluster"
  value_type: text
  description: Getting quorum - cluster name, type, and state.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get quorum member
  key: db.odbc.get[get_quorum_member,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT a.member_name, a.member_type, a.member_state, a.number_of_quorum_votes,\
    \ b.cluster_name\r\nFROM sys.dm_hadr_cluster_members a\r\nCROSS JOIN sys.dm_hadr_cluster\
    \ b"
  value_type: text
  description: Getting quorum members - member name, type, state, and number of quorum
    votes.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get replica
  key: db.odbc.get[get_replica,"{$MSSQL.DSN}"]
  interval: 1m
  type: db_monitor
  params: "SELECT \r\n  ars.connected_state as connected_state, \r\n  ars.is_local\
    \ as is_local, \r\n  arcs.join_state as join_state, \r\n  ISNULL(ars.operational_state,\
    \ 6) as operational_state, \r\n  ISNULL(ars.recovery_health, 2) as recovery_health,\
    \ \r\n  ars.role as role, \r\n  ars.synchronization_health as synchronization_health,\
    \ \r\n  ag.name as group_name, \r\n  arcs.replica_server_name as replica_name\
    \ \r\nFROM \r\n  sys.dm_hadr_availability_replica_cluster_states as arcs \r\n\
    JOIN sys.availability_groups ag ON ag.group_id = arcs.group_id \r\nJOIN sys.dm_hadr_availability_replica_states\
    \ ars ON ars.replica_id = arcs.replica_id"
  value_type: text
  description: Getting the database replica.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get performance counters
  key: db.odbc.get[get_status_variables,"{$MSSQL.DSN}"]
  interval: 0;m0-59
  type: db_monitor
  params: "DECLARE @SQLNAME NVARCHAR(22)\r\nSET @SQLNAME = CASE WHEN @@SERVICENAME\
    \ = 'MSSQLSERVER' THEN 'SQLServer' ELSE 'MSSQL$' + @@SERVICENAME END\r\nSELECT\
    \ object_name,\r\n  counter_name,\r\n  instance_name,\r\n  cntr_value\r\nFROM\
    \ sys.dm_os_performance_counters\r\nUNION SELECT @SQLNAME AS object_name,\r\n\
    \  'Version' AS counter_name,\r\n  @@version AS instance_name,\r\n  0 AS cntr_value\r\
    \nUNION SELECT @SQLNAME AS object_name,\r\n  'Uptime' AS counter_name,\r\n  ''\
    \ AS instance_name,\r\n  DATEDIFF(second, sqlserver_start_time, GETDATE()) AS\
    \ cntr_value\r\nFROM sys.dm_os_sys_info\r\nUNION SELECT @SQLNAME + ':Databases'\
    \ AS object_name,\r\n  'State' AS counter_name,\r\n  name AS instance_name,\r\n\
    \  state AS cntr_value\r\nFROM sys.databases\r\nUNION SELECT a.object_name,\r\n\
    \  'BufferCacheHitRatio' AS counter_name,\r\n  '' AS instance_name,\r\n  cast(a.cntr_value\
    \ * ISNULL((100.0 / NULLIF(b.cntr_value,0)),0) AS dec(3, 0)) AS cntr_value\r\n\
    FROM sys.dm_os_performance_counters a\r\nJOIN (\r\n  SELECT cntr_value,\r\n  \
    \  OBJECT_NAME\r\n  FROM sys.dm_os_performance_counters\r\n  WHERE counter_name\
    \ = 'Buffer cache hit ratio base'\r\n    AND OBJECT_NAME = @SQLNAME + ':Buffer\
    \ Manager'\r\n) b\r\n  ON a.OBJECT_NAME = b.OBJECT_NAME\r\nWHERE a.counter_name\
    \ = 'Buffer cache hit ratio'\r\n  AND a.OBJECT_NAME = @SQLNAME + ':Buffer Manager'\r\
    \nUNION SELECT a.object_name,\r\n  'WorktablesFromCacheRatio' AS counter_name,\r\
    \n  '' AS instance_name,\r\n  cast(a.cntr_value * ISNULL((100.0 / NULLIF(b.cntr_value,0)),0)\
    \ AS dec(3, 0)) AS cntr_value\r\nFROM sys.dm_os_performance_counters a\r\nJOIN\
    \ (\r\n  SELECT cntr_value,\r\n    OBJECT_NAME\r\n  FROM sys.dm_os_performance_counters\r\
    \n  WHERE counter_name = 'Worktables From Cache Base'\r\n    AND OBJECT_NAME =\
    \ @SQLNAME + ':Access Methods'\r\n) b\r\n  ON a.OBJECT_NAME = b.OBJECT_NAME\r\n\
    WHERE a.counter_name = 'Worktables From Cache Ratio'\r\n  AND a.OBJECT_NAME =\
    \ @SQLNAME + ':Access Methods'\r\nUNION SELECT a.object_name,\r\n  'CacheHitRatio'\
    \ AS counter_name,\r\n  '_Total' AS instance_name,\r\n  cast(a.cntr_value * ISNULL((100.0\
    \ / NULLIF(b.cntr_value,0)),0) AS dec(3, 0)) AS cntr_value\r\nFROM sys.dm_os_performance_counters\
    \ a\r\nJOIN (\r\n  SELECT cntr_value,\r\n    OBJECT_NAME\r\n  FROM sys.dm_os_performance_counters\r\
    \n  WHERE counter_name = 'Cache Hit Ratio base'\r\n    AND OBJECT_NAME = @SQLNAME\
    \ + ':Plan Cache'\r\n    AND instance_name = '_Total'\r\n) b\r\n  ON a.OBJECT_NAME\
    \ = b.OBJECT_NAME\r\nWHERE a.counter_name = 'Cache Hit Ratio'\r\n  AND a.OBJECT_NAME\
    \ = @SQLNAME + ':Plan Cache'\r\n  AND instance_name = '_Total'"
  value_type: text
  description: The item gets server global status information.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Get Access Methods counters
  key: mssql.access_methods.raw
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_status_variables,"{$MSSQL.DSN}"]
  value_type: text
  description: The item gets server information about access methods.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Auto-param attempts per second
  key: mssql.autoparam_attempts_sec.rate
  interval: '0'
  type: dependent
  master_item_key: mssql.sql_statistics.raw
  description: Number of auto-parameterization attempts per second. The total should
    be the sum of the failed, safe, and unsafe auto-parameterizations. Auto-parameterization
    occurs when an instance of SQL Server tries to parameterize a Transact-SQL request
    by replacing some literals with parameters so that reuse of the resulting cached
    execution plan across multiple similar-looking requests is possible. Note that
    auto-parameterizations are also known as simple parameterizations in the newer
    versions of SQL Server. This counter does not include forced parameterizations.
  history: 31d
  tags:
  - tag: component
    value: performance
- name: Average latch wait time
  key: mssql.average_latch_wait_time
  interval: 0;m0-59s3
  type: calculated
  params: "(last(//mssql.average_latch_wait_time_raw) - last(//mssql.average_latch_wait_time_raw,#2))\
    \ /\r\n(last(//mssql.average_latch_wait_time_base) - last(//mssql.average_latch_wait_time_base,#2)\
    \ +\r\n(last(//mssql.average_latch_wait_time_base) - last(//mssql.average_latch_wait_time_base,#2)=0))"
  units: ms
  description: Average latch wait time (in milliseconds) for latch requests that had
    to wait.
  history: 31d
  tags:
  - tag: component
    value: wait-time
- name: Average latch wait time base
  key: mssql.average_latch_wait_time_base
  interval: '0'
  type: dependent
  master_item_key: mssql.latches_info.raw
  value_type: unsigned
  description: For internal use only.
  history: 31d
  tags:
  - tag: component
    value: wait-time
- name: Average latch wait time raw
  key: mssql.average_latch_wait_time_raw
  interval: '0'
  type: dependent
  master_item_key: mssql.latches_info.raw
  value_type: unsigned
  units: ms
  description: Average latch wait time (in milliseconds) for latch requests that had
