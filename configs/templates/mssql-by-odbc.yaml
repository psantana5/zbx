triggers:
- name: 'MSSQL: Total average wait time for locks is high'
  expression: min(/MSSQL by ODBC/mssql.average_wait_time,5m)>500
  severity: warning
  description: An average wait time longer than 500 ms may indicate excessive blocking.
    This value should generally correlate to "Lock Waits/sec" and move up or down
    with it accordingly.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Too frequently using pointers'
  expression: last(/MSSQL by ODBC/mssql.forwarded_records_sec.rate) * 100 > 10 * last(/MSSQL
    by ODBC/mssql.batch_requests_sec.rate)
  severity: warning
  description: Rows with VARCHAR columns can experience expansion when VARCHAR values
    are updated with a longer string. In the case where the row cannot fit in the
    existing page, the row migrates, and access to the row will traverse a pointer.
    This only happens on heaps (tables without clustered indexes). In cases where
    clustered indexes cannot be used, drop non-clustered indexes, build a clustered
    index to reorg pages and rows, drop the clustered index, then recreate non-clustered
    indexes.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Percentage of the buffer cache efficiency is low'
  expression: max(/MSSQL by ODBC/mssql.buffer_cache_hit_ratio,5m)<30
  severity: high
  description: Too low buffer cache hit ratio.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Percentage of the buffer cache efficiency is low'
  expression: max(/MSSQL by ODBC/mssql.buffer_cache_hit_ratio,5m)<50
  severity: warning
  description: Low buffer cache hit ratio.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of rps waiting for a free page is high'
  expression: min(/MSSQL by ODBC/mssql.free_list_stalls_sec.rate,5m)>2
  severity: warning
  description: Some requests have to wait for a free page.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of buffers written per second by the lazy writer is high'
  expression: min(/MSSQL by ODBC/mssql.lazy_writes_sec.rate,5m)>20
  severity: warning
  description: The number of buffers written per second by the buffer manager's lazy
    writer exceeds the threshold.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Total number of locks per second is high'
  expression: min(/MSSQL by ODBC/mssql.lock_requests_sec.rate,5m)>1000
  severity: warning
  description: Number of new locks and lock conversions per second requested from
    the lock manager is high.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Total lock requests per second that timed out is high'
  expression: min(/MSSQL by ODBC/mssql.lock_timeouts_sec.rate,5m)>1
  severity: warning
  description: The total number of timed out lock requests per second, including requests
    for NOWAIT locks, is high.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Some blocking is occurring for 5m'
  expression: min(/MSSQL by ODBC/mssql.lock_waits_sec.rate,5m)>0
  severity: average
  description: Values greater than zero indicate at least some blocking is occurring,
    while a value of zero can quickly eliminate blocking as a potential root-cause
    problem.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of deadlocks is high'
  expression: min(/MSSQL by ODBC/mssql.number_deadlocks_sec.rate,5m)>1
  severity: average
  description: Too many deadlocks are occurring currently.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Page life expectancy is low'
  expression: max(/MSSQL by ODBC/mssql.page_life_expectancy,15m)<300
  severity: high
  description: The page stays in the buffer pool without references for less time
    than the threshold value.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Too many physical reads occurring'
  expression: last(/MSSQL by ODBC/mssql.readahead_pages_sec.rate) > 20 / 100 * last(/MSSQL
    by ODBC/mssql.page_reads_sec.rate)
  severity: warning
  description: If this value makes up even a sizeable minority of the total "Page
    Reads/sec" (say, greater than 20% of the total page reads), you may have too many
    physical reads occurring.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of physical database page reads per second is high'
  expression: min(/MSSQL by ODBC/mssql.page_reads_sec.rate,5m)>90
  severity: warning
  description: The physical database page reads are issued too frequently.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of physical database page writes per second is high'
  expression: min(/MSSQL by ODBC/mssql.page_writes_sec.rate,5m)>90
  severity: warning
  description: The physical database page writes are issued too frequently.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Percent of ad hoc queries running is high'
  expression: min(/MSSQL by ODBC/mssql.percent_of_adhoc_queries,15m) > 10
  severity: warning
  description: The lower this value is, the better. High values often indicate excessive
    ad hoc querying and should be as low as possible. If excessive ad hoc querying
    is happening, try rewriting the queries as procedures or invoke the queries using
    `sp_executeSQL`. When rewriting isn't possible, consider using a plan guide or
    setting the database to parameterization forced mode.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Percent of times statement recompiles is high'
  expression: min(/MSSQL by ODBC/mssql.percent_recompilations_to_compilations,15m)
    > 10
  severity: warning
  description: This number should be at or near zero, since recompiles can cause deadlocks
    and exclusive compile locks. This counter's value should follow in proportion
    to "Batch Requests/sec" and "SQL Compilations/sec".
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of index and table scans exceeds index searches in the last
    15m'
  expression: min(/MSSQL by ODBC/mssql.scan_to_search,15m) > 0.001
  severity: warning
  description: Index searches are preferable to index and table scans. For OLTP applications,
    optimize for more index searches and less scans (preferably, 1 full scan for every
    1000 index searches). Index and table scans are expensive I/O operations.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Service has been restarted'
  expression: last(/MSSQL by ODBC/mssql.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MSSQL: Failed to fetch info data'
  expression: nodata(/MSSQL by ODBC/mssql.uptime,30m)=1
  severity: information
  description: Zabbix has not received any data for items for the last 30 minutes.
  tags:
  - tag: scope
    value: availability
- name: 'MSSQL: Version has changed'
  expression: last(/MSSQL by ODBC/mssql.version,#1)<>last(/MSSQL by ODBC/mssql.version,#2)
    and length(last(/MSSQL by ODBC/mssql.version))>0
  severity: information
  description: MSSQL version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'MSSQL: Number of work files created per second is high'
  expression: min(/MSSQL by ODBC/mssql.workfiles_created_sec.rate,5m)>20
  severity: average
  description: Too many work files created per second to store temporary results for
    hash joins and hash aggregates.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Number of work tables created per second is high'
  expression: min(/MSSQL by ODBC/mssql.worktables_created_sec.rate,5m)>20
  severity: average
  description: Too many work tables created per second to store temporary results
    for query spool, LOB variables, XML variables, and cursors.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Percentage of work tables available from the work table cache is low'
  expression: max(/MSSQL by ODBC/mssql.worktables_from_cache_ratio,5m)<90
  severity: high
  description: A value less than 90% may indicate insufficient memory, since execution
    plans are being dropped, or, on 32-bit systems, may indicate the need for an upgrade
    to a 64-bit system.
  tags:
  - tag: scope
    value: performance
- name: 'MSSQL: Service is unavailable'
  expression: last(/MSSQL by ODBC/net.tcp.service[tcp,localhost,1433])=0
  severity: disaster
  description: The TCP port of the MSSQL Server service is currently unavailable.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Availability group discovery
  key: mssql.availability.group.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_availability_group,"{$MSSQL.DSN}"]
  item_prototypes:
  - name: 'MSSQL AG ''{#GROUP_NAME}'': Primary replica recovery health'
    key: mssql.primary_recovery_health["{#GROUP_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'': Primary replica name'
    key: mssql.primary_replica["{#GROUP_NAME}"]
    interval: '0'
    type: dependent
    value_type: char
  - name: 'MSSQL AG ''{#GROUP_NAME}'': Secondary replica recovery health'
    key: mssql.secondary_recovery_health["{#GROUP_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'': Synchronization health'
    key: mssql.synchronization_health["{#GROUP_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MSSQL: AG ''{#GROUP_NAME}'': Primary replica recovery health in progress'
    expression: last(/MSSQL by ODBC/mssql.primary_recovery_health["{#GROUP_NAME}"])=0
    severity: warning
  - name: 'MSSQL: AG ''{#GROUP_NAME}'': Secondary replica recovery health in progress'
    expression: last(/MSSQL by ODBC/mssql.secondary_recovery_health["{#GROUP_NAME}"])=0
    severity: warning
  - name: 'MSSQL: AG ''{#GROUP_NAME}'': All replicas unhealthy'
    expression: last(/MSSQL by ODBC/mssql.synchronization_health["{#GROUP_NAME}"])=0
    severity: disaster
  - name: 'MSSQL: AG ''{#GROUP_NAME}'': Some replicas unhealthy'
    expression: last(/MSSQL by ODBC/mssql.synchronization_health["{#GROUP_NAME}"])=1
    severity: high
- name: Database discovery
  key: mssql.database.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_database,"{$MSSQL.DSN}"]
  filter:
  - macro: '{#DBNAME}'
    value: '{$MSSQL.DBNAME.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MSSQL.DBNAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'MSSQL DB ''{#DBNAME}'': Get last backup'
    key: mssql.backup.raw["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'MSSQL DB ''{#DBNAME}'': Get performance counters'
    key: mssql.db.perf_raw["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'MSSQL DB ''{#DBNAME}'': Last diff backup duration'
    key: mssql.backup.diff.duration["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Last diff backup (time ago)'
    key: mssql.backup.diff["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Last full backup duration'
    key: mssql.backup.full.duration["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Last full backup (time ago)'
    key: mssql.backup.full["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Last log backup duration'
    key: mssql.backup.log.duration["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Last log backup (time ago)'
    key: mssql.backup.log["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
    units: s
  - name: 'MSSQL DB ''{#DBNAME}'': Recovery model'
    key: mssql.backup.recovery_model["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.backup.raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Active transactions'
    key: mssql.db.active_transactions["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Data file size'
    key: mssql.db.data_files_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MSSQL DB ''{#DBNAME}'': Log bytes flushed per second'
    key: mssql.db.log_bytes_flushed_sec.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    units: Bps
  - name: 'MSSQL DB ''{#DBNAME}'': Log file size'
    key: mssql.db.log_files_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MSSQL DB ''{#DBNAME}'': Log file used size'
    key: mssql.db.log_files_used_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MSSQL DB ''{#DBNAME}'': Log flushes per second'
    key: mssql.db.log_flushes_sec.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
  - name: 'MSSQL DB ''{#DBNAME}'': Log flush waits per second'
    key: mssql.db.log_flush_waits_sec.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
  - name: 'MSSQL DB ''{#DBNAME}'': Log flush wait time'
    key: mssql.db.log_flush_wait_time["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    units: ms
  - name: 'MSSQL DB ''{#DBNAME}'': Log growths'
    key: mssql.db.log_growths["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Log shrinks'
    key: mssql.db.log_shrinks["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Log truncations'
    key: mssql.db.log_truncations["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Percent log used'
    key: mssql.db.percent_log_used["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    units: '%'
  - name: 'MSSQL DB ''{#DBNAME}'': State'
    key: mssql.db.state["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
    value_type: unsigned
  - name: 'MSSQL DB ''{#DBNAME}'': Transactions per second'
    key: mssql.db.transactions_sec.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.db.perf_raw["{#DBNAME}"]
  trigger_prototypes:
  - name: 'MSSQL: DB ''{#DBNAME}'': Diff backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.diff["{#DBNAME}"])>6d and 1=1
    severity: high
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Diff backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.diff["{#DBNAME}"])>3d and 1=1
    severity: warning
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Full backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.full["{#DBNAME}"])>10d and 1=1
    severity: high
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Full backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.full["{#DBNAME}"])>9d and 1=1
    severity: warning
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Log backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.log["{#DBNAME}"])>8h and 1=1 and
      last(/MSSQL by ODBC/mssql.backup.recovery_model["{#DBNAME}"])<>3
    severity: high
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Log backup is old'
    expression: last(/MSSQL by ODBC/mssql.backup.log["{#DBNAME}"])>4h and 1=1 and
      last(/MSSQL by ODBC/mssql.backup.recovery_model["{#DBNAME}"])<>3
    severity: warning
    allow_manual_close: true
  - name: 'MSSQL: DB ''{#DBNAME}'': Number of commits waiting for the log flush is
      high'
    expression: min(/MSSQL by ODBC/mssql.db.log_flush_waits_sec.rate["{#DBNAME}"],5m)>1
    severity: warning
  - name: 'MSSQL: DB ''{#DBNAME}'': Total wait time to flush the log is high'
    expression: min(/MSSQL by ODBC/mssql.db.log_flush_wait_time["{#DBNAME}"],5m)>1
    severity: warning
  - name: 'MSSQL: DB ''{#DBNAME}'': Percent of log usage is high'
    expression: min(/MSSQL by ODBC/mssql.db.percent_log_used["{#DBNAME}"],5m)>80
    severity: warning
  - name: 'MSSQL: DB ''{#DBNAME}'': State is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.db.state["{#DBNAME}"])>1
    severity: high
- name: Job discovery
  key: mssql.job.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_job_status,"{$MSSQL.DSN}"]
  filter:
  - macro: '{#JOBNAME}'
    value: '{$MSSQL.JOB.MATCHES}'
  - macro: '{#JOBNAME}'
    value: '{$MSSQL.JOB.NOT_MATCHES}'
  item_prototypes:
  - name: 'MSSQL Job ''{#JOBNAME}'': Get job status'
    key: mssql.job.status_raw["{#JOBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'MSSQL Job ''{#JOBNAME}'': Enabled'
    key: mssql.job.enabled["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: unsigned
  - name: 'MSSQL Job ''{#JOBNAME}'': Last run date-time'
    key: mssql.job.lastrundatetime["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: unsigned
    units: unixtime
  - name: 'MSSQL Job ''{#JOBNAME}'': Last run status message'
    key: mssql.job.lastrunstatusmessage["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: text
  - name: 'MSSQL Job ''{#JOBNAME}'': Next run date-time'
    key: mssql.job.nextrundatetime["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: unsigned
    units: unixtime
  - name: 'MSSQL Job ''{#JOBNAME}'': Run status'
    key: mssql.job.runstatus["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: unsigned
  - name: 'MSSQL Job ''{#JOBNAME}'': Run duration'
    key: mssql.job.run_duration["{#JOBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mssql.job.status_raw["{#JOBNAME}"]
    value_type: unsigned
    units: s
  trigger_prototypes:
  - name: 'MSSQL: Job ''{#JOBNAME}'': Failed to run'
    expression: last(/MSSQL by ODBC/mssql.job.runstatus["{#JOBNAME}"])=0
    severity: warning
    allow_manual_close: true
  - name: 'MSSQL: Job ''{#JOBNAME}'': Job duration is high'
    expression: last(/MSSQL by ODBC/mssql.job.run_duration["{#JOBNAME}"])>1h
    severity: warning
    allow_manual_close: true
- name: Local database discovery
  key: mssql.local.db.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_local_db,"{$MSSQL.DSN}"]
  item_prototypes:
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': Suspended'
    key: mssql.local_db.is_suspended["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': State'
    key: mssql.local_db.state["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': Synchronization health'
    key: mssql.local_db.synchronization_health["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': "{#DBNAME}" is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.local_db.state["{#DBNAME}"])>0
    severity: warning
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': "{#DBNAME}" is Not
      healthy'
    expression: last(/MSSQL by ODBC/mssql.local_db.synchronization_health["{#DBNAME}"])=0
    severity: high
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Local DB ''{#DBNAME}'': "{#DBNAME}" is Partially
      healthy'
    expression: last(/MSSQL by ODBC/mssql.local_db.synchronization_health["{#DBNAME}"])=1
    severity: average
- name: Mirroring discovery
  key: mssql.mirroring.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_db_mirroring,"{$MSSQL.DSN}"]
  item_prototypes:
  - name: 'MSSQL Mirroring ''{#DBNAME}'': Role'
    key: mssql.mirroring.role["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Mirroring ''{#DBNAME}'': Role sequence'
    key: mssql.mirroring.role_sequence["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Mirroring ''{#DBNAME}'': Safety level'
    key: mssql.mirroring.safety_level["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Mirroring ''{#DBNAME}'': State'
    key: mssql.mirroring.state["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Mirroring ''{#DBNAME}'': Witness state'
    key: mssql.mirroring.witness_state["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MSSQL: Mirroring ''{#DBNAME}'': "{#DBNAME}" is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.mirroring.state["{#DBNAME}"])=3
    severity: warning
  - name: 'MSSQL: Mirroring ''{#DBNAME}'': "{#DBNAME}" is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.mirroring.state["{#DBNAME}"])=5
    severity: high
  - name: 'MSSQL: Mirroring ''{#DBNAME}'': "{#DBNAME}" is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.mirroring.state["{#DBNAME}"])>=0 and last(/MSSQL
      by ODBC/mssql.mirroring.state["{#DBNAME}"])<=2
    severity: information
  - name: 'MSSQL: Mirroring ''{#DBNAME}'': "{#DBNAME}" Witness is disconnected'
    expression: last(/MSSQL by ODBC/mssql.mirroring.witness_state["{#DBNAME}"])=2
    severity: warning
- name: Non-local database discovery
  key: mssql.non.local.db.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_non_local_db,"{$MSSQL.DSN}"]
  item_prototypes:
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Non-Local DB ''*{#REPLICA_NAME}*{#DBNAME}'':
      Log queue size'
    key: mssql.non-local_db.log_send_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Non-Local DB ''*{#REPLICA_NAME}*{#DBNAME}'':
      Redo log queue size'
    key: mssql.non-local_db.redo_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  trigger_prototypes:
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Non-Local DB ''*{#REPLICA_NAME}*{#DBNAME}'':
      Log queue size is growing'
    expression: last(/MSSQL by ODBC/mssql.non-local_db.log_send_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#1)>last(/MSSQL
      by ODBC/mssql.non-local_db.log_send_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#2)
      and last(/MSSQL by ODBC/mssql.non-local_db.log_send_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#2)>last(/MSSQL
      by ODBC/mssql.non-local_db.log_send_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#3)
    severity: high
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Non-Local DB ''*{#REPLICA_NAME}*{#DBNAME}'':
      Redo log queue size is growing'
    expression: last(/MSSQL by ODBC/mssql.non-local_db.redo_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#1)>last(/MSSQL
      by ODBC/mssql.non-local_db.redo_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#2)
      and last(/MSSQL by ODBC/mssql.non-local_db.redo_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#2)>last(/MSSQL
      by ODBC/mssql.non-local_db.redo_queue_size["{#GROUP_NAME}*{#REPLICA_NAME}*{#DBNAME}"],#3)
    severity: high
- name: Quorum discovery
  key: mssql.quorum.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_quorum,"{$MSSQL.DSN}"]
  filter:
  - macro: '{#CLUSTER_NAME}'
    value: ^.+$
  item_prototypes:
  - name: 'MSSQL Cluster ''{#CLUSTER_NAME}'': Quorum state'
    key: mssql.quorum.state.[{#CLUSTER_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Cluster ''{#CLUSTER_NAME}'': Quorum type'
    key: mssql.quorum.type.[{#CLUSTER_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
- name: Quorum members discovery
  key: mssql.quorum.member.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_quorum_member,"{$MSSQL.DSN}"]
  filter:
  - macro: '{#CLUSTER_NAME}'
    value: ^.+$
  - macro: '{#MEMBER_NAME}'
    value: '{$MSSQL.QUORUM.MEMBER.DISCOVERY.NAME.MATCHES}'
  - macro: '{#MEMBER_NAME}'
    value: '{$MSSQL.QUORUM.MEMBER.DISCOVERY.NAME.NOT_MATCHES}'
  item_prototypes:
  - name: 'MSSQL Cluster member ''{#MEMBER_NAME}'': Member state'
    key: mssql.quorum_members.member_state.[{#MEMBER_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Cluster member ''{#MEMBER_NAME}'': Member type'
    key: mssql.quorum_members.member_type.[{#MEMBER_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL Cluster member ''{#MEMBER_NAME}'': Number of quorum votes'
    key: mssql.quorum_members.number_of_quorum_votes.[{#MEMBER_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
- name: Replication discovery
  key: mssql.replica.discovery
  interval: '0'
  type: dependent
  master_item_key: db.odbc.get[get_replica,"{$MSSQL.DSN}"]
  item_prototypes:
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Connected state'
    key: mssql.replica.connected_state["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Is local'
    key: mssql.replica.is_local["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Join state'
    key: mssql.replica.join_state["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Operational state'
    key: mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Recovery health'
    key: mssql.replica.recovery_health["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Role'
    key: mssql.replica.role["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'MSSQL AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': Sync health'
    key: mssql.replica.synchronization_health["{#GROUP_NAME}_{#REPLICA_NAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is disconnected'
    expression: last(/MSSQL by ODBC/mssql.replica.connected_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=0
      and last(/MSSQL by ODBC/mssql.replica.role["{#GROUP_NAME}_{#REPLICA_NAME}"])=2
    severity: warning
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=0
      or last(/MSSQL by ODBC/mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=1
      or last(/MSSQL by ODBC/mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=3
    severity: warning
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=4
    severity: average
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is {ITEM.VALUE}'
    expression: last(/MSSQL by ODBC/mssql.replica.operational_state["{#GROUP_NAME}_{#REPLICA_NAME}"])=5
    severity: high
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      Recovery in progress'
    expression: last(/MSSQL by ODBC/mssql.replica.recovery_health["{#GROUP_NAME}_{#REPLICA_NAME}"])=0
    severity: information
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is Not healthy'
    expression: last(/MSSQL by ODBC/mssql.replica.synchronization_health["{#GROUP_NAME}_{#REPLICA_NAME}"])=0
    severity: average
  - name: 'MSSQL: AG ''{#GROUP_NAME}'' Replica ''{#REPLICA_NAME}'': {#REPLICA_NAME}
      is Partially healthy'
    expression: last(/MSSQL by ODBC/mssql.replica.synchronization_health["{#GROUP_NAME}_{#REPLICA_NAME}"])=1
    severity: warning
