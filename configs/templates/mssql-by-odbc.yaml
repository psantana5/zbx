  history: 31d
  tags:
  - tag: component
    value: wait-time
- name: Total average wait time
  key: mssql.average_wait_time
  interval: 0;m0-59s3
  type: calculated
  params: "(last(//mssql.average_wait_time_raw) - last(//mssql.average_wait_time_raw,#2))\
    \ /\r\n(last(//mssql.average_wait_time_base) - last(//mssql.average_wait_time_base,#2)\
    \ +\r\n(last(//mssql.average_wait_time_base) - last(//mssql.average_wait_time_base,#2)=0))"
  units: ms
  description: The average wait time, in milliseconds, for each lock request that
    had to wait.
  history: 31d
  tags:
  - tag: component
    value: wait-time
- name: Total average wait time base
