triggers:
- name: 'Ceph: Minimum monitor release version has changed'
  expression: last(/Ceph by Zabbix agent 2/ceph.min_mon_release_name,#1)<>last(/Ceph
    by Zabbix agent 2/ceph.min_mon_release_name,#2) and length(last(/Ceph by Zabbix
    agent 2/ceph.min_mon_release_name))>0
  severity: information
  description: A Ceph version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
- name: 'Ceph: Cluster in ERROR state'
  expression: last(/Ceph by Zabbix agent 2/ceph.overall_status)=2
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'Ceph: Cluster in WARNING state'
  expression: last(/Ceph by Zabbix agent 2/ceph.overall_status)=1
  severity: warning
  recovery_expression: last(/Ceph by Zabbix agent 2/ceph.overall_status)=0
  tags:
  - tag: scope
    value: availability
- name: 'Ceph: Can not connect to cluster'
  expression: last(/Ceph by Zabbix agent 2/ceph.ping["https://localhost:8003","zabbix","zabbix_pass"])=0
  severity: average
  description: The connection to the Ceph RESTful module is broken (if there is any
    error presented including *AUTH* and the configuration issues).
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: OSD
  key: ceph.osd.discovery["{$CEPH.CONNSTRING}","{$CEPH.USER}","{$CEPH.API.KEY}"]
  interval: 1h
  item_prototypes:
  - name: '[osd.{#OSDNAME}] OSD fill'
    key: ceph.osd[{#OSDNAME},fill]
    interval: '0'
    type: dependent
    units: '%'
  - name: '[osd.{#OSDNAME}] OSD in'
    key: ceph.osd[{#OSDNAME},in]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: '[osd.{#OSDNAME}] OSD latency apply'
    key: ceph.osd[{#OSDNAME},latency_apply]
    interval: '0'
    type: dependent
    units: ms
  - name: '[osd.{#OSDNAME}] OSD latency commit'
    key: ceph.osd[{#OSDNAME},latency_commit]
    interval: '0'
    type: dependent
    units: ms
  - name: '[osd.{#OSDNAME}] OSD PGs'
    key: ceph.osd[{#OSDNAME},num_pgs]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: '[osd.{#OSDNAME}] OSD up'
    key: ceph.osd[{#OSDNAME},up]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Ceph: Ceph OSD osd.{#OSDNAME} is near full'
    expression: min(/Ceph by Zabbix agent 2/ceph.osd[{#OSDNAME},fill],15m) > last(/Ceph
      by Zabbix agent 2/ceph.osd_nearfull_ratio)*100
    severity: warning
  - name: 'Ceph: OSD osd.{#OSDNAME} is full'
    expression: min(/Ceph by Zabbix agent 2/ceph.osd[{#OSDNAME},fill],15m) > last(/Ceph
      by Zabbix agent 2/ceph.osd_full_ratio)*100
    severity: average
  - name: 'Ceph: OSD osd.{#OSDNAME} is down'
    expression: last(/Ceph by Zabbix agent 2/ceph.osd[{#OSDNAME},up]) = 0
    severity: average
- name: Pool
  key: ceph.pool.discovery["{$CEPH.CONNSTRING}","{$CEPH.USER}","{$CEPH.API.KEY}"]
  interval: 1h
  item_prototypes:
