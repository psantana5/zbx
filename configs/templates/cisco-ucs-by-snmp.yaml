template: Cisco UCS by SNMP
description: "Template Server Cisco UCS\r\n\r\nMIBs used:\r\nCISCO-UNIFIED-COMPUTING-COMPUTE-MIB\r\
  \nHOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nCISCO-UNIFIED-COMPUTING-PROCESSOR-MIB\r\n\
  CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB\r\nCISCO-UNIFIED-COMPUTING-STORAGE-MIB\r\n\
  \r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'Cisco UCS: Unavailable by ICMP ping'
  expression: max(/Cisco UCS by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Cisco UCS: High ICMP ping loss'
  expression: min(/Cisco UCS by SNMP/icmppingloss,5m)>20 and min(/Cisco UCS by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco UCS: High ICMP ping response time'
  expression: avg(/Cisco UCS by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco UCS: Host has been restarted'
  expression: (last(/Cisco UCS by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Cisco
    UCS by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Cisco UCS by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/Cisco UCS by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco UCS: System name has changed'
  expression: last(/Cisco UCS by SNMP/system.name,#1)<>last(/Cisco UCS by SNMP/system.name,#2)
    and length(last(/Cisco UCS by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Cisco UCS: No SNMP data collection'
  expression: max(/Cisco UCS by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Array Controller Cache Discovery
  key: array.cache.discovery
  interval: 1h
  item_prototypes:
  - name: '{#DISKARRAY_CACHE_LOCATION}: Disk array cache controller battery status'
    key: system.hw.diskarray.cache.battery.status[cucsStorageRaidBatteryOperability.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#DISKARRAY_CACHE_LOCATION}: Disk array cache controller battery
      is in critical state!'
    expression: count(/Cisco UCS by SNMP/system.hw.diskarray.cache.battery.status[cucsStorageRaidBatteryOperability.{#SNMPINDEX}],#1,"eq","2")=1
    severity: average
  - name: 'Cisco UCS: {#DISKARRAY_CACHE_LOCATION}: Disk array cache controller battery
      is not in optimal state'
    expression: count(/Cisco UCS by SNMP/system.hw.diskarray.cache.battery.status[cucsStorageRaidBatteryOperability.{#SNMPINDEX}],#1,"ne","1")=1
    severity: warning
- name: Array Controller Discovery
  key: array.discovery
  interval: 1h
  item_prototypes:
  - name: '{#DISKARRAY_LOCATION}: Disk array controller model'
    key: system.hw.diskarray.model[cucsStorageControllerModel.{#SNMPINDEX}]
    interval: 1d
    value_type: char
  - name: '{#DISKARRAY_LOCATION}: Disk array controller status'
    key: system.hw.diskarray.status[cucsStorageControllerOperState.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#DISKARRAY_LOCATION}: Disk array controller is in critical
      state'
    expression: count(/Cisco UCS by SNMP/system.hw.diskarray.status[cucsStorageControllerOperState.{#SNMPINDEX}],#1,"eq","2")=1
    severity: high
  - name: 'Cisco UCS: {#DISKARRAY_LOCATION}: Disk array controller is in warning state'
    expression: count(/Cisco UCS by SNMP/system.hw.diskarray.status[cucsStorageControllerOperState.{#SNMPINDEX}],#1,"eq","3")=1
    severity: average
  - name: 'Cisco UCS: {#DISKARRAY_LOCATION}: Disk array controller is not in optimal
      state'
    expression: count(/Cisco UCS by SNMP/system.hw.diskarray.status[cucsStorageControllerOperState.{#SNMPINDEX}],#1,"ne","1")=1
    severity: warning
- name: FAN Discovery
  key: fan.discovery
  interval: 1h
  item_prototypes:
  - name: '{#FAN_LOCATION}: Fan status'
    key: sensor.fan.status[cucsEquipmentFanOperState.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#FAN_LOCATION}: Fan is in critical state'
    expression: count(/Cisco UCS by SNMP/sensor.fan.status[cucsEquipmentFanOperState.{#SNMPINDEX}],#1,"eq","2")=1
    severity: average
  - name: 'Cisco UCS: {#FAN_LOCATION}: Fan is in warning state'
    expression: count(/Cisco UCS by SNMP/sensor.fan.status[cucsEquipmentFanOperState.{#SNMPINDEX}],#1,"eq","3")=1
    severity: warning
- name: Physical Disk Discovery
  key: physicalDisk.discovery
  interval: 1h
  item_prototypes:
  - name: '{#DISK_LOCATION}: Physical disk media type'
    key: system.hw.physicaldisk.media_type[cucsStorageLocalDiskModel.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#DISK_LOCATION}: Physical disk model name'
    key: system.hw.physicaldisk.model[cucsStorageLocalDiskSerial.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#DISK_LOCATION}: Disk size'
    key: system.hw.physicaldisk.size[cucsStorageLocalDiskSize.{#SNMPINDEX}]
    interval: 1h
    value_type: unsigned
    units: B
  - name: '{#DISK_LOCATION}: Physical disk status'
    key: system.hw.physicaldisk.status[cucsStorageLocalDiskDiskState.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#DISK_LOCATION}: Physical disk error'
    expression: count(/Cisco UCS by SNMP/system.hw.physicaldisk.status[cucsStorageLocalDiskDiskState.{#SNMPINDEX}],#1,"eq","16")=1
      or count(/Cisco UCS by SNMP/system.hw.physicaldisk.status[cucsStorageLocalDiskDiskState.{#SNMPINDEX}],#1,"eq","11")=1
    severity: average
  - name: 'Cisco UCS: {#DISK_LOCATION}: Physical disk failed'
    expression: count(/Cisco UCS by SNMP/system.hw.physicaldisk.status[cucsStorageLocalDiskDiskState.{#SNMPINDEX}],#1,"eq","9")=1
    severity: high
- name: PSU Discovery
  key: psu.discovery
  interval: 1h
  item_prototypes:
  - name: '{#PSU_LOCATION}: Power supply status'
    key: sensor.psu.status[cucsEquipmentPsuOperState.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#PSU_LOCATION}: Power supply is in critical state'
    expression: count(/Cisco UCS by SNMP/sensor.psu.status[cucsEquipmentPsuOperState.{#SNMPINDEX}],#1,"eq","2")=1
    severity: average
  - name: 'Cisco UCS: {#PSU_LOCATION}: Power supply is in warning state'
    expression: count(/Cisco UCS by SNMP/sensor.psu.status[cucsEquipmentPsuOperState.{#SNMPINDEX}],#1,"eq","3")=1
    severity: warning
- name: Temperature CPU Discovery
  key: temp.cpu.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SENSOR_LOCATION}: Temperature'
    key: sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'Cisco UCS: {#SENSOR_LOCATION}: Temperature is above critical threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)<60-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}: Temperature is above warning threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)<50-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}: Temperature is too low'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco UCS by SNMP/sensor.temp.value[cucsProcessorEnvStatsTemperature.{#SNMPINDEX}],5m)>5+3
- name: Temperature Discovery
  key: temp.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SENSOR_LOCATION}.IOH: Temperature'
    key: sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}]
    interval: 3m
    units: °C
  - name: '{#SENSOR_LOCATION}.Ambient: Temperature'
    key: sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}]
    interval: 3m
    units: °C
  - name: '{#SENSOR_LOCATION}.Front: Temperature'
    key: sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}]
    interval: 3m
    units: °C
  - name: '{#SENSOR_LOCATION}.Rear: Temperature'
    key: sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.IOH: Temperature is above critical threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)>35
    severity: high
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)<35-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.IOH: Temperature is above warning threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)>30
    severity: warning
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)<30-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.IOH: Temperature is too low'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempSltatsIoh1Temp.{#SNMPINDEX}],5m)>5+3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Ambient: Temperature is above critical threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)>35
    severity: high
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)<35-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Ambient: Temperature is above warning threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)>30
    severity: warning
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)<30-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Ambient: Temperature is too low'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsAmbientTemp.{#SNMPINDEX}],5m)>5+3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Front: Temperature is above critical threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)>35
    severity: high
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)<35-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Front: Temperature is above warning threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)>30
    severity: warning
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)<30-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Front: Temperature is too low'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsFrontTemp.{#SNMPINDEX}],5m)>5+3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Rear: Temperature is above critical threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)>35
    severity: high
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)<35-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Rear: Temperature is above warning threshold'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)>30
    severity: warning
    recovery_expression: max(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)<30-3
  - name: 'Cisco UCS: {#SENSOR_LOCATION}.Rear: Temperature is too low'
    expression: avg(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco UCS by SNMP/sensor.temp.value[cucsComputeRackUnitMbTempStatsRearTemp.{#SNMPINDEX}],5m)>5+3
- name: Unit Discovery
  key: unit.discovery
  interval: 1h
  item_prototypes:
  - name: '{#UNIT_LOCATION}: Hardware model name'
    key: system.hw.model[cucsComputeRackUnitModel.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#UNIT_LOCATION}: Hardware serial number'
    key: system.hw.serialnumber[cucsComputeRackUnitSerial.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#UNIT_LOCATION}: Overall system health status'
    key: system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}]
    interval: 30s
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#UNIT_LOCATION}: Device has been replaced'
    expression: last(/Cisco UCS by SNMP/system.hw.serialnumber[cucsComputeRackUnitSerial.{#SNMPINDEX}],#1)<>last(/Cisco
      UCS by SNMP/system.hw.serialnumber[cucsComputeRackUnitSerial.{#SNMPINDEX}],#2)
      and length(last(/Cisco UCS by SNMP/system.hw.serialnumber[cucsComputeRackUnitSerial.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
  - name: 'Cisco UCS: {#UNIT_LOCATION}: System status is in critical state'
    expression: count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","30")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","33")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","34")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","60")=1
    severity: high
  - name: 'Cisco UCS: {#UNIT_LOCATION}: System status is in warning state'
    expression: count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","35")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","60")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","62")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","62")=1
      or count(/Cisco UCS by SNMP/system.status[cucsComputeRackUnitOperState.{#SNMPINDEX}],#1,"eq","204")=1
    severity: warning
- name: Virtual Disk Discovery
  key: virtualdisk.discovery
  interval: 1h
  item_prototypes:
  - name: '{#VDISK_LOCATION}: Layout type'
    key: system.hw.virtualdisk.layout[cucsStorageLocalLunType.{#SNMPINDEX}]
    interval: 1h
    value_type: unsigned
  - name: '{#VDISK_LOCATION}: Disk size'
    key: system.hw.virtualdisk.size[cucsStorageLocalLunSize.{#SNMPINDEX}]
    interval: 1h
    value_type: unsigned
    units: B
  - name: '{#VDISK_LOCATION}: Status'
    key: system.hw.virtualdisk.status[cucsStorageLocalLunPresence.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco UCS: {#VDISK_LOCATION}: Virtual disk is not in OK state'
    expression: count(/Cisco UCS by SNMP/system.hw.virtualdisk.status[cucsStorageLocalLunPresence.{#SNMPINDEX}],#1,"ne","10")=1
    severity: warning
