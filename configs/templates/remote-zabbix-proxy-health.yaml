- name: Zabbix stats
  key: zabbix[stats,{$ZABBIX.PROXY.ADDRESS},{$ZABBIX.PROXY.PORT}]
  interval: 1m
  type: zabbix_internal
  value_type: text
  description: Zabbix server statistics master item.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
triggers:
- name: 'Zabbix proxy: Utilization of agent poller processes is high'
  expression: avg(/Remote Zabbix proxy health/process.agent_poller.avg.busy,10m)>75
  severity: average
  recovery_expression: avg(/Remote Zabbix proxy health/process.agent_poller.avg.busy,10m)<65
  description: Indicates potential performance issues with the agent poller, which
    may affect monitoring efficiency and response times.
  tags:
  - tag: scope
    value: performance
