- name: Queue over 10 minutes
  key: zabbix[stats,{$ZABBIX.PROXY.ADDRESS},{$ZABBIX.PROXY.PORT},queue,10m]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: The number of monitored items in the queue that are delayed by at least
    10 minutes.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Queue
  key: zabbix[stats,{$ZABBIX.PROXY.ADDRESS},{$ZABBIX.PROXY.PORT},queue]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: The number of monitored items in the queue that are delayed by at least
    6 seconds.
