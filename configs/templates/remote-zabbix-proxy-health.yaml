    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix proxy: Wrong template assigned'
  expression: last(/Remote Zabbix proxy health/proxy_check)=1
  severity: disaster
  description: Check that the template has been selected correctly.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix proxy: Excessive configuration cache usage'
  expression: max(/Remote Zabbix proxy health/rcache.buffer.pused,10m)>75
  severity: average
  description: Consider increasing `CacheSize` in the `zabbix_proxy.conf` configuration
    file.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Zabbix proxy: Failed to fetch stats data'
  expression: nodata(/Remote Zabbix proxy health/rcache.buffer.pused,5m)=1
  severity: warning
  description: Zabbix has not received statistics data for `{$ZABBIX.PROXY.NODATA_TIMEOUT}`.
  tags:
  - tag: scope
    value: availability
- name: 'Zabbix proxy: {HOST.NAME} has been restarted'
  expression: last(/Remote Zabbix proxy health/uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Zabbix proxy: Version has changed'
  expression: last(/Remote Zabbix proxy health/version,#1)<>last(/Remote Zabbix proxy
    health/version,#2) and length(last(/Remote Zabbix proxy health/version))>0
  severity: information
  description: Zabbix proxy version has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
