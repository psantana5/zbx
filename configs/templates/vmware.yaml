- name: Get Overall Health VC State
  key: vmware.health.get
  interval: 1m
  type: script
  params: "var Vcenter = {\r\n\t params: {},\r\n\t vmware_api_session_id: '',\r\n\t\
    \ health_status: '',\r\n\t error_msg: '',\r\n\r\n\t setParams: function (params)\
    \ {\r\n\t\t  ['url', 'username', 'password'].forEach(function (field) {\r\n\t\t\
    \t  if (typeof params !== 'object' || typeof params[field] === 'undefined' ||\
    \ params[field] === '') {\r\n\t\t\t\t  throw 'Required param is not set: ' + field\
    \ + '.';\r\n\t\t\t  }\r\n\t\t  });\r\n\r\n\t\t  if (params['url'].endsWith('/'))\
    \ {\r\n\t\t\t   params['url'] = params['url'].slice(0,-1);\r\n\t\t  }\r\n\t\t\
    \  params['url'] = params['url'].replace('/sdk','');\r\n\r\n\t\t  Vcenter.params\
    \ = params;\r\n\t },\r\n\r\n\t isGtOrEqVersion: function (first_version, second_version)\
    \ {\r\n\t\t  var first = first_version.split('.').map(Number),\r\n\t\t\t  second\
    \ = second_version.split('.').map(Number);\r\n\r\n\t\t  if (first.length > second.length)\
    \ {\r\n\t\t\t  const max_componens_length = first.length\r\n\t\t  }\r\n\t\t  else\
    \ {\r\n\t\t\t  const max_componens_length = second.length\r\n\t\t  }\r\n\r\n\t\
    \t  var num_components = first.length;\r\n\t\t  while (num_components < max_componens_length)\
    \ {\r\n\t\t\t  first.push(0);\r\n\t\t\t  num_components = num_components +1;\r\
    \n\t\t  }\r\n\r\n\t\t  var num_components = second.length;\r\n\t\t  while (num_components\
    \ < max_componens_length) {\r\n\t\t\t  second.push(0);\r\n\t\t\t  num_components\
    \ = num_components +1;\r\n\t\t  }\r\n\r\n\t\t  if (first[0] > second[0] ||\r\n\
    \t\t\t  (first[0] === second[0] && first[1] > second[1]) ||\r\n\t\t\t  (first[0]\
    \ === second[0] && first[1] === second[1] && first[2] >= second[2])) {\r\n\t\t\
    \t  return true;\r\n\t\t  }\r\n\r\n\t\t  return false;\r\n\t  },\r\n\r\n\t login:\
    \ function () {\r\n\t\t  var response, request = new HttpRequest();\r\n\t\t  request.setHttpAuth(HTTPAUTH_BASIC,\
    \ Vcenter.params.username, Vcenter.params.password);\r\n\t\t  request.addHeader('Accept:\
    \ application/json');\r\n\t\t  request.addHeader('Content-Type: application/json');\r\
    \n\r\n\t\t  response = request.post(Vcenter.params.url + '/api/session', '');\r\
    \n\t\t  if (request.getStatus() >= 200 && request.getStatus() < 300 && (!JSON.parse(response).error))\
    \ {\r\n\t\t\t   Vcenter.vmware_api_session_id = Vcenter.removeQuotes(response);\r\
    \n\t\t\t   return true;\r\n\t\t  }\r\n\r\n\t\t  response = request.post(Vcenter.params.url\
    \ + '/rest/com/vmware/cis/session', '');\r\n\t\t  if (request.getStatus() >= 200\
    \ && request.getStatus() < 300) {\r\n\t\t\t   Vcenter.vmware_api_session_id =\
    \ JSON.parse(response).value;\r\n\t\t\t   return true;\r\n\t\t  }\r\n\r\n\t\t\
    \  return false;\r\n\t },\r\n\r\n\t logout: function () {\r\n\t\t  path = '/rest/com/vmware/cis/session';\r\
    \n\t\t  if (Vcenter.vmware_api_version && Vcenter.isGtOrEqVersion(Vcenter.vmware_api_version,\
    \ '7.0.2')) {\r\n\t\t\t   path = '/api/session';\r\n\t\t  }\r\n\r\n\t\t  Vcenter.request(Vcenter.params.url\
    \ + path, 'delete');\r\n\t },\r\n\r\n\t get_version: function () {\r\n\t\t  path\
    \ = '/rest/appliance/system/version';\r\n\r\n\t\t  try {\r\n\t\t\t   Vcenter.vmware_api_version\
    \ = Vcenter.request(Vcenter.params.url + path, 'get').version;\r\n\t\t\t   return\
    \ true;\r\n\t\t  }\r\n\t\t  catch (error) {\r\n\t\t\t   return false;\r\n\t\t\
    \  }\r\n\t },\r\n\r\n\t removeQuotes: function (str){\r\n\t\t  if (str.startsWith('\"\
    ') && str.endsWith('\"')) {\r\n\t\t\t  return str.slice(1, -1);\r\n\t\t  }\r\n\
    \r\n\t\t  return str;\r\n\t },\r\n\r\n\t getHealthStatus: function () {\r\n\t\t\
    \  path = '/api/appliance/health/system';\r\n\t\t  if (!Vcenter.isGtOrEqVersion(Vcenter.vmware_api_version,\
    \ '7.0.2')) {\r\n\t\t\t   path = '/rest/appliance/health/system';\r\n\t\t  }\r\
    \n\r\n\t\t  result = Vcenter.removeQuotes(Vcenter.request(Vcenter.params.url +\
    \ path, 'get'));\r\n\r\n\t\t  const idx = [\r\n\t\t\t   'green',\r\n\t\t\t   'yellow',\r\
    \n\t\t\t   'orange',\r\n\t\t\t   'red',\r\n\t\t\t   'gray'\r\n\t\t\t   ].indexOf(result.toLowerCase());\r\
    \n\t\t  Vcenter.health_status = idx !== -1 ? idx : 5;\r\n\t },\r\n\r\n\t request:\
    \ function (url, method) {\r\n\t\t  var response, request = new HttpRequest();\r\
    \n\r\n\t\t  if (typeof Vcenter.params.proxy !== 'undefined' && Vcenter.params.proxy\
    \ !== '') {\r\n\t\t\t   request.setProxy(Vcenter.params.proxy);\r\n\t\t  }\r\n\
    \r\n\t\t  request.setHttpAuth(HTTPAUTH_NONE);\r\n\t\t  request.addHeader(\"Cookie:\
    \ vmware-api-session-id=\" + Vcenter.vmware_api_session_id);\r\n\r\n\t\t  Zabbix.log(4,\
    \ '[ VMware vCenter ] Sending request: ' + url);\r\n\r\n\t\t  switch (method)\
    \ {\r\n\t\t\t   case 'get':\r\n\t\t\t\t   response = request.get(url);\r\n\t\t\
    \t\t   break;\r\n\r\n\t\t\t   case 'post':\r\n\t\t\t\t   response = request.post(url);\r\
    \n\t\t\t\t   break;\r\n\r\n\t\t\t   case 'delete':\r\n\t\t\t\t\tresponse = request.delete(url);\r\
    \n\t\t\t\t\tbreak;\r\n\r\n\t\t\t   default:\r\n\t\t\t\t   throw 'Unsupported HTTP\
    \ request method: ' + method;\r\n\t\t  }\r\n\r\n\t\t  Zabbix.log(4, '[ VMware\
    \ vCenter ] Received response with status code ' + request.getStatus() + ': '\
    \ + response);\r\n\r\n\t\t  if (request.getStatus() < 200 || request.getStatus()\
    \ >= 300) {\r\n\t\t\t   throw 'Cannot connect to VMware vCenter. Check debug log\
    \ for more information.';\r\n\t\t  }\r\n\r\n\t\t  if (method !== 'delete' && JSON.parse(response).value)\
    \ {\r\n\t\t\t   return JSON.parse(response).value;\r\n\t\t  }\r\n\t\t  else {\r\
    \n\t\t\t   return response;\r\n\t\t  }\r\n\t }\r\n};\r\n\r\ntry {\r\n\t Vcenter.setParams(JSON.parse(value));\r\
    \n\t \r\n\t if (Vcenter.login() && Vcenter.get_version() && Vcenter.isGtOrEqVersion(Vcenter.vmware_api_version,\
    \ '6.5.0')) {\r\n\t\t  Vcenter.getHealthStatus();\r\n\t }\r\n\t else {\r\n\t\t\
    \  Vcenter.health_status = 6;\r\n\t }\r\n\r\n\t if (Vcenter.vmware_api_session_id)\
    \ {\r\n\t\t  Vcenter.logout();\r\n\t }\r\n}\r\ncatch (error) {\r\n\t Zabbix.log(3,\
    \ '[ VMware vCenter ] ERROR: ' + error);\r\n\t Vcenter.error_msg = 'Failed to\
    \ get data from API:' + error;\r\n}\r\n\r\nreturn JSON.stringify({'health': Vcenter.health_status,\
    \ 'error': Vcenter.error_msg});"
  value_type: text
  description: Gets overall health of the system. This item works only with VMware
    vCenter versions above 6.5.
  history: '0'
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: Overall Health VC State
  key: vmware.health.state
  interval: '0'
  type: dependent
  master_item_key: vmware.health.get
  value_type: unsigned
  description: "VMware Overall health of system. One of the following:\r\n- Gray:\
    \ No health data is available for this service.\r\n- Green: Service is healthy.\r\
    \n- Yellow: The service is in a healthy state, but experiencing some level of\
    \ problems.\r\n- Orange: The service health is degraded. The service might have\
    \ serious problems.\r\n- Red: The service is unavailable, not functioning properly,\
    \ or will stop functioning soon.\r\n- Not available: The health status is unavailable\
    \ (not supported on the vCenter or ESXi side)."
  history: 31d
  tags:
  - tag: component
    value: health
- name: Version
  key: vmware.version[{$VMWARE.URL}]
  interval: 1h
  type: simple_check
  value_type: char
  description: VMware service version.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
triggers:
- name: 'VMware: Failed to get Overall Health VC State'
  expression: length(last(/VMware/vmware.health.check))>0
  severity: warning
  description: Failed to get data. Check debug log for more information.
  tags:
  - tag: scope
    value: availability
- name: 'VMware: Overall Health VC State is not Green'
  expression: last(/VMware/vmware.health.state)>0 and last(/VMware/vmware.health.state)<>6
  severity: average
  description: One or more components in the appliance might be in an unusable status
    and the appliance might soon become unresponsive.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
discovery_rules:
- name: VMware alarm discovery
  key: vmware.alarms.discovery
  interval: '0'
  type: dependent
  master_item_key: vmware.alarms.get[{$VMWARE.URL}]
  item_prototypes:
  - name: '{#VMWARE.ALARMS.NAME}'
    key: vmware.alarms.status["{#VMWARE.ALARMS.KEY}"]
    interval: '0'
    type: dependent
    value_type: char
  trigger_prototypes:
  - name: 'VMware: {#VMWARE.ALARMS.NAME}'
    expression: last(/VMware/vmware.alarms.status["{#VMWARE.ALARMS.KEY}"])<>-1
    severity: not_classified
- name: VMware cluster discovery
  key: vmware.cluster.discovery[{$VMWARE.URL}]
  interval: 1h
  type: simple_check
  item_prototypes:
  - name: Status of [{#CLUSTER.NAME}] cluster
    key: vmware.cluster.status[{$VMWARE.URL},{#CLUSTER.NAME}]
    interval: 1m
    type: simple_check
    value_type: unsigned
  trigger_prototypes:
  - name: 'VMware: The [{#CLUSTER.NAME}] status is Red'
    expression: last(/VMware/vmware.cluster.status[,{#CLUSTER.NAME}])=3
    severity: high
  - name: 'VMware: The [{#CLUSTER.NAME}] status is Yellow'
    expression: last(/VMware/vmware.cluster.status[,{#CLUSTER.NAME}])=2
    severity: average
- name: VMware datastore discovery
  key: vmware.datastore.discovery[{$VMWARE.URL}]
  interval: 1h
  type: simple_check
  item_prototypes:
  - name: Average read latency of the datastore [{#DATASTORE}]
    key: vmware.datastore.read[{$VMWARE.URL},{#DATASTORE.UUID},latency]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Average read IOPS of the datastore [{#DATASTORE}]
    key: vmware.datastore.read[{$VMWARE.URL},{#DATASTORE.UUID},rps]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Free space on datastore [{#DATASTORE}] (percentage)
    key: vmware.datastore.size[{$VMWARE.URL},{#DATASTORE.UUID},pfree]
    interval: 5m
    type: simple_check
    units: '%'
  - name: Total size of datastore [{#DATASTORE}]
    key: vmware.datastore.size[{$VMWARE.URL},{#DATASTORE.UUID}]
    interval: 5m
    type: simple_check
    value_type: unsigned
    units: B
  - name: Average write latency of the datastore [{#DATASTORE}]
    key: vmware.datastore.write[{$VMWARE.URL},{#DATASTORE.UUID},latency]
    interval: 1m
    type: simple_check
    value_type: unsigned
  - name: Average write IOPS of the datastore [{#DATASTORE}]
    key: vmware.datastore.write[{$VMWARE.URL},{#DATASTORE.UUID},rps]
    interval: 1m
    type: simple_check
    value_type: unsigned
  trigger_prototypes:
  - name: 'VMware: [{#DATASTORE}]: Free space is critically low'
    expression: last(/VMware/vmware.datastore.size[,{#DATASTORE.UUID},pfree])<10
    severity: high
  - name: 'VMware: [{#DATASTORE}]: Free space is low'
    expression: last(/VMware/vmware.datastore.size[,{#DATASTORE.UUID},pfree])<20
    severity: warning
- name: VMware hypervisor discovery
  key: vmware.hv.discovery[{$VMWARE.URL}]
  interval: 1h
  type: simple_check
- name: VMware VM discovery
  key: vmware.vm.discovery[{$VMWARE.URL}]
  interval: 1h
  type: simple_check
  filter:
  - macro: '{#VM.POWERSTATE}'
    value: '{$VMWARE.VM.POWERSTATE}'
