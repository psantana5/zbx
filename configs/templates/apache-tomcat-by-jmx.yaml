template: Apache Tomcat by JMX
description: "The template to monitor Apache Tomcat by Zabbix that work without any\
  \ external scripts.\r\nThe metrics are collected by JMX.\r\n\r\nYou can discuss\
  \ this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/411862-discussion-thread-for-official-zabbix-template-tomcat\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Version
  key: jmx["Catalina:type=Server",serverInfo]
  interval: 1m
  type: jmx_agent
  value_type: char
  description: The version of the Tomcat.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
triggers:
- name: 'Apache Tomcat: Version has been changed'
  expression: last(/Apache Tomcat by JMX/jmx["Catalina:type=Server",serverInfo],#1)<>last(/Apache
    Tomcat by JMX/jmx["Catalina:type=Server",serverInfo],#2) and length(last(/Apache
    Tomcat by JMX/jmx["Catalina:type=Server",serverInfo]))>0
  severity: information
  description: The Tomcat version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Protocol handlers discovery
  key: jmx.discovery[attributes,"Catalina:type=ProtocolHandler,port=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXATTR}'
    value: ^name$
  item_prototypes:
  - name: '{#JMXVALUE}: Gzip compression status'
    key: jmx[{#JMXOBJ},compression]
    interval: 1m
    type: jmx_agent
    value_type: char
  trigger_prototypes:
  - name: 'Apache Tomcat: {#JMXVALUE}: Gzip compression is disabled'
    expression: find(/Apache Tomcat by JMX/jmx[{#JMXOBJ},compression],,"like","off")
      = 1
    severity: information
    allow_manual_close: true
- name: Global request processors discovery
  key: jmx.discovery[beans,"Catalina:type=GlobalRequestProcessor,name=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXNAME}'
    value: '{$TOMCAT.LLD.FILTER.REQUEST_PROCESSOR.MATCHES}'
  - macro: '{#JMXNAME}'
    value: '{$TOMCAT.LLD.FILTER.REQUEST_PROCESSOR.NOT_MATCHES}'
  item_prototypes:
  - name: '{#JMXNAME}: Bytes received per second'
    key: jmx[{#JMXOBJ},bytesReceived]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: '{#JMXNAME}: Bytes sent per second'
    key: jmx[{#JMXOBJ},bytesSent]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: B
  - name: '{#JMXNAME}: Errors per second'
    key: jmx[{#JMXOBJ},errorCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXNAME}: Requests processing time'
    key: jmx[{#JMXOBJ},processingTime]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
    units: s
  - name: '{#JMXNAME}: Requests per second'
    key: jmx[{#JMXOBJ},requestCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
- name: Contexts discovery
  key: jmx.discovery[beans,"Catalina:type=Manager,host=*,context=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXHOST}'
    value: '{$TOMCAT.LLD.FILTER.MANAGER.MATCHES}'
  - macro: '{#JMXHOST}'
    value: '{$TOMCAT.LLD.FILTER.MANAGER.NOT_MATCHES}'
  item_prototypes:
  - name: '{#JMXHOST}{#JMXCONTEXT}: Sessions active'
    key: jmx[{#JMXOBJ},activeSessions]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXHOST}{#JMXCONTEXT}: Sessions allowed maximum'
    key: jmx[{#JMXOBJ},maxActiveSessions]
    interval: 1m
    type: jmx_agent
  - name: '{#JMXHOST}{#JMXCONTEXT}: Sessions active maximum so far'
    key: jmx[{#JMXOBJ},maxActive]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXHOST}{#JMXCONTEXT}: Sessions rejected per second'
    key: jmx[{#JMXOBJ},rejectedSessions]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXHOST}{#JMXCONTEXT}: Sessions created per second'
    key: jmx[{#JMXOBJ},sessionCounter]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
- name: Thread pools discovery
  key: jmx.discovery[beans,"Catalina:type=ThreadPool,name=*"]
  interval: 1h
  type: jmx_agent
  filter:
  - macro: '{#JMXNAME}'
    value: '{$TOMCAT.LLD.FILTER.THREAD_POOL.MATCHES}'
  - macro: '{#JMXNAME}'
    value: '{$TOMCAT.LLD.FILTER.THREAD_POOL.NOT_MATCHES}'
  item_prototypes:
  - name: '{#JMXNAME}: Threads count'
    key: jmx[{#JMXOBJ},currentThreadCount]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXNAME}: Threads busy'
    key: jmx[{#JMXOBJ},currentThreadsBusy]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  - name: '{#JMXNAME}: Threads limit'
    key: jmx[{#JMXOBJ},maxThreads]
    interval: 1m
    type: jmx_agent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Apache Tomcat: {#JMXNAME}: Busy worker threads count is high'
    expression: min(/Apache Tomcat by JMX/jmx[{#JMXOBJ},currentThreadsBusy],5m)>last(/Apache
      Tomcat by JMX/jmx[{#JMXOBJ},maxThreads])*75/100
    severity: high
