template: Microsoft Exchange Server 2016 by Zabbix agent
description: "The template to monitor Microsoft Exchange Server 2016 by Zabbix that\
  \ works without any external scripts.\r\nThe metrics are collected by Zabbix agent.\r\
  \nRecommended to use it with \"OS Windows by Zabbix agent\" template.\r\n\r\nYou\
  \ can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/415007-discussion-thread-for-official-zabbix-template-microsoft-exchange\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Databases total mounted
  key: perf_counter_en["\MSExchange Active Manager(_total)\Database Mounted"]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  value_type: unsigned
  description: Shows the number of active database copies on the server.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'ActiveSync: ping command pending'
  key: perf_counter_en["\MSExchange ActiveSync\Ping Commands Pending", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of ping commands currently pending in the queue.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'ActiveSync: requests per second'
  key: perf_counter_en["\MSExchange ActiveSync\Requests/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of HTTP requests received from the client via ASP.NET
    per second. Determines the current Exchange ActiveSync request rate. Used only
    to determine current user load.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'ActiveSync: sync commands per second'
  key: perf_counter_en["\MSExchange ActiveSync\Sync Commands/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of sync commands processed per second. Clients use
    this command to synchronize items within a folder.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'Availability Service: availability requests per second'
  key: perf_counter_en["\MSExchange Availability Service\Availability Requests (sec)",
    {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of requests serviced per second. The request can be
    only for free/ busy information or include suggestions. One request may contain
    multiple mailboxes. Determines the rate at which Availability service requests
    are occurring.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'Outlook Web App: current unique users'
  key: perf_counter_en["\MSExchange OWA\Current Unique Users", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of unique users currently logged on to Outlook Web
    App. This value monitors the number of unique active user sessions, so that users
    are only removed from this counter after they log off or their session times out.
    Determines current user load.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'Outlook Web App: requests per second'
  key: perf_counter_en["\MSExchange OWA\Requests/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of requests handled by Outlook Web App per second.
    Determines current user load.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'Autodiscover: requests per second'
  key: perf_counter_en["\MSExchangeAutodiscover\Requests/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of Autodiscover service requests processed each second.
    Determines current user load.
  history: 31d
  tags:
  - tag: component
    value: application
- name: 'MSExchangeWS: requests per second'
  key: perf_counter_en["\MSExchangeWS\Requests/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
  interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  description: Shows the number of requests processed each second. Determines current
    user load.
  history: 31d
  tags:
  - tag: component
    value: application
discovery_rules:
- name: Databases discovery
  key: perf_instance.discovery["MSExchange Active Manager"]
  interval: 1h
  item_prototypes:
  - name: 'Active Manager [{#INSTANCE}]: Database copy role'
    key: perf_counter_en["\MSExchange Active Manager({#INSTANCE})\Database Copy Role
      Active"]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: Page faults per second'
    key: perf_counter_en["\MSExchange Database({#INF.STORE})\Database Page Fault Stalls/sec",
      {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: Log records stalled'
    key: perf_counter_en["\MSExchange Database({#INF.STORE})\Log Record Stalls/sec",
      {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: Log threads waiting'
    key: perf_counter_en["\MSExchange Database({#INF.STORE})\Log Threads Waiting",
      {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Database Counters [{#INSTANCE}]: Active database read operations per second'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Reads (Attached)/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Database Counters [{#INSTANCE}]: Active database read operations latency'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Reads (Attached) Average Latency", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Database Counters [{#INSTANCE}]: Passive database read operations latency'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Reads (Recovery) Average Latency", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Database Counters [{#INSTANCE}]: Active database write operations per second'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Writes (Attached)/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Database Counters [{#INSTANCE}]: Active database write operations latency'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Writes (Attached) Average Latency", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Database Counters [{#INSTANCE}]: Passive database write operations latency'
    key: perf_counter_en["\MSExchange Database ==> Instances({#INF.STORE}/_Total)\I/O
      Database Writes (Recovery) Average Latency", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Information Store [{#INSTANCE}]: Active mailboxes count'
    key: perf_counter_en["\MSExchangeIS Store({#INSTANCE})\Active mailboxes"]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: Database state'
    key: perf_counter_en["\MSExchangeIS Store({#INSTANCE})\Database State"]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: RPC requests latency'
    key: perf_counter_en["\MSExchangeIS Store({#INSTANCE})\RPC Average Latency", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Information Store [{#INSTANCE}]: RPC requests per second'
    key: perf_counter_en["\MSExchangeIS Store({#INSTANCE})\RPC Operations/sec", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  - name: 'Information Store [{#INSTANCE}]: RPC requests total'
    key: perf_counter_en["\MSExchangeIS Store({#INSTANCE})\RPC requests", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
  trigger_prototypes:
  - name: 'MS Exchange 2016: Information Store [{#INSTANCE}]: Page faults is too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database({#INF.STORE})\Database Page Fault Stalls/sec", 60],5m)>0
    severity: average
  - name: 'MS Exchange 2016: Information Store [{#INSTANCE}]: Log records stalls is
      too high'
    expression: avg(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database({#INF.STORE})\Log Record Stalls/sec", 60],10m)>100
    severity: average
  - name: 'MS Exchange 2016: Database Counters [{#INSTANCE}]: Average read time latency
      is too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database ==> Instances({#INF.STORE}/_Total)\I/O Database Reads (Attached) Average
      Latency", 60],5m)>0.02
    severity: warning
  - name: 'MS Exchange 2016: Database Counters [{#INSTANCE}]: Average write time latency
      is higher than read time latency for {$MS.EXCHANGE.DB.PASSIVE.WRITE.TIME}'
    expression: avg(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database ==> Instances({#INF.STORE}/_Total)\I/O Database Writes (Recovery) Average
      Latency", 60],10m)>avg(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database ==> Instances({#INF.STORE}/_Total)\I/O Database Reads (Recovery) Average
      Latency", 60],10m)
    severity: warning
  - name: 'MS Exchange 2016: Database Counters [{#INSTANCE}]: Average read time latency
      is too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database ==> Instances({#INF.STORE}/_Total)\I/O Database Reads (Recovery) Average
      Latency", 60],5m)>0.2
    severity: warning
  - name: 'MS Exchange 2016: Database Counters [{#INSTANCE}]: Average write time latency
      is too high for {$MS.EXCHANGE.DB.ACTIVE.WRITE.TIME}'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      Database ==> Instances({#INF.STORE}/_Total)\I/O Database Writes (Attached) Average
      Latency", 60],10m)>0.05
    severity: warning
  - name: 'MS Exchange 2016: Information Store [{#INSTANCE}]: RPC Requests latency
      is too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchangeIS
      Store({#INSTANCE})\RPC Average Latency", 60],10m)>0.05
    severity: warning
  - name: 'MS Exchange 2016: Information Store [{#INSTANCE}]: RPC Requests total count
      is too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchangeIS
      Store({#INSTANCE})\RPC requests", 60],5m)>70
    severity: warning
- name: LDAP discovery
  key: perf_instance_en.discovery["MSExchange ADAccess Domain Controllers"]
  interval: 1h
  item_prototypes:
  - name: 'Domain Controller [{#INSTANCE}]: Read time'
    key: perf_counter_en["\MSExchange ADAccess Domain Controllers({#INSTANCE})\LDAP
      Read Time", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  - name: 'Domain Controller [{#INSTANCE}]: Search time'
    key: perf_counter_en["\MSExchange ADAccess Domain Controllers({#INSTANCE})\LDAP
      Search Time", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
    units: s
  trigger_prototypes:
  - name: 'MS Exchange 2016: Domain Controller [{#INSTANCE}]: LDAP read time is too
      high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      ADAccess Domain Controllers({#INSTANCE})\LDAP Read Time", 60],5m)>0.05
    severity: average
  - name: 'MS Exchange 2016: Domain Controller [{#INSTANCE}]: LDAP search time is
      too high'
    expression: min(/Microsoft Exchange Server 2016 by Zabbix agent/perf_counter_en["\MSExchange
      ADAccess Domain Controllers({#INSTANCE})\LDAP Search Time", 60],5m)>0.05
    severity: average
- name: Web services discovery
  key: perf_instance_en.discovery["Web Service"]
  interval: 1h
  item_prototypes:
  - name: 'Web Service [{#INSTANCE}]: Current connections'
    key: perf_counter_en["\Web Service({#INSTANCE})\Current Connections", {$MS.EXCHANGE.PERF.INTERVAL}]
    interval: '{$MS.EXCHANGE.PERF.INTERVAL}'
