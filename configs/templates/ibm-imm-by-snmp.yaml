template: IBM IMM by SNMP
description: "Template Server IBM IMM\r\n\r\nMIBs used:\r\nIMM-MIB\r\nHOST-RESOURCES-MIB\r\
  \nSNMPv2-MIB\r\n\r\nKnown Issues:\r\n\r\n  Description: Some IMMs (IMM1) do not\
  \ return disks\r\n  Version: IMM1\r\n  Device: IBM x3250M3\r\n\r\n  Description:\
  \ Some IMMs (IMM1) do not return fan status: fanHealthStatus\r\n  Version: IMM1\r\
  \n  Device: IBM x3250M3\r\n\r\n  Description: IMM1 servers (M2, M3 generations)\
  \ sysObjectID is NET-SNMP-MIB::netSnmpAgentOIDs.10\r\n  Version: IMM1\r\n  Device:\
  \ IMM1 servers (M2,M3 generations)\r\n\r\n  Description: IMM1 servers (M2, M3 generations)\
  \ only Ambient temperature sensor available\r\n  Version: IMM1\r\n  Device: IMM1\
  \ servers (M2,M3 generations)\r\n\r\nGenerated by official Zabbix template tool\
  \ \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1h
  value_type: char
  description: 'MIB: IMM-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1h
  value_type: char
  description: "MIB: IMM-MIB\r\nMachine serial number VPD information"
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Overall system health status
  key: system.status[systemHealthStat.0]
  interval: 30s
  value_type: unsigned
  description: "MIB: IMM-MIB\r\nIndicates status of system health for the system in\
    \ which the IMM resides. Value of 'nonRecoverable' indicates a severe error has\
    \ occurred and the system may not be functioning. A value of 'critical' indicates\
    \ that an error has occurred but the system is currently functioning properly.\
    \ A value of 'nonCritical' indicates that a condition has occurred that may change\
    \ the state of the system in the future but currently the system is working properly.\
    \ A value of 'normal' indicates that the system is operating normally."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'IBM IMM: Unavailable by ICMP ping'
  expression: max(/IBM IMM by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'IBM IMM: High ICMP ping loss'
  expression: min(/IBM IMM by SNMP/icmppingloss,5m)>20 and min(/IBM IMM by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'IBM IMM: High ICMP ping response time'
  expression: avg(/IBM IMM by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'IBM IMM: Device has been replaced'
  expression: last(/IBM IMM by SNMP/system.hw.serialnumber,#1)<>last(/IBM IMM by SNMP/system.hw.serialnumber,#2)
    and length(last(/IBM IMM by SNMP/system.hw.serialnumber))>0
  severity: information
  description: Device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'IBM IMM: Host has been restarted'
  expression: (last(/IBM IMM by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/IBM
    IMM by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/IBM IMM by SNMP/system.hw.uptime[hrSystemUptime.0])=0
    and last(/IBM IMM by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'IBM IMM: System name has changed'
  expression: last(/IBM IMM by SNMP/system.name,#1)<>last(/IBM IMM by SNMP/system.name,#2)
    and length(last(/IBM IMM by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'IBM IMM: System status is in critical state'
  expression: count(/IBM IMM by SNMP/system.status[systemHealthStat.0],#1,"eq","2")=1
  severity: high
  description: Please check the device for errors
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'IBM IMM: System is in unrecoverable state!'
  expression: count(/IBM IMM by SNMP/system.status[systemHealthStat.0],#1,"eq","0")=1
  severity: high
  description: Please check the device for faults
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'IBM IMM: System status is in warning state'
  expression: count(/IBM IMM by SNMP/system.status[systemHealthStat.0],#1,"eq","4")=1
  severity: warning
  description: Please check the device for warnings
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'IBM IMM: No SNMP data collection'
  expression: max(/IBM IMM by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: FAN Discovery
  key: fan.discovery
  interval: 1h
  item_prototypes:
  - name: '{#FAN_DESCR}: Fan speed, %'
    key: sensor.fan.speed.percentage[fanSpeed.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: '%'
  - name: '{#FAN_DESCR}: Fan status'
    key: sensor.fan.status[fanHealthStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: char
  trigger_prototypes:
  - name: 'IBM IMM: {#FAN_DESCR}: Fan is not in normal state'
    expression: count(/IBM IMM by SNMP/sensor.fan.status[fanHealthStatus.{#SNMPINDEX}],#1,"ne","Normal")=1
    severity: information
- name: Physical Disk Discovery
  key: physicalDisk.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SNMPINDEX}: Physical disk part number'
    key: system.hw.physicaldisk.part_number[diskFruName.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#SNMPINDEX}: Physical disk status'
    key: system.hw.physicaldisk.status[diskHealthStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: char
  trigger_prototypes:
  - name: 'IBM IMM: {#SNMPINDEX}: Physical disk is not in OK state'
    expression: count(/IBM IMM by SNMP/system.hw.physicaldisk.status[diskHealthStatus.{#SNMPINDEX}],#1,"ne","Normal")=1
    severity: warning
- name: PSU Discovery
  key: psu.discovery
  interval: 1h
  item_prototypes:
  - name: '{#PSU_DESCR}: Power supply status'
    key: sensor.psu.status[powerHealthStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: char
  trigger_prototypes:
  - name: 'IBM IMM: {#PSU_DESCR}: Power supply is not in normal state'
    expression: count(/IBM IMM by SNMP/sensor.psu.status[powerHealthStatus.{#SNMPINDEX}],#1,"ne","Normal")=1
    severity: information
- name: Temperature Discovery
  key: tempDescr.discovery
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: (DIMM|PSU|PCH|RAID|RR|PCI).*
  item_prototypes:
  - name: '{#SNMPVALUE}: Temperature'
    key: sensor.temp.value[tempReading.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'IBM IMM: {#SNMPVALUE}: Temperature is above critical threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)<60-3
  - name: 'IBM IMM: {#SNMPVALUE}: Temperature is above warning threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)<50-3
  - name: 'IBM IMM: {#SNMPVALUE}: Temperature is too low'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/IBM IMM by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}],5m)>5+3
- name: Temperature Discovery Ambient
  key: tempDescr.discovery.ambient
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: Ambient.*
  item_prototypes:
  - name: 'Ambient: Temperature'
    key: sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'IBM IMM: Ambient: Temperature is above critical threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)>35
    severity: high
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)<35-3
  - name: 'IBM IMM: Ambient: Temperature is above warning threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)>30
    severity: warning
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)<30-3
  - name: 'IBM IMM: Ambient: Temperature is too low'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/IBM IMM by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}],5m)>5+3
- name: Temperature Discovery CPU
  key: tempDescr.discovery.cpu
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: CPU [0-9]* Temp
  item_prototypes:
  - name: 'CPU: Temperature'
    key: sensor.temp.value[tempReading.CPU.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'IBM IMM: CPU: Temperature is above critical threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)<60-3
  - name: 'IBM IMM: CPU: Temperature is above warning threshold'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)<50-3
  - name: 'IBM IMM: CPU: Temperature is too low'
    expression: avg(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/IBM IMM by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}],5m)>5+3
