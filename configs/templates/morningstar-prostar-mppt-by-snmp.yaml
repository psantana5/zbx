    \n  Scaling Factor:1.0\r\n  Units:V\r\n  Range:[0, 80]\r\n  Modbus address:0x0013"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Battery: Battery Voltage discovery'
  key: battery.voltage.discovery[batteryTerminalVoltage.0]
  interval: 15m
  units: V
  description: 'MIB: PROSTAR-MPPT'
  history: '0'
  tags:
  - tag: component
    value: battery
  - tag: component
    value: discovery
  - tag: component
    value: raw
- name: 'Battery: Charge Current'
  key: charge.current[chargeCurrent.0]
  interval: 1m
