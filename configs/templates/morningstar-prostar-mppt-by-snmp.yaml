template: Morningstar ProStar MPPT by SNMP
description: "MIBs used:\r\nPROSTAR-MPPT\r\n\r\nGenerated by official Zabbix template\
  \ tool \"Templator\""
groups:
- Templates
items:
- name: 'Array: Sweep Pmax'
  key: array.sweep_pmax[arrayMaxPowerSweep.0]
  interval: 1m
  units: W
  description: "MIB: PROSTAR-MPPT\r\nArray Max. Power (sweep)\r\n Description:Array\
    \ Max. Power (last sweep)\r\n Scaling Factor:1.0\r\n Units:W\r\n Range:[0.0, 500]\r\
    \n Modbus address:0x003E"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Sweep Vmp'
  key: array.sweep_vmp[arrayVmp.0]
  interval: 1m
  units: V
  description: "MIB: PROSTAR-MPPT\r\nArray Vmp\r\n  Description:Array Max. Power Point\
    \ Voltage\r\n  Scaling Factor:1.0\r\n  Units:V\r\n  Range:[0.0, 5000.0]\r\n  Modbus\
    \ address:0x003D"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Sweep Voc'
  key: array.sweep_voc[arrayVoc.0]
  interval: 1m
  units: V
  description: "MIB: PROSTAR-MPPT\r\nArray Voc\r\n Description:Array Open Circuit\
    \ Voltage\r\n Scaling Factor:1.0\r\n Units:V\r\n Range:[0.0, 80.0]\r\n Modbus\
    \ address:0x003F"
  history: 31d
  tags:
  - tag: component
    value: array
- name: 'Array: Voltage'
