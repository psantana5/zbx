    last(/Morningstar ProStar MPPT by SNMP/load.state[loadState.0])=7
  severity: warning
  tags:
  - tag: scope
    value: notice
- name: 'Morningstar ProStar MPPT: Status: Device has "arrayCurrentOffset" alarm flag'
