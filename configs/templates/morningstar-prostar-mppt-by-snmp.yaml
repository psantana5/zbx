  history: 31d
  tags:
  - tag: component
    value: battery
- name: 'Battery: Charge State'
  key: charge.state[chargeState.0]
  interval: 1m
  description: "MIB: PROSTAR-MPPT\r\nCharge State\r\n  Description:Control State\r\
    \n  Modbus address:0x0021\r\n\r\n  0: Start\r\n  1: NightCheck\r\n  2: Disconnect\r\
    \n  3: Night\r\n  4: Fault\r\n  5: BulkMppt\r\n  6: Absorption\r\n  7: Float\r\
    \n  8: Equalize\r\n  9: Slave\r\n  10: Fixed"
  history: 31d
  tags:
  - tag: component
    value: battery
- name: 'Counter: Charge Amp-hours'
