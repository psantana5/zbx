triggers:
- name: 'Morningstar ProStar MPPT: Battery: Device charge in critical state'
  expression: last(/Morningstar ProStar MPPT by SNMP/charge.state[chargeState.0])=4
  severity: high
  tags:
  - tag: scope
    value: notice
- name: 'Morningstar ProStar MPPT: Battery: Device charge in warning state'
  expression: last(/Morningstar ProStar MPPT by SNMP/charge.state[chargeState.0])=2
  severity: warning
  tags:
  - tag: scope
    value: notice
- name: 'Morningstar ProStar MPPT: Load: Device load in critical state'
  expression: last(/Morningstar ProStar MPPT by SNMP/load.state[loadState.0])=3 or
    last(/Morningstar ProStar MPPT by SNMP/load.state[loadState.0])=4
  severity: high
  tags:
