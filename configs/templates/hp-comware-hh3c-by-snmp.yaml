template: HP Comware HH3C by SNMP
description: "Template Net HP Comware (HH3C)\r\n\r\nMIBs used:\r\nEtherLike-MIB\r\n\
  HOST-RESOURCES-MIB\r\nSNMPv2-MIB\r\nENTITY-MIB\r\nHH3C-ENTITY-EXT-MIB\r\nIF-MIB\r\
  \n\r\nKnown Issues:\r\n\r\n  Description: No temperature sensors. All entities of\
  \ them return 0 for HH3C-ENTITY-EXT-MIB::hh3cEntityExtTemperature\r\n  Version:\
  \ 1910-48 Switch Software Version 5.20.99, Release 1116 Copyright(c)2010-2016 Hewlett\
  \ Packard Enterprise Development LP\r\n  Device: HP 1910-48\r\n\r\nGenerated by\
  \ official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  description: "The host accessibility by ICMP ping.\r\n\r\n0 - ICMP ping fails;\r\
    \n1 - ICMP ping successful."
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  description: The percentage of lost packets.
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  description: The ICMP ping response time (in seconds).
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: The item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: network
- name: System contact details
  key: system.contact[sysContact.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \ If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr[sysDescr.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime[hrSystemUptime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location[sysLocation.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nPhysical location of the node (e.g., `equipment\
    \ room`, `3rd floor`). If not provided, the value is a zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name. If the name\
    \ is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime[sysUpTime.0]
  interval: 30s
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nTime (in hundredths of a second) since the network\
    \ management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid[sysObjectID.0]
  interval: 15m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity. This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  description: "Availability of SNMP checks on the host. The value of this item corresponds\
    \ to availability icons in the host list.\r\nPossible values:\r\n0 - not available\r\
    \n1 - available\r\n2 - unknown"
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
triggers:
- name: 'HP Comware HH3C: Unavailable by ICMP ping'
  expression: max(/HP Comware HH3C by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout. Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'HP Comware HH3C: High ICMP ping loss'
  expression: min(/HP Comware HH3C by SNMP/icmppingloss,5m)>20 and min(/HP Comware
    HH3C by SNMP/icmppingloss,5m)<100
  severity: warning
  description: ICMP packets loss detected.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP Comware HH3C: High ICMP ping response time'
  expression: avg(/HP Comware HH3C by SNMP/icmppingsec,5m)>0.15
  severity: warning
  description: Average ICMP response time is too high.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'HP Comware HH3C: Host has been restarted'
  expression: (last(/HP Comware HH3C by SNMP/system.hw.uptime[hrSystemUptime.0])>0
    and last(/HP Comware HH3C by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or
    (last(/HP Comware HH3C by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/HP
    Comware HH3C by SNMP/system.net.uptime[sysUpTime.0])<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'HP Comware HH3C: System name has changed'
  expression: last(/HP Comware HH3C by SNMP/system.name,#1)<>last(/HP Comware HH3C
    by SNMP/system.name,#2) and length(last(/HP Comware HH3C by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'HP Comware HH3C: No SNMP data collection'
  expression: max(/HP Comware HH3C by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: Entity Discovery
  key: entity.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '3'
  item_prototypes:
  - name: '{#ENT_NAME}: Firmware version'
    key: system.hw.firmware[entPhysicalFirmwareRev.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#ENT_NAME}: Hardware model name'
    key: system.hw.model[entPhysicalDescr.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#ENT_NAME}: Hardware serial number'
    key: system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#ENT_NAME}: Hardware version(revision)'
    key: system.hw.version[entPhysicalHardwareRev.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  - name: '{#ENT_NAME}: Operating system'
    key: system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}]
    interval: 1h
    value_type: char
  trigger_prototypes:
  - name: 'HP Comware HH3C: {#ENT_NAME}: Firmware has changed'
    expression: last(/HP Comware HH3C by SNMP/system.hw.firmware[entPhysicalFirmwareRev.{#SNMPINDEX}],#1)<>last(/HP
      Comware HH3C by SNMP/system.hw.firmware[entPhysicalFirmwareRev.{#SNMPINDEX}],#2)
      and length(last(/HP Comware HH3C by SNMP/system.hw.firmware[entPhysicalFirmwareRev.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
  - name: 'HP Comware HH3C: {#ENT_NAME}: Device has been replaced'
    expression: last(/HP Comware HH3C by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#1)<>last(/HP
      Comware HH3C by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}],#2)
      and length(last(/HP Comware HH3C by SNMP/system.hw.serialnumber[entPhysicalSerialNum.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
  - name: 'HP Comware HH3C: {#ENT_NAME}: Operating system description has changed'
    expression: last(/HP Comware HH3C by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}],#1)<>last(/HP
      Comware HH3C by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}],#2) and
      length(last(/HP Comware HH3C by SNMP/system.sw.os[entPhysicalSoftwareRev.{#SNMPINDEX}]))>0
    severity: information
    allow_manual_close: true
- name: FAN Discovery
  key: fan.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '7'
  item_prototypes:
  - name: '{#ENT_NAME}: Fan status'
    key: sensor.fan.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP Comware HH3C: {#ENT_NAME}: Fan is in critical state'
    expression: count(/HP Comware HH3C by SNMP/sensor.fan.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}],#1,"eq","41")=1
      or count(/HP Comware HH3C by SNMP/sensor.fan.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}],#1,"eq","91")=1
    severity: average
- name: Module Discovery
  key: module.discovery
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: (Fabric|FABRIC) (.+) (Module|MODULE)
  - macro: '{#SNMPVALUE}'
    value: ^(MODULE|Module) (LEVEL|level)1$
  item_prototypes:
  - name: '{#MODULE_NAME}: CPU utilization'
    key: system.cpu.util[hh3cEntityExtCpuUsage.{#SNMPINDEX}]
    interval: 1m
    units: '%'
  - name: '{#MODULE_NAME}: Memory utilization'
    key: vm.memory.util[hh3cEntityExtMemUsage.{#SNMPINDEX}]
    interval: 1m
    units: '%'
  trigger_prototypes:
  - name: 'HP Comware HH3C: {#MODULE_NAME}: High CPU utilization'
    expression: min(/HP Comware HH3C by SNMP/system.cpu.util[hh3cEntityExtCpuUsage.{#SNMPINDEX}],5m)>90
    severity: warning
  - name: 'HP Comware HH3C: {#MODULE_NAME}: High memory utilization'
    expression: min(/HP Comware HH3C by SNMP/vm.memory.util[hh3cEntityExtMemUsage.{#SNMPINDEX}],5m)>90
    severity: average
- name: Network interfaces discovery
  key: net.if.discovery
  interval: 1h
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
    interval: 5m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[ifOperStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[ifType.{#SNMPINDEX}]
    interval: 1h
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP Comware HH3C: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/HP Comware HH3C by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>2\r\
      \nor min(/HP Comware HH3C by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>2"
    severity: warning
    recovery_expression: "max(/HP Comware HH3C by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<2*0.8\r\
      \nand max(/HP Comware HH3C by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<2*0.8"
    allow_manual_close: true
  - name: 'HP Comware HH3C: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/HP Comware HH3C by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>(90/100)*last(/HP\
      \ Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or\r\navg(/HP\
      \ Comware HH3C by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>(90/100)*last(/HP\
      \ Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and\r\nlast(/HP\
      \ Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: "avg(/HP Comware HH3C by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/HP\
      \ Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and\r\navg(/HP\
      \ Comware HH3C by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<((90-3)/100)*last(/HP\
      \ Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])"
    allow_manual_close: true
  - name: 'HP Comware HH3C: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed
      to lower speed than it was before'
    expression: "change(/HP Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0\
      \ and last(/HP Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\r\
      \nand (\r\nlast(/HP Comware HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=6\
      \ or\r\nlast(/HP Comware HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or\r\
      \nlast(/HP Comware HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=11 or\r\n\
      last(/HP Comware HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or\r\nlast(/HP\
      \ Comware HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or\r\nlast(/HP Comware\
      \ HH3C by SNMP/net.if.type[ifType.{#SNMPINDEX}])=117\r\n)\r\nand\r\n(last(/HP\
      \ Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/HP Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\
      \ and last(/HP Comware HH3C by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0)\
      \ or\r\n(last(/HP Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)"
    allow_manual_close: true
  - name: 'HP Comware HH3C: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/HP Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
      and (last(/HP Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/HP
      Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))
    severity: average
    recovery_expression: last(/HP Comware HH3C by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
      or 1=0
    allow_manual_close: true
- name: EtherLike-MIB Discovery
  key: net.if.duplex.discovery
  interval: 1h
  filter:
  - macro: '{#IFOPERSTATUS}'
    value: '1'
  - macro: '{#SNMPVALUE}'
    value: (2|3)
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Duplex status'
    key: net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP Comware HH3C: Interface {#IFNAME}({#IFALIAS}): In half-duplex mode'
    expression: last(/HP Comware HH3C by SNMP/net.if.duplex[dot3StatsDuplexStatus.{#SNMPINDEX}])=2
    severity: warning
    allow_manual_close: true
- name: PSU Discovery
  key: psu.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '6'
  item_prototypes:
  - name: '{#ENT_NAME}: Power supply status'
    key: sensor.psu.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}]
    interval: 3m
    value_type: unsigned
  trigger_prototypes:
  - name: 'HP Comware HH3C: {#ENT_NAME}: Power supply is in critical state'
    expression: count(/HP Comware HH3C by SNMP/sensor.psu.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}],#1,"eq","51")=1
      or count(/HP Comware HH3C by SNMP/sensor.psu.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}],#1,"eq","61")=1
      or count(/HP Comware HH3C by SNMP/sensor.psu.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}],#1,"eq","91")=1
    severity: average
- name: Temperature Discovery
  key: temp.discovery
  interval: 1h
  filter:
  - macro: '{#SNMPVALUE}'
    value: (Fabric|FABRIC) (.+) (Module|MODULE)
  - macro: '{#SNMPVALUE}'
    value: (T|t)emperature.*(s|S)ensor
  - macro: '{#SNMPVALUE}'
    value: ^(MODULE|Module) (LEVEL|level)1$
  item_prototypes:
  - name: '{#SNMPVALUE}: Temperature'
    key: sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}]
    interval: 3m
    units: °C
  trigger_prototypes:
  - name: 'HP Comware HH3C: {#SNMPVALUE}: Temperature is above critical threshold'
    expression: avg(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)<60-3
  - name: 'HP Comware HH3C: {#SNMPVALUE}: Temperature is above warning threshold'
    expression: avg(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)<50-3
  - name: 'HP Comware HH3C: {#SNMPVALUE}: Temperature is too low'
    expression: avg(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/HP Comware HH3C by SNMP/sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}],5m)>5+3
