template: Docker by Zabbix agent 2
description: "Get Docker engine metrics from plugin for the New Zabbix Agent (zabbix-agent2).\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/435429-discussion-thread-for-official-zabbix-template-docker\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
