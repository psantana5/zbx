template: MongoDB node by Zabbix agent 2
description: "Get MongoDB metrics from plugin for the zabbix-agent2.\r\n  1. Setup\
  \ and configure zabbix-agent2 compiled with the MongoDB monitoring plugin.\r\n \
  \ 2. Set the {$MONGODB.CONNSTRING} such as <protocol(host:port)> or named session.\r\
  \n  3. Set the user name and password in host macros ({$MONGODB.USER}, {$MONGODB.PASSWORD})\
  \ if you want to override parameters from the Zabbix agent configuration file.\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/420659-discussion-thread-for-official-zabbix-template-db-mongodb\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: 'Document: deleted, rate'
  key: mongod.document.deleted.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: Number of documents deleted per second.
  history: 31d
  tags:
  - tag: component
    value: documents
- name: 'Document: inserted, rate'
  key: mongod.document.inserted.rate
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: Number of documents inserted per second.
  history: 31d
  tags:
  - tag: component
    value: documents
- name: 'Document: returned, rate'
