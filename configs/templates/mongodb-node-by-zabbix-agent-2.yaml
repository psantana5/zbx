- name: Database discovery
  key: mongodb.db.discovery["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30m
  filter:
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: 'MongoDB {#DBNAME}: Get db stats {#DBNAME}'
    key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    interval: 1m
    value_type: text
  - name: 'MongoDB {#DBNAME}: Collections'
    key: mongodb.db.collections["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}: Size, data'
    key: mongodb.db.data_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Extents'
    key: mongodb.db.extents["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}: Size, file'
    key: mongodb.db.file_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Size, index'
    key: mongodb.db.index_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}: Objects, count'
    key: mongodb.db.objects["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}: Objects, avg size'
    key: mongodb.db.size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    units: B
  - name: 'MongoDB {#DBNAME}: Size, storage'
    key: mongodb.db.storage_size["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.db.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}"]
    value_type: unsigned
    units: B
- name: Replication discovery
  key: mongodb.rs.discovery
  interval: '0'
  type: dependent
  master_item_key: mongodb.rs.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  item_prototypes:
  - name: Apply batches, ms/s
    key: mongodb.rs.apply.batches.ms.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: ms/s
  - name: Apply batches, rate
    key: mongodb.rs.apply.batches.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Apply ops, rate
    key: mongodb.rs.apply.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Buffer
    key: mongodb.rs.buffer.count[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Buffer, max size
    key: mongodb.rs.buffer.max_size[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: Buffer, size
    key: mongodb.rs.buffer.size[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: B
  - name: Replication lag
    key: mongodb.rs.lag[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: s
  - name: Network bytes, rate
    key: mongodb.rs.network.bytes.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: Bps
  - name: Network getmores, ms/s
    key: mongodb.rs.network.getmores.ms.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: ms/s
  - name: Network getmores, rate
    key: mongodb.rs.network.getmores.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Network ops, rate
    key: mongodb.rs.network.ops.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Network readers created, rate
    key: mongodb.rs.network.readers.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: 'MongoDB {#RS_NAME}: Oplog time diff'
    key: mongodb.rs.oplog.timediff[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: s
  - name: Preload docs, ms/s
    key: mongodb.rs.preload.docs.ms.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: ms/s
  - name: Preload docs, rate
    key: mongodb.rs.preload.docs.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Preload indexes, ms/s
    key: mongodb.rs.preload.indexes.ms.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
    units: ms/s
  - name: Preload indexes, rate
    key: mongodb.rs.preload.indexes.rate[{#RS_NAME}]
    interval: '0'
    type: dependent
  - name: Node state
    key: mongodb.rs.state[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Number of replicas
    key: mongodb.rs.total_nodes[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: Unhealthy replicas
    key: mongodb.rs.unhealthy[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: char
  - name: Number of unhealthy replicas
    key: mongodb.rs.unhealthy_count[{#RS_NAME}]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'MongoDB node: Replication lag with primary is too high'
    expression: min(/MongoDB node by Zabbix agent 2/mongodb.rs.lag[{#RS_NAME}],5m)>10s
    severity: warning
  - name: 'MongoDB node: Node in ReplicaSet changed the state'
    expression: last(/MongoDB node by Zabbix agent 2/mongodb.rs.state[{#RS_NAME}],#1)<>last(/MongoDB
      node by Zabbix agent 2/mongodb.rs.state[{#RS_NAME}],#2)
    severity: warning
    allow_manual_close: true
  - name: 'MongoDB node: There are unhealthy replicas in ReplicaSet'
    expression: last(/MongoDB node by Zabbix agent 2/mongodb.rs.unhealthy_count[{#RS_NAME}])>0
      and length(last(/MongoDB node by Zabbix agent 2/mongodb.rs.unhealthy[{#RS_NAME}]))>0
    severity: average
