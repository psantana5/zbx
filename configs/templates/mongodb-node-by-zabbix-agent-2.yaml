  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: The number of the active client connections performing read operations.
  history: 31d
  tags:
  - tag: component
    value: clients
- name: 'Active clients: total'
  key: mongodb.active_clients.total
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: The total number of internal client connections to the database including
    system threads as well as queued readers and writers.
  history: 31d
  tags:
  - tag: component
    value: clients
- name: 'Active clients: writers'
  key: mongodb.active_clients.writers
  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  value_type: unsigned
  description: The number of active client connections performing write operations.
  history: 31d
  tags:
  - tag: component
    value: clients
- name: 'Asserts: message, rate'
