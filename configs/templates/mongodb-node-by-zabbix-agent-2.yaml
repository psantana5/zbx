  interval: '0'
  type: dependent
  master_item_key: mongodb.server.status["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  description: "The number of message assertions raised per second.\r\nCheck the log\
    \ file for more information about these messages."
  history: 31d
  tags:
  - tag: component
    value: asserts
- name: 'Asserts: regular, rate'
  key: mongodb.asserts.regular.rate
