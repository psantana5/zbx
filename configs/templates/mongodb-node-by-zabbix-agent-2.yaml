    expression: max(/MongoDB node by Zabbix agent 2/mongodb.wired_tiger.concurrent_transactions.read.available[{#SINGLETON}],5m)<5
    severity: warning
  - name: 'MongoDB node: Available WiredTiger write tickets is low'
