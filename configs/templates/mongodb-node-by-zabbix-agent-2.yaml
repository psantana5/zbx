triggers:
- name: 'MongoDB node: Total number of open connections is too high'
  expression: min(/MongoDB node by Zabbix agent 2/mongodb.connections.current,5m)/(last(/MongoDB
    node by Zabbix agent 2/mongodb.connections.available)+last(/MongoDB node by Zabbix
    agent 2/mongodb.connections.current))*100>80
  severity: warning
  description: "Too few available connections.\r\nIf MongoDB runs low on connections,\
    \ in may not be able to handle incoming requests in a timely manner."
  tags:
  - tag: scope
    value: capacity
- name: 'MongoDB node: Too many cursors opened by MongoDB for clients'
  expression: min(/MongoDB node by Zabbix agent 2/mongodb.cursor.open.total,5m)>10000
  severity: warning
  tags:
  - tag: scope
    value: capacity
- name: 'MongoDB node: Too many cursors are timing out'
  expression: min(/MongoDB node by Zabbix agent 2/mongodb.cursor.timed_out.rate,5m)>1
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'MongoDB node: Connection to MongoDB is unavailable'
  expression: last(/MongoDB node by Zabbix agent 2/mongodb.ping["tcp://localhost:27017","",""])=0
  severity: high
  description: Connection to MongoDB instance is currently unavailable.
  tags:
  - tag: scope
    value: availability
- name: 'MongoDB node: mongod process has been restarted'
  expression: last(/MongoDB node by Zabbix agent 2/mongodb.uptime)<10m
  severity: information
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'MongoDB node: Failed to fetch info data'
  expression: nodata(/MongoDB node by Zabbix agent 2/mongodb.uptime,10m)=1
  severity: warning
  description: Zabbix has not received data for items for the last 10 minutes
  tags:
  - tag: scope
    value: availability
- name: 'MongoDB node: Version has changed'
  expression: last(/MongoDB node by Zabbix agent 2/mongodb.version["tcp://localhost:27017","",""],#1)<>last(/MongoDB
    node by Zabbix agent 2/mongodb.version["tcp://localhost:27017","",""],#2) and
    length(last(/MongoDB node by Zabbix agent 2/mongodb.version["tcp://localhost:27017","",""]))>0
  severity: information
  description: MongoDB version has changed. Acknowledge to close the problem manually.
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Collection discovery
  key: mongodb.collections.discovery["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}"]
  interval: 30m
  filter:
  - macro: '{#COLLECTION}'
    value: '{$MONGODB.LLD.FILTER.COLLECTION.MATCHES}'
  - macro: '{#COLLECTION}'
    value: '{$MONGODB.LLD.FILTER.COLLECTION.NOT_MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.MATCHES}'
  - macro: '{#DBNAME}'
    value: '{$MONGODB.LLD.FILTER.DB.NOT_MATCHES}'
  item_prototypes:
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Get collection stats {#DBNAME}.{#COLLECTION}'
    key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    interval: 1m
    value_type: text
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Objects, avg size'
    key: mongodb.collection.avg_obj_size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    units: B
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped'
    key: mongodb.collection.capped["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Objects, count'
    key: mongodb.collection.count["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped: max number'
    key: mongodb.collection.max_number["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Capped: max size'
    key: mongodb.collection.max_size["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
    master_item_key: mongodb.collection.stats["{$MONGODB.CONNSTRING}","{$MONGODB.USER}","{$MONGODB.PASSWORD}","{#DBNAME}","{#COLLECTION}"]
    value_type: unsigned
    units: B
  - name: 'MongoDB {#DBNAME}.{#COLLECTION}: Indexes'
    key: mongodb.collection.nindexes["{#DBNAME}","{#COLLECTION}"]
    interval: '0'
    type: dependent
