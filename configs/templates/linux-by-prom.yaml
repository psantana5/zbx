template: Linux by Prom
description: "This template collects Linux metrics from node_exporter 0.18 and above.\
  \ Support for older node_exporter versions is provided as 'best effort'.\r\n\r\n\
  Setup:\r\n\r\n1. Set up the node_exporter according to the official documentation:\r\
  \nhttps://prometheus.io/docs/guides/node-exporter/\r\n\r\nUse node_exporter v0.18.0\
  \ or above.\r\n\r\n2. Set the hostname or IP address of the node_exporter host in\
  \ the '{$NODE_EXPORTER_HOST}' macro. You can also change the Prometheus endpoint\
  \ port in the '{$NODE_EXPORTER_PORT}' macro if necessary.\r\n\r\nKnown Issues:\r\
  \n\r\n  - Node Exporter 0.16.0 renamed many metrics. CPU utilization for \"guest\"\
  \ and \"guest_nice\" metrics are not supported in this template with Node Exporter\
  \ < 0.16. Disk IO metrics are not supported. Other metrics provided as best effort.\
  \ See https://github.com/prometheus/node_exporter/releases/tag/v0.16.0 for details.\r\
  \n    - Version: below 0.16.0\r\n  - Metric node_network_info with label 'device'\
  \ cannot be found, so network discovery is not possible.\r\n    - Version: below\
  \ 0.18\r\n\r\nNotes on filesystem (FS) discovery:\r\n  - The ext4/3/2 FS reserves\
  \ space for privileged usage, typically set at 5% by default.\r\n  - BTRFS allocates\
  \ a default of 10% of the volume for its own needs.\r\n  - To mitigate potential\
  \ disasters, FS usage triggers are based on the maximum available space.\r\n   \
  \ - Utilization formula: 'pused = 100 - 100 * (available / total - free + available)'\r\
  \n  - The FS utilization chart, derived from graph prototypes, reflects FS reserved\
  \ space as the difference between used and available space from the total volume.\r\
  \n\r\nYou can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387225-discussion-thread-for-official-zabbix-template-for-linux\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: Version of node_exporter running
  key: agent.version[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: application
- name: Number of open file descriptors
  key: fd.open[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  history: 31d
  tags:
  - tag: component
    value: system
- name: Maximum number of open file descriptors
  key: kernel.maxfiles[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: May be increased by using `sysctl` utility or modifying the file `/etc/sysctl.conf`.
  history: 31d
  tags:
  - tag: component
    value: system
- name: Get node_exporter metrics
  key: node_exporter.get
  interval: 1m
  type: http_agent
  value_type: text
  history: 1h
  trends: '0'
  tags:
  - tag: component
    value: raw
- name: System boot time
  key: system.boottime[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: unixtime
  history: 31d
  tags:
  - tag: component
    value: system
- name: CPU guest time
  key: system.cpu.guest[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time spent on running a virtual CPU for a guest operating system.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU guest nice time
  key: system.cpu.guest_nice[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: The time spent on running a niced guest (a virtual CPU for guest operating
    systems under the control of the Linux kernel).
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU idle time
  key: system.cpu.idle[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent doing nothing.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU interrupt time
  key: system.cpu.interrupt[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent servicing hardware interrupts.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Interrupts per second
  key: system.cpu.intr[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: Number of interrupts processed.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU iowait time
  key: system.cpu.iowait[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has been waiting for I/O to complete.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (15m avg)
  key: system.cpu.load.avg15[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (1m avg)
  key: system.cpu.load.avg1[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Load average (5m avg)
  key: system.cpu.load.avg5[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: Calculated as the system CPU load divided by the number of CPU cores.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU nice time
  key: system.cpu.nice[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent running users' processes that have been niced.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Number of CPUs
  key: system.cpu.num[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU softirq time
  key: system.cpu.softirq[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent servicing software interrupts.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU steal time
  key: system.cpu.steal[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: The amount of "stolen" CPU from this virtual machine by the hypervisor
    for other tasks, such as running another virtual machine.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: Context switches per second
  key: system.cpu.switches[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  description: The combined rate at which all processors on the computer are switched
    from one thread to another.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU system time
  key: system.cpu.system[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent running the kernel and its processes.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU user time
  key: system.cpu.user[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: '%'
  description: Time the CPU has spent running users' processes that are not niced.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: CPU utilization
  key: system.cpu.util[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: system.cpu.idle[node_exporter]
  units: '%'
  description: CPU utilization expressed in %.
  history: 31d
  tags:
  - tag: component
    value: cpu
- name: System description
  key: system.descr[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: char
  description: Labeled system information as provided by the uname system call.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System local time
  key: system.localtime[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: unixtime
  description: The local system time of the host.
  history: 31d
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: char
  description: The host name of the system.
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Operating system architecture
  key: system.sw.arch[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Operating system
  key: system.sw.os[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: system.descr[node_exporter]
  value_type: char
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: os
- name: Free swap space
  key: system.swap.free[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: B
  description: The free space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Free swap space in %
  key: system.swap.pfree[node_exporter]
  interval: 1m
  type: calculated
  params: last(//system.swap.free[node_exporter])/last(//system.swap.total[node_exporter])*100
  units: '%'
  description: The free space of the swap volume/file expressed in %.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: Total swap space
  key: system.swap.total[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: B
  description: Total space of the swap volume/file expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
  - tag: component
    value: storage
- name: System uptime
  key: system.uptime[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  value_type: unsigned
  units: uptime
  description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Available memory
  key: vm.memory.available[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: B
  description: "The available memory:\r\n- in Linux - available = free + buffers +\
    \ cache;\r\n- on other platforms calculation may vary.\r\n\r\nSee also Appendixes\
    \ in Zabbix Documentation about parameters of the `vm.memory.size` item."
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Total memory
  key: vm.memory.total[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  units: B
  description: Total memory expressed in bytes.
  history: 31d
  tags:
  - tag: component
    value: memory
- name: Memory utilization
  key: vm.memory.util[node_exporter]
  interval: 1m
  type: calculated
  params: (last(//vm.memory.total[node_exporter])-last(//vm.memory.available[node_exporter]))/last(//vm.memory.total[node_exporter])*100
  units: '%'
  description: Percentage calculated as (total-available)/total*100.
  history: 31d
  tags:
  - tag: component
    value: memory
triggers:
- name: 'Linux: Running out of file descriptors'
  expression: last(/Linux by Prom/fd.open[node_exporter])/last(/Linux by Prom/kernel.maxfiles[node_exporter])*100>80
  severity: warning
  tags:
  - tag: scope
    value: performance
- name: 'Linux: Configured max number of open filedescriptors is too low'
  expression: last(/Linux by Prom/kernel.maxfiles[node_exporter])<256
  severity: information
  tags:
  - tag: scope
    value: performance
- name: 'Linux: node_exporter is not available'
  expression: nodata(/Linux by Prom/node_exporter.get,30m)=1
  severity: warning
  description: Failed to fetch system metrics from node_exporter in time.
  tags:
  - tag: scope
    value: availability
- name: 'Linux: Load average is too high'
  expression: "min(/Linux by Prom/system.cpu.load.avg1[node_exporter],5m)/last(/Linux\
    \ by Prom/system.cpu.num[node_exporter])>1.5\r\nand last(/Linux by Prom/system.cpu.load.avg5[node_exporter])>0\r\
    \nand last(/Linux by Prom/system.cpu.load.avg15[node_exporter])>0"
  severity: average
  description: The load average per CPU is too high. The system may be slow to respond.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: High CPU utilization'
  expression: min(/Linux by Prom/system.cpu.util[node_exporter],5m)>90
  severity: warning
  description: The CPU utilization is too high. The system might be slow to respond.
  tags:
  - tag: scope
    value: performance
- name: 'Linux: System time is out of sync'
  expression: fuzzytime(/Linux by Prom/system.localtime[node_exporter],60s)=0
  severity: warning
  recovery_expression: fuzzytime(/Linux by Prom/system.localtime[node_exporter],10s)=1
  description: The host's system time is different from Zabbix server time.
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Linux: System name has changed'
  expression: last(/Linux by Prom/system.name[node_exporter],#1)<>last(/Linux by Prom/system.name[node_exporter],#2)
    and length(last(/Linux by Prom/system.name[node_exporter]))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
  - tag: scope
    value: security
- name: 'Linux: Operating system description has changed'
  expression: last(/Linux by Prom/system.sw.os[node_exporter],#1)<>last(/Linux by
    Prom/system.sw.os[node_exporter],#2) and length(last(/Linux by Prom/system.sw.os[node_exporter]))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Linux: High swap space usage'
  expression: max(/Linux by Prom/system.swap.pfree[node_exporter],5m)<50 and last(/Linux
    by Prom/system.swap.total[node_exporter])>0
  severity: warning
  description: If there is no swap configured, this trigger is ignored.
  tags:
  - tag: scope
    value: capacity
- name: 'Linux: {HOST.NAME} has been restarted'
  expression: last(/Linux by Prom/system.uptime[node_exporter])<10m
  severity: warning
  description: The device uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Linux: Lack of available memory'
  expression: max(/Linux by Prom/vm.memory.available[node_exporter],5m)<20M and last(/Linux
    by Prom/vm.memory.total[node_exporter])>0
  severity: average
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
- name: 'Linux: High memory utilization'
  expression: min(/Linux by Prom/vm.memory.util[node_exporter],5m)>90
  severity: average
  description: The system is running out of free memory.
  tags:
  - tag: scope
    value: capacity
  - tag: scope
    value: performance
discovery_rules:
- name: Network interface discovery
  key: net.if.discovery[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  filter:
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[node_exporter"{#IFNAME}"]
    interval: '0'
    type: dependent
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[node_exporter,"{#IFNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): High error rate'
    expression: "min(/Linux by Prom/net.if.in.errors[node_exporter,\"{#IFNAME}\"],5m)>2\r\
      \nor min(/Linux by Prom/net.if.out.errors[node_exporter\"{#IFNAME}\"],5m)>2"
    severity: warning
    recovery_expression: "max(/Linux by Prom/net.if.in.errors[node_exporter,\"{#IFNAME}\"\
      ],5m)<2*0.8\r\nand max(/Linux by Prom/net.if.out.errors[node_exporter\"{#IFNAME}\"\
      ],5m)<2*0.8"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
    expression: "(avg(/Linux by Prom/net.if.in[node_exporter,\"{#IFNAME}\"],15m)>(90/100)*last(/Linux\
      \ by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"]) or\r\navg(/Linux by Prom/net.if.out[node_exporter,\"\
      {#IFNAME}\"],15m)>(90/100)*last(/Linux by Prom/net.if.speed[node_exporter,\"\
      {#IFNAME}\"])) and\r\nlast(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"\
      ])>0"
    severity: warning
    recovery_expression: "avg(/Linux by Prom/net.if.in[node_exporter,\"{#IFNAME}\"\
      ],15m)<((90-3)/100)*last(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"\
      ]) and\r\navg(/Linux by Prom/net.if.out[node_exporter,\"{#IFNAME}\"],15m)<((90-3)/100)*last(/Linux\
      \ by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"])"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed
      than it was before'
    expression: "change(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"])<0\
      \ and last(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"])>0\r\nand\
      \ (\r\nlast(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=6 or\r\n\
      last(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=7 or\r\nlast(/Linux\
      \ by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=11 or\r\nlast(/Linux by\
      \ Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=62 or\r\nlast(/Linux by Prom/net.if.type[node_exporter,\"\
      {#IFNAME}\"])=69 or\r\nlast(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"\
      ])=117\r\n)\r\nand\r\n(last(/Linux by Prom/net.if.status[node_exporter,\"{#IFNAME}\"\
      ])<>2)"
    severity: information
    recovery_expression: "(change(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"\
      ])>0 and last(/Linux by Prom/net.if.speed[node_exporter,\"{#IFNAME}\"],#2)>0)\
      \ or\r\n(last(/Linux by Prom/net.if.status[node_exporter,\"{#IFNAME}\"])=2)"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed
      than it was before'
    expression: "change(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])<0\
      \ and last(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])>0\r\nand\r\
      \n(last(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=6\r\nor last(/Linux\
      \ by Prom/net.if.type[node_exporter,\"{#IFNAME}\"])=1)\r\nand\r\n(last(/Linux\
      \ by Prom/net.if.status[node_exporter,\"{#IFNAME}\"])<>2)"
    severity: information
    recovery_expression: "(change(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"\
      ])>0 and last(/Linux by Prom/net.if.type[node_exporter,\"{#IFNAME}\"],#2)>0)\
      \ or\r\n(last(/Linux by Prom/net.if.status[node_exporter,\"{#IFNAME}\"])=2)"
    allow_manual_close: true
  - name: 'Linux: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and last(/Linux by Prom/net.if.status[node_exporter,"{#IFNAME}"])=2
      and (last(/Linux by Prom/net.if.status[node_exporter,"{#IFNAME}"],#1)<>last(/Linux
      by Prom/net.if.status[node_exporter,"{#IFNAME}"],#2))
    severity: average
    recovery_expression: last(/Linux by Prom/net.if.status[node_exporter,"{#IFNAME}"])<>2
      or 1=0
    allow_manual_close: true
- name: Block devices discovery
  key: vfs.dev.discovery[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  filter:
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.MATCHES}'
  - macro: '{#DEVNAME}'
    value: '{$VFS.DEV.DEVNAME.NOT_MATCHES}'
  item_prototypes:
  - name: '{#DEVNAME}: Disk read request avg waiting time (r_await)'
    key: vfs.dev.read.await[node_exporter,"{#DEVNAME}"]
    interval: 1m
    type: calculated
    params: (last(//vfs.dev.read.time.rate[node_exporter,"{#DEVNAME}"])/(last(//vfs.dev.read.rate[node_exporter,"{#DEVNAME}"])+(last(//vfs.dev.read.rate[node_exporter,"{#DEVNAME}"])=0)))*1000*(last(//vfs.dev.read.rate[node_exporter,"{#DEVNAME}"])
      > 0)
    units: '!ms'
  - name: '{#DEVNAME}: Disk write request avg waiting time (w_await)'
    key: vfs.dev.write.await[node_exporter,"{#DEVNAME}"]
    interval: 1m
    type: calculated
    params: (last(//vfs.dev.write.time.rate[node_exporter,"{#DEVNAME}"])/(last(//vfs.dev.write.rate[node_exporter,"{#DEVNAME}"])+(last(//vfs.dev.write.rate[node_exporter,"{#DEVNAME}"])=0)))*1000*(last(//vfs.dev.write.rate[node_exporter,"{#DEVNAME}"])
      > 0)
    units: '!ms'
  - name: '{#DEVNAME}: Disk average queue size (avgqu-sz)'
    key: vfs.dev.queue_size[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
  - name: '{#DEVNAME}: Disk read rate'
    key: vfs.dev.read.rate[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
    units: '!r/s'
  - name: '{#DEVNAME}: Disk read time (rate)'
    key: vfs.dev.read.time.rate[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
  - name: '{#DEVNAME}: Disk utilization'
    key: vfs.dev.util[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
    units: '%'
  - name: '{#DEVNAME}: Disk write rate'
    key: vfs.dev.write.rate[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
    units: '!w/s'
  - name: '{#DEVNAME}: Disk write time (rate)'
    key: vfs.dev.write.time.rate[node_exporter,"{#DEVNAME}"]
    interval: '0'
    type: dependent
  trigger_prototypes:
  - name: 'Linux: {#DEVNAME}: Disk read/write request responses are too high'
    expression: min(/Linux by Prom/vfs.dev.read.await[node_exporter,"{#DEVNAME}"],15m)
      > 20 or min(/Linux by Prom/vfs.dev.write.await[node_exporter,"{#DEVNAME}"],15m)
      > 20
    severity: warning
    allow_manual_close: true
- name: Mounted filesystem discovery
  key: vfs.fs.discovery[node_exporter]
  interval: '0'
  type: dependent
  master_item_key: node_exporter.get
  filter:
  - macro: '{#FSDEVICE}'
    value: '{$VFS.FS.FSDEVICE.NOT_MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSDEVICE.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.MATCHES}'
  - macro: '{#FSNAME}'
    value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.MATCHES}'
  - macro: '{#FSTYPE}'
    value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'FS [{#FSNAME}]: Space: Available'
    key: vfs.fs.free[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    units: B
  - name: 'FS [{#FSNAME}]: Inodes: Free, in %'
    key: vfs.fs.inode.pfree[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Used, in %'
    key: vfs.fs.pused[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    units: '%'
  - name: 'FS [{#FSNAME}]: Space: Total'
    key: vfs.fs.total[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    units: B
  - name: 'FS [{#FSNAME}]: Space: Used'
    key: vfs.fs.used[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    units: B
  - name: 'FS [{#FSNAME}]: Filesystem is read-only'
    key: vfs.fs.[node_exporter,"{#FSNAME}"]
    interval: '0'
    type: dependent
    value_type: unsigned
  trigger_prototypes:
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by Prom/vfs.fs.inode.pfree[node_exporter,"{#FSNAME}"],5m)<10
    severity: average
  - name: 'Linux: FS [{#FSNAME}]: Running out of free inodes'
    expression: min(/Linux by Prom/vfs.fs.inode.pfree[node_exporter,"{#FSNAME}"],5m)<20
    severity: warning
  - name: 'Linux: FS [{#FSNAME}]: Space is critically low'
    expression: min(/Linux by Prom/vfs.fs.pused[node_exporter,"{#FSNAME}"],5m)>90
    severity: average
    allow_manual_close: true
  - name: 'Linux: FS [{#FSNAME}]: Space is low'
    expression: min(/Linux by Prom/vfs.fs.pused[node_exporter,"{#FSNAME}"],5m)>80
    severity: warning
    allow_manual_close: true
  - name: 'Linux: FS [{#FSNAME}]: Filesystem has become read-only'
    expression: last(/Linux by Prom/vfs.fs.[node_exporter,"{#FSNAME}"],#2)=0 and last(/Linux
      by Prom/vfs.fs.[node_exporter,"{#FSNAME}"])=1
    severity: average
    recovery_expression: last(/Linux by Prom/vfs.fs.[node_exporter,"{#FSNAME}"])=0
    allow_manual_close: true
