template: Cisco Catalyst 3750V2-24FS by SNMP
description: "Template Cisco Catalyst 3750V2-24FS\r\n  \r\n  MIBs used:\r\n  CISCO-MEMORY-POOL-MIB\r\
  \n  IF-MIB\r\n  EtherLike-MIB\r\n  SNMPv2-MIB\r\n  CISCO-PROCESS-MIB\r\n  CISCO-ENVMON-MIB\r\
  \n  ENTITY-MIB\r\n\r\nYou can discuss this template or leave feedback on our forum\
  \ https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/418396-discussion-thread-for-official-zabbix-templates-for-cisco\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
groups:
- Templates
items:
- name: ICMP ping
  key: icmpping
  interval: 1m
  type: simple_check
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP loss
  key: icmppingloss
  interval: 1m
  type: simple_check
  units: '%'
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: ICMP response time
  key: icmppingsec
  interval: 1m
  type: simple_check
  units: s
  history: 31d
  tags:
  - tag: component
    value: health
  - tag: component
    value: network
- name: SNMP traps (fallback)
  key: snmptrap.fallback
  interval: '0'
  type: snmp_trap
  value_type: log
  description: Item is used to collect all SNMP traps unmatched by other snmptrap
    items
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System contact details
  key: system.contact
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe textual identification of the contact person\
    \ for this managed node, together with information on how to contact this person.\
    \  If no contact information is known, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System description
  key: system.descr
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nA textual description of the entity. This value\
    \ should\r\ninclude the full name and version identification of the system's hardware\
    \ type, software operating-system, and\r\nnetworking software."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware model name
  key: system.hw.model
  interval: 1h
  value_type: char
  description: 'MIB: ENTITY-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Hardware serial number
  key: system.hw.serialnumber
  interval: 1h
  value_type: char
  description: 'MIB: ENTITY-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (hardware)
  key: system.hw.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: "MIB: HOST-RESOURCES-MIB\r\nThe amount of time since this host was\
    \ last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB\
    \ [RFC1907] because sysUpTime is the uptime of the network management portion\
    \ of the system."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System location
  key: system.location
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe physical location of this node (e.g., `telephone\
    \ closet, 3rd floor').  If the location is unknown, the value is the zero-length\
    \ string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System name
  key: system.name
  interval: 1h
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nAn administratively-assigned name for this managed\
    \ node.By convention, this is the node's fully-qualified domain name.  If the\
    \ name is unknown, the value is the zero-length string."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Uptime (network)
  key: system.net.uptime
  interval: 1m
  value_type: unsigned
  units: uptime
  description: "MIB: SNMPv2-MIB\r\nThe time (in hundredths of a second) since the\
    \ network management portion of the system was last re-initialized."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: System object ID
  key: system.objectid
  interval: 1m
  value_type: char
  description: "MIB: SNMPv2-MIB\r\nThe vendor's authoritative identification of the\
    \ network management subsystem contained in the entity.  This value is allocated\
    \ within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous\
    \ means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones,\
    \ Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier\
    \ 1.3.6.1.4.1.4242.1.1 to its `Fred Router'."
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: Operating system
  key: system.sw.os
  interval: 1h
  value_type: char
  description: 'MIB: SNMPv2-MIB'
  history: 31d
  trends: '0'
  tags:
  - tag: component
    value: system
- name: SNMP agent availability
  key: zabbix[host,snmp,available]
  interval: 1m
  type: zabbix_internal
  value_type: unsigned
  history: 31d
  tags:
  - tag: component
    value: system
triggers:
- name: 'Cisco Catalyst 3750V2-24FS: Unavailable by ICMP ping'
  expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/icmpping,#3)=0
  severity: high
  description: Last three attempts returned timeout.  Please check device connectivity.
  tags:
  - tag: scope
    value: availability
- name: 'Cisco Catalyst 3750V2-24FS: High ICMP ping loss'
  expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/icmppingloss,5m)>20 and min(/Cisco
    Catalyst 3750V2-24FS by SNMP/icmppingloss,5m)<100
  severity: warning
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco Catalyst 3750V2-24FS: High ICMP ping response time'
  expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/icmppingsec,5m)>0.15
  severity: warning
  tags:
  - tag: scope
    value: availability
  - tag: scope
    value: performance
- name: 'Cisco Catalyst 3750V2-24FS: Device has been replaced'
  expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber,#1)<>last(/Cisco
    Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber,#2) and length(last(/Cisco
    Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber))>0
  severity: information
  description: The device serial number has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco Catalyst 3750V2-24FS: Host has been restarted'
  expression: (last(/Cisco Catalyst 3750V2-24FS by SNMP/system.hw.uptime)>0 and last(/Cisco
    Catalyst 3750V2-24FS by SNMP/system.hw.uptime)<10m) or (last(/Cisco Catalyst 3750V2-24FS
    by SNMP/system.hw.uptime)=0 and last(/Cisco Catalyst 3750V2-24FS by SNMP/system.net.uptime)<10m)
  severity: warning
  description: Uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco Catalyst 3750V2-24FS: System name has changed'
  expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/system.name,#1)<>last(/Cisco
    Catalyst 3750V2-24FS by SNMP/system.name,#2) and length(last(/Cisco Catalyst 3750V2-24FS
    by SNMP/system.name))>0
  severity: information
  description: The name of the system has changed. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco Catalyst 3750V2-24FS: Operating system description has changed'
  expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/system.sw.os,#1)<>last(/Cisco
    Catalyst 3750V2-24FS by SNMP/system.sw.os,#2) and length(last(/Cisco Catalyst
    3750V2-24FS by SNMP/system.sw.os))>0
  severity: information
  description: The description of the operating system has changed. Possible reasons
    are that the system has been updated or replaced. Acknowledge to close the problem
    manually.
  tags:
  - tag: scope
    value: notice
- name: 'Cisco Catalyst 3750V2-24FS: No SNMP data collection'
  expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/zabbix[host,snmp,available],5m)=0
  severity: warning
  description: SNMP is not available for polling. Please check device connectivity
    and SNMP settings.
  tags:
  - tag: scope
    value: availability
discovery_rules:
- name: CPU discovery
  key: cpu.discovery
  interval: 1h
  item_prototypes:
  - name: '#{#SNMPINDEX}: CPU utilization'
    key: system.cpu.util[{#SNMPINDEX}]
    interval: 5m
    units: '%'
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: #{#SNMPINDEX}: High CPU utilization'
    expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/system.cpu.util[{#SNMPINDEX}],5m)>90
    severity: warning
- name: Entity Serial Numbers discovery
  key: entity_sn.discovery
  interval: 1h
  filter:
  - macro: '{#ENT_CLASS}'
    value: '[^3]'
  - macro: '{#ENT_SN}'
    value: .+
  item_prototypes:
  - name: '{#ENT_NAME}: Hardware serial number'
    key: system.hw.serialnumber[{#SNMPINDEX}]
    interval: 1h
    value_type: char
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: {#ENT_NAME}: Device has been replaced'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber[{#SNMPINDEX}],#1)<>last(/Cisco
      Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber[{#SNMPINDEX}],#2) and length(last(/Cisco
      Catalyst 3750V2-24FS by SNMP/system.hw.serialnumber[{#SNMPINDEX}]))>0
    severity: information
- name: FAN discovery
  key: fan.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SNMPVALUE}: Fan status'
    key: sensor.fan.status[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Fan is in critical state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.fan.status[{#SNMPINDEX}])=3
      or last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.fan.status[{#SNMPINDEX}])=4
    severity: average
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Fan is in warning state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.fan.status[{#SNMPINDEX}])=2
    severity: warning
- name: Memory discovery
  key: memory.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SNMPVALUE}: Free memory'
    key: vm.memory.free[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#SNMPVALUE}: Used memory'
    key: vm.memory.used[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: B
  - name: '{#SNMPVALUE}: Memory utilization'
    key: vm.memory.util[{#SNMPINDEX}]
    interval: 1m
    type: calculated
    params: last(//vm.memory.used[{#SNMPINDEX}])/(last(//vm.memory.free[{#SNMPINDEX}])+last(//vm.memory.used[{#SNMPINDEX}]))*100
    units: '%'
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: High memory utilization'
    expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/vm.memory.util[{#SNMPINDEX}],5m)>90
    severity: average
- name: Network interfaces discovery
  key: net.if.discovery
  interval: 1h
  filter:
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
  - macro: '{#IFADMINSTATUS}'
    value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.MATCHES}'
  - macro: '{#IFALIAS}'
    value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.MATCHES}'
  - macro: '{#IFDESCR}'
    value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.MATCHES}'
  - macro: '{#IFNAME}'
    value: '{$NET.IF.IFNAME.NOT_MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
  - macro: '{#IFOPERSTATUS}'
    value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.MATCHES}'
  - macro: '{#IFTYPE}'
    value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
    key: net.if.in.discards[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
    key: net.if.in.errors[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
    key: net.if.in[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
    key: net.if.out.discards[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
    key: net.if.out.errors[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
    key: net.if.out[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
    key: net.if.speed[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
    units: bps
  - name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
    key: net.if.status[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
    key: net.if.type[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): High input
      error rate'
    expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.in.errors[{#SNMPINDEX}],5m)>2
    severity: warning
    recovery_expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.in.errors[{#SNMPINDEX}],5m)<2*0.8
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): High inbound
      bandwidth usage'
    expression: "(avg(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.in[{#SNMPINDEX}],15m)>(90/100)*last(/Cisco\
      \ Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])) and\r\nlast(/Cisco\
      \ Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.in[{#SNMPINDEX}],15m)<((90-3)/100)*last(/Cisco
      Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): High output
      error rate'
    expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.out.errors[{#SNMPINDEX}],5m)>2
    severity: warning
    recovery_expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.out.errors[{#SNMPINDEX}],5m)<2*0.8
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): High outbound
      bandwidth usage'
    expression: "(avg(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.out[{#SNMPINDEX}],15m)>(90/100)*last(/Cisco\
      \ Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])) and\r\nlast(/Cisco\
      \ Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])>0"
    severity: warning
    recovery_expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.out[{#SNMPINDEX}],15m)<((90-3)/100)*last(/Cisco
      Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): Ethernet has
      changed to lower speed than it was before'
    expression: "change(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])<0\
      \ and last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])>0\r\
      \nand (\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=6\
      \ or\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=7\
      \ or\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=11\
      \ or\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=62\
      \ or\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=69\
      \ or\r\nlast(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.type[{#SNMPINDEX}])=117\r\
      \n)\r\nand\r\n(last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.status[{#SNMPINDEX}])<>2)"
    severity: information
    recovery_expression: "(change(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}])>0\
      \ and last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.speed[{#SNMPINDEX}],#2)>0)\
      \ or\r\n(last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.status[{#SNMPINDEX}])=2)"
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): Link down'
    expression: 1=1 and (last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.status[{#SNMPINDEX}])=2)
    severity: average
- name: EtherLike discovery
  key: net.if.duplex.discovery
  interval: 1h
  filter:
  - macro: '{#IFOPERSTATUS}'
    value: '1'
  - macro: '{#SNMPVALUE}'
    value: (2|3)
  item_prototypes:
  - name: 'Interface {#IFNAME}({#IFALIAS}): Duplex status'
    key: net.if.duplex[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: Interface {#IFNAME}({#IFALIAS}): In half-duplex
      mode'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/net.if.duplex[{#SNMPINDEX}])=2
    severity: warning
- name: PSU discovery
  key: psu.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SNMPVALUE}: Power supply status'
    key: sensor.psu.status[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Power supply is in critical state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.psu.status[{#SNMPINDEX}])=3
      or last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.psu.status[{#SNMPINDEX}])=4
    severity: average
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Power supply is in warning state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.psu.status[{#SNMPINDEX}])=2
    severity: warning
- name: Temperature discovery
  key: temperature.discovery
  interval: 1h
  item_prototypes:
  - name: '{#SNMPVALUE}: Temperature status'
    key: sensor.temp.status[{#SNMPINDEX}]
    interval: 1m
    value_type: unsigned
  - name: '{#SNMPVALUE}: Temperature'
    key: sensor.temp.value[{#SNMPINDEX}]
    interval: 1m
    units: °C
  trigger_prototypes:
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Temperature is in critical state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.status[{#SNMPINDEX}])=3
      or last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.status[{#SNMPINDEX}])=4
    severity: high
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Temperature is in warning state'
    expression: last(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.status[{#SNMPINDEX}])=2
    severity: warning
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Temperature is above critical
      threshold'
    expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>60
    severity: high
    recovery_expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<60-3
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Temperature is above warning
      threshold'
    expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>50
    severity: warning
    recovery_expression: max(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<50-3
  - name: 'Cisco Catalyst 3750V2-24FS: {#SNMPVALUE}: Temperature is too low'
    expression: avg(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<5
    severity: average
    recovery_expression: min(/Cisco Catalyst 3750V2-24FS by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>5+3
