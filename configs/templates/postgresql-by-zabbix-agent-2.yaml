- name: Cache hit ratio, %
  key: pgsql.cache.hit
  interval: 1m
  type: calculated
  params: last(//pgsql.dbstat.sum.blks_hit.rate) * 100 / (last(//pgsql.dbstat.sum.blks_hit.rate)
    + last(//pgsql.dbstat.sum.blks_read.rate))
  units: '%'
  description: Cache hit ratio.
  history: 31d
  tags:
  - tag: component
    value: cache
