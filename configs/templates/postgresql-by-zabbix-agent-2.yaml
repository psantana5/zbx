template: PostgreSQL by Zabbix agent 2
description: "This template is designed for the deployment of PostgreSQL monitoring\
  \ by Zabbix via Zabbix agent 2 and uses a loadable plugin to run SQL queries.\r\n\
  \r\nSetup:\r\n\r\n1. Deploy Zabbix agent 2 with the PostgreSQL plugin. Starting\
  \ with Zabbix versions 6.0.10 / 6.2.4 / 6.4 PostgreSQL metrics are moved to a loadable\
  \ plugin and require installation of a separate package or compilation of the plugin\
  \ from sources (https://www.zabbix.com/documentation/7.4/manual/extensions/plugins/build).\r\
  \n\r\n2. Create the PostgreSQL user for monitoring (`<password>` at your discretion)\
  \ and inherit permissions from the default role `pg_monitor`:\r\nCREATE USER zbx_monitor\
  \ WITH PASSWORD '<PASSWORD>' INHERIT;\r\nGRANT pg_monitor TO zbx_monitor;\r\n\r\n\
  3. Edit the `pg_hba.conf` configuration file to allow connections for the user `zbx_monitor`.\
  \ You can check the PostgreSQL documentation for examples (https://www.postgresql.org/docs/current/auth-pg-hba-conf.html).\r\
  \n\r\n4. Set the connection string for the PostgreSQL instance in the `{$PG.CONNSTRING.AGENT2}`\
  \ macro as URI, such as `<protocol(host:port)>`, or specify the named session -\
  \ `<sessionname>`.\r\n\r\nNote: if you want to use SSL/TLS encryption to protect\
  \ communications with the remote PostgreSQL instance, a named session must be used.\
  \ In that case, the instance URI should be specified in the `Plugins.PostgreSQL.Sessions.*.Uri`\
  \ parameter in the PostgreSQL plugin configuration files alongside all the encryption\
  \ parameters (type, certificate/key filepaths if needed etc.).\r\n\r\nYou can check\
  \ the PostgreSQL plugin documentation (https://git.zabbix.com/projects/AP/repos/postgresql/browse?at=refs%2Fheads%2Frelease%2F7.4)\
  \ for details about agent plugin parameters and named sessions.\r\n\r\nAlso, it\
  \ is assumed that you set up the PostgreSQL instance to work in the desired encryption\
  \ mode. Check the PostgreSQL documentation (https://www.postgresql.org/docs/current/ssl-tcp.html)\
  \ for details.\r\n\r\nNote that plugin TLS certificate validation relies on checking\
  \ the Subject Alternative Names (SAN) instead of the Common Name (CN), check the\
  \ cryptography package documentation (https://pkg.go.dev/crypto/x509) for details.\r\
  \n\r\nFor example, to enable required encryption in transport mode without identity\
  \ checks you could create the file `/etc/zabbix/zabbix_agent2.d/postgresql_myconn.conf`\
  \ with the following configuration for the named session `myconn` (replace `<instanceip>`\
  \ with the address of the PostgreSQL instance):\r\nPlugins.PostgreSQL.Sessions.myconn.Uri=tcp://<instanceip>:5432\r\
  \nPlugins.PostgreSQL.Sessions.myconn.TLSConnect=required\r\n\r\nThen set the `{$PG.CONNSTRING.AGENT2}`\
  \ macro to `myconn` to use this named session.\r\n\r\n5. Set the password that you\
  \ specified in step 2 in the macro `{$PG.PASSWORD}`.\r\n\r\nYou can discuss this\
  \ template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/384190-%C2%A0discussion-thread-for-official-zabbix-template-db-postgresql\r\
  \n\r\nGenerated by official Zabbix template tool \"Templator\""
