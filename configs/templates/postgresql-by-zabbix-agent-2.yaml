  - name: 'DB [{#DBNAME}]: Num of rowexclusive locks'
    key: pgsql.locks.rowexclusive["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.locks.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Num of rowshare locks'
    key: pgsql.locks.rowshare["{#DBNAME}"]
    interval: '0'
