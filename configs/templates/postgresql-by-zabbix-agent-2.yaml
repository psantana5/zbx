    key: pgsql.queries.tx.slow_count["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Queries max transaction time'
    key: pgsql.queries.tx.time_max["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
