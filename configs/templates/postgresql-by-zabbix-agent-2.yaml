triggers:
- name: 'PostgreSQL: Total number of connections is too high'
  expression: min(/PostgreSQL by Zabbix agent 2/pgsql.connections.sum.total_pct,5m)
    > 90
  severity: average
  description: Total number of current connections exceeds the limit of {$PG.CONN_TOTAL_PCT.MAX.WARN}%
    out of the maximum number of concurrent connections to the database server (the
    "max_connections" setting).
  tags:
  - tag: scope
    value: performance
- name: 'PostgreSQL: Dbstat: Checksum failures detected'
  expression: last(/PostgreSQL by Zabbix agent 2/pgsql.dbstat.sum.checksum_failures.rate)>0
  severity: average
  description: "Data page checksum failures were detected on that DB instance:\r\n\
    https://www.postgresql.org/docs/current/checksums.html"
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Oldest xid is too big'
  expression: last(/PostgreSQL by Zabbix agent 2/pgsql.oldest.xid["tcp://localhost:5432","zbx_monitor","******","postgres"])
    > 18000000
  severity: average
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Service is down'
  expression: last(/PostgreSQL by Zabbix agent 2/pgsql.ping["tcp://localhost:5432","zbx_monitor","******","postgres"])=0
  severity: high
  description: Last test of a connection was unsuccessful.
  tags:
  - tag: scope
    value: availability
- name: 'PostgreSQL: Service has been restarted'
  expression: last(/PostgreSQL by Zabbix agent 2/pgsql.uptime["tcp://localhost:5432","zbx_monitor","******","postgres"])
    < 10m
  severity: average
  description: PostgreSQL uptime is less than 10 minutes.
  tags:
  - tag: scope
    value: notice
- name: 'PostgreSQL: Version has changed'
  expression: last(/PostgreSQL by Zabbix agent 2/pgsql.version["tcp://localhost:5432","zbx_monitor","******","postgres"],#1)<>last(/PostgreSQL
    by Zabbix agent 2/pgsql.version["tcp://localhost:5432","zbx_monitor","******","postgres"],#2)
    and length(last(/PostgreSQL by Zabbix agent 2/pgsql.version["tcp://localhost:5432","zbx_monitor","******","postgres"]))>0
  severity: information
  tags:
  - tag: scope
    value: notice
discovery_rules:
- name: Database discovery
  key: pgsql.db.discovery["{$PG.CONNSTRING.AGENT2}","{$PG.USER}","{$PG.PASSWORD}","{$PG.DATABASE}"]
  interval: 1h
  filter:
  - macro: '{#DBNAME}'
    value: '{$PG.LLD.FILTER.DBNAME}'
  item_prototypes:
  - name: 'DB [{#DBNAME}]: Database age'
    key: pgsql.db.age["{$PG.CONNSTRING.AGENT2}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    interval: 10m
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Bloating tables'
    key: pgsql.db.bloating_tables["{$PG.CONNSTRING.AGENT2}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    interval: 1m
    value_type: unsigned
  - name: 'DB [{#DBNAME}]: Database size'
    key: pgsql.db.size["{$PG.CONNSTRING.AGENT2}","{$PG.USER}","{$PG.PASSWORD}","{#DBNAME}"]
    interval: 5m
    value_type: unsigned
    units: B
  - name: 'DB [{#DBNAME}]: Get dbstat'
    key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'DB [{#DBNAME}]: Get locks'
    key: pgsql.locks.get_metrics["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'DB [{#DBNAME}]: Get queries'
    key: pgsql.queries.get_metrics["{#DBNAME}"]
    interval: '0'
    type: dependent
    value_type: text
  - name: 'DB [{#DBNAME}]: Blocks hit per second'
    key: pgsql.dbstat.blks_hit.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Disk blocks read per second'
    key: pgsql.dbstat.blks_read.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
  - name: 'DB [{#DBNAME}]: Disk blocks read time per second'
    key: pgsql.dbstat.blk_read_time.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    units: s
  - name: 'DB [{#DBNAME}]: Disk blocks write time'
    key: pgsql.dbstat.blk_write_time.rate["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.dbstat.get_metrics["{#DBNAME}"]
    units: s
  - name: 'DB [{#DBNAME}]: Checksum failures'
