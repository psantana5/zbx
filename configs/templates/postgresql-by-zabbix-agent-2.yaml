  - name: 'DB [{#DBNAME}]: Queries sum transaction time'
    key: pgsql.queries.tx.time_sum["{#DBNAME}"]
    interval: '0'
    type: dependent
    master_item_key: pgsql.queries.get_metrics["{#DBNAME}"]
    value_type: unsigned
