name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"        # triggers on git tag: v0.2.0, v1.0.0, etc.
  workflow_dispatch:    # allow manual publish from Actions UI

jobs:
  build-and-publish:
    name: Build and publish zbx-tool
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token secret needed.
        # Configure trusted publisher at https://pypi.org/manage/project/zbx-tool/settings/publishing/
