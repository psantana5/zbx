name: Auto-merge AI PRs

# After the test suite passes on an ai/* branch, auto-squash-merge the PR.
on:
  workflow_run:
    workflows: ["Run tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    # Only act on branches created by the autonomous agent
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'ai/')

    steps:
      - name: Find PR for this branch
        id: find_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh pr list \
               --repo "$REPO" \
               --head "$BRANCH" \
               --state open \
               --json number,title,body \
               --jq '.[0]' 2>/dev/null)

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No open PR found for branch $BRANCH — skipping."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR" | jq -r '.number')
          PR_TITLE=$(echo "$PR"  | jq -r '.title')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE"   >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER: $PR_TITLE"

      - name: Merge PR
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.find_pr.outputs.pr_title }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --subject "$(echo "$PR_TITLE")" \
            --body "Auto-merged after all tests passed. ✅" \
            --delete-branch
          echo "Merged PR #$PR_NUMBER"

      - name: Comment on originating issue
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.find_pr.outputs.pr_number }}
        run: |
          # Extract the issue number from the PR body (looks for "Closes #NNN" or "Fixes #NNN")
          ISSUE=$(gh pr view "$PR_NUMBER" \
                    --repo "$REPO" \
                    --json body \
                    --jq '.body' \
                  | grep -oP '(?i)(closes|fixes)\s+#\K[0-9]+' \
                  | head -1)

          if [ -n "$ISSUE" ]; then
            gh issue comment "$ISSUE" \
              --repo "$REPO" \
              --body "✅ PR #$PR_NUMBER was automatically merged after all tests passed. This issue can now be closed."
            gh issue close "$ISSUE" \
              --repo "$REPO" \
              --comment "Resolved by the autonomous agent — auto-merged."
          else
            echo "No linked issue found in PR body — skipping issue comment."
          fi
