name: Autonomous Agent

# Runs daily at 02:00 UTC, or on-demand with selectable mode.
on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day
  workflow_dispatch:
    inputs:
      mode:
        description: "Agent mode"
        required: true
        default: "full"
        type: choice
        options:
          - full       # scan + process issues (default daily)
          - scan       # analyse codebase and create ai-task issues only
          - issues     # process all open ai-task issues only
          - release    # auto-bump version and open release PR
      dry_run:
        description: "Dry-run (no GitHub writes)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: autonomous-agent
  cancel-in-progress: false   # never cancel a running agent

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release mode

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install zbx and agent dependencies
        run: pip install -e ".[dev]" requests openai

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run autonomous agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          AGENT_MODE: ${{ github.event.inputs.mode || 'full' }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: python .github/scripts/autonomous_agent.py
