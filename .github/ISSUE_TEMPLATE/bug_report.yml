name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: zbxctl version
      description: Output of `zbx --version`
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python3 --version`
      placeholder: "3.11.x"
    validations:
      required: true

  - type: input
    id: zabbix
    attributes:
      label: Zabbix server version
      placeholder: "7.x"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `zbx plan configs/...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant YAML config (if any)
      description: Paste the YAML that triggered the bug (remove any credentials)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      render: shell
    validations:
      required: false
