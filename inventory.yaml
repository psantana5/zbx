# zbx inventory
#
# Defines all hosts managed by zbx — analogous to an Ansible inventory.
# This is the single source of truth for:
#   - what hosts exist in Zabbix (groups, IP, port)
#   - which scripts live on each host and what UserParameters they expose
#
# Workflow:
#   zbx inventory list                      # see what Zabbix currently has
#   zbx inventory apply inventory.yaml      # create/update hosts in Zabbix
#   zbx agent diff   <hostname>             # preview agent-side changes
#   zbx agent deploy <hostname>             # deploy scripts + write userparams
#   zbx agent test   <hostname>             # verify keys with zabbix_agentd -t
#   zbx apply configs/hosts/<hostname>.yaml # link templates + set macros
#
# LOCAL HOST NOTE:
#   If ip is 127.0.0.1 / localhost / ::1, zbx skips SSH entirely and
#   runs all commands locally via subprocess. No paramiko needed.
#
# GENERIC SCRIPTS:
#   The agent.scripts[] and agent.userparameters[] sections work for ANY
#   scripts — S3 monitoring, custom app checks, disk scripts, API checks, etc.
#   Add as many scripts as needed; each is deployed independently.

hosts:

  # -------------------------------------------------------------------------
  # Example: host running on the same machine (localhost → no SSH)
  # -------------------------------------------------------------------------
  - host: zabbixtest3100
    name: "Zabbix Test Server 3100"
    ip: 127.0.0.1
    port: 10050
    groups:
      - Linux servers
      - S3 Monitoring
    templates:
      - system-health
    description: "Primary S3 monitoring test host"
    status: enabled

    agent:
      ssh_user: sanpau   # ignored for localhost, kept for documentation
      sudo: true

      # -- Scripts -----------------------------------------------------------
      # zbx compares SHA-256; only redeploys when file content changes.
      # Use zbx agent deploy <host> --from-check configs/checks/<name>/
      # to merge a check's scripts and userparameters at deploy time.
      scripts: []

      # -- UserParameters ----------------------------------------------------
      # Each entry becomes one .conf file in zabbix_agentd.d/.
      userparameters: []

        # Add more parameter groups as needed, e.g.:
        # - name: custom_simple
        #   path: /etc/zabbix/zabbix_agentd.d/userparameters_custom.conf
        #   parameters:
        #     - key: custom.api.health
        #       command: /usr/local/scripts/zabbix/check_api.py
        #     - key: "custom.disk.lld"
        #       command: /usr/local/scripts/zabbix/lld-disks.py

      restart_agent: false

      # Keys to verify after deploy (zbx agent test / zbx agent deploy)
      test_keys:
        - s3.user.discover

  # -------------------------------------------------------------------------
  # Example: remote host reached over SSH
  # -------------------------------------------------------------------------
  # - host: webserver01
  #   name: "Web Server 01"
  #   ip: 192.168.1.101
  #   port: 10050
